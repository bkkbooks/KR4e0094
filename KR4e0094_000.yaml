body:
  text: 金文靖集别集類五明提要臣等謹案金文靖集十卷明金幼孜撰幼孜有北征録已著録幼孜在洪武建文之時無所表見至永樂以訖宣德皆掌文翰機密與楊士竒諸人相亞其文章邊幅稍狹不及士竒諸人之博大而雍容雅步頗亦肩隨蓋其時明運方興故廊廟賡揚具有氣象操觚者亦不知也千頃堂書目載幼孜集十卷又外集一卷又北征集一卷今外集未見朱彛尊靜志居詩話稱其北征集大漠窮沙靡不身厯時露悲壯之音則彛尊猶及見之今亦未見是編為其子昭伯所輯詩文多應制之作蓋即黃虞稷所謂十卷之本别冠以三朝思榮録一卷則其敕諭誥命祭文像贊神道碑之屬幼孜事迹已詳明史核以本傳此録多其子孫誇侈之詞無關考證今刪去不載惟以本集著録焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:747ea97814221a0548c55ca92b11ee09f99f30c9ad37d8a53ec079fda4b20f1d
