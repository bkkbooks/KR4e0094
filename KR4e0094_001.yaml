body:
  text: 金文靖集卷一眀金幼孜撰五言古詩長林書屋為學士胡公賦我昔逰青原聞子廬滄洲近瞰芙蓉山遙睇大江流繞屋植嘉木開軒面良疇繁隂奪炎夏爽氣回髙秋庭除鳥雀靜白日人事幽牙籖積架上縹帙盈案頭講誦窮晝夜奮力追前修羣言極探索小大悉搜求藏修既有時俯仰隨所由朝吟倚蒼竹夕覽登髙樓援琴酌白酒盍簮聚朋儔抽毫落風雨揮劍拂斗牛一朝齒鄉校戰藝即見收髙舉薄霄漢逺覽帝王州匡時展經術所志在伊周清華職論思秉筆贊鴻猷步趨邇禁闥顧問紆宸旒侍從十五載荷蒙恩寵優去年省桑梓偶得尋舊丘徘徊撫林木感歎非昔逰滄波去浩浩白雲日悠悠鹿門未有期小山不可留臨風駐遐想悵恍增煩憂因之寄圗畫聊復寫綢繆尚期返初服白首同歸休辭劍圗為學士胡公賦楚平席僣偽任邪斥忠良伍奢既就烹子胥遂奔亡出疆適吳會追者何太忙行行至江滸欲渡津無梁邂逅得漁父哀窮濟以航感此脫危厄解劍聊為償父也義不受長揖增慨慷嗟彼寰中人結交布周行刎頸誓莫逆笑談出肝腸一朝嬰禍患變情非故常父也諒非舊急難恤劻勷利害等絲髮萬金一毫芒髙風振頽俗百世仰餘光夫子尚志節撫圗不能忘寫之置座隅懷古意何長斯人不可見三復涕沾裳清白堂為楊庶子賦關西昔華胄太尉古名臣直節照簡册清風動冠紳遂令千載下流光播無垠偉哉建安𣲖閥閲何嶙峋夫子負傑特學術孰與倫蜚聲起庠序髙步凌風雲決科振場屋射䇿登紫宸詞垣清切地列職逾十春瞻依近日月蒙被恩寵新從容念先訓所志在忠勤於焉揭華扁文藻麗青旻左右列圗史退休時討論庭空絶私謁來往稀回輪兢兢慎操履栗栗保貞純氷壺湛秋月玉雪含幽芬匪圗淑來裔庶以希前人蹇豫沗侍從託交誼彌敦耿耿懷補報恆恐貽緇磷登堂仰休聞企瞻愧後塵作詩寫衷曲聊以申同寅惠迪齋為臨川劉紀賦西江有佳士文采何陸離少小入庠序所習書與詩兢兢循軌則抑抑謹威儀順理身逾泰寡欲心自怡匪兹卜休咎實以嚴操持天地有常運寒暑不違時生人有常道所志在秉彛內省茍無愧安命復奚疑愚者昧厥理蹈險去坦夷違天伐恆性倒行兼逆施一朝罹顯罰寧復救顛危所以古賢聖懇懇垂訓辭齋居託令名進修誠在斯績學匪空言力行思有為乃者辭鄉邑吐氣凌虹霓振衣逰太學揖讓何委蛇及兹被寵命筮仕固有期直道茍不回志行寧有虧努力慎朝夕永保期弗隳酌泉齋為嘉靜吳員外乃弟賦昔有吳刺史飲泉著清聲廉貪勵髙節千載揚芳馨聞孫家淦曲結屋依巖扃青山列户牖嘉木羅前楹流泉出砌下一碧湛泓渟齋居誦遺訓仰止思繼承白雲蔭芳潤皓月涵虛眀永日愜幽賞俯仰挹清泠一酌祛煩慮再酌怡神形三酌沁肌骨頓使心目清匪兹樂淡泊實以固幽貞嗟彼寰中人胡乃獨營營沉酣嗜麯蘖夜旦了不醒視此酌泉者寧不畏惕驚蹇豫慕修潔清華邇蓬瀛幸兹逺氛濁潄滌瓊瑤英凛焉對氷雪朝夕懷兢兢誓圗堅晚節補報竭忠誠因斯發佳詠聊以寄髙情贈李伯髙司訓還廬陵廬陵古名郡風俗天下聞卓哉歐陽子奮發振斯文聲光被後世至今仰餘芬惟子企前軌力學究典墳棲遲三十載布衣誰與羣忽兹膺薦舉峩冠上金門授以郡博士文采耀青雲今晨别我去悵然惜解分臨岐重握手酌以白玉尊朔風吹浩浩雨雪何紛紛抽帆上南浦行行近青原及家固云樂况乃親弟昆蹇豫荷恩遇謬忝職禁垣西江未同返遙睇瞻丘園解佩為子贈聊復申好言朂哉繼先達浮名何足論梅忩為教授金原祺賦嚴冬閉雲隂衆卉各摧折瑤樹粲佳花綽約凌氷雪君子秉文教終嵗擅髙潔豈期謝春榮所志堅晚節觴詠日逍遙琴書足娛恱願言保貞姿庶以紹先烈三友軒為德清鈕允髙賦種樹必嘉種取友必端士常木無堅姿泛交少恆志之子慕清貞列植異凡卉直幹倚修節孤芳挺蒼翠氷雪誓不渝並立凌寒嵗覽物尚如此託交寧有異君子思賤貧小人懷勢利管鮑夫何如此道久淪棄尚期秉金石庶以敦髙誼郊祀齋宿翰林奉柬諸同寅大郊屆嚴祀致齋玉堂署衣冠集寮寀及此諧良晤焚香對蒼竹促席坐深户東風昨夜來崖雪消餘沍庭草抽細芽新條發幽樹感兹節候殊忽令鬒成素顧惟負簡陋朴樕慙虛譽未能寡尤悔但恐辜恩遇幸兹同職業規益賴深助清談夜未央淡然銷衆慮對越實在兹寧敢忘祗懼將事期無斁庶以答神祜魯林懷思詩為太常孔克準賦尼山誕元聖大道斯以彰刪述著彛典筆削眀王章冠冕照日月端拱居廟堂禮樂極崇報萬世垂耿光闕里建東魯閥閲何煌煌詩書啓華胄奕葉揚芬芳迢迢姑蔑墟遺澤久彌昌於焉有裔孫妙齡際時康一朝被恩眷超擢居太常青雲耀簮紱儀羽簉鵷行眄彼洙與泗源深流且長惕焉企先躅引領增慨慷豈無蘋蘩薦道逺不得將雲山浩漫漫杏林鬱蒼蒼徘徊感霜露惻愴悲中腸寫圗寓深臆懷思固難忘願言紹先緒庶以慰所望梅所詩有序永豐嚴所安氏負耿介之資抱通眀之學于世無所嗜好而獨愛夫梅之清潔乃于所居種梅數十株日與相對以樂其性情蓋有終焉山林之意遂名其室曰梅所既而所安宦遊于外者幾二十年其心神夢寐無一日而不在於梅者間來京師求豫作詩以寫其嵗寒之思夫梅于植物中最為髙潔有幽獨貞介之操無纎穠軟媚之態古人以之比其德君子豈茍然而已哉今所安年逾七帙志彌篤而操彌堅特立之行凛然而不可奪誠可謂名實相符者矣為作梅所詩其詞曰君子謝時好幽居恆晏如開軒種梅樹宛若臨西湖託根既得所不受纎塵汙嵗寒濯氷雪粲粲明肌膚幽芳襲圗史疏影交座隅于焉企髙潔淡泊聊自娛一朝領文教中道異所趨夢寐二十載延想徒踟蹰素心諒可託白首期不渝他時幸歸老庶以返其初雪梅為壻袁大鵬賦憶昨家居時種梅繞書屋嵗寒綻佳花滿林散芬馥玊肌耀彩雲縞袂承朝旭把卷時相親巡簷看不足一朝上蓬菜幽賞更難復耿耿懷不忘夢寐在林谷偶然披畫圗覽玩增躑躅維子愛重之結交誼尤篤無為媚冶容汨沒隨流俗修潔慎自持于以保貞獨挂冠倘可期吾將返初服挽吕處士禮部尚書震之父藍田貴名胄世德重髙門處士樂嘉遁夙昔行誼敦棲遲托韋布所志在丘園積善逾懇懇裕後尤諄諄賢嗣奉眀訓績學希前聞發身耀科第踐歷揚清芬操持厲氷雪穆若春陽溫南宫進華秩廊廟資經綸厚祿遂榮養寵錫尤繽紛詎期慘風木銜哀竟無言聖情重褒恤錫命賁九原存歿被光耀感此天地恩述德表貞石遺風儼猶存作詩寫哀些于以告後昆雅集圖為鄒侍講仲熙賦王氏昔貴盛幽賞寓西園佳花雜芳卉修篁蔭叢蘭瑤林鬱深秀亭榭無囂氛時雨被繁緑好鳥鳴間關興言念君子列籍聯衣冠光風泛瑤席餘靄襲芳樽豆籩既有序詠歌何紛紜杯至迭酬酢劇談有餘歡揮麈睇飛鴻解纓濯流泉援琴度逸響灑翰生雲煙夷曠各有得意適欲忘言遺風寄圗畫髙致邈難攀蘭亭世已逺所托在斯文蘇黃去已久光價重璵璠撫事增永歎徒此懷清芬此圗自東坡潁濱山谷而下凡十有三人西園乃晉卿之别墅也當時宴集於此李伯時寫此為圗以傳於世仲熙此圗特其模本耳題楊諭德畫竹楊子居巷南閉門絶車馬種竹不計年濃深密相亞朝回解冠珮對之極瀟灑簷端落晴雪涼籟含深夜我時一相過絃琴坐其下得句寫琅玕笑歌傾盞斚氷霜歎遲暮寒暑頻代謝悠悠十五載念子知音者兩京昨暌違良晤此傾寫玊堂燈火寒看竹仍題畫貞夀堂詩白璧易為玷寡居少完節宛宛令母儀姢娟抱幽潔二十失所天中道遭危瓦危臬秉心靡他適誓死弗回折高堂何巍巍翠柏凌霜雪遐齡介睂夀莫景耀黃髮有子足侍養有孫足娛悅堂前綵衣舞堂上旨甘列懿德及鄉閭清風敦閥閲載誦柏舟詩永言播貞烈贈蕭醫士蕭子擅醫名不假藥石功以心運元氣斡旋掌握中婁生嬰熱疾蕭子撫其躬默運極冥搜頃刻皆流通化熱為清涼去煩息呻恫勿藥收竒效名聲播西東報謝却金帛髙誼邈難同一朝持大軸來語玉堂翁為之發佳詠浩思意無窮贈李翊赴南京國學助教建昌人子昔負竒氣攜書遊泮庠學成邁流輩策足馳康莊褎然掇鄉薦職教居蜀邦樂育著成績升擢閩海旁講道心靡懈善誘極周詳於兹復九載化雨深門墻既最天官考超秩嚴詮量謂子才力優豈冝專一方分教登胄學斯文有榮光時當仲冬候旋載南京航河氷凍未堅執别途路長翔風振林木鴻雁鳴且翔徘徊不能去浩歌慨以慷願言厲初志為國成俊良作詩寫朋好白首無相忘春意圗春陽政和煦衆卉相滋榮名花豔秀質丹霞濯朱英衆鳥意頗適雄雌相和鳴大氣流天地物物同生成因兹觀至理誰能契中情夀諼堂為德清屠生誠作諼草樹北堂雨露日蕃滋慈母欣有托撫玩心獨怡門庭日無事鶴髮眀春暉之子念母慈致養及良時朝朝具甘旨炫耀五采衣再拜獻春酒泛此黃金巵祝母多夀考千嵗忘憂思嵗歲對諼草願母長不衰母夀不易得子心將何為謹言與慎行戰兢當自持顯揚報母德不使聲名隳歸哉尚努力惜此光隂馳引領日相望重來應可期筠軒為修撰陳叔剛乃父作閩中有佳士翛然偉丰儀間居淡無營與世恆相遺開軒種修竹嵗久蕃且滋流雲被柯葉雨露涵幽姿清飊振蒼玉舞鳳何委蛇直節靜相偶虛心久能持絃琴雜宫徴戛玉聲相隨悠然發佳興觴詠無不宜幽賞諧淇澳髙風猶可希願言保貞獨嵗晏以為期陳氏竹甘露猗猗淇園植羅生滿階庭夕光流素液垂兹泫瑤英灑枝方泥泥綴葉猶盈盈當陽殊未消承風愈堅凝孰知太和世涵澤被羣生彼媺君子者素行此其徴萬竿煙雨圗為侍讀曽鶴齡作平生愛佳竹常有江南情忽此見新圗玩之有餘清千竿挺寒玉一片瀟湘青離離紫鳳梢尚與煙雲平依微拂崖石隱約入杳冥聲雜瀑泉小色映寒溪眀茆亭亞蒼雪美韻諧琴聲旁有灌木藂鳥雀時喧鳴秋風即搖落突兀枝交撑獨髙此君節寒暑無變更不逐桃李芳不隨蒲栁零惟應松與柏可以同堅貞贈顧進士讓南京刑部主事蚤嵗負超卓畢力窮書詩一朝掇髙第厯試將有為秋臺與簡擢郎署秩匪卑兹焉涖舊都聖心尤倚毗邦刑古所重欽恤誠在兹慈祥察冤滯讞議公是非伊昔虞舜世皋陶稱士師眀刑弼至教世乃登雍熙惟子居部屬致理誠所宜勉勉服古訓兢兢慎操持朂哉踵前烈永矢期弗隳湖山佳趣為黃博士賦屏迹慕間曠素有髙世姿結茅謝塵鞅淡然心自怡湖光涵几席山色臨書帷遊魚戲文藻好鳥鳴髙枝橫琴芳樹下濯足清澗湄開樽酌美酒揮毫賦新詩緬懷百年內誰復同襟期一朝際休運忽與雲壑辭薦書達名姓文采何陸離昨來居太學橫經擁皋比羣才資樂育講授忘渴飢出處諒不偶隱顯固有時相期貴努力補報方在兹他年謝簮紱庶以慰心思中秋宴集分韻得九字聖皇撫區夏省方事巡狩蹇豫沗侍從亦獲效奔走杪春始駐蹕和氣動郊藪良辰奉鸞馭周覽遍丘阜窮幽托竒秀幸免載芻糗寒暑倐更换星虛已屆酉于焉屬秋半宴會集寮友肴羞列長席時果薦芳豆開尊對明月序齒論先後灝氣滿瓊樓寒光達虛牖遙空淨纎翳河漢斜臨斗零露浥叢蘭涼飊振疏栁盍簮有真樂飛觴屢呼酒喧譁競酬酢笑語或揚肘分韻各有題誰能為擊缶鄙詞愧珠玊剗削慙蕪莠俯懷際休運感激恩尤厚畢力圗補報矢心期白首沗兹諧宿好託交嵗年久切偲賴啓沃洗濯脫塵垢追陪青瑣闈出入喜相偶旅懷頓寬釋憂思亦何有良宵興未終既醉猶攜手南樓桂始花東園菊方茂登臨有佳約相期在重九九日宴集分韻得駛字良辰不易得流光疾如駛我行沗扈蹕三時留帝里倐兹屆重九朋從皆客子邀我開清宴烹羔膾鮮鯉時蔬間棗栗羅列亦盈几紫茰泛新酒馨冽勝臘蟻喧呼熱中腸笑談忘鄙俚酣歌引長劍光芒照秋水仰視天宇寬商飊颯然起候鴈屆新寒霜菊猶含蕊遙岑晚逾碧西山淨如洗登髙信非逺騁望增懸企幸兹會文飲勸酬助深喜羣公爛詞藻清芬播蘭芷殷勤寫衷素抱拙慙蟲技贈友人謝繩正還新淦憶我丱角初攜書侍嚴父訪君滄洲曲握手遂良晤碧梧挺髙標金蘭托深契硯席幸有託寒暄同起處朋情謝新益麗澤愜衷素悠悠金石交歷厯嵗年莫東西各驅逐冠蓋何由聚南宫沗科甲青雲忽髙舉叨承侍從榮出入誠何補今春别京國北狩隨鸞馭回望南天雲遙睇故園樹憑髙謾躊躇對景增延佇君從梁宋來邂逅慰羈旅天涯故舊情鐙前牢落趣時蔬薦辛盤肴核侑芳醑劇談夜未央移席月當午但惜歡會難寧知别離苦攬袂聽晨雞候此秋天曙我復趨承眀君還故鄉去鴻雁正南飛商飊動砧杵分攜五雲館翹首金臺路望望不見君相思渺何許蔣御醫靜學齋伊人抱沖素而有氷雪姿齋居謝塵垢恆以靜自怡圗書盈几案涵泳窺聖涯幽觀契玄妙昕夕忘渴飢寒暑更代謝人事有盛衰萬變恣紛擾操存諒不移于焉企遐軌俯與先哲期匪圗富經術復此專國醫金門振髙步永懷擴所施朂哉勵初志作詩效針規挽永嘉吳原範因其子翰林庶吉士吳志文之請昔人志幽獨皎皎氷玉姿窮居閲今古言動無愆違力行敦孝友耿介恆自持簞瓢淡無慮韋布聊棲遲翰墨有餘暇吟詠多新詩懷玉匪求售末俗寧相知詎期溘朝露遐逝竟莫追鄉閭增永歎親友含悽悲承家幸有托顯揚方在兹太史述潛德千載昭銘詞靜暗為黃學士尊人賦端居謝塵鞅屏迹卧柴荆布衣樂嘉遁簞瓢淡無營幽思契玄化𡨕搜觀物情神間志先定寡欲心自寧琴尊諧夙賞水木涵餘清簷端白雲下芳徑春草生永愜丘園趣終辭圭組榮含光保貞固養德崇令名吾生愧擾擾遐想尋鷗盟分題得秋浦孤帆送友人疾風吹人寒清霜肅天宇澄河浩漫漫抽帆上秋浦泛泛淩雄濤搖搖轉孤嶼川途坐超忽飄颻驚鴻翥舟子誇利涉中流喧笑語誰識倚篷人戀闕時延佇頥庵為祭酒胡公賦君子志古道中心常晏如一室絶塵想湛若凝氷壺幽思契玄化靜觀識盈虛于以求所養揭頥當座隅匪徒兹口實養德與之俱間邪靡他適步履由康衢翼翼謹儀度周旋慎起居言寡行彌篤體胖心自舒暢情發佳詠隨意讀古書清風在几席翰墨足自娛揮絃白雲下酌酒鳴禽呼麗澤洽髦士咏歌追舞雩芹藻沐時雨桃李亦芬敷于焉陶聖化沛然樂有餘願兹保貞獨白首期無渝素暗為鄒侍講仲熙賦結髮已學道而有髙世姿衡門逺氛濁韋布聊棲遲黽勉事耕稼蔬食甘藿藜中年遘休運遂與林壑辭辟雍起名譽卓為學者師超登列清要侍從職論思忠誠彌激切耿分恆不移俯仰靡愧怍操存無外馳安行任所適進退何委蛇圗書列左右翰墨復在兹沈潛探幽賾涵咏窺聖涯孔子貴知命順理無不宜孟軻養浩然力行復何疑尚友千載士聖賢以為期樂琴書處為沈民則學士賦公本布衣士世家在東吳襟懷敵氷玉所樂琴與書牙籖插滿架中有萬卷儲潛心究墳典雋泳周孔腴矻矻忘嵗年晝夜窮卷舒興來操孤桐逸氣凌八區寒泉出幽谷清飊泛庭除一彈復一詠沛然樂有餘棲遲三十載仁仰恆晏如一朝去鄉里聲價重璠璵載筆青鎖闥待詔承眀廬光華依日月荷沐恩寵殊蹇豫沗侍從出入聯珮琚朝回訪官舍文字聊足娛絃琴坐芳樹洗盞酌清酤白鶴為起舞酣歌劇歡呼嗟彼寰中人此樂誰能俱惟公與我輩職業儕文儒乾坤並生育雨露均涵濡感此聖恩厚補報將焉圗願言竭忠藎白首期無渝日省齋為駙馬趙暉賦君子秉髙志夙負氷玉姿齋居靜無譁玩習書與詩兢兢日自省名賢為之師力行務忠信跬步恐或違講授資劘切寧敢懷自欺黽勉竟朝夕念兹復在兹𢎞毅期逺到一息罔有虧作輟或靡常德業因以隳况乃託戚里忠孝實所資嘉猷思獻納仰圖贊雍熙作詩匪為頌庶以效針規贈孫博士致仕還豐城孫君我鄉里十載居橋門雅志尚古道布衣振斯文羣才資樂育仰欽博士尊講論既不竭考較良已勤小大各有成寧復遺斧斤况聞篤義方有子才且賢伯也領司牧季也登詞垣聯翩耀文彩宛若鸞鳳騫三朝偕際遇涵沐雨露恩忽兹去榮養投簮賦歸田綸音重褒錫龍章煥繽紛驪駒戒眀發祖餞相攀援遙遙睇南浦江流泛沄沄桑梓故無恙松菊今尚存上堂接賓親入室撫兒孫間居樂有餘逍遙畢晨昏蹇豫荷恩遇侍從三十春白首冒榮祿補報圗拳拳故鄉未回往中情何由宣因兹寫長句聊以道殷勤贈楊景衡致仕還永嘉時為福建參政早歲負經術文采耀儒紳眀廷忽登薦熙運逢昌辰首選夏官屬再擢領司勳九載績稱最超遷佐名藩優優敷治理黽勉勤咨詢揚厯三十載踐履思彌敦及兹登七秩陳詞乞歸田聖情特允許優老懷舊人清晨别閶闔冠蓋擁青雲絲竹沸華筵飛觴促行輪迢迢踰大河渺渺涉長津喬林翳桑梓竹樹蔭雲泉别墅日成趣猿鶴時相親良辰集賓友諧詠樂琴尊以兹保遲暮眉夀綿千春永言寫朋好終始期勿諼百日懷幼子武安爾亡忽百日無日不念爾行想爾追隨坐想爾逰戲食想爾同桉卧想爾同被清晨送我朝未晚候我歸逢迎與應答無不解人意如何遽夭閼長往隔人世悲號徹上蒼抱痛切肝肺骨肉恩誼深誰能即捐棄挽鳳陽周處士其子銓為鴻臚寺丞與豫為同年進士士有慕恬素習隱居田廬逍遙畢冬春衣食自有餘孳孳軫窮匱積善乃其圗飭躬務儉勤淑子惟詩書青雲起步武揚歷陟要途及兹膺茂典寵錫先親俱恩榮及存殁封秩偕鴻臚皇天報不爽隂隲默與符銘文屬太史琢石崇丘墓桓桓松柏間雨露深涵濡流慶未涯涘浩若江海儲昭兹貽後人永世期不渝訥齋為泥田周仲升作君子尚古道制行戒多言謹口不妄發恆以訥為先酬酢合典則終身逺尤愆交遊重敦朴鄉里推仁賢嗟彼寰中人辨給若濤翻往往速咎戾身名弗自全以兹貴守默操制若管鍵高齋揭華扁圗史相周旋往來接朋好終嵗謝塵喧願言服古訓永永期弗諼贈楊允嘉還建安華胄出關西宦譜何煌煌聲光照閩越慶澤深且長少傅我知己早年登玉堂風雲際嘉會千載符明良表儀動朝著事業輝巖廊報國竭忠藎治家敦義方令子皆偉器清標重圭璋趨庭受經訓力學攻文章來往申定省煜然多令望季也始弱冠眀珠異非常丰姿玊雪瑩行美芝蘭芳孝友出天性詩書能自強時時肯過我恭敬不暫忘周旋情懇懇應唯聲琅琅有如丹穴雛羽儀絢朝陽又如千里駒矯首欲騰驤我實愛念之期待不可量昨者奉親命言旋歸故鄉侵晨向我别欲去仍傍徨吾觀公卿間子弟空昻藏禮義漫不省况乃資顯揚念子好兄弟承家相頡頏盛時須努力學問無怠荒豈徒慰親志足以紹前光髙髙青雲步拭目看翺翔凝秀樓為都御史邵玘作君子秉純孝至和育嘉祥重屋薦靈草郁郁休氣翔玄雲被紫蓋丹霞沃太陽煜煜銅池秀粲粲瑤圃芳輪囷異衆卉五色耀竒章豈伊昭行美實以著休光况逢聖眀世位秩尤顯揚屬兹託邦憲毅然振宏綱奮威薄鷹隼除暴驅豺狼蜚聲播畿甸美譽馳巖廊拳拳勵忠孝勉勉贊時康昕夕期弗替終譽思永臧贈鍾觀伯司訓新淦邑庠為士貴立志志立名乃成所以賢聖徒尚志尤兢兢維子我同里祖父實相知弱冠志己殊晝夜窮書詩春秋紹家學講究探玄微眀經夙抱負應聘來京畿金門特召試辭藻何陸離裒然居上第儕輩咸相推翩翩持教鐸去作淦庠師清晨來告别執手聊蹰踟驪駒且未動盡此黃金巵大河日東注白雲正南馳朝經直沽北暮駐長淮西鍾山屹相望廬阜雄且竒九江既浩蕩南浦何逶迤洪都集冠蓋車馬紛往來彌楫劍江涘艤棹蕭水湄金川對玉笥佳氣含朝暉諸生集襟佩瞻拜盛容儀舍菜謹趨謁揖讓生光輝升堂聞絲竹宴會及兹時優遊敷文教作育懷切偲士風振頽靡俗化厚民彛末學懲剽竊彌文戒夸毗由兹興治理簡拔有所資朂哉志道德永矢期勿隳恱琴軒人生穹壤間所好百不同好之得其正德義日以充所好昵于邪敗德隳厥躬惟此方寸內邪正恆相蒙君子履正道秉志宜專攻理欲潛幾微毫髮寧相容如彼耨苗者莠去苗乃豐又如藝芝蘭棘剪蘭始濃美惡若黑白詎可昧所從惟爾負英邁閥閲出名宗衣冠振江右詩禮夙所崇爾親我故交契誼超凡庸眷言托姻好得爾諧乘龍年來居二室契濶心忡忡去冬來省謁晤語愜寸衷或時聞揮絃悠然豁心胸凄清凌别鶴飄颻逐逰鴻委蛇合宫徴滿坐聲渢渢神舒情轉懌體胖心自融于焉禁邪僻蝥賊敢內訌爾能知好尚德義宜兼隆所期力學問持身秉謙沖出入先孝弟周旋必敬恭惟學可明德惟勤乃有功嵗華易荏苒流光若轉蓬及時宜努力黽勉毋怠慵蜚聲紹先世令譽垂無窮豫之甥趙瑛嘗學琴于子昭伯久之若有得焉者瑛以去年冬來省豫官舍豫或夜坐聞其操宫聲一二引至其聲之疾徐髙下動蕩流麗亦不能無意會焉瑛家居揭其軒之扁曰恱琴來北京請縉紳先生作恱琴之詩以道其意豫以琴士大夫一藝耳若能力學問以造夫髙眀廣逺之域則其所得而樂者又有過于是焉豫故于詩歷述其意而勉瑛以學期之于逺大此豫愛瑛之至情也瑛其勉之鴻臚寺卿王善父哀挽壯逰去鄉邑卜築居燕城中年謝輪鞅遁世不求名布衣自蕭散風月娛幽情杖履隨所適壺觴時獨傾詩書課諸子笑談集良朋翛然忘世慮欣戚了不驚春秋餘六秩乘化忽長征令子遘興運致身登眀延九重錫褒秩追贈列九卿天章耀龍采雲漢昭日星大史最潛德墓道揭新銘縉紳述哀挽渢渢揚嘉聲流慶殊未艾千載想繼承山溪小隱為周時立賦梧山鬱蒼蒼沂溪流瀰瀰溪山兩竒絶居有泥田里里中有著姓衣冠數周氏君子樂在斯恂恂謹操履力田充食衣積學窮經史繞廬樹桑麻緣階藝蘭芷開忩白雲來揮絃清風起門深駐山光庭虛湛流水賓朋或時過觴豆同樂只酒酣賦新詩歌詠諧宫徴悠然適嘉趣達生契直理蹇豫迫衰暮役役果何似侍從三十春貪榮昧知止况兹乏禆益訹惕久未已挂冠倘可期吾將返其始來往山溪間庶以終餘齒禮部新建諸卿設宴落成遂賦此南宫壯巍巍落成在今日籩豆秩禮筵衣冠集儔匹獻酬各有儀諧笑忘坦率千載幸遭逢昌辰慶文物成禮貴無愆終焉敢怠忽六月二十七日早朝奏孟秋時享孟秋屆時享太常嚴齋沐聖主秉深誠詰旦興猶夙髙闕麗繁星彤墀散明燭百寮謹祀事祗命咸屬屬所期答神庥庶以臻福祿送周時立歸文江逺逰送將歸翩然辭國都迢迢越山川靡靡涉長途秋風動原野殘暑猶未除玄蟬號樹端候鴈翔且呼豈伊念朋好况復懷友于停杯且未别握手謾踟蹰西江幾千里雲水渺重湖子行日以逺會面日以疏及家雖云樂我懷將何如舊鄉未即返南望增鬱紆歸哉倘相憶為我致雙魚雨歎入秋五六日風雨連夜朝屋漏水過膝路滑泥沒腰庭花半憔悴田稼亦飄搖城中粟已貴城外無歸樵安得捲癡雲太陽麗九霄使我開懷抱無復憂早朝山東鹽運司副使蕭鵬舉挽詩西昌有南溪著姓曰蕭氏傳家本淳朴積纍自先世維公實亢宗少小拔其萃孝友本天性急難志不匱拳拳重手足同居篤恩誼和氣藹門閭紫荆兆嘉異一朝起林壑浩然舒壯志待詔金馬門辭華著光麗承恩佐名郡涖官益嚴厲布衣與蔬食儉素若寒士被譴忽逺去曽不懷怨懟榮辱恬不驚夷險惟一致再起應時需黽勉服官事嵗課每先期商民有遺利方兹圗報稱胡乃遽捐棄室空無長物緼袍遺篋笥見者為嘉歎聞者增歔欷春秋更代謝九原悼永逝令子志顯揚褎然掇髙第近者來京師一見非凡器昊天懷罔極孝誠實深至乞我為挽辭屢請不一置憶昨公仕時我忝居禁侍兩京曽晤面幸獲論鄉契縉紳仰風裁吏民稱善治豈知十載間忽忽如夢寐自古各有盡聖賢皆如是令名可長存死生那足計公歸可無憾貽後永無替殷勤寫長詩臨風發深喟挽周生渙編修敘之姪貟外岐鳳之孫也周生文江人來作金臺客負此英妙年讀書翰林宅辛勤閲冬春講誦窮朝夕晝倦忘渴飢夜卧不就席文采照珊瑚星斗蟠胸臆摛詞已成章篇翰稍堆積語言不妄發居處恆謹飭事長秉謙恭事親循禮則布衣不屢更蔬食無厭斁里巷少交遊縉紳幸知識間過詢所業漸喜有進益豈知自去春遽為二堅迫淹延逾嵗月形容就枯瘠兀坐或終朝憑几或終日未忘親筆硯猶能檢書籍臨終聲琅琅從容具盥櫛溘焉從此辭哀樂異今昔骨肉增痛悲親知殊愴惻寒暑互往來時序迭更易鴻雁正南翔原野迥蕭索兹辰返靈櫬祖送臨道側山川邈悠悠魂魄將何適故鄉日在望行矣即窀穸顔跖異夀天善惡豈儔匹生年雖未多已能踵前迹百年會有終令名垂無極今古瞬息間那足較失得生去日已逺我懷詎能釋為生述此辭庶以慰存歿瞻松閣嚴陵有陳氏弟昆惟三人伯也嗣先緒理家儉且勤仲也篤問學起家列朝紳季也鍾友愛器宇溫且淳三人心不異夙昔均孝親親歿知幾載至今銜酸辛伯也懷永慕種松繞孤墳墳前構髙閣繁隂蔽青雲朝望松與對暮處松為鄰松間日來往重壤賁九原時祭陳爼豆謦咳若有聞風聲起悽愴雨露秋復春親去日已逺子懷難重陳但使松益茂愛護崇本根世世勿剪伐永逺揚清芬浦雲樓為羅宗器賦豫章有佳士磊落超常流久居厭喧雜復此構崇樓突兀倚雲表翬飛凌斗牛綺忩間疏牖灝氣相蕩浮西山與南浦景物淡以幽朝登發佳興夕覽舒煩憂賓朋日來往歌詠同倡酬臨風操猗蘭拂席看吳鈎間來誦墳典子史兼窮搜豈惟紹先緒實以光前修昨者來京國感子意綢繆索我題佳句未能為淹留離思鬱中腸倐已及髙秋謾兹託縑素寫懷寄滄洲他時倘歸老尚期尋舊逰送貢士鄒文選南歸鴻鵠騰九霄騏驥馳萬里之子懷逺圗學古希名士朅來與計偕志欲取青紫殊方會賢俊冠蓋何旎旖戰藝奪文場誓將掇髙第青雲忽蹭蹬逸足淹泥滓懷寶雖難售抱器寧終祕歸哉不可留翩然去知己故鄉渺江右茫茫隔雲水朝回一相送懷抱殊礧磈徘徊不能别何以寫深契愧無千金贈為子壯行李千金未足多贈言重莫比須知九仭山功成少一簣從兹更努力慎無中道止賈董亦何人垂名耀青史明當繼芳躅並駕騁遐軌日月懸中天流光疾于駛相見在幾時重來勿淹滯望子翔青霄庶以慰遐企贈孔秉中考滿復任郾城先聖有孫子家住西江湄積學企前軌文采何陸離一朝膺鶚薦飛步凌天池風雲際嘉會海宇同雍熙承恩佐名郡蓮幕暫棲遲牛刀雖小試讃畫靡不宜所貴在施設寧慙職位卑宦遊逾六載朝夕任驅馳雅操厲氷蘗清苦恆自持寸心悉民隱閭里無怨咨今秋辭洛邑考績來京畿銓曹嚴黜陟三考固有期及兹命復職庶以慰民思蹇豫同里閈託好深相知闊别已十載道逺音問稀都門一相見握手心怡怡張燈話疇昔有如消渴飢胡為不暫住遽此歎睽離寒風正蕭索翹首雁南飛殷勤酌别酒聊以寫心私人生百年內會合能幾時願期樹嘉政贈言比針規贈熊元節還南京有序友人熊元節始以大理卿奉命撫巡吳越諸郡三載之間鋤強植弱屏姦貪出寃滯威聲四達而吏民莫不恱服比還朝上嘉勞之特升秩長南京憲臺恩渥之厚委任之専可謂極一時之榮者矣其還南京也來索豫作詩遂賦古選三十韻以攄别懷云詩曰熊君負經術早歲登青雲素承明主知超擢中朝臣繼聞陟大理奉命専咨詢風聲振吳越次第蘇疲民鋤姦去豪猾剗凶格頑嚚遂令東南郡皞皞被皇仁聖情日虛寧屢勑嘉勞勤三載積憂懼馳情懸紫宸及兹奏對日欵慰尤諄諄申命職憲紀榮光動朝紳南臺既専任委寄真殊倫繡衣明白日清霜肅陽春豈惟戢貪墨實以繩謬愆况聞澄清地表率由一身惟君秉直諒操履端且純屹然重時望所至揚清芬蹇豫忝朝列交誼夙所敦睽違渺南北夢寐勞心神幸兹諧簮盍晤對逾兼旬忽聞别我去惻惻難為言驪駒發前路遙瞻動芳塵衣冠擁廣陌絲管一何繁握手且未辭盡此黃金尊人生會合間百嵗若轉輪黽勉圗報稱致身在君親永懷保終譽景仰希前聞廬陵多達士至今耀斯文忠節著宇宙千載垂不泯朂哉踐古道永矢期勿諼贈周子瓛致仕還永豐時為蘭溪縣丞驅車欲何適駕言歸故鄉朋遊具觴豆餞送臨周行憶昨佐花縣志氣殊非常琴堂席未暖行役嗟靡遑京華厯寒暑鬢髮皓已蒼布衣與蔬食淡泊常自將只今七十餘謝事何匆忙為感聖恩厚悲歌激中腸徘徊不能别念此故意長山川邈迢遞大江浩洋洋去途日已逺馳景曜征裳愧無千金贈為子增慨慷歸哉慎自保南北永相望思全室為李士文賦人生天地間稟受良有偏七情失其正六脈為之愆因兹致疾疚危弊紛相聯所以古先聖醫藥使其全姑蘇有佳士仙李育慶源上窺黃農祕術業尤精專兢兢念疲癃惻惻閔危顛神樓有竒效一匕生氣旋杏林藹春意橘井流香泉蘇耽不可見董奉亦可仙超焉繼髙躅寧為利祿牽朝夕心匪懈活人澤永延朂哉慎終始令名千載傳慶夀堂為西溪蕭氏賦西溪構髙堂堂有白髮親親年齊夀考子孫復詵詵大椿枝葉蕃萱草顔色新綵衣拜堂前旨甘具晨昏獻夀酌春酒歡樂及嘉賓况逢太平時至和被八垠外無非橫加內無憂患臻黃髮日優遊慶澤流津津作詩歌盛美庶以垂千春贈郭郎中鼎貞還新淦客行辭國都眷言歸舊鄉舊鄉渺何許雲山浩茫茫我昔當壯年與子同翺翔交誼等金石志氣相激昻青雲幸際會喜得同朝行睽違屢契闊南北遙相望兹來遘衰疾乞歸何匆忙荷蒙聖恩許感激切中腸悵然别我去執手徒倣徨鴻鴈鳴索羣我懷增慨慷涼飈動蕭瑟川陸悠且長及家遂間適為樂殊未央願言慎起處永矣臻夀康為王侍講時彥題秋意圗長天帶逺景絶島含秋意橋響客時過竹深門獨閉蒼煙迥蕭瑟落日生迢遞回首大江西故山何處是題李仕璉山水圗幽岑帶煙光逺嶼浮嵐氣野水舟自回山居少人至松聲度潺湲雲水生迢遞對此欲忘言誰能識兹意小景五首為楊少傅東里作瑤林翠如織玉立何森森虛心濯氷雪直節凌岑崟炎暑無六月清風生滿林右萬玉林珊瑚出海底低拂鳳凰枝蒼雪落寒影晴雲含碧滋瀟湘不可到翹首起遐思右竹石王孟端作幽岑淡碧靄古木生夕隂泉石契清賞雲林諧夙心即此得逍遙悠然豁煩襟右山水陳叔起作積雪沒深户溪山絶行迹鳥栖迷故林泉聲斷餘滴中有映書人宴坐忘朝夕右雪景青山無垢氛野水多秋思紅樹帶疏煙夕景生迢遞客子欲何之孤舟出村際右原闕好學齋為邊給事作伊人慕先哲積學恆孜孜好問不自己舜尹乃吾師于焉燭萬理于以釋衆疑虛心如不足謙抑恆自持力行期逺到賢聖固可希朂哉企前軌庶以慰所思賦存心堂君子秉恆性萬理偹一心操存貴弗失恆恐蟊賊侵靈臺湛虛寂天君若監臨主敬在朝夕先哲誠所欽朂哉崇令德保此瑤華音朴齋為給事趙文金賦唐虞世已逺古道迷荆榛頽波逝不返淳風蕩無垠綺紈尚美麗布帛何足珍良烹侈玉食菽粟難並論太朴日已散彌文滅其真趙君抱沖素持守思益敦篤行合前軌秉志期忠純清光邇禁闥載筆聯紫宸讜言懷激切至誠諒斯存王風被寰宇禮樂在彌綸永期贊隆治薄俗斯還淳臘月草日同陳俊文過武安殯所爾亡忽兩月我懷獨悲傷北風號中野白日慘無光撫柩為痛哭四顧增倣徨蒼天復蒼天奚忍降暴殃垂老失愛子此恨何時忘帝王膺受天命至聖之德格於天心故三光全而寒暑時羣生和而萬物育是以上天昭錫景貺以彰盛美欽惟皇上統紹鴻基主宰神人宵旰圗治至仁孚於海內至信昭於天下華夷效順海宇清寧雨暘晦明各順其敘時和嵗登家給人足乃永樂十一年春二月皇上再狩北京行慶賞黜陟之典田野之民莫不鼓舞歡躍瞻仰日月之光華以為盛世太平之賀乃夏五月丁未山東兖州府曹縣以騶虞來獻白質黑章五采絢爛目光如電尾長倍軀起伏蹲卧不擾不驚在廷臣僚洎蠻夷酋長與夫工商輿𨽻之徒莫不奔走聚觀以為希世之遇臣謹按瑞應圗曰騶虞義獸也王者德至鳥獸澤洞幽冥則見又云王者有至信之德則應之伏自皇上涖阼以來諸福之物莫不畢至而騶虞之應至是凡兩見皇上至仁至信之德昭著于天下故上天錫以非常之瑞不一而足而聖心尤謙抑退讓弗以自居拳拳焉申敕臣工以警戒相成之道所以隆國家無窮之慶納生民於仁夀之中而開萬世太平之基者誠亘古所未見而未有者也臣沗職詞林躬逢盛事所當作為歌詩以播揚鴻休不敢以淺陋辭謹拜手稽首而獻詩曰聖皇握乾符御統膺寶厯宵衣運神化日昃弗遑息上追虞周治逺邁漢唐迹禮樂聿昭宣人文煥奎璧雨暘既順序寒暑靡差忒閭閻底豐冨男女樂耕織洪纎悉包含物各遂生植熙然際時雍鼓舞歌帝力天心屢眷顧祖考亦昭格垂休降純嘏咸俾躋夀域竒祥粲繽紛和氣實充塞芳甸薦神龜南郊醴泉溢慶雲麗層霄膏露時委積赤麟與紫鳳文采何輝奕維兹鄒魯區神禹所經畫地靈協坤珍光氣常閟匿萃精育仁獸於以符至德祥飊振藂薄瑞采動崖壁神明為呵護民庶驚辟易二虎從左右馴狎如服役及兹應時至入獻彤墀側猊首而虎軀黑章而質白般般雲霞文粲粲雪霜色雙瞳夾眀鏡紫電光相射尾長倍其身墨花絢胸臆初陽發光彩清氷助標格生芻足不踐生物性不食俯仰帖不驚舉動甚安適回翔荷恩寵天顔惟咫尺率舞同百獸蹌然中儀則羣臣拜且抃聖情倍歡懌緬思仁獸瑞曠世斯一獲周南託佳詠千古垂簡籍自從三代降兹事遂寥寂我皇繼天位功烈超古昔往年致嘉祥來獻自藩國兹晨忽再覩竒異誠難測自非神聖功上瑞何由得我皇乃弗居誠心愈謙抑兢業同禹舜罔敢怠朝夕微臣邇清光謬沗承明直愧乏班馬資獻納鮮裨益耿耿懷丹忠再拜陳悃愊皇圗萬姬周歷年逾八百聖夀天地俱寶祚綿萬億作詩諧頌聲庶以播無極送蕭知州迪哲赴晉寧憶昨居頖水與君同遨逰昕夕費磋切討論極搜求我首竊科第侍從蒙恩優君繼領髙薦簮筆侍宸旒瑣闈同出入交契何綢繆忽兹膺寵擢出守涖名州朋從相宴餞冠蓋擁道周蹇豫托姻好繾綣難為留商飈正嫋嫋征斾何悠悠南雲在萬里道路阻且修居行慎起處毋為念離憂方今際聖明簡賢佇嘉猷牧守任撫字布政先懷柔殷勤宣德意庶用安遐陬朂哉慎終譽永矣揚嘉休題賚溪釣者卷賚溪有逸士世本商巖孫中嵗慕恬適養晦居丘樊垂綸不設餌志靡耽華鱗煙波浩渺渺魚鳥恆相親濯纓弄夕影散髮晞朝暾企彼渭川穸洗心欲忘言俯仰終宇宙此樂難具論元夕宴集分韻得坐字上元弛夜禁朋逰忽相過華燈粲中庭列席邀同坐呼酒具殽饌觴詠更唱和繁星入户明皎月當空墮九衢沸簫鼓雜遝歡聲播幸此際升平衰邁慙無那北征晨起即事客居寡情悰兀坐不簮纓侵晨見箠楚畏聞哀痛聲士卒殊飢飽甘苦亦異情盜剽非得已困迫深可矜大將捴戎鉞委托任匪輕人命在朝夕胡為死生闕送蕭深州復任詩古稱循良吏者以其能順民之情不生事以撓之是以閭里之間仰事俯育出入作息各得其所無飢寒愁歎之聲若漢之龔黃卓魯之為治蓋可見矣豫友蕭公伯辰之在深州也寬而不失之縱亷而不失於懦察民之情而不為苛刻之作度民之力而不為窘迫之政省刑薄賦而事無不集發號施令而人無所議是以境內晏然賴之若父母焉雖古之良吏何以逾此今以兩上天官較其績為列郡之最有命復還深州豫喜公之為政有聞而惠足以及人且重有光於鄉里也于其行作詩以道意且以期公之重來也詩曰聖皇馭九有圗治如渴飢求賢靡不至實期贊雍熙矧兹郡縣寄休戚係黔黎簡擢茍不慎易以生怨咨深州古名郡俗尚非昔時官守失其政凋弊日以滋公來敷治理極力為撫綏吹噓振枯朽扶植蘇癃疲欣欣沐膏澤煦煦蒙春輝於焉樂生遂有食且有衣徭役既不後租賦自有期豪強遵約束吏胥憚嚴威黃堂白日靜終歲忘鞭笞心清事逾簡絃誦有新詩潁川績可擬渤海名堪齊及兹逾兩考奏最咸稱冝還官既有命五馬何光輝都門一相送握手暫蹰踟春風正駘蕩桃李還芳菲酌君光祿酒盡此黃金巵深州日在望速往毋遲遲相期在逺大勿用傷睽離候君重來日三考榮超躋努力慎終始庶以慰遐思素暗為九江二守魏宗冕賦素暗有佳士抱志何休休綺麗非所貴淡泊寧自羞返朴存至理窮源遏奔流古道邈難復努力追前修六月草一日立秋偶題兩日風雨過滿目皆秋意開軒灝氣回入座涼飊至髙梧響蕭蕭鳴蜩方嘒嘒坐念寒暑更令人發深喟金文靖集卷一
