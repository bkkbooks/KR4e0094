body:
  text: 金文靖集巻二明金㓜孜撰七言古詩雪窩為翰林修撰苗衷賦泮池凍壓芹藻香雪窩湛湛通鋃潢瓊姿玉質烱寒素短櫺碧檻凝清光蓬萊浩𣺌徹銀闕羅浮夣裏何殊别凈色微含冷淡風暗香遥度黄昏月當年美人尤好奇對此轉覺心神怡花明髙閣朝吟處簾捲寒忩夜暎時只今逺隔西湖側欲托幽悰那可得青綾儤值玉堂深夣寐猶疑照顔色新圖貌得重南金時來展玩清煩襟為君揮翰寫長句願保平生貞白心題松鸐薛公畫鸐藝殊絶真蹟人間半磨㓕玉堂退直見新圖毛骨蕭踈渾彷彿丹砂作頂霜作翎逈立松梢壓蒼雪試看挺特仙客姿軒昂豈是樊籠物萬里髙摶遼海風一聲清淚臨臯月忽然振翼將逺舉雲薄天空一超越肯學池塘鷗鷺羣啄食卑汙外空潔懸知素壁玩且久似有凉風起寥泬赤松異日許同遊借爾翺翔向金闕上林春雨圖為御史羅亨信賦上林竹深緑如簀滃然一片瀟湘色春雨溟濛天際來凈洗琅玕澹空碧恍疑白晝鬼神驚散作碎玉聲琮琤濃深半隠𤣥豹色蒼翠低含紫鳯翎忽然雲霧生眼底似覺隂生帶秋意乃知畫者妙入神力斡天機有如此知君愛竹非尋常寫入圖畫情難忘嵗寒節操慎自保凜凜應同御史霜贈傅子楫徳安教授京師仲冬月天氣寒栗冽客懷已無歡况與故交别先君昔教臨江時我亦攜書侍講帷春風游泳泮池上惟君與我最相知君心磊落懐奇寳自分青雲致聲早一從領薦上京華拜官得似儒官好蘄州振鐸經㡬年廣海旋聞席再遷欒城契濶三載餘又聞書考來朝天相逢頓覺容髪改却羨當時好風采論心但喜别懐舒話舊猶看故情藹只今南去沐榮恩盡道徳安風俗淳朝回相送情怱怱作詩聊以申殷勤征車軋軋金臺路落日風沙𣺌烟樹人生聚散胡爾為况乃相看各遲暮君行逺道勿蹉跎正值嵗寒霜雪多徳安早到如相憶莫道衡陽無雁過贈貢士王志浩赴東莞訓導東風三月鶯亂啼都門冠葢相追隨鄉人故舊領除命布衣一日生光輝王郎素非尋常者浩氣凌霄絶瀟洒昔年充貢登成均萬里青雲重光價已看蟾宫擢髙枝復聞戰藝來春闈霜蹄暫蹶未為失一官雅稱克儒師番禺南望𣺌何許便道還能過鄉土梅雨連村旅舍昏林隂滿地郵亭午懸知到日夏方深杏壇晝永分清隂臯比日宴説經史座間濟濟皆青衿况當聖治文明日宵旰孜孜在儒術兹行仰體聖明心作育羣才須努力朝回送别惜匆忙且盡花前酒一觴嶺南若遇回京使猶待椷書寄玉堂次少師姚廣孝禁體雪詩韻歐陽公雪詩不許用梨梅練絮白舞鵞鶴等事謂之禁體江空嵗晏天作雪滕六先驅勢逾裂同雲惨淡始異色眼底紛紜忽驚瞥山川髙下漸堆積東西岐路那分截晨光炫爛隠烏彩夕景微茫封蟻垤上林千樹夐相宜九重雙闕何殊别金河水淺凝不流玉碗無聲凍先結滿城泥滑馬蹄深空院香清鳥聲絶不聞忩外林葉聲時聴階頭竹枝折聨翩亂洒入衣袖宛轉斜窺投隙穴拂檻穿雲去復來隨風帶雨吹還滅書生把巻愜清妍紅女停針愁凜冽貂裘翠被未覺温火井湯泉那復熱棹回剡曲發佳興詞傳郢客停歌舌淮隂破敵誇神速渤海思家歎騷屑知公素有氷蘖聲嵗寒不變青松節梁園賦就筆屢呵石鼎新烹水微咽臘前預喜兆豐年潜祛螟螣消餘孽隂陽順序民物和昭錫異瑞天心悦嗟予才薄慚蹇塞十年載筆詞臣列捐軀報國誓匪他長秉忠誠心似鐵朝回看雪天上來屬和長歌資一吷重午日侍從内苑觀擊毬射栁應制大明麗天聖人作𢎞宣治化昭禮樂華夷嚮風四海清人和嵗豐物咸若翠華五載重巡幸經營北都同卜洛惟時帝京值重午習武馳毬戒程約霓旌鳯蓋天邉來禁苑清晨張御幄騰騰虎士盡貔貅劍㦸相摩燿鋒鍔毬門結束正當中兩朋左右雜相角玊花驄馬絡青絲錦衣繡服相煇爍吹簫伐鼓雜鳴笳馬前奮擊爭揮霍星飛電掣合變化神珠宛轉當空落翻身奮臂挽琱弓白羽交飛向寥廓穿楊百步巧難工分籌得雋咸驚愕至尊有喜動顔色御前勅賜恩尤渥侍臣載筆預簮花宫壺賜飲黄金爵酒酣獻夀效嵩呼傾竭丹誠比葵藿作詩再拜進蓬萊欲擬長楊慚謭薄神功聖徳不可名萬嵗千秋等喬嶽張孝子歌為尚寳司丞張信賦我聞山東張孝子早嵗啣哀報嚴父昊天罔極恩莫酬教育維持頼慈母母年未艾孝彌敦奉盈執玊心所存雞鳴問寢候堂前婉容愉色如春温綵衣娱侍供調膳從容食飲頻相勸毎懐鶴髪未成霜筋力愈強身愈健三春慈竹隂滿堂萱草含緑凌氷霜板輿緩挽向東風穿竹看花清晝長花前酌酒仍髙歌夀觴迭進慈顔和子孫滿前母更夀此樂人間真不多朅來孝親名譽起奉檄作官親更喜紫誥迴鸞下五雲詔書褒錫光閭里九重親切掌帝符日趍瑣闥鳴珮琚况聞伯兄更脱畧十年執㦸儕金吾近者受命殄賊曹南征萬里清海濤弟兄忠孝有如此一心只欲愉勤勞古來事君違所親事親寧復能忠君子今際遇事明主得禄奉親逾古人嗟哉孝子不易得朂子終養崇明徳何時升堂為母夀更作長歌寫胸臆為楊庶子題紙屏畫竹我昔隠居在山谷繞舍只令種脩竹清風白晝洒蒼雪終日吟哦看不足一從攜書來北闕遂與此君成久别平安十載知何似往往思之心欲折楊君亦是愛竹者官舍新成最幽雅紙屏拂拭無㸃塵滿寫琅玕更瀟洒昨來置酒邀客子燈前見之驚且喜停盃借問作者誰似與老可同髙致墨花淋漓真可愛黯淡猶疑鬼神㑹初看積翠落簷端便覺湍聲起忩外數竿隔水各千尺微露青林帶秋色暮雨寒霏紫鳯翎驚濤瞑巻蒼龍翼知君好竹幽思殊朝回看畫仍讀書臨風或吹蒼玉管對月時弄青珊瑚嗟哉此君貞且良丰姿凜凜非尋常世情髙下逐冷暖此君志節無炎涼氷霜嵗晏慎自保相期白首毋相忘洪厓山房歌為祭酒胡公作我聞洪厓山水好往往思之不能到今君却憶洪厓山欲結茅廬傍幽島畫圖㸃染寫深思數來邀我題新詩展圖試覔幽棲處洪厓千仭凌空垂洞口寒雲杳莫分石橋流水長潺湲閒來或有漁樵到盡日那聞雞犬喧丹霞碧樹連幽嶂翠壁青林更蕭爽落花啼鳥自四時芝草琅玕日應長君家玉峽我故鄉㡬年卜居來豫章城中地窄少耕種唯有圖書堆滿牀憶昨射䇿辭鄉縣承恩數上黄金殿玉堂視草䄂天香花裏迎鑾侍清宴朅來扈從金臺北載筆還為兩京客漸覺奔馳筋力衰纔過五十頭俱白西山峩峩江水深悵望洪厓違宿心詠歸未有陶潛賦招隠空懐桂樹吟嗟我平生慕幽雅亦欲移居玉山下蒼松翠竹不用栽石田野圃寧須借㡬時詔許乞身閒共脱朝簮尋故山預約洪厓結茅屋江上扁舟相往還為勉仁學士題王孟端所畫松檜圖長松參天苔蘚碧飛泉迸落蒼厓石霧雨三秋入杳㝠風林六月含蕭索伊誰妙筆與神通力斡造化千鈞雄此材卓犖為世用老大猶當備梁棟老檜蒼蒼擁髙葢交柯崛起蛟龍背懸厓惨淡雷雨生白日蒼茫鬼神㑹朝回坐對太古姿凜然不受霜雪欺為君歌罷久嘆息要知畫好如此詩徽廟古松山鵲為顧進士作松梢盤拿出巖壑一夕山風吹子落㡬迴度澗聴松聲横枝忽見飛來鵲翠衿紅觜一何奇誤疑青鳥降瑶池根深茯苓不易斸王母羽葢今何之宣和宮中迹如掃胡沙漠漢天地老莫向松間占鵲聲五國城荒長芳草大若靈根為醫者顧東啓作吾聞永嘉朱孺子㓜慕𤣥真王道士錬藥𡨕棲大若巖日服丹砂學冲舉時從絶嶺斸黄精餌之十年道不成偶來溪邊見二犬竒形異狀忽心驚追踪逐影何恍惚枸杞根深下盤屈乃知此物鮮通靈採食應能致仙術斬根淨洗清溪流寳鼎温温瑞氣浮煮來三夕火不絶味若崖蜜傾金甌孺子飲之驚且悟便覺胸懐洒甘露清風兩腋肌骨輕白日飛騰入雲去𤣥真引領慕昇仙西陶山中自長年山人往往尋蹤跡出没隠顯隨風烟君家業醫今㡬世活人功多人感恵何用當年枸杞根滿林紅杏皆春意送太守盧玉潤還新淦展墓薊門十月多北風道上垂楊枝已空離筵呼酒勸行客酒杯有盡情無窮盧君自是同鄉里况復青雲托知已選部曽推藻鑑明朝端共説才華美一朝承擢守錢塘朱幡皂葢生輝光布宣徳化耐繁劇撫字黎庶多慈良是邦從昔稱難治閭井欣欣樂君至數邑豪奢自斂蹤海濱赤子無遺利政成九載復朝天喜得論心向日邊九重奏績䇿書最萬里承恩蹔賦還匆匆話别臨長道昨日紅顔縂衰老風前鴈影去人遙馬上狐裘覺寒早南上歸舟莫太遲梅開定是到家時鄉中故舊歡迎處應歎昔遊今若斯歸榮晝錦誠堪羨桑梓情深難久戀明年八月候趍朝五雲深處重相見瑞兎其色𤣥從闗西來進聖皇一徳膺天命省方巡守因時令維兹靈兎表瑞徴一色𤣥膚如玉瑩毫端純潔明且淨迴身滃若𤣥雲凝目光㸃漆㣲開鏡黒毳毿毿烱相映鋒稜矯矯塞逾勁意氣直與秋空逈適當𤣥㝠司斗方乃有此兎色純正貢來玉階朝萬乘百辟抃舞歡呼競撫摩馴擾有異性白麟朱雁安足勝奇哉此兎遭榮幸沐浴膏澤為靈應瑶圃嬉遊誰與並小臣拜覩形歌詠萬嵗千秋頌神聖瑞應甘露詩聖皇御宇四海清際天極地俱來庭誕敷徳教及遐邇重熈景運昭文明九重端拱成至治恩澤汪洋悉霑被至和薫蒸盈兩間上瑞奇祥日相繼永樂已亥維仲冬天乳明潤當太空孝陵峩峩霄漢上甘露又降松栢中彌柯布葉縂醲郁絢彩流光滿山谷遙看宛若綴蠙蛛近覩猶如屑瓊玊千林萬樹動晴輝天風吹香襲人衣絪緼本是和氣結璀璨不逐朝陽晞數日霏微亘朝夕湛湛瀼瀼厚愈積天酒空聞自古傳神漿始向今時得臣民慶抃傳京師東宫採擷心更怡玉壺盛取獻天子囊以文錦登丹墀金門洞開贍黼扆龍顔悦懌稱絶美當殿傳宣賜近臣滿朝動色懐深喜須臾分賜徧得嘗全覺飴餳難比方豈猶心神益清爽頓使疲薾臻平康臣聞楨祥不易致萃美凝英逢盛世聖徳巍巍治道隆靈貺駢蕃出天意慶雲煥耀映皇都夀星夜粲天南隅瑞光郁郁成五色彌滿宫城遶帝居嘉禾瑞麥紛薿薿麒麟騶虞靈囿裏京樹烏翔色似霜仙井泉流甘若醴還看玉兎貢紫宸毛質漆黒誠可珍煌煌瑞牒難備録又見甘露來茲辰皇心乾乾尚謙抑徳配軒堯與天一上帝景命重眷顧太祖神靈永昭格小臣拜進甘露篇嵩呼蹈舞玉階前皇圖聖夀同天地陛下鴻名萬古傳長角獸歌其名馬哈獸聖人端拱御八方車書混一超虞唐仁恩義澤霈洋溢雨暘時序民物康南極炎荒北窮髪西逾月窟東扶桑陸讋水慄悉稽顙輦琛奉贄來梯航維時天心眷皇徳紛紛總總來奇祥麟虞在郊鳯在藪白烏馴雉叅迴翔醴泉出地甘露降嘉禾瑞麥何穰穰前年西域貢獅子赤豹神鹿紛成行今年海外見奇獸殊姿異狀尤非常茸茸紫毳瑩蒼璧兩角稜稜三尺強非兕非豸亦非鹿𤣥雲蓊鬰凝天章雙瞳夾鏡黒如漆四足捷疾行蹌蹌徴圖考牒不可辨載稽博物何茫茫逺人效貢儗珍異徑渉大海揚飛檣薦之雕籠藉芳褥再拜奉獻登明堂是時九重啟閶闔旭日照耀森開張祥飈瑞靄相拂掠佳氣鬱勃歡聲揚乃知聖徳極廣逺覃及庶類䝉恩光豈知此獸更奇絶性質馴雅勝白狼𤣥犀角耑未堪儗九真所獻那足方虞廷率舞先百獸上協簫韶儀鳯凰太平幸際千載㑹願紀鴻績鐫琳琅陳詞稽首歌聖徳天子萬夀地久同天長福禄獸歌狀似驢有獸有獸名福祿逸態奇姿異凡畜身髙五尺力如虎一日千里超驥足奇文間錯分黒白毛質無瑕瑩如玉目光瞳矓夾明鏡掩映𤣥雲散朝旭紛紛縞毳雪花寒皓彩瑶光何煒煜超騰逈覺長風生一鳴解使百獸服海南之國卜刺哇乃有此獸出大麓虞人致之匪羇紲弗迫弗驅自馴伏萬里飛航度海來天吴海若相叅逐山川處處流光彩祥烟瑞靄飄芬馥清晨導引獻九重從以𤣥犀與神鹿乃知聖徳被廣逺航海梯山日相屬逺人稽首貢方物異瑞奇祥莫殫録騶虞麒麟在靈囿渥洼龍媒聚天育願將職貢寫成圖一統華夷集諸福吾皇萬夀與天齊聖徳神功昭簡牘為禮部金尚書純梅花圖尚書示我梅花圖雪色一片涵氷壺嵗寒蕭索少儔侣偃蹇頗覺形容癯南枝一夜回枯槁漏泄人間春信早纔看冷蕋耀晨輝又見繁花照晴昊羅浮山人無俗塵參横月落長相親仙姿縹緲出姑射白玉為質氷為神水邉籬落幽深處梨雲半掩瑶臺樹紙帳虚明素影分銀屏皎潔寒香度向來孤山風物清千葩萬榦何縱横林逋幾度愜幽賞長吟屢遣花神驚只今零落無知已惟是西湖𣺌烟水回首當年放鶴亭千古清風孰能擬尚書愛此圖畫工標格直與梅花同正當鼎鼐調元日願報吾皇恩眷隆獅子歌有序聖天子徳極天地明並日月化被萬方仁及庶類上安下順内綏外懐隂陽協序萬寳告成田野熈洽無鬬爭金革之聲蠻方君長稽首稱藩嵗時貢獻梯航聮絡比肩接踵而至者日不暇給而凡昔之紀於載籍所不常有之物或聞之而不可見者今皆目覩其盛若騶虞麒麟世皆知為仁獸寥寥數千載未有能識其形似之真者我聖天子臨御之日騶虞凡再見至於麒麟之祥亦兩自海外數萬里而來其餘若名馬文犀紫象赤豹之屬葢以為常貢而弗之數者今西域自流沙踰崑崙歴玉門闗以達於中國又不知其㡬萬里乃汲汲焉走一介之使檻獅子以貢其嚮慕於聲教者何若是其至哉稽之往牒獅子即狻猊也如虥貓能食虎豹威伏百獸日行可五百里今觀其狀似虎猛而壯銅爪鋸牙廣顙巨頰尾大而長目烱烱如電聲哮哮震撼山嶽撫摩之不懾不懼蹲跽拜伏游戲舞躍皆能解人意有不待馴擾而能者自邊徼達於京師歡聲四動觀者蟻附而公卿大夫與執事莫不榮耀慶幸以為千萬載之奇遇且相與發揚蹈厲作為歌詩以稱頌聖天子之威徳光明宣著覃被四表不以幽而弗燭不以逺而弗届且以見殊方絶域畏威慕徳臣僕於中國者極其歸仰愛戴之誠葢自書契以來包舉六合統一夷夏開萬世太平之業未有若今日之為盛者也臣忝職文字躬覩盛美不可無紀述以傳示將來謹拜手稽首而獻詩曰聖皇御天𢎞廟畧敷宣鴻化昭禮樂登庸俊賢親簡擢河清海晏雨暘若民物熈熈遂耕鑿奇祥異瑞疊昭灼朝野頌聲相繼作封疆視古益恢拓幅􅊷相距何寥廓東窮扶桑南海角西涉流沙北荒漠山梯海航日聮絡玉帛筐篚紛交錯侏􅍣椎卉相唯諾奔走貢獻填郊郭金天之西路綿邈粤有神獸匿深壑非熊非羆亦非駮咆哮一聲震崖㟧曰為獅子何卓犖百獸見之遁且却象犀虎豹貍與貉伏地腦裂俟其玃西人致之脱羇縛載之雕闌覆以幄雄風長雲相拂掠逺逾流沙度河朔黄金臺前霜正落五雲輝輝映樓閣觚稜曉月明金爵閶闔九重方啓鑰逺人致詞甚敦樸薄貢逺物效勤慤毛為黄茸光濯濯兩目晶熒驚電爍銅頭鐵䈥紛犖确奮髯吐舌聳齦齶尾大如斗何揮霍軒然猛氣如欲搏左顧右盻喜而躍衣袂日月榮恩渥䟽滌雨露逺氛濁飽食紫芝謝叢薄瑶圃瓊林以為託乃知聖皇徳至博同仁一視靡厚薄聲教所暨如槖籥指揮萬國在掌握威服強梗懾暴惡邇安逺懐遵約束神功巍峩等山嶽小臣獻詩愧雕琢萬嵗千秋歌永樂拜和聖製元夕觀燈詩天眷皇明基祚隆肇建兩京壯且雄龍樓鳯閣倚天表飛甍傑構凌層空鴻圖鞏固地同厚寳歴綿久天與崇祥雲耀采析木上佳氣遥接扶桑東西山千仭列屏幛河流九曲如朝宗連城迴抱負滄海重闗嶻􅑖臨居庸九重冠葢自濟濟五城鐘鼓何渢渢恢𢎞盛烈莫倫擬綿延慶澤無終窮萬機圖治意尤切奉天勤民心愈忡羣生熈洽際文治萬國清寧昭武功風調雨順樂生遂潜消疾癘無疚恫是時玊京值元夕陽和應候回春融六鼇戴山來海上千仭突兀摩蒼穹金吾奉勅㢮夜禁太平樂與華夷同鑾輿乍臨丹闕外璧月正照青天中綵樓深䕶芙蓉暖瑶波蕩漾金蓮紅祥烟細繞笙歌隊天香時度羅綺叢賞心樂事固不偶良辰美景真難逢小臣感激荷恩寵拳拳補報懐攄忠仰瞻宸翰煥奎璧妙參造化天同工都俞賡歌繼虞舜垂衣致治儕軒農斂時錫福集靈貺坐令寰宇歌年豐願期聖夀齊天地萬年永樂同熈雍秋日登萬嵗山萬嵗之山髙挿天逺摩蒼翠凌紫烟瓊樓玉樹何娟娟鶯啼白晝出深谷縞鶴嵗久巢松巔洞門隂隂苔蘚碧石澗九曲通流泉日轉金輿經翠巘風迴仙伏度花前天香遥散廣寒外紫翠近落瑶池邊方壺員嶠果安在閬風瑶圃徒虚傳偶來登覽上絶頂便欲振袂凌飛仙凌飛仙坐閲天地長不老上下日月同周旋分韻得西山晴雲送蕭郎中伯辰之官南京西山嵯峨挿天半長日晴雲散空外霏霏郁郁爛成文兀兀童童列車葢紛紛五彩發青紅流丹曵紫輝層空朝連翠靄絢初日暮帶浮嵐逐斷風深州太守最瀟洒十載看雲愛幽雅昨來拜命尚書郎振袂忽辭雙闕下平生忠孝亷且勤聚散尋常寧足論從龍早已應嘉運為霖尚想攄經綸西山回首日漸逺還望飛雲重留戀南宫更喜對鍾山看雲坐憶題詩徧何將軍山林圖詩有序同邑何叔安所居在金川之潭溪左右皆佳山水因追慕何將軍山林乃命畫者為圖而求予作詩其上遂為長歌一首以寫其山林之趣且以徴後㑹云耳詩曰寰中山林無處無奚獨將軍名最都不因工部有佳句後人那得知其故金川玉峽秀且奇潭溪更在金川西將軍奕世逺孫子繼承文采尤光輝名園緑水南塘麓第五橋邉富脩竹真宰何年驅六丁掇取靈區過潭曲石欄㸃筆聴流鶯銀甲金魚舊日情四時佳致宛猶昨一段勝景真天成何郎意度尤瀟洒貌取山林入圖畫朝來訪我歡相持索我題詩説鄉社臨風濡毫為寫之却憶故山勞夢思濠梁谷口未應逺白雲流水還相期明當乞假向天子錦衣快着歸鄉里預擬山林作勝遊馬蹄踏徧烟霞裏金文靖集巻二
