body:
  text: 金文靖集卷四明金幼孜撰七言律詩和答庶吉士楊之宜就柬宗豫大學士士奇諭德及翰林諸同志九首西風露下碧溥漙久别羇懷有萬端遊子自驚鄉夢逺慈闈應念客衣寒雲連南浦低回鴈木落空江湧浩瀾東閣故人如見憶新詩還許寄來看廣寒宫闕載丹丘攬轡親隨御輦遊林外好花多映日澗邊瑤草不知秋恍疑飛步凌三島絶勝吹笙過十洲此日登臨膺寵渥相思不見重離愁都門翹首思如飛萬里鄉山入望微久客情懷隨處好故人書札近來稀江南落日孤雲逺旅館西風一鴈歸昨寄黃庭緘逺意使來應想達京畿太平海宇被皇風御輦時巡出九重獻納極慙才力薄遭逢更荷聖恩濃未忘退直聨車騎猶憶同朝聽早鐘回首帝京天咫尺鍾山雲氣盡成龍日射天門烏亂啼朝回祇在掖垣西玉堂視草回鸞馭內苑看花散馬蹄太液波光臨闕近西山雲氣入簾低欲知别後承恩好時有天香滿袖攜十年謬忝戴朝簮嵗月欺人老易臨報國未酬明主意託交深識故人心太平製作過前輩早嵗聲華在禁林何日西忩同剪燭尊前夜雨聽新吟扈蹕叨陪侍從臣後車寧敢附麒麟三春跋涉秦淮道萬里經行析木津薄宦十年違梓里丹心此日係楓宸南來冠蓋多如雨欲賦長楊愧後塵春風躍馬上燕臺一覽江山亦快哉盛世遭逢叨寵眷微生報答愧非才已從瓊島看花去還憶長楊獻賦來早晚元戎清朔漠先期扈蹕日邊回金水橋東謾卜居趍朝日日侍皇輿心懸北闕青雲近日接南天樹影踈逺客風流應未減諸公文采復何如癡兒無事煩深念懶鈍寧能讀父書隨駕至昌平登萬夀山萬里平原入渺茫淡煙踈雨曉蒼蒼河流北下連滄海山勢西來接太行小洞人家雞犬靜雲邊石室水泉香經行不異桃源境駐目慿髙意轉長和胡祭酒快雪喜晴之作九月草八日也黃雲萬里敻相連六出飛花點座氊凍合龍樓初試火寒侵鶴氅欲添綿御溝滉漾銀波靜瓊島微茫霽景鮮最是玊堂清似水捲簾呵筆寫鸞箋禁中對雪和鄒侍講韻都門向曉雪交飛獨步偏宜鶴氅衣天近蓬萊銀作屋地回粉署玉為扉灑忩更恐踈簾過拂帽還將短袖揮已卜豐年多瑞應一尊共賞莫相違再和曽侍講韻凍雲壓地曉寒清剪出瑤花片片輕撩亂欲迷鳷鵲觀霏微逺度鳯凰城湘簾半捲飛還落輦道經行掃更平向晚玉堂光可燭細看書卷獨分明和答祭酒胡公移居故人逺自西江至借得幽居意自新茶竈筆床忘俗慮紙忩石榻淨氛塵賓朋問候時相過雞犬移來久自馴共喜北來風景好霜晴十月暖如春退朝口號和答祭酒胡公金闕嵳峩聳巨鼇慶雲五色護龍袍西山瑞雪浮佳氣太液微風揚碧濤載筆每聞天語近退朝還覩日華髙玉堂承詔多清暇歌詠猶能試彩毫十月三十日思親生我於今四十年每懷報德負蒼天身留北闕違桑梓望盡南原隔墓田郡有清名傳死後人懷遺愛在生前客居此日偏多感灑淚西風獨惘然次許鳴鶴至日韻初陽隱隱動微和卜嵗占雲竟若何天近九重香霧暖日回萬井瑞煙多北來旅寓隨萍梗南望鄉山隔薜蘿共沐聖朝恩渥重且須對酒一髙歌冬十一月草三日隨駕閲武於齊化門外聖主從容事閲兵鑾輿向曉出都城三軍勇悍今無敵萬騎驍騰舊有名牙帳風生鳴鼓角期門日暖動旄旌早須漢北銷氛䘲海晏河清頌太平讀文丞相傳有感憶昨中原板蕩秋銜哀日夜在興周全生不為功名計後死空懷社稷謀皎皎丹心明日月巍巍大節重山丘北來弔古看餘録祇在當時已泪流晚歸自玉堂偶成詞林退直過昏鴉緩轡垂鞭踏月華風急斷鴻低粉堞天寒羸犢困柴車誰家步幛隨絲管何處鐃歌雜鼓笳漸喜客居生意好底須物外避喧譁皆山軒為太僕寺丞吳性泉賦滁上幽居盡日間捲簾面面對青山煙中樹色自逺近天際浮雲時往還酒醒聞鶯過别墅興來洗馬坐松間故知吏隱多真率何日相從一解顔和韻答梁修撰風清馳道散香塵日共趍朝侍紫宸瓊島雪寒猶待臘御溝氷冸已回春異鄉慰藉煩朋友久客暌離念老親慚愧菲才叨寵遇深期報答在兹辰輝輝旭日照髙臺暖氣還從上谷回香霧細薰池上草紅霞低映水邊梅故人病起耽詩句羇旅豪來縱酒杯總道殘年霜雪少春光先已到蓬萊禁城雪後暖初生草樹凝暉炫曉晴仗簇青雲開雉扇香通紫禁度鸞笙中天日月懸雙闕一統山河奠兩京幸喜承恩偕扈蹕朝回時共散珂聲凝清堂為姚府尹賦玊雪襟懷鶴氅輕畫堂燕坐有餘清捲簾自愛青山好隱几不聞啼鳥聲日轉暖雲當户靜雨餘碧草上階生就中此意誰能識嵗久應知太守情贈太僕吳寺丞還滁陽昨來呈馬御樓前五色龍文照錦韉喜見承恩來日下忽看行李出天邊河流夜繞盧溝月關樹晴連白塔煙臘盡春歸能幾日到官應是及新年次若思胡祭酒立春日早朝客裏殘年逢立春清宵待漏拜楓宸玉階旗影飄晴雪馳道珂聲動紫塵綵燕鬬簪幡勝好芹芽試簇菜盤新鑾輿暫退聞呼喚賜宴先傳及近臣次羅修撰元旦紀事漏聲未徹禁鐘催絳闕熹微曙色開仙樂近從三殿出香煙還傍九霄來西山王氣連蓬島南極恩光被草萊此日履端同獻夀陽春屬和羡多才次胡祭酒元日早朝未明鹵簿已先陳鳯蓋鸞旗五色新銀燭影含雙闕曉簫韶聲合九重春金函奉表來羣辟卉服隨朝進逺人共祝堯年歌聖德燕南萬里淨風塵和子啓曽侍講元日早朝金爐裊裊瑞煙輕銀燭煌煌拂曙明天轉蓬萊紅日近春回閶闔暖霞生九霄斧鉞開仙仗萬國衣冠會玉京忝列鵷行稱聖夀三台遙覩泰階平喜友人郭子成赴召至京夜宿旅舍賦此奉柬暌離已是五年餘又復相逢在客居白首誰憐多患難丹心自許效馳驅金臺夜月生歸夢鯨水秋風憶故廬此夕旅懷應盡解不須對酒重欷歔黃公宗豫元夕請賞蓮花燈次光太胡公韻錦簇星房巧樣新畫堂不夜暖生春瓊杯貯露承仙掌絳幕流霞度暗塵艷質交輝風度席紅粧低照月隨人年年此夕陪清燕傾倒寧辭醉脫巾贈王尹實判官還潞州善篆書三年京國數追遊千里還官寵渥優詩興謾從佳士發篆書多為故人留山城臘盡梅初放驛路春寒雪未收早晚到州如有暇新詩先寄鳯池頭贈袁士誨之官孝感與君相見還相别又捧天書出紫宸江上月移仙棹逺花前日照錦袍新河陽舊日民懷惠柏府當年政有神自昔郎官當列宿為言撫字在忠勤贈赤水張經歷矩秩滿還官矩嘗為新淦知縣昔年相見忝諸生此日重逢愧老成紫陌看花同是客燈前對酒若為情湘江水暖春來緑蜀道雲開雪後晴此去轅門勤贊畫佇看鶚薦有公卿和答光太胡學士至日喜雪之作微陽初動暖生灰晨雪霏霏應候來漸覺飛花迷粉署忽驚舞絮滿瓊臺銀河有影光初合金水無聲凍不開總道豐年三白好且須酌酒勸深杯和若思胡祭酒至後詠懷二首學省朝回無一事鉤簾坐看雪飛花故人問字或載酒稚子敲氷時煮茶東閣十年同載筆西江千里共思家昨朝葭琯陽初動時覺新袍暖漸加花樹凝暉散彩霞禁梅融雪吐輕花玉堂進講仍分直光祿傳餐更賜茶報國自期心似鐵浮生已分客為家太平幸際重熙日喜見新陽霈澤加壬辰會試受命作考試官恭承詔命簡羣英慚以非才秉鑑衡五夜奎光垂玉座九重曙色動霓旌明時養士關興運此日掄材係聖情不獨有周歌棫朴朝陽佇聽鳯凰鳴二月八日入試院奉柬諭德士奇諸同志羣才濟濟會南宫奮筆爭趍戰藝中江海魚龍乘化雨雲霄雕鶚借長風文章自昔歸時論選拔由來合至公聖代求賢思治理共須努力副宸衷青山白雲圖十年京國夢林丘此日披圖憶舊遊忩户煙雲晴欲合樓臺蒼翠晚初收長橋流水通行客落日滄波起棹謳為問玉山渺何許此身先已到瀛洲竹林書屋為劉子樵賦萬竿蒼玉護茅廬清絶偏宜隱者居五月緑隂連户牖三秋涼翠濕衣裾間裁汗簡供吟詠醉寫琅玕入畫圖何日考槃能遂願相從三徑引柴車分題得黌館絃歌送蕭太守伯辰還深州太守興賢費琢磨諸生嵗久沐餘波黃堂晝永鞭笞靜泮水春深雨露多已喜閭閻興揖讓屢聞父老誦時和州人自此敦風教不獨文翁有詠歌贈石彥誠之官徐聞故人取别大匆忙行李朝來發帝鄉當代求賢思治理昔人作縣重循良過家臘盡懷桑梓度嶺春來避雪霜海上到時官事少題詩日日對桄榔贈黃思恭先生受誥還永嘉回鸞五色散天香鳯翥龍飛粲玉章聖主褒封昭盛典先生拜賜荷恩光大夫命服尊鄉里學士官銜壓右坊此别但期多夀考永歌天保頌時康挽蘇伯厚編修先生交誼重金蘭十載同朝列從官天祿校書知姓字經筵進講識衣冠花迎旅櫬春雲暗樹掩銘旌暮雨寒目送歸魂招不得忍將别酒酹江干扈從狩陽山次韻答胡學士時有甘露降鸞輿曉出五城東從狩儒臣載筆同日下蒼龍隨玉仗道前寶馬載雕弓苑松承露枝皆白島樹經霜葉盡紅向晚笳聲催疊鼓軍門校獵氣偏雄扈從再狩武岡次學士胡公韻二首曉瞻行殿倚岧嶤步入髙峯路更遙鐵騎蹴雲開御道蒼鷹掠野上層霄旌旄髙下隨山轉煙火依微隔樹燒忝後詞臣慚謭薄幾回扈蹕逐行鑣輦道霏霏散紫塵好風晴日暖先春羽林列騎分兵衛玉帳迎鑾引從臣香度綵雲瞻御氣光涵寶露沐深仁太平久協非熊兆况是清朝集鳯麟贈李伯葵還廬陵其子為禮部郎中二十年前早識君别來幾度想清芬滄洲把釣常聽雨林下哦詩只看雲郎署綵衣留繾綣畫圖别意寫殷勤青原白鷺遙相望把酒臨岐忍共分臘月四日同楊諭德晚出訪友人李伯葵余回至長安街墜馬遂在告數日胡學士先以詩見寄明日楊復以詩來相嘲因次韻奉答且以自解也然後詩結語蓋答楊意也二首雪消官道馬難行駕馭由來未可輕顛蹶泥塗爭失笑淋漓衣袖益堪驚浩歌不盡停雲意髙卧何勝戀闕情忽得好詩相慰藉明珠萬斛照新晴向晚街頭驚墜馬已瞻歸騎去翩翩濺泥未覺沾烏帽墜地寧論涴錦韀松火寒爐供夜坐梅花髙閣對朝眠未須一蹶傷遲暮壯志還應邁昔年九日侍從車駕出南郊登髙京華此日逢重九扈蹕登臨荷聖情萬里河山空斥候三秋禾黍賀收成西風旌斾連雲影落日樓臺起笛聲慚愧微生叨寵遇永歌天保答升平九月十八日扈從車駕出居庸關外較獵羽士如林亦壯哉長風萬里蹴飛埃雕弓射鴈雲中落錦臂鞲鷹馬上來絶壁重重圍網近髙峰獵獵竪旗開從臣載筆長楊裏謭薄慚無獻賦才和子啓曽侍講敕建內閣之作中天蓬島鬱岧嶤紫殿瓊樓近碧霄樹外逺峰晴入閣花間流水曲通潮清朝視草回鸞馭白晝焚香合鳯韶共喜臨池多暇日綵雲時向座間飄和曽侍講禁中聞鶯禁城踈雨映紅霞忽聽鶯聲感物華天上幽棲偏自在日邊嬌語避喧譁歌餘白晝間芳樹啼盡東風送落花却憶江南成久别坐聽曽到野人家北京八景居庸疊翠嶻􅑖天關復幾重龍飛鳯翥勢偏雄千山黛色落平野萬里煙光明逺空峽口人行春雨外樹邊鳥度夕陽中北巡記得隨鸞馭曽上雲間苐一峯玉泉垂虹宛宛垂虹引玉泉縈巖出澗淨娟娟細通樹底映初日遙轉湖隂涵逺天魚動翠紋生雨後鷗翻細浪起風前源源自是歸滄海添作恩波遍九埏太液晴波禁苑香風散紫埃晴波漾日自沿洄天光下映銀潢淨雲影遙涵玉鑑開舊日曽隨仙仗到幾時還載酒船回從知弱水通三島應有羣仙獻夀來瓊島春雲蓬萊東望近扶桑冉冉春雲接下方隔水樓臺通御氣半空草樹發天香花間駐輦霓旌濕海上傳書鶴夢長映日龍文還五色殿頭常得近清光薊門煙樹平野荒荒接薊門淡煙踈樹碧絪緼過橋酒幔依稀見附郭人家逺近分翠羽落花行處有緑隂啼鳥坐來聞玉京盡日多佳氣縹眇還看映五雲西山霽雪海上雲收旭景新連峰積雪淨如銀晴光逈入千門曉淑氣先回上谷春瑤樹生輝寒已散瓊林消凍暖偏勻玉堂相對題詩好移席鈎簾坐夕曛盧溝曉月盧溝杳杳出桑乾月照河流下石灘茅店雞聲斜漢曙汀沙鴈呌早霜寒水光微帶山煙白野色遙連塞草殘千古長橋枕南北憶曽題柱倚闌干金臺夕照迢遞金臺近日邊偶來登覽尚依然萬家禾黍秋風外十里旌旗落照前逺郭砧聲來杳杳平原歸騎去翩翩黃金謾説能招士千載猶傳郭隗賢元夕賜午門觀燈四首鼇山髙聳架層空萬燭燒春瑞氣融星動銀河浮菡萏天垂瓊島綻芙蓉行行綵隊穿華月曲曲鸞笙度好風自是太平多樂事君王要與萬方同鳯輦初臨鼓吹喧千官環侍紫宸邊九門燈火雲霄上午夜山河錦繡前春散爐煙浮樹暖月移寶仗映花妍從臣忝預傳柑宴既醉猶歌湛露篇天上紅雲濕翠旗樓前燈影動罘罳御筵花暖歌聲近紫禁風清玉漏遲中使傳宣還賜果詞臣獻賦更陳詩華夷盡道承恩澤千載昌期際此時萬朵金蓮徹夜開滿簾香霧隔蓬萊遙看鼇背雲中出喜見仙人海上來拂曙星河低絳闕凌空鸞鶴上瑤臺笙歌一𣲖春如海共進吾皇萬夀杯賦玩藻軒新構華軒小池上間來玩藻亦多情紫莖蕩日緑波動翠葉翻風細浪輕自昔舜裳昭盛美况聞魯泮播嘉名極知文采歸吾輩育德相期更老成贈許闕時還文江共説君家兄弟好容儀楚楚羡多才兄從載筆兩京去弟復將家萬里來行李暫留殘臘住扁舟却向早春回客中相送情難盡愁賦歸鴻對酒杯次用之梁贊善人日觀駕之作四首森森羽衛肅清晨扈蹕千官候紫宸旗擁交龍收宿雨輦隨丹鳯輾輕塵三陽應候頻占嵗七日宜晴自可人極知聖德同天運萬彚從兹又一新朝罷金輿出建章慶雲五采絢晨光霓旌拂樹開仙蹕寶馬穿花散御香金水繞梁初泛緑仙醪貯甕尚封黃鎬京侍宴沾恩澤獨對南山獻夀觴幄殿當中錦繡開千官先進紫霞杯花間合樂晴雲度栁下停鑾晝漏催日麗綵筵金作屋雲回寶仗玉為臺東風淡蕩春先到已有陽和遍九垓萬乘行春展豫遊忝從載筆荷恩休碧桃花重偏迎輦御栁寒輕不入裘天香盡日隨冠蓋佳氣無時近冕旒聞道故人歌詠好詩成先擬進瀛洲賦道鄉先德堂昔者曽聞鄒道鄉至今青史播餘芳傳家獨倚詩書重貽後深知慶澤長門外滄波流滚滚雲邊喬木碧蒼蒼西山南浦遙相望何日維舟向草堂為太僕卿楊砥賦春牧圖為愛吳興筆法工綵毫一掃冀羣空雄姿駿骨多難辨汗血龍媒自不同春暖散遊芳草地雨餘間卧落花風渥窪異産曽親見幾度承恩侍九重次曽侍講對雪二首北風作雪試寒冬逺近飄颻未覺重禁苑鶴回迷玉樹長天鴈落避遙峯偏宜映字臨書卷不畏衝寒候早鐘最是玉堂清致好煮茶髙詠獨從容落雪如花屬莫冬關河萬里白重重飛花亂點城邊樹積素遙遮海上峯雙闕塵消清輦道九城月淡度踈鐘平生心事應如許肯與春光鬬冶容寄伯兄季質及諸弟四首弟兄不見十餘年南北相望各一天久别故園空有夢新添白髮自堪憐已知放浪煙霞外自愧棲遲雨露邊愁思滿懷無處著朝回時誦鶺鴒篇一别滄江十五年每依北斗望南天鬢毛衰颯交遊念才學迂踈聖主憐望日獨占霄漢表因風不到鴈鴻邊自慚蹤迹長羇旅招隱空吟桂樹篇金臺為客動經年北望鄉山萬里天書札久無朋舊問官居惟有老親憐白雲渺渺西江外歸雁翩翩落日邊早晚淦頭逢驛使殷勤為我寄長篇淹留京國值殘年回首西江隔楚天金馬玉堂容我老清泉白石為君憐已聞卜宅依雲際尚憶攜書到日邊盡道别來多賦詠錦囊珠玉動成篇除夕次胡祭酒韻燈前又是一年過久客寧知白髮多天上椒花渾爛熳故園生計己蹉跎玉堂詩句聨珠玉華屋笙歌艷綺羅獨坐齋居清似水早朝又擬候鳴珂雲山草堂為楊庶子賦二首聞道幽居近翠微好山多與白雲齊栁塘日暖花爭發門巷春深鳥自啼酒醒每臨松下坐詩成間向竹邊題一從射䇿金門去風雨年年夢建溪草堂瀟灑出氛埃疊嶂層雲翠作堆林下日長書帖靜溪頭水滿棹船回興來展席看圖畫客至揮毫對酒杯倘得承恩歸梓里杖藜還許共徘徊贈劉院判舊傳方技獨精深白首難忘濟世心聲譽早知聞禁闥交遊今喜在詞林種來仙朵頻收穀煉就丹砂欲化金我為鄒陽偏感激謾酬舊德寫新吟為雲南楊賦雅樂軒久住雲南長子孫故家文獻至今存絃歌不廢書連屋賓客間過酒滿尊春暖花香晴入户雨餘山色曉當門碧雞金馬應能識此意何時與共論贈劉校書赴沂州學正角聲催曉鴈聲寒握手都門話别難行李只留詩卷在離筵須勸酒杯乾幾行雪樹臺前見千里雲山馬上看莫謂沂州氊獨冷校書原是老儒官贈汝南房公安再任山東參政昔在山東治績優只今躍馬羡重遊九天雨露覃恩澤萬里風雲起滯留心事自來如鐵石聲名此去重丹丘承宣努力康時政佇聽民謡載道周贈郭公敘改調浙江僉憲當年承命忝文衡虎榜髙題見姓名衣繡昔從關陜去秉􅔕今向浙江行薊門臘盡陽和動沽驛寒消雪水生深愧臨岐無别贈激揚好為樹風聲贈山隂吕公升服闋僉憲閩中待漏曉辭雙闕下秉驄逺出五雲邊交遊愧我叨虛譽風裁如公羡獨賢客路三冬逢積雪關河萬里值殘年七閩早晚咨詢遍猶想登臨攬轡前贈吳舍人勝復任還南京十載抽毫侍禁闥天官書考共稱宜清宵待漏辭仙仗幾日看花到鳯池别酒一杯憐夙昔畫圖半幅寫暌離南京故舊如相問為道衰遲鬢欲絲贈人長蘆鹽運司柏臺凜凜著清名十載超遷荷寵榮風掣滄溟鵬運逺雨晴官道馬蹄輕地空積鹵煙光逈海闊遙天蜃氣清自昔煮鹽關國計深期出納慎亷平挽亡友胡若愚與子暌離三十年詎期死别隔重泉西山鶴唳寒雲外南浦猿啼落照前曲庋塵消遺藥裹空齋雨冷廢殘編巳聞令弟書潛德欲托銘文與世傳元夕午門賜觀燈二首鳯輦遙臨絳闕前六鼇擁翠出中天花明寶樹分銀燭仗簇青霄散御煙五鼓稀聞傳玉漏九重頻得侍金筵太平共仰吾皇聖再拜稱觴祝萬年天仗森森列寶臺教坊初進鼓如雷金蓮夜放輕寒散絳蠟春融瑞氣回仙樂慢調雙玉管紫宸頻上萬年杯傳柑嵗嵗承恩渥感遇深慚負不才贈子魯陳郎中使西域東風輕騎去翩翩王事驅馳念獨賢奉詔昔曽煩陸賈尋源今日得張騫曉經虜部雲連塞寒宿穹廬雪滿氈兩度玉門今始慣殷勤德意在敷宣贈王所存復任會昌十年司訓滯山城此日重遊歎老成闕下偶留俱是客天涯送别若為情馬融設帳青燈舊劉向經傳白髮生聖主崇儒恩獨厚深期作育報升平贈熊自誠還文江白髮遨遊閲兩京相逢偶得話平生花開别館三春夢草緑遙天萬里情水驛維舟聞過鴈江亭把酒對啼鶯極知令子難為别逺道猶煩寄好聲三月十日隨駕獵海子上奉簡胡學士楊庶子暖日融融靜鼓鼙條風拂拂動旌旗栁間飲馬春泉細花裏聞鶯晝漏遲近苑獵回猶賜饌行宫朝罷更題詩晚來獨向都城望雲擁蓬萊五色垂三月草二日隨駕出郊外即事出郊偶得並鞍驂塵俗都忘意自耽桃李花繁正啼鳥桑柘葉大將浴蠶逺樹垂羅青似帶遙峰過雨淨於藍聞道野人催種秫却令回首憶江南夀菊為行儉王修撰賦二首剪折曽聞出禁垣誰知生意久能存敷榮不異煙霞色秀植何殊雨露恩盡日幽香回玉署經時艷彩照清尊持茲好為嚴親夀服食區區未足論玉堂分得一枝來坐對髙秋亦快哉餘英絢日時堪把殘蕊凌風久更開祇訝生成資灌溉翻憐穠郁勝栽培保此孤芳期晚嵗贈君髙詠擬瓊瑰偶過胄監學正曽才魯出黃精共食之因以奉東見説黃精出逺方製來佳味喜初嘗長鑱斸處應逢雪小甕盛來尚帶霜日曝已經三伏暑蜜藏猶和百花香臨風泚筆題佳句還憶分來寄玉堂挽兵部盧侍郎淵經年不見盧兵部忽讀銘文淚滿頥事業巳為當世重忠勤賴有聖明知浮雲流水都如夢南浦西山總是思一劍未酬知己願忍歌楚些送孤兒贈周至善還廬陵大理寺正復則之父也清曉驅車出帝京一尊那及送歸程分攜不盡故人意繾綣難勝手足情雪滿匡廬山更好草深彭澤水初生到家應慰諸孫望日向花前進夀觥贈進士錢稽穡僉憲湖廣新除僉憲湖南去行李匆匆發帝鄉金闕九重分使節繡衣五色帶天香雲霄攬轡回雕鶚江漢觀風動雪霜少日操持期逺大臨分相送意偏長槐隂書屋為姚少師乃子賦種來槐樹碧森森髙覆茅齋十畝隂積翠滿庭侵縹帙清風入座濯鳴琴盍簮時有衣冠集閉户不聞車馬音壯志窮經知有待沉潛須識古人心嵗除時享太廟陪祀廟門肅肅迓鸞輿環佩珊珊百辟趍大樂升歌將事始黃流祇薦禮神初香霏寶鼎浮丹户氣間膋蕭散玉除萬嵗皇圖天逺大靈光長護紫宸居瑞應白烏詩二首海陽縣貢獻聖皇端拱致雍熙逺貢祥烏自海涯素質晶熒疑綴雪奇姿淨潔勝凝脂藏輝雅稱棲瓊島映日還宜傍玉墀幸際升平瞻上瑞虞廷堪比鳯來儀仁鳥呈祥特賜觀玉階抃舞集千官霜毫一色逾瑶鶴玉羽雙明掩素鸞五夜崇光生絳闕清晨喜氣溢朝端吾皇福夀同天地仰祝鴻圖萬世安萬夀聖德詩四首天眷皇明膺寶祚德隆聖母集繁禧塗山啓夏同前代太姒興周比昔時閨閫只今資善教邦家政此賴維持太平海宇同歡慶萬嵗千春仰聖慈聖母勤勞秉孝誠陵園展謁屆清明龍輿穩導出金闕鳯駕徐行自玉京田野耄倪均舞抃山川草木總光榮小臣扈蹕承恩澤願效嵩呼播頌聲聖母謁陵當令莭孝心一念格皇天初看瑞雪清黃道旋觀甘霖布大田此日園林鍾王氣長時松柏藹祥煙鑾輿嵗嵗來瞻拜慶澤綿延及萬年聖母深仁及萬民聖皇至孝貫蒼旻西宫榮養超前古長樂歡娛奉萬春夀擬乾坤同久逺德隆家國極彌綸臣民處處騰歌頌此日均沾雨露仁元夕賜觀燈二首聖主無為致太平九重歡賞洽輿情東風大地春如海午夜星河火作城魚躍鳶飛同化育農歌社舞荷生成鎬京侍宴榮恩遇願效賡歌答聖明天仗森森護翠華從官如雨列簪花教坊樂舞三千隊燈市樓臺十萬家寶座星回瞻御氣宫壺春暖醉流霞金吾此夜知無禁處處笙歌語笑譁次韻答孫孟修五首蚤嵗詞華邁等流名家知子獨才優芝蘭玉樹推諸謝碧嶂清江數二劉忩下螢光長照夜客邊鱸鱠屢逢秋胸懷已覺吞雲夢蹤迹於今半九州朝朝禁苑接羣賢日影那能復計磚晝永玉堂頻視草夜寒金殿每分蓮敢誇詞藻三王後誰識文章兩漢前千里獨勞詩逺贈驪珠萬斛照華箋蓬萊紫殿壓金鼇簮筆時常近節旄紅日逈浮仙掌動綵雲深擁御筵髙娛情翰墨知吾子叨祿詞垣愧我曹幾度歸來清夜永天香細細染宫袍故園松菊未全荒桑梓遙瞻雨露芳自愧青綾嚴內直長懷白髮在髙堂文名敢擬追先漢詩律誰當繼盛唐江海羡君才獨健贈來珠玉夜生光儒官列職侍東曹宦轍馳驅敢憚勞載筆屢登金獸闥承恩多賜錦雕袍不栽縣令門前栁慣看仙人洞裏桃自是南州多俊傑劍光還射斗牛髙山居八景為大學士胡公光太賦芳洲春草滄洲迤邐接長堤草色經春望欲迷濃帶曉煙青冉冉逺含踈雨碧萋萋王孫獨係歸時恨謝氏偏留夢裡題記得往年長送客夕陽江上馬頻嘶竹塢雲林憶過滄江問草堂萬竿蒼竹倚雲長隔簾鶴舞清風入卷幔龍吟雨氣涼靜對琅玕時拄笏間吹玉管更焚香故園久别知無恙晚節相期傲雪霜天玉泉石白石清泉舊有盟長年登覽愜幽情危通碧澗生雲氣亂灑寒巖作雨聲曽共仙翁分玉髓或從野客濯塵纓何時蠟屐尋幽處坐聽松風思更清石屋晴瀾危石峩峩聳翠巒𥻘𥻘晴影揚層瀾四時雲氣當忩近五月灘聲入座寒日照翠紋浮畫舫風含素練動漁竿却懷太液恩波濶曽從鑾輿倚檻看滄江煙雨一望長江際碧空淡煙漠漠雨濛濛密遮逺樹蒼茫外暝拂長林杳靄中極浦征帆迷逺近荒溪流水亂西東滿懷清絶無塵思幾度看圖興不窮墨潭秋月寒潭煙淨水溶溶璧月澄清映逺空素練影深涵魄玉盤光滿落鮫宫弄珠神女何時到解珮遊人此夕同尚想泛舟攜客處扣舷一曲對西風螺岡晚照螺阜蒼蒼紫翠浮夕陽倒影映河流白雲半壁峰前暮黃葉孤村雨後秋漸聽樵歌歸谷逺恍聞僧磬出巖幽昔時行處今成夢回首令人憶舊遊芙蓉寒雪江上芙蓉萬疊開漫空飛雪淨纎埃瑶林欲凍千峰合玉澗無聲一水回向晚漁樵應自訝清朝猿鶴謾相猜玉堂載筆曽同賦坐對西山亦快哉次祭酒胡公移居禁城之西韻四首編茆為屋竹為門咫尺嚴城隔市喧五夜珂聲花外散九霄旗影日邊屯行尋紫陌添詩興坐對髙槐注酒尊自昔市朝多吏隱不須更羡浣花村小徑新開長土花數椽茅屋靜無譁忩前午轉聞啼鳥墻角晴來數閗蝸一榻安身那有纍十年為客自成家詞林退食無餘事日日相過問煮茶抱朴誰言拙似鳩官間十載遂優遊興來酌酒不成醉老去吟詩苦未休野馬隨風忩外過茶煙揚日鬢邊浮他年倘遂歸田計有約東山訪舊丘踈槐涼雨曉來過短服新裁試越羅長日閉門人事少清風滿榻緑隂多退朝只想尋韋曲投老猶思賦繭窩共喜卜居成物色滿懷詩思近如何內閣新成次大學士胡公韻四首祕閣新開紫禁西髙甍輝映與雲齊娟娟碧樹當忩近靄靄晴峰入户低豈有文章裨黼黻空慚侍從列簮圭朝回盡日文書靜花落間階鳥自啼同官翰苑忝同年敢以能言擬謫仙長日抽書開石室清時進講侍經筵苑中御氣浮仙掌池上晴雲濕綵箋好是午朝初退直紫薇花裏漏聲傳五雲垂彩護金鑾載筆時臨白玉闌末學每蒙宣室問不才虛費大官餐曹劉未愧風騷逺班馬由來制作難却憶金莖頻賜露晚涼氷署不勝寒晝長華館自沉沉最喜鉤簾得樹隂對語黃鸝偏近户多情燕子故穿林青雲回首江潮逺白髮欺人嵗月深慚愧微生無補報敢忘忠孝負初心贈子儀張博士還南京胄監新除博士南京去一騎迢迢發薊城久别未忘鄉里意相逢不盡故人情夕陽紅樹孤帆影野水寒雲落鴈聲職教成均知不忝深期作育贊皇明挽史公望院判三十餘年住帝鄉獨將遺業究岐黃官間久已忘生事朝退猶能校古方月滿杏林秋雨冷風悲橘井晚煙涼令孫萬里扶歸櫬忍聽哀鴻薦一觴贈傅以莊無為州同知為客兩年留闕下承恩此日佐名州天香不斷生衣袖大雪初晴送客舟報國自能持節操濟時應不乏才猷到官尚想憐知己好遣音書慰别愁贈傅禮讓僉憲還河南憲府聲華藹縉紳還官總喜慰斯民繡衣出殿香煙合紫誥從天雨露新千里驊騮開道路九霄雕鶚出風塵遙知父老爭迎候􅔕馬重臨洛水春挽泥田周煥英生平孝義有天知父子情深不盡思歸骨尚存當日事載銘空使後人悲江湖隨處曽經覽風月於今負宿期千載髙門餘慶在况聞嗣世有佳兒挽曽秬光薦學士棨之長子二首力期科第繼前人豈料青雲志莫伸白日悲風來萬里故鄉凶問及三春青山雨冷封黃壤舊館燈殘掩素塵可奈雙親成永訣空餘涕淚灑衣巾生死茫茫未可知九原一去負深期偶看書札傷前事細讀新詩感昔時春雨蘭苕空有恨秋風玉樹不勝悲向來哀樂真成夢三尺空令著刻詞次韻寄祭酒胡公若思蓋嘲之也老去襟懷誰與開喜聞燕子及春回舊書祇課諸孫讀新釀時逢好客來稠疊敢忘知己贈經綸浪許後生材一自西江歸卧病幾從天上望蓬萊挽解潮夫憶昨承恩乞養歸九原一去更無期弟兄遘難人皆惜鄉里傷心我更悲令子已聞歸舊業故人還為著銘詞追思往事成塵夢回首山陽淚滿頥挽錢塘潘處士中書舍人勤之父湖山舊隱最從容詩酒間中杖履同總喜髙年榮祿養親逢聖代沐褒封遼東鶴化驚秋月江上猿聲墮晚風令子詞林久相識為吟楚些興無窮分題玉階春曉送知縣郭瑛還金華九重初起漏聲稀海色曈曨曙影微花隱玉樓通御氣香霏丹陛散朝暉天垂豹尾開仙仗日繞龍鱗動衮衣朝罷都門一相送五雲回首思依依挽李訥菴布衣久與世相忘德善由來重一鄉湖海壯遊詩獨好山林清隱興偏長間齋教子書盈篋别館娛賓酒滿觴一自九原乘化後空聞薤露淚霑裳送人赴遵化主簿昔聞作簿數仇香文采如君更莫當豈謂鳯鸞棲枳棘終看騏驥騁康莊花前對酒清歌發馬上看山别意長珍重到官敷善政都門翹首日相望岫雲軒為泥田周叔昭作平生心事只悠然杖履逍遙稱暮年長愛山光來座上時看雲影落簷前花間曉共絪緼合忩外晴兼紫翠連亦欲與君尋雅趣投簪何日賦歸田送江紀善秉心奔母喪還鄉初聞謁告省慈闈豈料仙遊忽見違白首未終三釜養故鄉空見一舟歸松楸有淚傷春雨諼草無情暗夕暉腸斷東風難把别寸心應逐白雲飛和劉仲良遺子咸詩為憶雙親及老年冬溫須是藉純綿初從蠶室分霜繭寄自烏臺裏雪氈野服裝成宜宴坐寒衾製就稱安眠極知微物勞嚴訓肯使清名汙一錢挽南昌黃仲謙禮部郎中鍾之父昔隱林泉逺利名至今遺德重鄉評艱難早見承先業耕學還聞啓後生夜雨孤燈間舊榻寒霜宿草翳佳城南宫有子揚潛德表墓將鐫太史銘送胡尚書乃弟歸常州北來未久即言歸兄弟情深忍遽違别館夢回催去騎南宫人醉把征衣山回極浦帆檣逺水濶長空鴈影稀想過彭城憶坡潁暮雲回首思依依送楊稷還泰和東里先生子也君家嚴父我知己道義相親三十年共説承家推令子况聞世德盛名賢歸帆渺渺西風外去鴈翩翩落照前此别更期敦實好臨岐相送思綿綿送康孟嘉赴廣西按察知事遙奉除書指越鄉佐􅔕今喜得賢良過家猶想榮簮紱度嶺應知靜雪霜揮翰有時臨桂樹捲簾長日對桄榔極知憲幕無餘事書問時能寄玉堂送陳秉剛赴亷州照磨二首闕下相逢話未休一官又赴嶺南州近郊苜蓿收殘雨髙井梧桐動早秋鴻鴈逺隨舟楫去魚龍欲挾海波浮喜聞郡幕無公事應得登臨記逺遊射䇿當年負俊聲每憐知已最關情梁園早見收枚乘宣室無能薦賈生清夜聞雞傷别思北風驅馬促嚴程懸知過嶺梅將發有待題詩寄玉京松筠軒為章仕顒作號風子能大定數居淦城舊住城東二畝宅種來松竹長偏成每疑蒼雪簷間落時有涼風座上生長日持杯看鳯舞清宵隱几聽龍鳴向來數學名尤盛深識先天造化情贈李君元珙致仕還家三首京國重來鬢巳蒼每因話舊意難忘幾年簪筆依丹禁兩度乘􅔕按越鄉自是髙情超世俗從來雅操敵氷霜只今勇退真難得為子髙歌一慨慷客路驅馳四十年一朝解組賦歸田柴桑獨見陶潛去盤谷誰如李願賢鴻鵠九霄隨返斾煙波萬里送歸船都門把别情無限老我空吟桂樹篇天上涼風動早秋河橋送客思悠悠詩篇獨向朝回寫翰墨多因去日留白石清泉同野服間雲流水共扁舟鑑湖倘得蒙恩遇尚擬山中訪舊遊送陳參政傑復職久效勤勞歷四朝暮年文采更飄蕭九重奏最隨鳴珮萬里還官理去橈藩閫祇今資贊畫縉紳猶自仰丰標西江總有清名在更盡忠誠答帝堯挽都御史邵玘繡衣屢拜渥恩濃憲府重臨位秩崇此日威名馳列郡昔時風采著朝中清秋鶴化鍾山月落日猿啼浙水風北望鳯臺吟楚些可勝抆淚聽哀鴻送從姪亷伯還新淦憶别鄉關忽五年逺來相見各凄然為憐骨肉情難盡力濟艱危誼獨全去鴈嗈嗈低逺浦征帆渺渺隔長川倚門白髮懸相望早促歸程慰目前王學士直求賦五杏圖贈蔣院判蔣君髙誼復何如種德惟看杏繞廬緑葉晴雲遮錦幄繁花踈雨薦庭除心同董奉多隂隲學究河間有著書此日故人酬厚意畫圖千載重璠璵贈張清紀根致仕還蘄州御敕新頒五色鮮賜歸今見寵恩全同朝愧我猶為客投老如公即是仙行李蕭蕭秋色外征帆渺渺夕陽前蘄山回首還相憶清夢時應到九天龍潭十景為太醫院判蔣用文賦三江觀潮三江形勝接蓬萊海若驅潮萬里來捲地雲濤奔洶湧連天雪嶂聳崔嵬居人訝逐滄溟去賈舶驚從碧漢回最是髙樓明月夜憑欄騁望亦奇哉七星禮斗七星山名舊有七星觀道士馮初陽居之薩天錫有詩贈馮云江上名山似列星玉皇宫殿接青冥忩留御史尋仙句匣有真人寫道經紫府月明瞻斗氣瑶壇夜永候雲軿當年曽記幽棲處幾度登臨上翠屏華麓尋真有兩峯秀拔可愛相傳茅君於此稅駕云華麓蒼蒼擁翠鬟兩峰髙並碧雲間飛仙逺挾蒼龍去羽客曽乘白鶴還絳節霓旌何處是青松白石此中間一從簉羽隨鵷鷺幽賞於今不可攀栁灣待渡楊栁依依兩岸分清灣渺渺是通津舟人向夕停橈久過客臨流待渡頻華麓煙消山色暝海門潮送月華新畫船撾鼓滄江上曽扈鑾輿向北巡官橋送别迢迤官橋接坦衢每因送别此躊躇流分曲澗通瑶海影落長虹跨碧虛别酒傾殘桑落好愁心折盡栁條踈致身巳遂青雲志何用歸乘駟馬車水驛維舟畫鼓傳聲動驛樓江臯使客暫維舟初承紫詔來天上直遣皇華到海陬漠漠雲山春靄合蒼蒼煙水夕陽收長亭勝概今何似歸夢時應戀舊遊花洞垂綸桃花洞口水洄沿下有漁郎理釣船萬傾光浮瓊島月一絲晴漾碧波煙髙風未許誇桐水逸興何殊在渭川巳喜飛騰霄漢上不須回首記當年旗山散牧有牧馬所在焉見説旗山近帝鄉清時散牧總飛黃千羣踏月雄姿異萬騎嘶風駿尾長雨後平原芳草遍春來曲澗碧泉香昔時汧渭那勝此蕃息應知似華陽石屋春遊與客春遊上翠微春寒新試薄羅衣行逢石屋窺仙境坐對龍池俯釣磯隔塢雨餘啼鳥緩平林風靜落花稀也知勝地尋芳好吟送斜陽盡醉歸譙樓晚眺麗譙髙構倚層空暇日登臨逸興濃野色蒼茫迷逺樹角聲凄切遞踈鐘數行影落江心鴈一點青分海上峯最是五雲雙闕近幾回翹首望飛龍贈林推官還閩中白髮蕭蕭老節推金門謁告獨言歸十年報國心如鐵萬里還家錦作衣路入閩山榕樹暗雲生海嶠荔枝肥京華相送多知己别後無令信息稀贈進士陳素漳州教授上林鶯囀栁花飛送子今辰出帝畿射䇿巳先多士選承恩獨領教官歸淮南雨過蘼蕪緑閩嶠雲深荔子肥珍重斯文期逺大臨岐莫用歎暌違敬思亭為司業貝公賦翼翼新亭倚墓門思親不見每銷魂寸心獨抱終天痛永慕難酬罔極恩陟降有時聞謦咳薦羞猶想及生存松楸滿目餘霜露流澤綿綿裕後昆為吕尚書題山水小景時有還陜之行尚書愛山兼愛畫索我題詩意甚濃一片白雲晴雨外兩行樹色有無中茆舍午煙啼鳥靜野橋春水落花紅明朝一騎天邊出回首居庸隔幾重贈吕尚書震還陜西省親八月二十四日鳴珂擁蓋度函關盡道春卿晝錦還聽履幾年勞聖眷稱觴此日慰慈顔馬頭千里秦川路鳥外三峯華嶽山别後知君長戀闕龍墀佇待綴清班贈李子華江西參議懷昨論交二十年祇今相見雪盈顛驊騮逺路驅馳慣紫鳯朝陽羽翮鮮北闕承恩知感激西江二閫賴敷宣玉堂話别憐知已謾寫新詩拂錦箋贈周迪赴襄陽訓導官署相逢屬暮春一尊偶得話情親昔年講學期科第此日傳經領縉紳花外鶯聲醒别酒雨中草色沒征輪臨期一送情何限為子長歌賦采芹贈蕭鶴年還新淦逺遊今識帝王州暫住還聞買去舟早從北闕瞻麟鳯却望西江候斗牛聖世才華難自致故家文獻許相求底事匆匆不相見詩成何以慰離愁豸角山房詩有序豫友羅彥功昔司教於延平之順昌因扁其退休之室曰豸角山房嘗命善畫者為圖以寫其山房之勝而徴士大夫為之歌詠焉比來京師出此卷相示且索豫賦詩憶豫十七八在廬陵時與彥功相交今且三十餘年矣俯仰今昔不覺為之慨然因退朝之隙與彥功張燈夜話遂援筆賦此時永樂戊戌八月二十又六夕也昔年振鐸豸山阿池館隂隂閟緑蘿雨後翠微移榻近春來芳草入簾多樞衣秀士聽經退載酒騷人問字過江海只今思舊業夢魂長繞劍津波為友人題思親堂雙親淪逝獨何之此日空餘淚滿頥故里松楸長在望客居霜露不勝思秋風宰樹啼烏慘夜雨青山白鶴悲知子承家能不負顯揚努力慰深期贈貢士李敘入太學戰藝南宫志不衰春風下第自稱宜九苞紫鳯誰能識千里驊騮豈易知璧水逺遊無舊業玉堂贈别有新詩蟾宫萬里應須到遲子重來折桂枝贈李彥安赴荆門州學正白髮蕭踈老教官幾回相見在朝端三遷不為年勞轉九考深知作育難舟過淮南春漸近路經湘浦雪猶寒荆門此去攜家便珍重斯文好健餐雲谷書樓圖為禮部郎中蕭伯辰賦南樓面面瑣忩虛樓上惟藏萬卷書滿架藝香春暖後隔林燈火夜涼初鹿門尚想龎公宅盤谷猶懷李願居久别雲林無限思公餘重憶看新圖贈胡海澄臨江教授時為中書舍人以母老乞便地迎養列職十年居禁侍除書一日遂私恩君家夀母堪迎養吾郡諸生總在門長晝松隂分講席四時江影照清尊考亭千載流風在待得歸休與共論贈貢士熊廣赴金壇訓導聖代求賢意獨加早年膺薦見才華朝端選士先興學京下為官復近家驛舍雨涼醒别酒馬頭風急送飛花他時教育看書最雲路相期未有涯贈南陽知縣李桓圭時三年大朝鳬舄來朝會玉京日瞻龍扆拜光榮新春雨露從天降白日香煙滿袖生久聽閭閻稱豈弟况逢朝著有清名還官好慰斯民望當寧於今想治平送葛延琮南京都察院檢校三載京華數往來薦書交上得賢才九重丹闕承恩快一日青雲得意回南去香煙隨綵服北瞻霜雪滿烏臺到官預想多清暇日對鍾山送酒杯松鶴為刑部主事劉斆賦老氣崢嶸不可羇蒼松白石舊相依海霞暖護丹砂頂山月寒生白雪衣赤壁當年曽入夢青田此日獨來歸也知骨格非凡種為爾摩挲思欲飛挽曹編修父生平不為利名牽閲世今過九十年七品褒封榮里閈一官蕭散在林泉乾坤久付浮生外風月空餘覽秀前遙望三茆吟楚些為憐令子重澘然挽文江劉子長黃梁夢斷竟何如薤露歌殘事已殊當日楓宸騰一鶚至今花縣憶雙鳬鄉山暮雨精靈逺墓道西風草木踈喜有賢郎能振拔蜚聲今巳上雲衢已酉秋九月草一日扈從車駕巡邊瞳曨海色隱朝暾載筆從容侍至尊天上旌旗懸日月雲中笳鼓壯乾坤九霄駐蹕虹光合十里連營虎士屯白首揚雄慚獻賦驅馳何以報深恩過將臺追憶先皇憶從先帝北征時親奉鑾輿誓六師威駕風雲嚴號令陳分龍虎耀旌麾指揮掌握真無敵駕馭英雄政有為一自鼎湖仙去後幾回過此重悽悲贈翰林侍講余學夔還西昌二首以老疾告歸禁苑同官三十年忽聞承詔賜歸田玉堂金馬貧如舊流水間雲客似仙解組未能忘去國聽雞無復候朝天今晨相送情無限潦倒空慚雪滿顛南望青原思欲飛臨岐那忍把征衣縉紳共惜張翰去鄉里爭迎賀監歸竹簟暑風清晝逺滄江白石宦情稀他年倘遂歸休願有約山中訪板扉贈潘參議文奎二首以修史事畢告老而歸蓋豫同年也國史新成寵渥優故人拜命遂歸休每慚秉筆陪清論久念同朝事校讐行李光華充賜槖圖書蕭散載扁舟極知别後難相即且為樽前一少留聞君南去賦歸歟鴈蕩山前有故廬泉石自堪供嘯傲煙霞應得侣樵漁豈無野老論心事亦有兒童候起居問訊故人黃少保年來生計總何如贈梁教諭萼赴衢州府學教授以實録成升除五載論交在石渠史成又見拜新除賜金且喜光行李典教寧忘載舊書文物只今稱兩浙衣冠自昔重三衢兹行努力勤師道講罷應知樂有餘送禮部郎中况伯律赴蘇州南宫進秩久為郎又覩分符出帝鄉周室自來推牧伯漢廷今喜得循良花明紫綬承恩露日射緋袍染御香此去吳中待蘇息好敷善政繼甘棠送周時敏赴南陽訓導仲方先生孫也逺持教鐸向南陽相送都門意獨長芳草夕煙停去斾緑槐踈雨濕行裝古人為學嚴師道今上求賢急治康努力斯文期逺大前人德業政相望送曽鼎僉憲廣東天書重拜外臺臣衣繡翩翩出紫宸驛路霜清飛馬首關河雪霽動征輪漏聲尚憶金門曉梅信先傳庾嶺春南海早須蘇困弊周爰好為遍咨詢送刑部主事陳虬還家焚黃永豐人甚貧蚤嵗蜚聲邁俊髦青雲列侍映西曹一心報國惟氷蘗三載還家尚布袍御敕交龍涵曉露仙舟畫鷁泝秋濤焚黃不日登丘隴存歿應知荷寵褒贈何迪宗赴寶慶府照磨同除者十人羣賢連茹喜遭逢拜命聨翩出九重莫謂郡寮居幕屬極知節概秉清忠山城臘盡梅爭發水國春回雪正融料想過家勝衣錦鄉閭欵迓意偏濃贈羅繼鼎赴福建理問清曉除書降紫宸一官迢迤向三閩聖朝自是嚴欽恤藩屬於今重簡掄雪霽關河瞻去騎天寒驛路促征輪讞刑自昔關隂隲務俾斯民洽至仁贈羅宜範肇慶照磨幾年相見在瑶京士論推君獨老成半世無營安淡泊一官新拜荷恩榮嶺南行處山川好幕下吟餘案牘清見説先親敦行誼力期忠孝振家聲送陳彛訓再授湖廣參議宦遊十載歎驅馳藩閫重臨異昔時補報未忘明主意暌離不盡故人思舊時文采公卿識此去聲名父老知見説楚鄉人重困早宣德意遍諏咨和答同年鄧時俊為揭州府通判侍從頻年厠列卿白頭猶自忝虛名匡時但愧才無補佐郡多推政有成五夜星辰環禁籞九天日月照蓬瀛重逢喜敘平生話况有新吟慰客情挽龎處士夫婦其子振舒為中書舍人每嗟伉儷不同歸薤露興歌事已非德善至今聞里閈聲容猶想在庭闈春風宿草悲埋玉秋雨叢萱憶斷機聖代褒封昭盛典故山同穴有光輝送陳三䇿赴建安訓導去春闕下暫相逢又此攜書出九重久别未忘懷耿耿朝回猶惜去匆匆昔年交誼推陳重此日傳經辟馬融共説建安人事美紫陽千載擅髙風送葉汝梅赴福建運判三月雨晴鶯亂鳴朝回送客不勝情船經沾渚片帆逺路入閩山一騎輕自昔煮鹽資利用只今輸粟更充盈深期出納蠲姦弊要使商民頌德聲劉氏母九十夀詩劉修撰沖之母也鶴髮埀垂映北堂年登九帙益康強兒孫長日供滫瀡鄰曲無時獻夀觴藹藹叢萱深雨露森森慈竹耐氷霜况逢聖代推恩典鸞誥新頒荷寵光新正訪鄒侍講偶成寓居順承門之西獨騎官馬踏晴沙來訪城西侍講家栁巷柴門成物色菜盤椒醑入年華西山捲幔留殘雪北闕當軒駐紫霞久住金門成小隱不妨詩酒寄生涯挽御史黃公宗載母李氏見説髙年七十過忍聞薤露遽興歌繡衣違侍雲霄逺祿養榮霑雨露多故里烏啼悲宰樹青山馬鬛暗煙蘿賢郎述德存深孝太史書銘永不磨四月草五日隨駕出拜郊宿雨初晴鶯亂鳴翠華曉動出宫城栁邊萬騎分行出花裏雙旌引道行帳殿風清香霧濕周廬天近暖雲生時巡總道多恩澤父老相逢説太平隨駕過西湖載筆從容扈乘輿經行偶得過西湖林花朵朵迎人笑水鳥雙雙向客呼雨洗斷碑荒緑蘚煙埋廢剎長青蕪欲論往事皆塵土立馬東風日又晡閏四月九日隨駕宿龍虎臺軍都邑廢巳無城龍虎臺空尚有名山繞平原煙樹緑天連碧海暮潮平清宵宿衛聞笳響拂曙趍朝聽鼓聲傳道乘輿催早發中軍先己抗前旌六月十五日哭子添祿作爾生三嵗忽云亡夀天何能問彼蒼自念奔馳違骨肉可堪痛哭在他鄉鳯臺落日遊魂逺牛渚愁雲係恨長悲慟滿懷無處著眼枯惟有淚成行七夕雨洗煩囂屬早秋露華月影靜悠悠謾從天上占烏鵲空向河邊望女牛旅館倦吟偏對酒誰家乞巧獨登樓自緣鄙性真成拙欲訴天孫半是愁中秋宴集和答胡學士直舍西頭俯禁城捲簾坐待月華明詩題綵筆誇先就酒注銀瓶勸滿傾蟾桂風清微有影金莖露下不聞聲北來此會應難得且共酣歌詠太平賦黃侍讀瑞菊詩二首舊植芳叢護粉牆一枝紅艷獨呈祥駢花疑奪天工巧異質偏含雨露香華萼有心同晚節雙娥無力倚新粧當年三徑渾間事未許陶潛獨擅芳朝罷看花日幾回開筵數喜共追陪競傳紅玉雙呈瑞未許金錢獨占魁並蒂重含瑶露潤聨葩髙映紫霞開玉堂展卷題佳句流慶應知及後來題秋江卷黃臺地逈接滄洲有客棲遲獨罕儔夜雨湖邊三畝宅西風江上一虛舟涼雲野水秋無際岸芷汀蘭晚更幽何日投簪歸梓里訪君南浦共追遊題劉南奎贈行卷與子同朝交誼重往來深識故鄉情十年遊宦青雲逺一日還家晝錦榮白髮未能忘孝養丹心祇益奉皇明卷中題贈多知己育德深期保令名賦赤壁贈蕭長史用導之靖江大江東去碧溶溶水淨平沙接逺空月下勝遊非舊日眼中遺迹感英雄猿啼斷岸孤帆雨鶴唳滄洲一笛風料想登臨無限意題詩還憶訪坡翁贈康志髙致仕還廬陵新頒御敕墨淋漓白首休官願不違嵗晏天邊孤鶴逺春風林下一人歸龍河雪色侵行舫官道梅花照錦衣明日匡廬重回首鳯城繚繞五雲低題鄭氏白雲暗卷白雲渺渺欲何之遙望金山對古祠翠滴松楸餘舊恨隂連桑梓係深思四時薦祀存家禮百世文章有墓碑流慶綿綿應未巳况聞繼述在佳兒贈胡太守璉還泉州泉州太守最相知十載常懷會面遲喜有清名留海郡况聞事業重明時朝來五馬穿花出雪後孤舟向日移聖代只今思治理好將衣食慰黔黎題張天台灤河歸興久聞作縣有清聲三載惟圖答聖明忽向青雲辭宦轍深懷白日照忠誠東風酌酒金陵館夜月揚帆白下亭此别應須重相見懸知鶚薦有公卿贈晏彥文僉憲山東早將姓字籍金閨又覩乘􅔕别帝畿十載居官心似鐵三春持節繡為衣聲馳當道豺狼避力奮遙空雕鶚飛為説山東凋弊久便須攬轡遍詢咨贈王持翰掾河南都司兼寄黃伴讀體方三年京國獨相知逺别那堪對酒巵淮浦好山晴似畫汴堤新水緑如漪春風洛下堪攜酒夜雨轅門好賦詩我憶故人黃伴讀為言千里重相思贈宗魯貝廣文還新淦去年暫會忽相違此日重來慰所思金闕早朝曽賜酒玉堂夜語謾論詩斗南冠冕文星聚泮水絃歌化雨滋慚愧菲材叨寵遇感懷何以報明時挽敬先廖檢討嗟君不見涕泛瀾未讀銘文鼻已酸藜閣青燈間硯席詞林白髮少衣冠日邊鶴化魂應逺天上樓成夢已殘南望孤舟回旅櫬青山疊疊暮雲寒題曽沂淵沂濱清隱卷沂上幽居樂隱淪清心久巳謝塵紛日長鷗鳥間當户雨後山光逺到門花裏琴尊娛好客案頭書帙課諸孫舞雩尚想前人舊此意何時與共論贈黃彥子赴竹山教諭與君濶别四年餘忽領鄉書上帝都金殿春風膺薦後玉堂夜雨盍簮初驚傳綵服還鄉縣親聽綸音下玉除料想重來應有日先期穩步躡雲衢七夕與蕭迪寬對酌賦此又向玉京逢七夕一尊聊與故人同鵲橋有路雙星會銀漢無波一水通簾外蛛絲頻墜露樓前鳯管獨吹風玉堂話舊憐知巳坐對銀缸夜未終贈楊貴琛南海知縣獨膺鶚薦上楓宸喜有清名在搢紳聖主九重開日月郎官百里應星辰涼風夜送仙舟逺恩露晨沾墨綬新若過嶺南逢驛使早梅先寄一枝春題文江李允誠杏林精舍傳家久得軒岐祕嗣世仍存濟物心門對好山啼鳥靜樹藏紅雨落花深清朝洗藥過松澗落日鳴琴坐竹林我憶滄洲成久别濯纓何日共幽尋贈廷振楊處士還清江客中幾見鴈南飛忽向都門賦式微紅樹碧雲迎去棹西風涼露動征衣入門掃徑餘松菊倚杖看山老蕨薇遙想到家秋未晚比鄰酌酒話京畿贈魏奉祠還陜西久向王門作奉祠朅來京國見容儀聖朝寬宥多恩澤海宇康寧際盛時復職惟圖修祀禮輸誠還憶祝繁釐都門相送情何極折贈梅花雪滿枝贈羅大敏教諭之官襄陽君家逺自羅源出道學相傳有豫章世系固應存慶澤諸孫還喜紹書香聖朝作育文風盛泮水絃歌化日長早晚到官有餘暇題詩須上峴山陽送鄒子翬宰通山去年膺薦來京國此日分符出帝關行李三春經赤壁孤舟千里問通山公庭鞭撲長年少山市喧囂盡日間朝罷都門一相送東風吹栁未堪攀正月十四夕黃侍讀宗豫請賞蓮花燈光大胡公席上有詠走筆屬和之艷質娉婷巧製裁瓊葩髙下一時開偏宜午夜瑶池看絶勝當年玉井栽絳幕斜分霞影亂畫簾低引月華來金吾此夕知無禁顛倒何妨纍百杯贈别友人羅汝𢎞久别故人心欲摧燈前對語謾銜杯嚴親慰問勞書札令弟交遊數往來行李欲隨孤棹發趍朝又逐五門開相思莫忘金陵路還記來時過鳯臺和汝𢎞客中除夕之作贈别江湖久客倍思歸行李匆匆忽告違曉日江花留去棹東風官栁拂征衣壯懷每欲凌仙島清譽空慚在禁闈問訊嚴親多夀考玉堂還有寄來詩和學士胡公陪祀南郊之作聖君御極紹先皇每以精神格彼蒼漏下齋宫移月影煙霏紫殿散天香羣仙雜遝紛來下百辟趍陪儼列行預想豐年歌聖德東郊農事又相將贈沙同知之官祿州行人臨發意如何獨向津頭發棹歌逺浦晴煙添草色滄江宿雨動新波輿圖盡入河山壯海宇均沾雨露多况是逺人蒙化久敷宣好為布陽和贈劉允珮之官懷慶新除太守河南去榮捧天書荷寵光少日才猷期董賈明時事業繼龔黃檣帆隱隱經淮浦旌斾翩翩指大行聖主憂民圖治理深期補報濟時康贈周韶鳯南歸難兄太學稱儒師令弟相從志不違夜雨頻穿管寧榻春風時下董生幃故家文獻應堪繼先世科名自可期此日臨岐無限意願言力學慰深思贈彭塤還長洲周教諭岐鳯之甥也與子連宵對客床覺來猶聽誦琅琅已看丱角超餘輩想見成人更老蒼自昔才華推阮謝只今述作愧班揚明朝獨上扁舟去遙望姑蘇隔渺茫舊時山口説彭家文獻相傳豈浪誇故老百年成夢寐諸孫今日見才華青燈黃卷心逾苦流水髙山意更賖相送臨岐無限思重來好賦上林花題扇贈郭必復汾陽公子舊知名兩度相逢在玉京入覲已聞輸賦足還家更有賜書榮三山曉日孤帆逺天上清風一握輕鄉里如逢知巳問殷勤為我道深情贈進士傅玉良玉潤昆弟還臨江昔年校士忝文衡爭覩朝陽兩鳯鳴鄉里共傳登進士交遊為喜得門生三年戀闕君恩重萬里還家晝錦榮回首帝京須到早上林春好聼啼鶯挽中書舍人王孟端二首雅韻髙懷敻絶倫矯如修鶴出風塵半生浪迹甘羇旅一日蜚聲列近臣自信王維非畫史誰知賈至是詩人髙齋夜雨看遺墨欲賦招魂淚滿巾平生氣槩薄虹霓之死超然更不疑流水浮雲無盡意新圖妙墨係深思尚懷退食歸青瑣猶憶揮毫對鳯池惆悵東風回旅櫬淡煙芳草遍天涯贈廖自亷沅江教諭以求賢舉告願教職南北暌違又幾年重來兩鬢己蒼然乞身不厭官資薄典教應知德操全舟過大湖晴望嶽帆經逺浦瞑浮煙菁莪樂育知多暇應有新詩寄日邊送李德固赴分水縣丞幾年從事居京國佐縣咸推有藝才辭闕早登沽水驛問程遙指富春臺山臨附郭民無事吏散官衙印少開努力亷勤圖報稱好音頻寄日邊來賦蕭公伯辰庭桂秋香蟾宫移得樹蒼蒼碧蓋如雲覆草堂奕世盤根深雨露四時孤翠老風霜瓊枝浸月秋無影金粟含風夜有香翹首南山應咫尺早期招隱掇仙芳為楊諭德題贈蔣御醫承家舊得軒岐學絶藝於今獨罕儔待漏每蒙天語召校方不厭世人求杏林花重紅雲曉橘井泉香玉露秋慙愧微生無恙久獨懷髙誼未能酬乙未三月一日䇿試進士讀卷聖主臨軒親䇿士新頒御敕墨淋漓百年禮樂逢興運一代文章際盛時天近蓬萊香霧濕日回閶闔漏聲遲有周幸覩賢才盛感遇惟歌棫朴詩白鶴山房為學士楊公賦白鶴之山髙插天盤盤先壠翳蒼煙凌雲古木千章合映日靈芝五色鮮清白逺傳簮笏在詩書今見子孫賢知君感遇恩尤厚好勒封碑樹墓田題朱太守永貞堂早嵗孀居失所天獨餘白髮照林泉共薑有誓心難變令女無瑕操愈堅雪裏松筠宜並秀風中桃李謾爭妍聖朝砥礪崇名節行覩旌書下日邊題海南程氏貞節卷痛徹蒼天淚若翻仰天長訣竟何言三生不負同心約一死難忘結髮恩粧鏡塵生遺粉黛泉臺月冷照香魂玉堂展卷題貞烈千載芳名表墓門贈魏千户扈駕親曽翊聖躬壯年應敵萬夫雄腰懸寶劍龍光動手撚雕弓鵲血紅輦路看花春躍馬長安通籍曉聞鐘只今海宇風塵淨長倚恩光近九重挽沈生潮翰林侍講學士民則之長孫也氣質溫然玉雪清未登弱冠巳先傾生前總得親知重死後難勝祖父情空見殘書留篋笥忍看遺骨瘞佳城臨風為爾增深慨讀罷銘文淚滿纓贈蕭迪敏南還曉日都門鶯亂鳴那堪把酒問歸程天涯緑暗花將盡沽口船髙水正生莫謂難兄傷别意極知慈母慰深情故鄉耆舊如相見為道平安寄逺聲繼志堂為李存節賦聞説君家住渝陽至今繞屋樹千章花前臘酒開春宴竹裏書燈照夜堂自信流傳多慶澤况聞繼述付賢良深期努力追先烈奕世綿綿望耿光貝祭酒泰求贈謝良翰妙年文采照青雲喜有聲華藹縉紳五載聽雞留闕下一朝走馬向三閩野梅融雪經殘臘江栁舒雲動早春見説郡中塵事少紅蓮緑水四時新龍川八景二首為宋常固賦清泠一派渾堪愛瑩徹溪流絶點塵蒼峽氤氲晴起霧逺空蕩漾暖生春光搖鮫室通銀海影泛鷗波動碧𥻘此日郎官分瀉去好為霖雨濟斯民右合溪溫泉澄潭萬頃映長天為愛飛流在目前映日似從銀漢落垂空偏訝玉虹懸流歸滄海翻晴浪逺度寒巖濕紫煙自是長風吹不斷應同廬阜瀉前川右龍潭飛瀑送周編修功敘南歸省親京華每日念慈闈目斷西江思欲飛方切陳詞趨北闕喜聞給驛賜南歸薊門天濶鴻聲逺淮海霜清木葉稀想得到家稱夀日天香猶自染班衣題傅氏雙桂堂君家伯仲最賢良並立還勝五桂芳共喜枝柯承雨露更同節操老氷霜蟾宫接武青雲近仙籍聨名白日光奕葉信知流慶逺年年花裏掇秋香元夕觀燈應制蓬萊髙聳五雲端蠟炬融春夜不寒月滿瓊林花作陳星垂瑤樹錦為團紫霞瀲灔浮仙醴香霧氤氲繞御鑾嵗嵗鎬京霑賜宴恩波浩蕩海同寬金蓮五夜燦瑶臺一派星河徹夜開銀甕蒲萄天上出翠華騕裊月中來地臨太液虹光合春滿神都御氣回此夕傳柑知感遇嵩呼願進萬年杯帝京三五值佳辰燈月澄輝霽景新大地山河天不夜滿城簫鼓暖生春宴遊遭遇同千載盛事歡娛及萬民拜祝吾皇千萬夀深慙獻賦忝詞臣濟美堂為郭郎中鼎貞題故家世系出汾陽數百年來倍有光門外青山餘黛色屋邊喬木老風霜傳家自信詩書美啓後方知慶澤長回首東梅溪上路至今簮笏照髙堂題傅玉良春山訪友圖春山伐木曉丁丁何事相求念友生乍聽巖前飛瀑響還聞谷口送鶯聲日髙野寺僧猶卧煙暝溪橋客獨行我亦平生愛林壑展圖此日動歸情東梅八景為刑部郎中郭鼎貞題三垇浮嵐羣峰削玉倚青天迤邐浮嵐斷復連逺樹盡疑含宿霧長林不辨雜飛煙隨風冉冉霑衣袖帶雨冥冥濕錦韀却憶東梅溪上路芒鞋幾度踏曽巔九峯疊翠疊嶂回巒復幾重千巖萬壑翠連空遙兼積靄林光潤近染晴雲樹色濃深澗鳥啼迷晚黛蒼崖人語度冥濛憶從蚤嵗同登覽曽上凌霄第一峯石橋流水石橋磊落跨溪流長日溪頭事事幽一片雨聲來枕畔半空雲影上簾鈎花間濯足聞清瀨栁下垂綸近白鷗有約還山尋舊隱芒鞋竹杖共追遊驛路停驂青山疊疊樹蒼蒼驛騎時看駐道傍嘶向栁邊當薄暮飲來花底愛微涼解裝暫息征途倦振轡寧忘去驛長愧我兩京叨扈蹕馳驅幾得從飛黃竹岡晚照翠竹岡頭景物幽長天落日淡悠悠幾家返照催砧杵半壁新蟾入畫樓髙壠牛歸樵己散滄溪漁罷網初收故家迢遞金川外猶憶登臨共唱酬山寺曉鐘蘭若踈鐘曉露涼扶桑海色曙蒼蒼遙催落月沉西嶺微度間雲出上方鶴下巢邊鳴竹徑僧從定處啓松房幾回待漏趨丹禁閶闔聲中拜玉皇獅山霽雪大雪舒晴絢碧霄山前積素擬瓊瑤千林日轉寒將散萬壑陽和凍欲消谷口問人初見路溪頭送客漸通橋玉堂嵗嵗逢三白吟對西山寄泬寥蛇嶺晴雲蒼嶺蜿蜒去復回白雲千仞壓崔嵬髙林縹眇晴光合列嶂絪緼旭景開己見從龍天上去還聞伴鶴日邊來承恩屢到蓬萊島五色曽看擁上台元夕賜觀燈十首閶闔天門開九重玉樓金殿月朣朧共看鼇背辭滄海獨向龍墀擁翠峯瑞雪暖融鳷鵲觀慶雲晴護建章宫盛時佳節逢元夜此夕歡娛萬國同河漢沉沉霽景澄蓬萊撚滿九華燈青猊白象三千界綺閣雕闌十二層花繡芙蓉濃艷吐簾垂翡翠異香凝世人唯向雲中見遙望天門不可登寶樹金蓮萬炬明春風一夜百花榮絳紗含霧垂珠幕紫焰蒸霞晃繡楹洛水涵光龜象出滎河流耀馬圖呈仙禽靈獸多嘉瑞盡見揚輝入太清樂奏韶咸寶扇開遙瞻龍馭自天來九門香逐靈飊度萬國春隨御氣回綵鳯髙臨青玉案彤雲輕護紫霞杯臣民共願宸遊樂海內歡聲溢九垓五色祥雲奉御筵翠華垂蓋出中天玉龍吐焰開靈曜金鴨騰薰藹瑞煙淑氣晴含旗影動輕飈微帶漏聲傳教坊初進升平曲鳯吹鸞笙雜管絃中使傳宣宴百官珮聲遙集五雲端酒頒緑蟻開金甕饌鱠蒼鱗奉玉盤寶帳春回頻送暖瑤臺雪霽不生寒侍臣霑醉蒙恩德更敕都人近御看羅綺含薰綵隊盈金花翠帽錦裝成奉琛獻璧諸畨貢舞縆尋橦百伎呈戲帳弄嬌空外影挈帷巧出靜中聲三農更有豐年曲齊向天街歌太平錦額瑜環童伎兒分行列隊向彤墀當筵齊唱摩尼曲對御還歌大聖詞寶藏金錢頒出富雕盤珍果賜來奇衮衣浮動陽和滿正是天顔有喜時天外遙聞雲珮鳴仙人飛步下瑶京安期神棗千年瑞王母蟠桃萬夀徴玉女金童迎鳯輦霓旌羽蓋列龍軿紫金還現空中相羣會璇霄對聖明銀箭遲遲禁籞長月華燈彩炫巖廊暖隨佳氣浮三殿春逐恩波被八方湛露更添仙甕醴祥飈還度御爐香小臣願祝齊天夀萬嵗嵩呼仰聖皇贈端木孝思使朝鮮曽同載筆侍蓬萊文彩煌煌映上臺奉詔又從天上出馳車還向日邊來新亭樹色連征斾驛道梅花照酒杯好為吾皇宣德意早春先候使車回贈王行人使安南承恩曉出九重天王事驅馳念獨賢奉詔尉他煩陸賈尋源西域得張騫車書自昔通南紀聲教於今遍八埏聖主綏懷恩似海殷勤德意在敷宣緬人入貢詩應制聖主龍飛開泰運殊方效貢慶昌辰九天宫闕風雲會一統山河雨露新重譯未誇來白雉在郊先覩集祥麟幸逢四海為家曰願祝皇圖億萬春􅔕馬行春圖為傳副使題職司風紀有清聲郡邑咨詢羡獨行當道豺狼應逺遁窮簷父老總歡迎繡衣照日三春暖白簡飛霜一道清自昔勤勞煩使者觀風應得悉民情送孫巡檢赴崖州迢遞崖州海盡頭一官南去苦難留五更風雨雞催曉萬里河山雁報秋久别誰憐長作客還鄉那得與同舟如君才力終登用莫嘆淹留滯一州師古堂為朱太守賦賢侯有道贊雍熙報國丹心誓不移事業欲同千載上聲名要與古人期南陽召父應堪繼西蜀文翁可並馳早晚政成書上考更期努力嗣音徽送僧歸崑山旃檀樓閣倚中天借住僧房又隔年方外幾時堪結社名山到處可栖禪曉攜金錫雲生鉢夜對龕燈月滿船我憶逺公能説偈臨風謾為寫長箋題春暉堂卷鶴髮如霜映北堂母恩難報寸心長自期晚節調甘旨願奉髙年託夀康日照萱花春藹藹雲生慈竹晚蒼蒼也知純孝無時巳為爾題詩一慨慷題魏氏繭絲遺藁君才卓犖冠時流獨惜青年志未酬奮筆自期攀屈宋苦吟端欲駕曹劉幸存製作傳遺墨無復衣冠繼昔遊令子至今能嗣世顯揚應不負箕裘題梅軒種來梅樹滿林坰那似溪山景物清氷雪生香雲繞屋珊瑚照影月當屏西湖酒醒逋仙夢東閣吟餘水部清佇待他年成實後要知金鼎可調羮題顔氏奇峯卷極目青原在翠微羣峰如畫列屏帷天連秀色分書幌地擁晴嵐照板扉竹嶼風涼吟載筆石屏雲暖坐題詩有懷勝迹增惆悵何日登臨慰所思賦雷給事璜溪書屋君家祇在璜溪上門對青山一事無春暖藝香時剔蠧夜涼燈火獨看書間中自得先天妙靜處曽觀太極初一自金門膺薦後臨風幾欲賦歸歟題指揮克勤齋共説將軍好讀書早年聲價重璠璵晴忩點筆春雲薄官閣題詩夜雨餘靜閲豹韜忘寢食間窺蠧簡惜居諸况聞報國心尤切繼志終期展壯圖題雙竹軒庭畔無根竹自生雙枝秀拔長偏成月髙彩鳯翻瓊佩雨暖蒼龍脫錦繃浪説渭川千畝緑絶勝淇澳萬竿青何時載酒尋三徑共倚琅玕聽紫笙題王氏槐隂堂種來嘉樹鬱蒼蒼嵗晏濃隂覆草堂翠滴簷楹春雨暖秀分書幌午風涼封培喜見孫枝茂庇覆深懷世澤長千載晉公名未泯更期奕葉振餘芳七言排律瑞雪應制詩有序宣德五年冬十有二月乙卯之夕雪驟作逮明逺邇皆徹山川壯麗草木晶明氛埃斂淨厚土膏潤朝野相慶皆以為聖天子至德所感其應為豐年實天下生民之福聖心悅豫既為長歌以頒示臣寮復錫之宴飲俾盡醉而樂焉君臣相與之意藹然備見於情辭之間雖詩之稱既醉太平不是過也臣幼孜叨沐榮恩無任感激爰效古昔賡歌之意以頌聖德於萬一謹再拜而獻詩曰聖君御統紹先皇恩德覃施及萬方序屬嘉平融瑞氣時逢大雪散祥光初驚灑地蠙珠集忽訝漫空粉絮揚盡夕玉階輝皎月凌朝苑樹炫初陽山川漫汗疑連縞城闕玲瓏擬截肪晃耀神京圍玉壘晶熒宫井凍銀床中天霽景浮瓊島大地歡聲徹廟堂政喜寰區消癘孽預知年穀兆豐穰九重錯落頒宸藻百辟追趨獻夀觴此日賡歌同舜禹太平致治邁堯湯武功文德謀猷逺聖子神孫寶歷昌願效嵩呼歌悃欵千秋萬嵗頌時康孝友堂詩有序禮部尚書吕公震名其奉親之堂曰孝友國子祭酒胡公若思既為之序復來徴豫詩為賦七言近體十六韻以識卷末詩曰名家系緒出藍田閥閲重光屬後賢堂上慈親娛好景眼中諸季羡英年叢萱藹藹迎春秀華萼輝輝向日妍膝下每聮鴻雁影間居時誦鶺鴒篇鸞回紫誥承恩寵蟻泛瓊觴介夀筵綵服戲時情最洽錦輿行處樂尤便幕中黃雀充庖美泉裏金魚入饌鮮冠蓋久依雙闕下塤箎常奏百花前承家玉樹遙相映報國丹心祗自懸顧問日聆天語近追趨時聽屨聲傳春官典禮儀文秩曉殿崇班位望全數載親闈勤定省幾回使節任旬宣政懷喜懼心逾切夙秉忠誠志益堅書紀君陳垂往牒詩陳張仲著遺編聲華獨繼千年後孝友真為百行先擬述勳名昭盛美迂踈愧乏筆如椽都門曉望春滿皇都淑氣清偶來縱目一舒情逺山漠漠平臨野緑栁依依半出城負郭牛羊初散牧隔花鶯鳥自和鳴玉泉近繞宫牆過香霧遙從島樹生天上旌旗回仗影人間簫管雜歌聲也知聖代多恩澤况是豐年樂太平金文靖集卷四
