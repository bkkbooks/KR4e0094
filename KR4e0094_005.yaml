body:
  text: 金文靖集卷五明金幼孜撰五言絶句早朝寫懷宵分睡正濃忽聞雞喔喔強起整衣冠明星在屋角風雨入朝長衢浩漫漫水深泥沒膝京城五六月強半風雨日東閣自况太平幸無事長日文書靜素餐誠所愧聊足慰衰病自歎四首齒踈髮將盡力衰膝已酸身弱衣不勝腰窄帶逾寬不謂老已至情思日衰落寡諧性所安庶以存吾朴昔賢以文名我自愧作者古道不可復誰謂知音寡悅世非所尚直道將自任挂冠倘可期庶以遂初心偶成二首侵尋老易至荏苒嵗如馳萬事如雲變浮名空爾為逢人懶勸酒送客倦吟詩朝退無餘事間消幾局棊即事五月西湖上荷花開正濃花開能幾日又見摘蓮蓬我愛梧桐樹枝濃露不晞秋聲一夜至葉葉逐風飛七夕寫懷懶性拙尤甚挂冠當早休滿懷清似水涼月一天秋偶興踈雨過梧桐商飈動楊栁秋意已颯然殘暑詎能久觀葵花蜀葵生庭間甚為人所惜昨日始開花今朝已岑寂張古老騎牛圖客有騎牛者人稱古老仙問知欲何往大笑指青天布帳梅花踈竹間纎梅清標絶點埃微風動虛幌似有暗香來題萬竿煙雨圖贈康知事萬玉碧毶毶煙深雨氣涵鷓鴣啼日暮客思滿江南題墨梅贈楊稷素質比瑶瑰貞心不易摧江南春信早先寄一枝來題墨竹寄趙君公復四首猗猗緑如簀飄拂青雲端炎光不到地颯颯江風寒瀟灑渭川上數竿淨如許秋思滿江南寒煙淡踈雨幽貞不可變嵗久色逾好夫君渺湘南氷霜慎自保新梢出林表可擬青琅玕應知晚節至結實待鳳鸞子昂蘭石深谷發幽姿自與衆草别蒼石動玄雲清風灑晴雪子昂竹石翡翠臨風好珊瑚出海清江南春事晚暮雨鷓鴣聲為庶吉士萬完題竹翠黛濕篔簹懸崖百尺長誰知玉堂夜聽雨憶瀟湘牧牛圖為師尚書題日出騎牛去日暮遂牛歸年豐耕作好食飽望牛肥題莫慶善鷹為袁生大鶚賦昔年從羽獵高入萬重雲尚有沖霄志難忘報主恩題墨竹贈貢士鄒觀五首虛心秉髙潔不受一塵侵五月清溪上蕭蕭風滿林挺挺瀟湘玉平生意獨耽玉堂風雨夜思爾隔江南雲谷翠森森氷霜閲嵗深已看能鳳舞還聽作龍吟夜雨翻龍籜春風長鳳梢佇看清廟薦美韻協笙匏逸態謝炎涼貞姿炯氷玉君子思切磋無忘詠淇澳六言絶句新秋偶興二首楊栁幾行踈翠梧桐一葉飄秋隂蛩偏響北户早鴈正度南樓過雨漸消殘暑回飈初送早涼捲簾獨對芳樹拂席時焚好香七言絶句元夕午門觀燈應制十二首雲擁蓬萊五色濃銀燈煜煜照芙蓉笙歌一泒來天上萬嵗聲中拜六龍鼇山結綵翠重重萬壑千巖錦繡中報道羣仙來獻壽驂鸞駕鶴下瑶空午夜天香散紫臺東風玉樹萬花開千官齊拜瞻龍衮丹陛前頭進夀杯御前百戲許都陳燈市繁華五夜春綵隊行行分次第一回歌舞一回新天際三山海上移午門雪霽彩雲垂侍臣朝罷親承旨今夜元宵許進詩月滿天門集珮珂華筵此夜受恩多教坊樂譜皆新調絶勝梨園第一歌蠟炬髙燒映紫宸踏歌初進鼓聲頻年年正月元宵節願作蓬萊獻夀人上元十日盡休衙絃管東風帝子家闕下放燈如白日人來人往自諼譁海宇豐年協瑞徴農歌社舞賀升平自慙忝預傳柑宴未有涓埃答聖明天階雪後淨氛埃月上龍樓寶仗開盡道聖恩深似海觀燈都向午門來戲樂呈來六隊中御前特勑賜黃封侍臣既醉猶能賦步出端門月正中閶闔重重夜不扄瓊樓十二敞銀屏東風一曲升平樂此夜都人盡許聽為吏部師尚書題畫六首碧户幽窗盡日間落花啼鳥自間關白雲野水生春浦翠黛夫容對曉山右春景水滿西湖長芰荷白鷗泛泛浴輕波屋頭楊栁深深碧門外青山苒苒多右夏景天際涼風瀑布流遙峰積翠雨初收板橋人渡踈林晚野寺蟬鳴落葉秋右秋景曲曲溪流凍不聲扁舟獨載更多情千峰玉樹凌寒色九疊銀屏照晚晴右冬景養就丹砂雪作團終朝俯啄近琅玕三山碧海休歸去好向瑶池弄羽翰右竹鶴素質玄文錦翼齊絳桃花下見雙栖可堪野鶴同標格難與山雞共品題右白鷴秋浦晚罾圖蕭蕭落木水增波欹岸風泠起棹歌怪得漁郎贏笑語晚來罾上得魚多蘆汀夜笛圖上下天光接水光滿汀蘆葉晚蒼蒼一聲長笛驚殘夢明月滿船風露涼贈孔止武橫州學正妙年學禮獨超羣早領鄉書會縉紳喜見姓名登乙榜十年不負讀書勤承恩曉出五雲端為向橫州作教官聖主崇儒資教育逢人休歎座氈寒御溝新漲雨初晴楊栁毶毶囀早鶯朝罷都門一相送故鄉回首不勝情便道還鄉兩月程綵衣偏勝錦衣榮到家且慰雙親望膝下頻將夀酒傾驪駒早發向橫州逺道風煙莫滯留五嶺秋來有回鴈平安先寄鳳池頭為馬通政題畫二首海棠花發過春寒花上禽啼宿雨乾雙雙不惜頭俱白猶向東風弄羽翰誰教寒皋語自圎可人毛羽更新鮮上林千樹堪栖息應見髙飛近日邉寫懷十首録寄諸兄弟忽忽離家十五年每懷桑梓獨澘然東風寒食南源路灑飯空令憶墓田南北驅馳鬢已皤西江萬里隔煙波池頭舊種黃柑樹結實秋來有幾多慈親日夜係深思夢裏常懷見面遲近得好音相慰藉為言強健勝前時先公遺德在江鄉死後人傳姓字香聖主恩深推錫命千年黃壤有輝光伯氏行年五十強年年旅食客他鄉别來十載知無恙薑被何時共客床諸弟持家力有餘田園生計未應踈堂中奉母多餘暇好共諸郎更讀書憶昨窮經慕昔賢嵗寒氷雪伴青氈一從天上登科後無復篝燈事簡編繞屋青山緑樹稠春來啼鳥自啁啾回來登覽知何似幾度臨風慨昔逰久别親朋覺已踈頻年不得半行書平生經術慙無補空有虛名在石渠老我于今幸有孫前人積德至今存餘生倘遂歸田計教育猶思淑後昆寄友人郭房陵二首京華别後頻相憶尚想風流似昔年前日德州曾借問尋君不見思悽然數從馬首問平安逺道懷人有萬端白首鯨川歸未得誰知為客獨艱難題畫牛服箱力穡不知年報主多情只自憐好是野田春種後飽肥芳草卧深煙牧童原上催歸急逺樹微茫帶夕曛前日東郊曾扈從野人牽進沐恩頻為大理寺丞馬麟題畫馬二首萬里曽思度玉門歸來立仗卸櫜鞬飽肥苜蓿風霜晚未老猶思報主恩異種由來産渥窪曾看入貢度流沙幾回牽向瑶池過新濯龍文照五花山水圖憶過彭蠡看廬山九疊雲屏倚翠鬟今日看圖山更好似聞飛瀑落雲間寒梅凍雀繁蕊初開滿玉條碧梢低亞影蕭蕭天寒凍雀雙棲穩却怪朝來雪未消枯荷鶺鴒林塘秋盡水波寒荷葉無聲半已殘日暮鶺鴒棲不起藕花深處露漙漙生菜為神樂觀道者作手種青蔬不用鋤白雲為圃自芬敷南郊夜宿邀同飯却憶清齋味有餘白蓮為樂舞生賦秋水清涵白玉盤露華淨洗鏡光寒幾回欲載吹簫侶共向瑶池月下看雜畫為師尚書逵賦五首修翎如雪自飄飄飲啄尋常不受招野濶天髙秋萬里長鳴直欲上青霄右雙清松鶴扶桑浴日夢初醒天上曽聞送好聲却愛羽毛成五色梅花照影雪初晴右梅雪金雞雪滿瓊林凍不開數竿如玉立崔嵬閉門盡日無人到山鵲一雙飛下來右竹雪山鵲驊騮騕裊並傳聞牝牡驪黃竟莫分聖代只今多入貢大宛龍種動成羣右牧馬圖絳桃枝上雨初晴相喚相呼更有情上林千樹花如錦好向朝陽雜鳳聲右聚禽圖題趙仲穆馬房星夜墮渥窪中一片玄雲覆玉騣逺人知是真龍種萬里牽來獻九重題王熙臨宣和雪天蘆雁卷末有端本圖畫端本堂中迹已空興亡總在畫圖中惟有幹難河上路年年飛雪送歸鴻題郭魚臺古圖小景二首仙館清虛似廣寒碧紗低卷映琅玕天風半夜吹殘夢自把瓊簫度紫鸞銀河露下散微涼畫扇金屏度好香蒼雪萬竿清透骨卧聽仙樂過瀟湘題方尚書賓山水圖浩蕩湖山天際來雲屏九疊立崔嵬花邉小艇緣溪水洞口茅亭倚樹開凱旋詩十二首有序臣聞帝王之有天下莫不以討不庭安中國為務故昔虞舜在位有三苗之征周宣中興有獫狁之逐夫豈聖人之所得已哉不過為生民造福為國家開太平之業耳洪惟我聖朝太祖髙皇帝混一區宇汛掃穹廬太宗文皇帝復親征強敵肅清沙漠恭惟皇上以神武之姿紹承祖烈夙夜孜孜惟圖安緝生民乃於宣德三年秋九月農事之隙親馭六師巡歷邉陲蓋欲訓飭將士嚴安邉禦侮之備也而邉隅未靖適率衆南侵皇上遂一舉而滅之曽未逾月塵氛蕩滌邉境清寧豐功駿烈巍巍煌煌照耀天地所以造生民無窮之福開國家萬年之業者至矣雖虞舜周宣之烈何以過哉臣使回至寧州伏覩班師詔下無任欣抃愧不獲親奉鑾輿目擊盛事途次用撰詩十二首以備紀述謹於復命之日俯伏闕下以獻乞賜聖覽不勝幸甚聖主承天統萬方梯山航海盡來王不應殘醜猶烏合屢犯邉疆恣奪攘天威赫怒整彤弧萬騎如雲從乘輿白日風雷嚴號令指揮掌握仗神謨斧鉞煌煌出九天旌旗千里照山川桓桓武士排山嶽爭道從龍近日邉昨夜旄頭暗不明忽傳強敵向南行三千鐵騎爭追逐盡卷穹廬入塞城金鼓喧闐盡日聞歡聲雷動及軍門六師斬馘知無算駝馬驅來動百羣聖皇除暴在安民神武由來合至仁納欵綏降寬大罰盡令生育在陽春鐵騎長驅蹴塞雲掃清沙漠蕩塵氛從今邉籞無烽燧聖武神功荷至尊凱奏歡呼入帝鄉天戈一指靖遐荒臣民快覩平邉詔萬嵗聲中祝聖皇周宣北伐中興時紀述于今尚有詩此日時巡因閲武盡殱羣寇鎮邉陲絶塞蕭條迹已空霆轟電掃大荒中磨崖須勒燕然石萬世神功繼太宗萬乘巡邉奏凱旋千官齊賀九重天河清海晏升平日一統華夷萬萬年寰宇清平樂世康雨暘時順嵗豐穰皇圖久逺同天地宗社尊安聖夀昌萬竿煙雨圖為袁生大鶚題滿林煙雨曉濛濛萬箇琅玕半淡濃向晚江風吹不散無端飛翠入簾櫳秋江待渡圖為席咸寧賦秋山疊疊映雲蘿渺渺長空接逺波日暮小舟爭渡急行人猶唱竹枝歌萬松圖題寄幼學賢弟二首一别鄉園草四春種來松樹已成村寄言孫子須培植剪伐無令及本根種得長松萬箇多連山數里暗煙蘿何時投老歸鄉曲分我寒巖翠一坡立春日朝罷偶賦三首東郊擊鼓送春回闕下趨朝玉漏催嵗嵗黃柑傳臘酒千官先進萬年杯春盤春酒開春宴幾得簮花侍御筵聖主只今恩似海人人齊賀太平年隔嵗立春先十日東風已覺到天涯叉頭綵勝簮來好莫笑酡顔鬢已華題墨梅姑射仙人不可招月明瑶圃路迢迢夢回猶憶西湖上雪樹參差暗野橋題墨竹為鄭誠御史作虛心徑節倚雲端白日清風散羽翰幾度趨朝聞鳳管月明猶想珮珊珊朝回獨坐憶幼男武安三首每日朝回對板扉一回相憶一回悲階前獨步尋行迹猶想牽衣似昔時語笑常時近我傍為寬懷抱解愁腸每從膝下供茶果時向燈前勸酒觴秀目寬眉骨格髙短衫窄袖小絨縧階前恁地趨蹌好來往人稱是鳳毛晚出長安門偶成白髮毶毶老從官籃輿自便懶登鞍京華久住交遊少惟有西山耐久看內閣花臺新成口號聖恩特許築花臺移得名花取次栽大是眼前生意好便須酌酒趂花開徐仲敬作雪梅見貽因題其上老氣峥嶸宇宙前開花萬朵照晴天平生自是調羮手老大空餘雪滿顛古松圖十畝繁隂欲蔽空當時曽受大夫封廟廊政爾需梁棟未許終容大壑中望晴日晏雲開欲放晴忽聞乾鵲樹間鳴屢占簷溜停餘滴且向間階散悶行墨蒲萄風架引藤髙十丈翠葉隂隂氣蕭爽老龍昨夜挾風雨亂吐驪珠落天上聞孔君志仁至喜而賦此與君暌違三載強忽聞逺來喜莫當朝回夜靜卜燈花為解懷抱愁都忘文與可墨竹濃翠森森滿畫屏鳳毛如織長初成月明繞屋驚飈動倣佛蛟龍作雨聲候志仁不至五月傳聞出鳳城相思日日計行程怪來數日無消息不見簷頭喜鵲聲為宋給事題四景江上春山翠作堆江頭春水緑如苔何人擁騎東風裏谷口看花只獨來春景青山幾疊護雲屏緑樹風涼鳥自鳴最是幽人無一事捲簾獨坐看黃庭夏景涼雲鴈呌荻花秋兩岸青山帶淺流向晚月明天似水吹簫獨上木蘭舟秋景萬里平鋪雪滿天瑶花亂點散瓊田江村盡日無啼鳥惟見沙頭繫釣船冬景為蕭迪中題扇竹髙節凌雲不可攀風前時聽珮珊珊間將玉管吹明月人在瀟湘猶未還和朱仲良先生韻贈彭友恭二首六月揚帆别帝京思鄉日日算歸程我家兄弟如相問煩道平安寄好聲逺來京國訪難兄繾綣難忘手足情無奈客居留未久整裝又出鳯凰城送武安同福安柩歸西江二首望斷天涯去不還空餘血淚染衣殷西江萬里歸遺骨煙水漫漫渺故山天地無情白日悲臨岐相送忍相違江南草緑蘼蕪怨腸斷東風哭子時為戴容安題扇竹三徑清隂生晝寒滿林新長碧琅玕何時截作參差玉吹向瑶臺聽紫鸞題畫扇寫金陵送别楊栁深深映畫樓君行又上木蘭舟夜深正好看明月莫放青山過石頭為蕭迪寬題息齋竹亭亭玉節映琅玕嵗晏相看有二難何日相從攜鳳管夜深吹月向雲端為葉仲疇題蘭竹二首緑葉葳蕤間紫莖幽芳淡浥露華清美人遙隔湘江外解珮何當寄逺情自是芳姿不涴塵西風涼露散清芬莫嫌空谷無人到嵗晏相看有此君題王母蟠桃西來王母載河車羽蓋翩翩映紫霞燕罷瑶池春似海東風開遍碧桃花題胡太守五馬圖逸氣騰空不可羈幾回聯步上天墀東風二月棠隂合夾道爭迎五馬歸為兄貴質題鶺鴒圖憶昨離家忽四年客居長誦鶺鴒篇相看無奈離情苦嵗晏梅華雪滿天贈人之官通判滿城煙雨落花深離思紛紛惱客心向曉玉堂揩病目送行謾復寫新吟題徐崇威所藏貴妃上馬圖道前寶扇擁花驄當日君恩第一濃不是華清事逰幸後人那得見嬌容雲林書屋為蕭深州賦一徑深深長緑隂雲山髙下樹幽森閉門盡日無人到時有書聲出逺林劉商觀奕圖為曽景武賦一局忘言意若何古松流水白雲多回看石室山前路肯信樵夫有爛柯題竺上人卷間雲流水意悠然上谷彌陀别有天欲識禪心清淨處一輪明月照窗前庚戌臘月十四夕寫懷末學深慙忝禁林空餘白髮伴丹心平生事業知無補坐對青燈感慨深立春賜宴拜和御製海宇春回瑞景遲年豐民物樂熙熙彤庭錫宴皆霑醉千載君臣慶會時恭和御製詩有序宣德五年秋九月丁未節屆重九伏蒙皇上頒賜羣臣御製詩一首既又命光祿賜宴于史館咸俾霑醉以盡君臣同樂之意恩至渥也臣竊惟皇上自蒞阼以來四方寧謐雨暘時敘年榖阜成德化覃被蠻夷順服朝覲會同一統無外蓋所謂全盛之日也所以然者皆由皇上恭儉勤勞所致而聖心謙抑恆不自居往往推之於臣下復乃親御宸翰形之篇什雲漢昭回日星璀璨誠可謂千載之榮遇者矣臣叨沐鴻恩輒不自揣爰效古昔君臣賡歌之意謹依韻拜和以進詩曰熙熙海宇被仁風民物謳歌樂嵗豐聖主優賢隆眷遇愚臣何幸重遭逢恭和御製喜雨詩有序宣德六年辛亥春時當農種雨澤未浹乃三月四日忽隂雲晝翳逮暮微雨霡霂至夜迄旦沛然不已自近郊以及畿甸之外莫不霑足皇上敬天之澤樂甘雨之及時喜豐年之有望乃賦喜雨之詩以頒示臣工且出上尊內膳錫宴史館以同樂之恩榮之厚難以比倫臣仰惟皇上以至仁大德撫馭華夷宵旰孜孜惟在於愛養斯民自臨御以來天心昭答屢降豐年海內晏安同臻熙皥斯實由皇上敬天勤民所致誠天下國家生民無窮之福臣伏覩聖製倍切欣抃謹依韻拜和以進伏乞睿覽雨順風調屢嵗豐民安物阜萬方同吾皇聖德躬勤儉感格天心協至公題竹翠拂琅玕落粉香無端春色滿瀟湘美人學得青鸞曲何處吹簫聽鳯凰為孔守忠題馬曽覩天間八尺龍驍騰萬里振長風只今圖畫看神駿無復承恩侍九重題扇畫數聲黃鳥緑隂稠一片青山翠欲流坐久不知花落去間身只為白雲留題子昂馬為趙君公復作太液初晴雪正融金羈新試渥窪驄幾回天上從鑾馭牽度長揚立晚風題墨菊自是芳姿不涴塵曉粧如洗露華新玉英粲粲黃金色斜倚東籬日又曛金文靖集卷五
