body:
  text: 金文靖集卷七明金幼孜撰序贈太師夏公挽詩序昔在有周召公畢公佐文武以定天下既相成王又相康王嘉謨偉烈施于國家被于生民故詩人之頌召伯曰蔽芾甘棠勿剪勿伐召伯所茇康王之告畢公曰惟公懋德克勤小物弼亮四世正色率下罔不祗師言蓋古今所稱元老大臣與國同休者莫或過之也惟我聖朝天啓昌運篤生賢臣為國良輔若榮祿大夫少保兼太子少傅户部尚書贈太師諡忠靖夏公原吉早以明經領薦入仕事太祖皇帝纍遷為户部侍郎事太宗皇帝為戶部尚書屢兼六卿之政事仁宗皇帝洎今上皇帝居保傅之任前後四十餘年其勳績之茂在太宗時為最久輔弼之勤在仁宗今上時為尤著揚于朝廷播于天下垂諸國史人人所共知見也蓋公以純明淵懿之資宏博寬裕之量德優才具罔施不宜而其踐履之確寵辱不動其心始終不渝其操人無賢不肖皆歆仰愛慕之而無所間故其歿也天子興悼百僚䀌傷下及武夫胥吏識與不識咸相與咨嗟歎息或為之涕泣霑襟嗚呼何其感之深而傷之切如此耶其賢者感深傷切而尤有不能已乎其情遂相率作為詩歌以挽之是皆出於人心之自然非勉強而致也嗚呼若公者方之詩書所稱元老大臣如召公畢公者又豈愧之哉豫嘗論之國家有大混一之氣運必有大混一之聖君賢臣以成之故夫周家開八百年之業者以文武成康為之君周公召畢為之臣也我朝列聖在上創業繼統光啓鴻圖又有若公輩諸臣為之輔則所以衍聖明無窮之緒者夫豈偶然哉挽詩成什諸君子俾豫序之豫因述公平生之槩且著公之所以有係於國家者辨其端庶觀者知所考也大學士胡公挽詩序豫友文淵閣大學士兼左春坊大學士廬陵胡公光大以疾卒于北京之官舍訃聞上為之嗟悼不已詔遣禮官賜祭贈資善大夫禮部尚書諡文穆既又敕有司具舟載其喪歸于江西國子祭酒兼翰林侍講胡公若思為銘公之墓而一時縉紳大夫與公交遊者皆為詩歌以挽之公之子穆以豫託交之久請一言敘其首簡嗚呼公以故家大族承先人之遺緒篤志厲行力學好古端方純確不事表暴自其少時巳有聲煜然馳於逺邇而其氣識之超詣風韻之遒逸尤非他人所能及一旦出而戰藝文場決巍科踐清華遂知名天下今天子入正大統公特被眷遇秉代言之政侍從之久幾二十年小心慎密克盡於職公雅善筆札而才思敏速其為文溫潤典則每數敕俱下公索筆一揮恆數千百言頃刻而就略無血指汗顔之態至於典册之施詔誥之播故實之講所以黼黻贊襄而禆益於國家者公可謂兼盡其美者矣抑豫於此而重有感焉豫辱與公同年幸同官翰林既又同處祕閣食焉而共桉坐焉而連席道義志氣之相孚論議可否之相正以至朝夕出入所以被顧問近清光而蒙賚賜者又未嘗不同其榮焉至於相與切劘淬礪討論辨難以規豫之不及者公之德可謂厚矣嗚呼孰謂一旦公先棄我而逝雖其光華振耀生榮死哀固可以無憾然俾豫之孤陋失其所依自兹以往豫之過將誰為之警飭而其職論思被顧問以任黼黻之責者非公其誰足以當之豫也雖獲䇿其駑鈍以圖報稱於萬一然追惟曩昔與公交遊出處之相同心腹肝膽之相照而一旦溘焉永決如豫者又烏得不怛然悲愴而有無窮之感哉姑因穆之請録公平生大槩以為序且以泄豫之哀焉贈彭塤赴廬州郡庠司訓序憶自永樂改元之初蒙恩偹員禁林而豫友周君岐鳯亦來為國子學官方是時豫之子麒與君之子敘俱以垂髫方向學往來遊好蓋有切偲之益後數年君復出教長洲而彭塤往來京師復從豫遊蓋塤於麒有連袂之好皆君之子壻也由是三人者相頡頏奮然致力於學不肯屈儕輩下豫竊兾其有以自立而君亦期望之以逺大也洎豫扈從兩京以南北寥邈不得躬親訓誨獨敘首以書經登永樂戊戌進士第為翰林編修又數年子麒亦幸以書經奏名賜進士出身至是塤又以詩經應聘分教廬州郡學適君以職方員外書考至京間謂豫曰是一子二壻幸皆無忝於教訓然尤兾玉其成以終惠焉既而敘復以塤之行請一言為教於戲豫於塤之行果能默而已乎夫士之學貴有諸已則推以及人者皆吾之所同得於天而非有異焉者也况學校之教聖人所以盡人之性也其理則仁義禮智其器則君臣父子夫婦長幼朋友其文則冠婚喪祭朝覲會同射飲軍搜斯道之行於日用彛倫之間亘古今而不可易者也塤既由是而學之則其施以為教者又豈外此而它求哉雖然天下之理無窮而學亦無窮也塤尚去此而益致力於聖賢之學以造乎髙明之域則是行也豈惟推及於一郡將見他日德成名立所以達之於天下國家以成其功用者皆是道之推也塤倘過家為二親夀幸與麒相見其亦以是語之是為序贈禮部蔚尚書致仕序南京禮部尚書蔚公文璽以年逾七十乞致仕於朝上閔其情敕賜歸田里公感上恩深厚特詣闕謝及陛辭復賜鈔萬緡為道里費於是其部屬之居行在者咸榮公之歸乃來請文為餞惟士之生也四十而仕五十服官政七十致仕蓋常道也然其間有以勞悴早衰或引年之不逮者往往而是其能全名終始進退以禮而遂其志之所安者蓋十不二三焉公世家廬之合肥洪武中以明經薦授户部度支主事轉員外郎出為山西參政永樂間復用薦入為户部侍郎尋改禮部洪熙初元特升禮部尚書前後四十餘年歷躋顯要逮事四朝其端謹之行亷勵之操內有以竭盡其忠誠外有以致力於勞勩蓋於人臣之職殆無所愧矣今幸遭國家太平四海乂安聖天子大興文治篤念舊人但公得以引年以遂其退休之私視世之人未老先衰或引年不逮而進退始終之弗遂其志者可同年而語耶公去此而休矣巢湖肥水之間風物如故有田廬松菊可以供盤桓有琴尊几杖可以適燕間有旨甘滫瀡可以備調養而又有故人賓客歲時相與往來嬉遊以資夫笑談之樂其快且適為何如耶雖然古之君子去國其忠愛之誠恆惓惓不忘公念生平遭遇所以享富貴夀考於今日者果誰之賜歟尚以忠孝教其子孫以禮義率其鄉人㴠泳聖化頌歌太平以上報聖天子眷禮之厚此則區區所望於公而亦公之所不能自巳者公其以為如何是為序贈禮部侍郎儀公致仕還鄉序君子之仕也能以其所學見之躬行施之於國家以成其事功而其老也荷朝廷眷遇之隆得遂休致以歸榮於其鄉此誠古今千載之遇而臣子終身之至幸者也乃永樂十九年辛丑夏四月禮部侍郎髙密儀公某以年八十有二祇奉聖天子德音謝其事以歸中外聞知者咸為公賀其部屬從公之久者尤惻惻然不忍其去乃相率徴言以為公贈公為人亢爽秀朗剛毅亷直德茂而學豐氣充而操篤始典教郡庠以薦者即擢任牧守繼領通政兼職官僚未幾擢升藩閫入二宗伯復詔侍從皇大孫贊翊導輔之勤講論啓迪之功孜孜焉不懈於其職而近年以來公以年齡之髙步趨出入之艱當寧興念所以期公之引年謝事以佚老于家者已非一日矣而公拳拳於忠愛未嘗敢以是為言至是弗欲重勞特命公以今職致仕且賜敕奬勞天語之舂容宸衷之眷注煥乎日星之麗爛乎雲漢之輝其為寵榮光華誠莫與比而所謂古今千載之遇臣子終身之至幸者獨於公見之矣雖然公以布衣發身經術逮今揚歷中外者幾四十年觀其自少至壯自壯以至于老其輔時及物之心未嘗少忘卒之顯融盛大全名終始夀考康寧登于太平今之歸也優遊田里與故人賓客置酒髙會上以頌聖天子禮賢優老之厚下以歌聖朝太平熙皥之盛使其鄉人子弟仰之以為法受之以為教于以敦化而厚俗厲德而勸善則公之今日受上之賜者豈徒為一身一家之榮而所以被及于鄉邦者其光耀亦永永無窮焉是為序送楊允嘉歸閩中序余嘗觀夫公卿家之子弟其家教之良而性質之美者尚矣否焉其髙者則恃問學矜文辭自謂才美出乎衆人而其流失於傲其卑者則假聲勢徇貨利自視家之富貴若固有之而其流失於侈侈與傲并習與性成其能保其家之悠久而不貽士君子之譏者鮮矣豫友太子少傅工部尚書兼謹身殿大學士楊公以宏儒碩學歷事太宗仁宗逮今上皇帝蓋三十年于兹矣公之遭遇之隆倚任之重勳業聞望著于中外而恆謙抑退讓若不勝衣且尤拳拳焉嚴其家教防範裁制具有條理而其諸子森然玉立皆恂恂謹飭平居誦詩讀書事親敬長藹然孝弟未嘗以貴富為侈傲之習是雖公教使然亦其性質之美有非人力之可強者豫嘗舉以自勵而美歎其不能及也公家建寧諸子更迭來省侍允嘉公之季子也敦厚穎敏侍公數年從師講學勤甚公嘗遣之歸以學未成願自留卒業又再期今年逾弱冠將命之婚以公命來告别余嘉其志既為詩朂之矣而翰林侍讀李君時勉錢君習禮復相率賦詩餞之屢來屬余言為序豫與公同第進士同官禁近志同道合才雖不逮於公而前後出處未始不同也今相視皆蒼然老矣見允嘉兄弟之卓立如此得不深為之喜耶公可謂有子也已雖然允嘉之歸豈惟公所屬望豫與諸君子亦深所期待尚日孜孜進於髙明不以其所已能者自足而益以其所未能者自勉則他日所至其可量耶允嘉勉之送國子監丞熊仲彰省墓南歸序古之仕也貴於志之遂而道之行也彼其居百司庶府之任有民人社稷之寄仕而能遂其志者有矣而於道或窒而不能行焉若夫職師儒者秩雖卑而實尊官雖冷而實清外有以淑郡縣之俊秀內有以育天下之英才其可謂志遂道行而異乎他官者矣而世之居是職者果能遂其所志而俾其道之行也哉吾郡之清江熊君仲彰早歲從先少保雪崖先生遊洪武中以明經舉于鄉授四川南溪教諭升國子學正再遷監丞前後三十餘年皆以教導為職業而獲遷擢之美可謂難也已其居監丞也則其秩為益顯其道為益尊而其志益可遂矣夫以天下之大英才之衆萃乎太學歲率數千人所以佐祭酒司業以施教者唯監丞也是故諸生有勤學好修而精于業者得以勵之而使勸有學行悖戾而隳于業者得以責之而使懲凡日用食息動靜語默之間少有乖成規逾禮節者丞皆得以詰治之然則數千人之衆所以仰望而則效之者惟於丞是視其所係之重為何如哉茍非博學以導之端已以先之其於所職且不能盡尚何志遂道行而有譽於時乎君久居師儒學博而才優身端而行飭於夫丞之為職亦可謂盡之者矣今年以三載秩滿績最受敕荷褒嘉之榮顧念丘隴展省久曠援例陳請以歸鄉之縉紳大夫在朝者來請子言贈之夫得天下英才而教育之人之志也即仕晝繡而歸榮其鄉亦人之志也然君今皆有之矣是行申孝敬於奠掃之餘訪宗戚於暌違之後促裝重來以蒞厥職勉圖報稱益敦吾道則非惟太學之幸而於吾黨斯文亦重有光焉豫與君幸同郡而同門相知最久於其去嘉其志之遂道之達而復期望於將來也故為之書送指揮李固忠赴河南都指揮僉事序聖天子嗣統之五年民物康阜海宇乂寧思惟守成之世恆安於文治而忘武備必詰戎兵揚武烈振怠弛之政以永無強之大業而後可焉乃詔選武臣之老成練達軍政者往蒞天下諸都司且命必經數人推舉者而後用之聖上經理天下之心文武並用之術深且逺矣猗與盛哉於是金吾右衛指揮使李進固忠以選擢河南都指揮僉事戒行其友人李福輩相率來請文贈之豫惟武勳世祿之家能嗣守先烈者固難而克自建立以光前休者尤難也固忠之先君子當太宗皇帝靖難初早立戰功纍官至千戶階武德將軍固忠以其先君子功超授金吾右衛指揮同知其後以從征沙漠再遷指揮使今復以選授任帥閫非其積纍之有漸而衆心所推服以合於公道者曷克臻兹且固忠為人端方簡靜處心平恕事朝廷以忠謹為本家居無事即焚香誦佛書未嘗敢萌非分以事請求其操持如此則其平生可知矣雖然河南為中原重鎮固忠是行尚益體聖天子奮揚武威振起治功之心率其所屬盡保邦禦侮之道俾兵不厲民而訓練之有方民安耕織而警備之無虞則為無負今日選任之意而於承先裕後之道益有光矣固忠尚勉之送劉長謙赴廣東參議詩序宣德四年二月中書舍人劉君長謙除廣東布政司參議其友諭德周君崇述相率賦詩為餞而屬豫序之始豫以進士給事內廷即識長謙於太學及豫備員禁林長謙乃以薦與修太祖髙皇帝實録逾年書成擢中書舍人計其相與出入朝著蓋三十年于兹矣長謙為人端謹持重平居恂恂不妄發一言與人交和氣滿容其居職勤敏小心每誥詞既下必謹率同寮相與參稽讎校然後正襟端席而精書之蓋不啻若對上帝而臨師保也以是歷任之久自始至終無纎毫差爽以玷於其職焉今天子宵旰圖治方柄用儒臣以長謙久於其職特升擢之俾二藩閫其亦可謂榮且重矣然長謙為天子近臣非他人可比而方面之寄所以承流宣化為郡縣庶司之所瞻仰又非尋常職任之可擬則夫天子所以待近臣而寵任之者可不謂榮且重哉雖然長謙之去尚當體聖天子閔念元老之意於今或政有所未舉或化有所未洽必審度而咨諏之何者而便於民何者而厲於民汲汲焉若奉漏沃焦釡以圖其理庶幾山顛海涯之民皆得安其生以樂太平之治斯則聖天子委任長謙之意亦長謙報天子之職也長謙行矣尚慎重之哉送劉長史天錫致仕還會稽序國家優禮臣下顯榮終始而凡任職內外無小大年至七十者皆得謝事而歸恩德之厚曠古鮮儷乃宣德已酉之夏會稽劉天錫先生以淮府長史自陳衰耄弗堪任事遂得賜歸其鄉既將行其鄉之仕于朝者咸來請豫言為餞先生在洪武丁卯以明經領浙江鄉薦會試名在乙榜授南康星子學官其後改安慶之望江歷二學施教皆有成法而諸生多所造就永樂初元以秩滿擢校書司經局尋復為沂州學正未幾用薦為禮部試官竣事升吏部考功主事洪熙改元封建親藩詔選文學老成之士充職輔導以先生常為功臣特拜淮府長史而自居職以來蓋亦駸駸而老矣一旦懸車將翩然去之其喜為何如耶夫人臣之事君貴於進退以禮先生自少而仕既壯踐歷中外蓋四十年於此矣竊惟先生為人癯然清介淵乎其有道充乎其有容中扄坦夷不事表暴間居終日罕接人事疏食水飲左圖右書裕如也乃今以耄齡引年而歸非知止戒益進退以禮者能若是乎先生南望越中言還桑梓夀考永艾日與鄉人父老優遊林泉之下尚能作為文章以頌歌聖天子至仁之化而復以其餘教其子若孫以及其宗族鄉䣊使之入孝出弟仰之以為訓奉之以為法則古所謂父師少師者非先生之謂歟豫昔領薦于鄉先生實與選士相從之久知先生之為最深顧鄙陋之辭奚足以為先生重苐以疇曩之好有不能以默然者故因諸君子之意而致其嚮仰之私如此云送貝伯舉歸金華序國子祭酒金華貝先生之長嗣伯舉今年自家來省先生于京師居數月先生以其有家政之任復遣之歸監察御史胡器陳紹夔中書舍人干霈鴻臚寺序班黃惠太學生羅震楊延於伯舉有交遊之舊相率來請文為贈先生初為教諭新淦日伯舉始生豫時猶未仕也洎豫叨有祿仕于朝先生秩滿遷國子助教升司業以轉今官前後蓋三十餘年伯舉往來兩京未嘗不與豫接然伯舉方屹然成人而豫則蒼然而老矣伯舉自幼莊重異常兒及長勤學好問克承親志數年來雖侍其慈顔膺幹蠱之勞而與其弟仲勤歲時更迭來省婉愈承順實有以慰先生之心且聞伯舉兄弟居鄉里恂恂然凡所以接姻族待賓客以至於吉凶慶弔往來餽問之際又皆周旋有度輕重適宜未嘗有傲僣之失以是人皆愛重之則其飭身謹行篤於孝弟者可知矣於戲堯舜之道本於孝弟先生居首善之地專教育之枋固常以是率其下也使伯舉兄弟於事親之道少有或怠其能見重於人哉夫教由身以及家由家以及國與天下先生父子之間既盡其道則其為天下士子之法也不亦宜乎伯舉之歸慈侍定省之餘尚益勉於自修俾他日德成名立以永貝氏詩書之澤則於先生之道益有光矣豫既嘉伯舉之克奉家訓又因以知先生之有所本也於其行遂書以告之贈王裕還臨川序吾江右臨川多巨儒在宋時有若晏元獻公王文公及曾南豐陸九淵兄弟俱以文章政事著名當時至有元時則又有若吳文正公以道學為己任師表後進名聞天下故士生其間仰其流風遺韻皆卓卓然有以自立者豫處翰林得友人王君時彥者臨川人也時彥以名進士入翰林纍官侍講其為人周慎沖密器宇凝峻問學該洽充其中不事於表暴和其外不流於阿徇進退辭讓惴惴焉如不勝者豫於是而知時彥所立非偶然而致者蓋有鄉先達為之表率故也今年春時彥之子裕以明經領鄉薦而來將與多士掉鞅文場適以後期弗得與遂得候其父起居越數日時彥以裕來見豫試察之目其貌則和而莊耳其言則端而確叩其業則易而習而於動容周旋則恂恂焉恭下而有禮豫於是而又知裕之所立非偶然而致者蓋有嚴父以為之表率故也乃秋九月裕念祖母在堂承其父命將歸省於家來請言為别豫不敢辭則為之告曰子由臨川歷數千里以致於此所以觸乎目接乎耳得之於見聞者亦既富矣尚何待於豫言哉雖然豫聞之天下之事皆有足惟學也不可以有足何也蓋性命道德之藴禮樂刑政之用古今治亂成敗得失之迹載之於經著之於史紀録於百家若海委河輸其深無崖其浩無際自少至壯自壯至老盡日夜之力有不能博極其旨趣窮探其涯涘尚何敢須臾頃刻懷自足之心哉子之歸也尚勉求聖賢之懿致察於日用彞倫之間防慎於念慮幾微之頃徴之以前言往行日求其所未知未能以期追蹤諸先達為臨川之光是則乃父之所望而友朋之所期待者也舍是豫無以為子言子行矣尚朂之哉贈周子宣還吉水序吉水多故家文獻惟泥田周氏綿歷數百年愈久而益盛愈逺而不替者蓋由其世篤詩書纍德積慶而子孫之賢有以繼承之耳先大夫諭德嘗言今之故家饒於財賦者不足貴惟能敦禮教以紹續先世之緒者乃為可貴若泥田諸周其財賦之盛他族或可等獨文獻忠厚之傳至今不泯者則非他族所可及聞者莫不以為確論豫自弱冠以來與周君岐鳯交莫逆其時有若仲源甫則君之曽大父行也雍容儒雅不事表暴虛已下人塪焉如不足禮賢待士汲汲如不及教族人子弟懇懇焉以忠信孝弟為主本居鄉里以周窮恤匱為先佳時暇日則深衣大帶與賓客故人放情於煙霞山水之間或絃琴而共酌或雅歌而投壺或登髙而眺或臨溪而漁或枕石而卧或引樹而吟蓋深有得夫光風霽月之趣今仲源墓已宿草矣獨其流風遺韻猶可想見而其仁義忠厚之澤藹如也於乎何仲源德善之美一至此哉今年冬十月仲源之孫子宣來京師相見因與酌酒道舊故慨前輩之凋落念交遊之疏濶則有不勝其感歎者子宣將歸鄉人士之仕於朝者皆為詩以餞之而屬豫為序方聖天子營建北京四方會同舟車輻輳凡百工羣有司以及藝能之士莫不奔走效勞趨事赴功維時天人交贊百靈薦祉祥光燭霄卿雲捧日白烏産於京府麒麟來自海外白象貢於交趾天馬呈於渥窪夀星現於南極嘉禾出於畿甸諸福之來不可殫紀子宣遨遊兩京幸目覩其勝以為昔之所未見者今則見之矣昔之所未聞者今則聞之矣虛而往實而歸子宣亦何其幸哉歸拜家慶與族人鄉黨置酒髙會必有為之歆慕歎羡求如子宣之遭遇者有不可得矣因其行故述其所懷而徴以世家文獻之舊與夫疇昔交遊之好序以送之贈進士蕭迪哲序豫昔為博士弟子員有蕭竒迪哲嘗從豫遊鋭敏勤篤刻志於學蓋駸駸乎其未巳也及豫來京師十有二年忽聞迪哲領鄉書來南宫會試豫躍然以喜曰是必將取髙第者也其年春二月豫受命典司文柄不意迪哲竟遭黜落遂入為國子監生明年聖天子巡幸北京又二年適當賓興賢能之秋天下之士來會試者凡三千餘人而迪哲亦與計偕豫又躍然以喜曰是行取科第也必矣及撤棘中選者三百五十人迪哲果占名第九三月一日上臨軒策試豫忝與讀卷後三日臚傳而迪哲又占名第二甲賜進士出身烏乎迪哲亦可謂榮且盛矣既釋褐吏部請循例命諸進士試事于羣有司於是迪哲復得還南京所與遊者皆賦詩為别復求豫言以自朂豫謂國家之得人也為難而用人也為尤難得一才必養之於十數年之久而後可以達於用及其用之也又必歷試之使其諳練於政事而後授之以任其養之也甚厚其望之也甚至士生斯世遭遇聖明感恩寵之隆則所以上報國家而自待之重也為當何如哉迪哲蒙教養之恩發身於經術其於修已治人之道講之有素使其受一職以往夫豈不可乃猶歷試之而不肯輕用焉蓋將以擴其見聞宏其智識練達其才而期之以逺大耳吾兾迪哲之往也尚益勵其志敬其行勤其職致謹於戒慎恐懼之際朝夕孳孳以求無負於聖天子待遇之厚異時出而黼黻鴻猷輔成治化建功立事而垂聲光於久逺者吾於迪哲有望焉迪哲勉之送王彥修僉憲四川序國朝方面之職有藩閫以蒞民政有帥府以總軍務而又設按察使以臨之蓋其職專任風紀激濁揚清亷問得失詢察民隱凡一道之利病無不得言之其為任甚重也皇上繼承大統宵旰圖治簡拔賢士而於風憲之職尤慎擇其人蓋以其為朝廷耳目之司生民休戚之所係非有清廉孤直之操疏通練達之才不足以處之永樂十二年冬十有二月友人王君彥修以工科右給事擢四川按察司僉事將行凡所與遊者皆相率賦詩以餞之而俾豫言辨諸首簡彥修由科目發身列職禁近日侍聖天子左右閲歷庶務幾十餘年習之久而聞之熟一旦祗承寵命任臬司之寄其所以發於政而施於事者譬猶駕輕車而馳康莊吾固知其易易耳雖然按察之任非他職可比茍非其人不失之疲懦則流於寬縱不失之矯激則過於苛察如是而能稱其職者蓋鮮矣彥修之往也毋訐訐以為能毋察察以為明必曰寃滯之未伸吾思所以平之姦蠧之未清吾思所以去之風俗之未一吾思所以齊之民生之未遂吾思所以蘇之吏治之未舉吾思所以糾之揚憲軌而樹風聲秉廉介而勵氷蘖使人望而畏之如烈日秋霜孰敢易視而輕犯之哉嗟夫君子之仕也非其位則不得於言得其位或不足於言皆世之所病也彥修得言之位當言之路所以濟時行道以上報國家者政在於斯茍為得其位而有所不言言之而有所不行行之而害於政病於民此非豫之所敢望於彥修也彥修尚勉乎哉贈兵部尚書陳公赴交址序交址去中國最逺限山瀕海僻處南徼萬里外自古以來夷人相虎吞迭為雄長漢唐之世雖嘗置郡縣然反側叛服卒無寧歲下逮宋元遂弗能制由是胙土錫封建國安南更歷數傳桀驁滋甚以至黎氏父子戕殺其主乘黃屋左纛鴟張狼顧將與中國抗衡歲時貢獻往來狙詐益甚天子震怒命大將帥偏師往討之首惡就禽凡黨與相煽結者悉獮剃無遺遂以其地為郡縣建交址布政司以統之方王師之南征也吏部侍郎陳公叔逺實受命以從公為人沉默謹願小心周密其在閫外也凡軍旅之調度餽餉之經營邉務之計畫以至胥史筆札之細微皆預領而參決之暨交址既平號令更新選吏以理其民公勞來綏輯哺飢喣寒而又以宣上之德意納之於春陽和煦之中近年以來瀕海之區寇孽伺釁阻險負固復相聚動搖掠民資畜為生活用是弗寧事聞仍詔大將軍英國公臣輔提兵往靖之公復受命以從至海上逾年遂搗其巢穴縛首禍者數人俘獻闕下交址肅清民大喜以寧去年秋九月班師公從大將軍入覲宸衷豫恱特賜宴賚擢升兵部尚書光華寵耀榮及友朋而公尤栗栗焉傴僂謙退若不能勝者烏乎此可謂厚德之君子者矣居間聖天子因念及交址方內附禮樂教化未大洽于民且其地方數千里為交南重鎮非假大臣以鎮撫之則不足以宣昭威德惟公負才能聲望於其民情俗尚之所安政令寬猛之所宜與其山川城守之所備皆嘗圖度而熟察之乃復命公以往朝之縉紳與公遊者皆賦詩酌酒飲餞于都門之外而屬豫敘之豫謂士之未遇也患不得其位既得其位也患其道之不能行位得矣道行矣而上足以結主知下足以為民望此尤古人之所難而不可以必焉者也若公之遭逢盛際德足以稱位才足以立事道行志得為聖天子之所眷注十年之間出入勞勤揚天威於萬里馳英聲於海上而屹然為交南之望方且自致於青雲之上建立功業以古之名臣自期待此其志則公之獨得而他人固有所不識也公行矣尚周爰咨宣誕昭德音以副聖天子一視同仁之意使交南之民屬望於公者如始來之日則惠之所及者逺矣公行矣尚慎重之哉送蕭知州還深州詩序始吾友蕭伯辰以薦擢知泰州四閲月丁內艱而歸其民皆咨嗟繾綣至相與挽留之不置人或怪之以為伯辰之政教未有以浹於人人果何以得此哉及服闋來深州未數月而聲譽籍籍在人耳目其人之愛慕之者無異於泰州然後知吾伯辰之政果有以異於人矣伯辰為人周慎沖密無疾言遽色當其家居時謹身飭行篤於孝友所以㴠養而淬礪之者非一朝夕矣及出而遭值聖明則勉竭忠藎盡力所事兢兢焉業業焉惟恐失墜以貽鄉里之辱逮今揚歷幾三十年終始如一誠可謂耿介拔俗而傑然特出者矣今年夏五月伯辰為其州三年當報政于朝乃由州而上之府府考之其職稱復由府而上之吏部吏部考之其職亦稱至是又以其績而上之天子命復還其州凡縉紳大夫與伯辰遊者咸賦詩酌酒為賀伯辰辭謝至再三告其友金善曰伯辰蕪陋蹇劣無過人之才學不足以適用道不足以濟時政不足以為理徒以遭遇明時忝牧守之寄尸位竊祿茍延歲月未嘗有一善可以為士君子稱道今為吾賀實以益吾之愧而重吾之不德耳子幸有以教之庶幾俾伯辰有所持循而無負於諸公之所望也豫聞其言而解之曰士之仕也惟守令得與民親可以展其行道濟時之心而鮮能舉其職以盡夫牛羊芻牧之寄往往不失之寬縱則過於苛刻不流於委靡則過於矯激乖其廉潔之操忘其奮厲之志曽未及究其所施而身辱名喪遂為棄人重可歎也伯辰慈祥豈弟練達老成介特之操凜焉而不變長厚之風藹然而可接所至政績昭昭人用和恱庶幾無愧於古之良吏矣而尤且謙退自下若不能勝者此豈非所謂慎終如始而卑以自牧者歟雖然以伯辰之所存而施於政者如此由是而益勉焉以求無負於國家無負於深之人吾知他日之超躋顯庸有未可量而潁川勃海恐不足為龔黃久淹也伯辰拜而謝曰僕何足以望此惟是所以教我者不敢不勉贈歐陽太守之長沙序長沙故大郡地廣物衆統屬邑十有二其人徑悍決烈尚勇而好爭非得疏通練達介特亷明之士不足以治之蓋疏通練達則足以剸煩裁劇而不滯於事理介特亷明則足以律己正人而不廢於官政此長沙所以在於得人而吾友歐陽聿修所以克稱其選也聿修學通於古有才識燭理而敏於事特立而不阿始為茶陵令豈弟愛民卓卓然有古循吏風今天子即位之初用薦者入為大理評事繼為監察御史論議激揚侃侃焉著風裁之節永樂十年冬擢知廬州府未幾以事去當改調適長沙缺長吏而難其人遂以聿修往蒞焉朝之縉紳士與聿修遊者既為之賀而又惜其去也乃相與賦詩酌酒為餞而以首簡授豫竊惟聖天子自蒞阼以來宵旰圖治拳拳焉於郡守縣令之選非得人為理未嘗茍且而輕授之蓋以守令者民之師帥其任甚重而凡俗之登耗政之隆替教化之張弛民之休戚靡不係焉聿修既負通達之材揚踐中外多歷年所其所以發於政而施於事者如工之於規矩方圓無所施而不得其宜又豈在於他求哉雖然善為治者察民之緩急先後則用力少而獲效速反是未有能得其理也聿修昔在茶陵與長沙密邇其民情之趨向風俗之好尚與夫山川風氣之美惡有不待詢察而知者至於一郡之得失利害非耳目所及者則必謀於其屬告於其父老為今之政訟獄有未平者歟盜賊有未弭者歟徭役有未均者歟姦蠧有未清者歟民生有未遂而吏治有未興者歟茍無所聞則已一有所聞則必力行以求其治使無一夫而不獲其所如此則庶幾無負於聖天子愛養元元之意聿修行矣尚勉乎哉贈應太守赴臨江序聖天子臨御以來勵精圖治宵旰孜孜惟欲利安元元以成三代雍熙之化十餘年間屢下求賢之詔敕吏部慎選守令非名德碩望歷試有司治著明效者弗與是選乃永樂四年冬通判延平應矦子澤用薦者擢知臨江下車之初即詢察民隱問政之緩急先後舉凡可以惠利於民者無所不用其心由是其民皆樂於其政居無何侯以外艱去服闋調守彰德比以舊官還得代上行在吏部適臨江久缺長吏乃復以侯蒞之於是吾郡之入仕於朝者莫不以侯之賢而克當其任也遂舉酒為賀且賦詩若干篇為贈俾豫敘其首簡昔豫於侯之往也嘗預離觴之末僣屬筆一言矣今於侯之行而重為之告者則以諸公之拳切屬望於侯者其意甚深是以欲辭不獲欲默不可而不得不為之言也嗟夫天生萬物不能以自治也則命之天子天子統萬民不能以遍治也則命之庶官是以內設六卿外設藩閫臬司暨府若州若縣皆所以為民也而所以與民親得達其情者惟守令為然然非博達明敏之士亷足以自守才足以剸繁量足以容衆而慈祥豈弟足以施於政者弗克以居之侯昔在郡時寬厚廉恕雍容不迫懼民之弗親也常下之懼其情之弗申也常達之蹈循良之風行平易之政故遺愛及於人者油然有甘棠之思則今之往也凡一郡之得失利害有不待詢察而後知發號施令有不必計慮而後行若駕輕車就熟路而無有齪齬凝滯於其間是則侯之所以及乎人而人之所以沐侯之惠者又非昔日之比矣雖俾豫之子弟亦得以詠歌優遊於田里之中而為太平之民則所以蒙侯之惠者又可勝計哉遂為之序於是乎書金溪王氏族譜序古有宗法有祭法皆所以統族屬敘昭穆敦本始而篤孝弟之道也大抵宗法行其族雖繁而不亂祭法行其統雖分而可合去古既逺宗法廢墜而祭法不舉於是族無所統各親其親各子其子昧疏戚之誼失昭穆之序至有老死不識其宗族而甚至相視如途人者有之此世之君子所以深致意於斯而譜之不可以不作也友人王君時彥嘗授豫以家譜一編觀之既則請豫一言以序其端豫不敢辭乃為按譜而序之王之先與周同姓春秋時有王子成父者以勞績始賜姓居大原至東漢有名烈者以行義聞號其所居曰君子鄉唐貞元初君子鄉之後曰仲舒者少孤奉母居江南後仕為江南西道觀察使以殁葬洪州因家焉其居臨川者自洪而分由臨川而居金溪者則始於宋迪功郎宗達也宗達之後有曰東窗居士曰小窗先生曰頥齋俱以行義文學著稱於一時頥齋之後若子成修本尤博學能文辭孝友之實聞於其鄉修本有子英今天子即位之初以明經登進士第纍官翰林修撰忠謹端慤有聲于時英與豫同官禁林稱時彥者其字也夫自宗達至時彥凡九世幾二百年其間積德纍慶淵潏渾厚如木水之有本源浩乎注江河干雲霄而不可禦者此無他蓋由本之以詩書充之以道義修之以孝弟忠信以馴至其盛也時彥常曰物久者不能以無蠧事久者不能以無變族久者不能以無弊則所以救其弊者亦敦本之道焉於是為之譜牒以明其等降衰殺之節使逺者可近而不至於易失疏者可親而不至於易離衆多者可合而不至於易分蓋亦統族於宗合族於祭之遺意也然則時彥之用心可謂至勤且厚矣繼今以往有能即是而求之培本濬源益勉於為善以敬承其世毋逺而失也毋疏而離也毋繁而分也使既往者之不絶而方來者之不替庶幾有得於時彥統宗合族之意而於尊祖敬宗之道或亦有所感發焉詩曰子子孫孫勿替引之觀於斯譜者尚益敬重之哉送謝繩正南歸序余少時嘗從先大夫諭德雪崖先生客吾邑莒洲謝氏之孰于時謝君子平乃以訓子為事虛已下賢常若有所不及而先大夫執禮抗義獨以師道自任子平有子四人瑰偉卓邁森若玉立其季曰繩正尤穎異秀爽與豫齒相若而所習之業亦與豫同所聞於先大夫者亦與豫無異也風晨月夕相與切劘講貫志同意合蓋有甚相得者既而時異事遷東西散去子平與先大夫亦相繼傾逝豫後備員庠序忝以明經登進士第擢官詞林而繩正亦抱其所業放浪江湖間暌違間闊屢易寒暑去年夏六月繩正買舟泛彭蠡上金陵道淮泗涉梁宋過齊魯之邦而抵幽冀之都蓋將以攄竒發粹擴其見聞而豁其心目也今年春豫扈從來北京適與繩正相值於金臺之上即命酒觴酌道舊故握手盡歡促席接膝亹亹忘倦越數月還江右謂豫相知有素徴言為贈豫謂繩正以方壯之年負英邁之氣追慕昔人遊覽之勝不肯以隘陋自居乃遍歷名山大川通都巨邑以發舒夫胸中之竒氣吾知其所得益深所見益廣而所聞者益富矣今之歸也展拜家慶奉觴上夀與其兄弟子姓賓客故人從容宴笑具道夫四方登覽之勝哲人文士交遊之美與夫聖天子製作之盛其為快樂可勝既哉豫言蕪陋不足以副繩正之請姑道其實如此且以徴後會云送梁本之赴任序泰和梁先生本之以內艱服闋入京師拜魯王府紀善或曰先生嘗以是職居蜀府輔導之美著稱于時歷年滋久當得遷秩且其器識之異問學之優將無施而不可也顧乃復任王國以去夫豈其宜豫曰此政朝廷簡畀之意也夫王國皆天子懿親往往必擇老成碩學任之左右為其能輔以德義而有所裨益焉耳先生洪武中以明經舉歷教古筠溧陽納溪諸郡揚歷仕途三十餘年其學識之奧操行之端所至人被其化聲譽洋溢及用薦至蜀能益崇其學厲其行啓沃彌綸卓為賢輔今復官于魯其能以德義為輔而有禆於王國也必矣况聖明在上推恩藩府益篤親親以先生之賢復得從遊於賢王之門其尊崇優逸為何如則雖遷擢之以他秩有不足重矣矧兹郡實先聖闕里所在衣冠爼豆可以朝夕資遊泳寓觀覽豈不尤可樂者耶謂之不宜其去者不知先生者也或者遂默然無對於是縉紳大夫相與賦詩送之豫故舉所以答或者之辭次以為序贈宋常固知遂溪縣詩序豫友宋常固氏以明經登永樂戊戌進士第歷事天官越四載得授廣東之雷州遂溪縣知縣朝之縉紳士咸作詩為餞以豫有鄉里之好屬一言以序其端欽惟聖天子嗣承大統宵旰孜孜勵精圖治惟以安養斯民為務故于守令之職恆重其選誠以守令者民之師帥得其人則治否則厲于民而郡縣之休戚係之常固以名進士藴經濟之學幸獲出入天子之庭日近清光以廣其見聞周覽政務備悉夫為治之要一旦有百里之命其猶駕輕就熟恢恢乎為之有餘裕者矣雖然為政之道必本於廉公明恕而後有以立乎其位而致夫治效之美焉大抵廉則不為物屈一有不廉則喪其所守矣公則不為物欺一有不公則陷於偏徇矣明則不為物蔽一有不明則昧於是非矣恕則不為物害一有不恕則流於苛刻矣常固奮有為之志方將建功立事以古人自期待於厲操制行固守持循蓋非一朝夕矣然為今之政必有實惠以及民察其緩急先後因其所利者而興之所惡者而去之撫綏漸摩使寒者有所衣飢者有所食優遊怡愈盡仰事俯育之道樂豈弟循良之化若是則於聖天子簡賢任能之意百里撫字之寄可以稱於其任而無愧乎為民之師帥者矣且豫聞常固父母俱康強無恙今道經西江尚過家候起居展家慶綵服翩躚奉觴稱夀上以慰二親暌離之念下以盡人子定省之恭此又吾常固拳拳忠孝之思匪惟宋氏一家之榮而於鄉里亦重有光焉常固行矣尚朂之哉灤京百詠集序豫嘗扈從北征出居庸歷燕然道興和逾隂山度磧鹵大漠以抵臚朐河復緣流東行經闊灤海子過黑松林觀兵靜虜鎮既又南行百折入淙流峽望應昌而至灤河又自灤河西行過烏桓經李陵臺趨獨石涉龍門出李老谷迤邐紆徐度鎗竿嶺遵懷來而歸往復七閲月周回數萬里凡山川道路之險夷風雲氣候之變化鑾輿早晚之次舍車服儀衛之嚴整甲兵旗旄之雄壯軍旅號令之宣布禡師振武之儀容破敵納降之威烈隨其所見輒記而録之且又時時作為歌詩以述其所懷雖音韻鄙陋不足以擬諸古作然因其言以即其事亦足以見當時儒臣遭遇之盛者矣豫自幼聞西雲揚先生以詩名今覩其所為灤京百詠則知先生在元時以布衣職供奉嘗載筆屬車之後因得備述當時所見而播諸歌詠者如此然燕山至灤京僅千里不過為歲時巡幸之所度先生往來正當有元君臣恬嬉之日是以不轉瞬間海內分裂而灤京不守遂為煨燼數十年來元之故老殆盡無有能道其事者獨豫幸得親至灤河之上竊從畸人遷客咨訪當日之遺事猶獲聞其一二登髙懷古覽故宫之消歇睇河山之悠邈以追憶一代之興廢因以著之篇什固有不勝其感歎者矣因觀先生所著而徴以豫之所見敢略述其槩以冠諸篇端然則後之君子欲求有元兩京之故實與夫一代興亡盛衰之故尚於先生之言有徴乎贈徐太守復任還太平序自昔以守令為重必得賢者而任之蓋守得其人則一郡治令得其人則一邑安是以民之休戚係於守令之賢否甚非細故也我國家法古制治凡簡擢守令必其才之老成達於政事足以勝其任者而後授之同郡徐君仲敬疏通而長於才練達而敏於事始由太學擢監察御史歷十餘年轉春坊右中允又數年由春坊擢知太平今年夏仲敬以秩滿來京師吏部考其績稱引奏命復還其職將行所與遊者各賦詩為餞而俾豫序之豫聞仲敬之居太平也慈祥樂易嚴而不失於猛寬而不失於縱凡政務之緩急民事之先後賦役之供應農桑之勸督吏治之綜核人才之興舉獄訟之聼審以至馭強猾摘姦蠧植弱扶善莫不施之有其序而處之得其宜也由是致聲卓然達於畿甸而其民皆服於其教然則今之時論列郡守之賢能若吾仲敬者誠有以稱之矣大抵守令雖為親民而其職至為難盡自漢之世有張堪廉范龔遂黃霸之徒見稱於當時其後得名者寥寥不過數人此豈非其職之難盡歟仲敬持身廉謹揚歷中外所至有聲及今又能舉於其職以為一郡之望則其功業名譽又豈下於漢之諸賢守哉詩曰以似以續續古之人仲敬有之矣封兵部尚書方隱君慶八十夀詩序聖天子嗣承大統勵精圖治委任股肱心膂之臣以相與贊理道裨教化由是治效日臻四方底寧故凡克躬勤勞者皆得推恩封贈於其親而兵部尚書方公其一也于時公之尊府君實拜命領尚書之職既入謝而歸衣冠風采照耀一時齒爵之隆甲于鄉邑至其耳目之聰明起居之安適又有非常人之所能及者乃永樂庚子秋七月十有二日適當八十之期諸名卿縉紳咸謂尚書公遭逢不偶家居夀考得以優遊祿養享太平之樂是蓋古今所罕見者遂相率賦詩以歌詠尚書公之厚福且以祝頌其夀焉不鄙謂豫序之豫謂天下之物有不可必得者皆可以智力求惟夀出於天不可以強致也然極而推之非天地至和之委國家㴠養之深天下太平之盛則不足以致之今尚書公髙年令德政修於家化行於鄉衣服几杖足以適體旨甘滫瀡足以備其養子孫賓客足以樂其心而又有嗣世之賢膺台鼎之重贊理協于宸𠂻聲光著於遐邇於是國家推其所自而尚書公遂得荷褒美之恩侈封爵之貴光榮耀乎閥閲名譽播於鄉邦其榮且盛可以為至矣然非尚書公之遭時升平㴠煦至和身臻夀考享有盛福又安得覩其子之貴富以致君臣之相遇忠孝一門千載一時其所以遭逢於太平亨嘉之日者果何如其盛哉豫雖未得升堂為尚書公之夀而於羣公歌詠之際亦可以想見稱觴之樂也因不辭而為之序焉湖山竹隱詩序吉水曽氏其先自西昌徙居泉上數百年來子孫之衆衣冠之盛田園物産之富恆甲於他族有仲詹氏隱居鄉里性雅好淡泊嘗即所居湖山之傍别構堂以居復於堂之南築小軒為宴休之所軒之前可半畝列植以竹歲久森然玉立秀拔可愛仲詹暇日與賓客故人徜徉嬉遊或絃琴於斯或觴詠于斯或誦詩讀書于斯或脫巾解帶于斯清隂布地涼飈滿庭上可以隔囂氛下可以滌煩暑度爽籟於林端灑蒼雪於湖畔景與心遇物與意交誠隱居之至樂於是士大夫相與名之曰湖山竹隱且為賦詩以寫其勝來請言為序於乎世之珍竒瑰異可好者多矣而仲詹所好而樂者獨在於竹豈不以其虛中直外特立不阿遇霜雪而不摧歷四時而不變為君子之所尚歟然則仲詹之有取於此所以蓄耀韜光抱幽守獨異於庸俗者霄壤不侔矣雖然湖山之勝豈特為今日之美觀將俾後之人挹其流風遺韻㴠養封殖以繼承於無窮則仲詹遺澤之所及詎有涯哉是為序贈翟大尹還新淦序守令皆所以親民也然令視守其於民為尤親焉何也凡民有所欲而求得與所惡而欲去必先之乎令以求得與去之令有不能然然後之乎守也令之尤親於民如此故一設施措置而民之利病休戚係之其任豈輕乎哉然職乎是者貴乎以亷潔持巳以平易近民以惠利存心庶幾能善其職而盡令之責也茍非亷潔以持巳則有所蔽纍而不能施公正之治非平易以近民則求為新異馳騖於髙逺而不能臻善政非惠利以存心則凡疵於政癘於民者漠乎若不相關而民有不蒙其澤矣令之鮮能修其職善其治者往往職此之由耳若余新淦令翟君溥福殆可謂能盡乎是者矣君始由進士出為青陽令以事去改為新淦其在職介然一以公正為治未嘗立異作新以驚俗駭衆而視民之利病汲汲焉興而去之者不啻切於肌膚焉故令若干年雖無赫赫之聲而上下熙然相安民不擾政不疵而邑以大治由能盡乎三者而巳也詎不謂之賢令者乎今年春以秩滿上吏部吏部考其績在優等援例命還其職於是給事艾君廣蕭君迪哲相率賦詩為餞而徴余為之序余邑人也知君有素遂舉君之所以善其職者為之頌且兾其始終行之若是則雖古所稱循良者又豈多讓哉贈劉士皆僉憲四川倡和詩序永樂癸巳冬進士劉咸士皆得擢四川按察僉事於其行前翰林學士胡公光大賦七言唐詩五韻以贈其意既美士皆以英年登髙第而膺顯擢又欲其仕優而益進於學蓋美不忘乎規也于時縉紳大夫屬而和之者凡若干人律吕相宣雅正迭奏渢渢乎盛世之音也厥後士皆由四川改于河南所至政聲籍籍觀其志之所存業之所充術之所施蓋益有可徴者豈有得於詩之所謂學優而仕者歟今年春士皆以督工留京師持以謁余而求言夫士志乎髙逺者不以所巳得為自足隨其所至皆不忘乎學是以源委深長根本盛大有非隘陋膚淺者所可及至其他日之所就功名事業宏偉光大稱于當時傳于後世而無窮者亦非常人之所可及也然則士皆之深懷逺志所以自期待者既如此其至而友朋之所以期望於士皆者又如此其厚則繼今以往所以致謹於操履以期建功立事垂世而傳後者有不在兹乎士皆廬陵人余家於淦於士皆為同鄉士皆壬辰進士是年余承命典文衡則士皆為門生同鄉也門生也於其有請焉得無言哉遂書此以辨羣玉且益為士皆勸云贈兩傳兄弟之官序永樂辛卯秋吾臨江以鄉舉與計偕者六七人惟新喻兩傅兄弟曰玉良玉潤者年最少豫以鄉里故始與之識明年春會試豫承上命忝司文枋而兩人者皆中髙等殿試復厠前列得賜進士出身於是其名遂彰彰然傳播士大夫間又明年車駕巡幸北京豫忝扈從而玉良兄弟亦留行在巳而有詔命歸省于家其還京師也當待選吏部於是二人者又得七品官為縣乃以玉良知常熟玉潤知政和一時縉紳之士莫不榮之於其行各賦詩為餞而以首簡相授昔有宋之盛文學之士乘時而進者恆出於一家有若宋元獻公郊蘇文忠公軾兄弟皆以同時登科有盛名於天下其時吾臨江則有劉原父貢父孔文仲武仲平仲兄弟亦以科第相繼得盛名於時至今文章事業炳耀史册數百年來兄弟聨科者獨少乃今復見傅氏之盛可謂有光於鄉里矣雖然君子之學固期於行非徒託之空言而已有若玉良之英鋭明敏玉潤之沉潛蕳靜其於蒞官臨民固皆足以有為而無難矣然政無常而有繁簡事無常而有緩急俗無常而有美惡治無常而有遲速以常熟而較之政和豈能盡同哉至於民可近而不可離可懷而不可擾可順而不可逆因其所利而興之因其所惡而去之此則常熟與政和其人情固無以大相逺者子兄弟之往也尚善於其職以求無負於聖天子選畀之重而思有以為父母斯民之寄庶幾無忝於科目無愧於鄉先達而吾黨亦重有光焉送武文振赴臨江同知序聖天子自統御以來敦崇治化作新政理每於郡縣有司之職必精加選拔者蓋以其人之賢否民生休戚所係故慎重之而不輕也然比年之間能不忝其職者無幾耳嗚呼此得人之所以為難也中山武文振始由胄監為工部主事秩滿遷南京户部郎中比又改授臨江同知臨江七大夫官于朝者咸謂文振之賢不可無言乃相率詣豫請文以餞之豫雖與文振未覿然聞其賢亦竊為臨江幸又寧靳於一言哉夫郡有守有二皆所以蒞民也同知秩五品於兵民錢榖户口賦役獄訟之事得與守裁決可否參校利病短長其任甚重也臨江古文獻之邦其君子尚禮教畏清議崇德齒務名檢其小人安居樂業勤力知分訟簡而少事比於他郡治之蓋易易耳文振至彼能察其政之所急事之所先與守參決可否若何而徭役賦稅可以經久而無弊若何而户口刑罰可以清省而不濫使其仰事俯育之餘知由於孝弟忠信則其風聲氣習未必不可以丕變而其民未必不可以入於善者也特在賢守二力行之而已且吾聞文振為人敦實詳謹其在工部任煩理劇無苛刻之過及居户部政修職舉無玩愒之失推是以施於政以臨其民未有不得其理者也文振勉之其思所以慰吾臨江士大夫之望無以豫言為迂濶而安於小成也則他日所至又豈可量哉是為序張宜人挽詩序宣德戊申冬十月張宜人陳氏享年七十有二以疾終于家其子珂時為宗人府經歷訃聞號痛幾絶既得請將歸士大夫與珂遊者咸作詩以歌挽宜人既聨為一編持以求豫序惟挽歌之始説者謂自漢時田橫死吏不敢哭故為此以寄哀音至李延年分為二曲則有薤露蒿里之歌後世因之迄今而愈盛至於閨門女婦之什自非其事卓卓足為世勸或因其子之賢其母之不獲終養者亦鮮見焉惟宜人育自名閥自幼間於女則性質端謹柔慈寡言笑及笄歸張氏奉舅姑盡其孝敬事其夫恭順無違教諸子嚴而不傷遇下人寬而有恩理家治生一務於勤儉而尤汲汲焉周窮恤匱以施其惠利故自宗族內外戚疏長幼無間言焉於乎世之論婦德者必本於孝順若宜人之飭躬制行於為婦為母皆合法式而又身享榮養以夀考終其亦可無憾矣而諸君子尤悲傷悼惜之者何耶始珂之出守章貢嘗迎宜人就養所以針規訓諭於珂者禆益為多至今郡人稱道其善者猶嘖嘖不置及珂入朝贊政宗人則以道逺弗獲躬定省猶兾秩滿得褒封其親以為榮豈意竟觖所望而宜人遽至大故不獲生受其慶此珂所以抱痛無窮而諸君子之所以不能巳乎悲傷悼惜之意也歟嗚呼詩本人情是編之作豈非本乎人之情也哉豫推原其意而序以引之送江副使復任詩序憲臣之職上以司天子耳目之寄下以振肅紀綱而表率乎庶僚者也其任重而望髙其道行志得士君子效用于世者恆樂處焉然獲一處其職者鮮矣况宦歷中外而皆處之乎况處之而致績用成聲譽著者乎此其樂當何如也茍使當任重望髙無以廣明聼之公盡表率之責志不能得於已道不能行於世績用無所成名譽無足稱君子於此蓋將戚乎其位矣尚何處之之久而能樂耶建安江君志堅永樂初科進士擢任御史歷事三朝亷謹敦實稱於其職遷秩超擢浙江按察副使其居職不異御史時而於正已蒞下平心率物寬不失之縱嚴不失之苛無訐訐察察之過較其績用之成聲譽之著則視昔有加焉今年夏以三載書最蒙恩循例復職縉紳大夫士相與賦詩以餞而吏部員外郎蘇良金復來請豫言辨諸首簡夫君子必有所憂而後有所樂志堅官成名立道行志得其樂於斯者可以想見矣然兩浙之間民吏之衆刑獄或未盡平賦稅或未盡均風俗或未盡純姦蠧或未盡去凋瘵或未盡蘇寧能不動諸念慮哉志堅重臨其尚憂其所憂而樂其所樂可也行矣尚為我問訊林君茂宏黃君敷仲今日方面之寄惟諸君子是賴幸相與共勉之以副聖天子切切圖治之盛心庶俾豫輩亦與有光焉羅氏老人亭詩夀考出於天不可以強致也求其人同出一時者或有之而不能必其皆出於一家求其同出於一家者或有之不能必其屢見於數世之下此羅氏老人亭之所由作而詩人君子所以見諸詠歌者如此羅故吉水望族以儒起家宋南渡以來世多長者享年之久或八九十或百有餘歲其時官府存問髙年出於羅氏者先後相望由是見稱於時莫不以為太平之盛事遂相與名其里曰老人里其後子孫蕃殖春秋會合揖拜至舍無所容則又構亭於里中以展家慶亦名其亭曰老人亭元季亭燬于兵歷年滋久未有以復之永樂乙酉秋養蒙先生始即其舊重葺而新之文淵閣大學士兼左春坊大學士胡公光大為記其事已而將刻石亭上以告其族人昆弟子姓而先生捐館下計其享春秋蓋亦幾百歲矣今先生之子汝敬修撰偕其兄嗣武汝宏其弟汝寬琢石樹碑于亭復集諸君子所為詩歌總若干首而屬豫序之於戲耆年盛德見稱於古昔者尚矣漢西都諸儒若申公伏生輩皆八九十至於百歲唐香山諸老宋洛中諸耆英亦皆八九十是雖齒德之髙同出一時而其人未必皆於一家也羅氏數百年來耆頥耋耄彬彬于于既萃見一時又同出一家而又屢見之不巳家庭之間慈孝愛敬藹如也於乎何羅氏夀考之蕃福澤之盛至於如此哉謂非得於天可乎大抵天下之事由人力者可勉強而致得於天者恆出乎自然非人力所能為也繼今以往羅氏子若孫登降揖讓于斯俯仰酬酢于斯為子而敬其父為弟而恭其兄念祖考敷遺之厚思國家㴠煦之深益勉於為善以詠歌太平而臻夫夀考之盛則斯亭之美將傳之無窮而斯文亦與有榮焉松柏軒詩序武昌陳氏其遷由江州世為望族有式銘處士者在元時蓄德弗耀以醫藥濟人其志淡然無利祿之求嘗構軒為燕休之所軒之前無他植惟種松柏蓋取斯以見志也處士去世已若干年而松柏獨無恙今其孫孟機以進士擢監察御史官居之日恆以處士之手植為念縉紳大夫與之遊者既為賦松柏之詩而復屬豫序焉夫物之在天地間殊萬彚而不齊故其質之貴賤美惡堅脆亦各因其材而見焉然東南之區求其材之重厚堅緻挺特凌厲髙出巖壑上干層霄歷霜雪而不變見用於宫室器用可以任重而致久逺者惟松柏為然然君子有取於斯者豈徒然而已哉觀其正直不阿則思所以立其志觀其堅忍不拔則思所以厲其節觀其材力之壯則思所以致其用若是者於君子進修之道未為無助也茍以是為凡卉之類無與於人事而漠然不以相干斯亦不足與議於道者矣孟機堅忍持重廉介弗阿所至風節凜然吏民安之誠無忝於其世無愧於松柏之植矣異時超躋顯融建功立事以任重致逺其不為廊廟之令器者乎姑以是冠於羣公之什且以期於孟機也是為序周氏族譜序豫觀故家大族其根本深固枝葉扶疏愈久而益蕃愈逺而益大者雖本乎祖宗積纍之勤敷遺之厚而所以維持防範之者則在乎子孫之賢篤親親明世系謹昭穆以合而一之此豫於吉水周氏之家譜所以為之敬羡而重有取焉周之先本吳將周瑜子都鄉侯胤始家廬陵之烏東胤之後有諱汾翁者為會稽刺史復自袁而還烏東汾翁之後六世有號沂濱者復由烏東徙今之泥田沂濱生整整生四子曰庭顯曰庭光曰庭實曰庭充自是子孫蕃盛遂析而為四其居水邉安福永新者則為苐一房居上凍者則為苐二房居樓下盧兜天柱岡者則為苐三房居下凍髙屋大安絅村者賦羅坊官洲長沙者則為苐四房夫以四族之衆其地非一處其居非一鄉其系非一世其傳非一人而其戚疏之等逺近之分系序之承傳支𣲖之分合可指而定焉曰某為髙祖某為曽祖某為祖為考某為苐幾世之𣲖某為苐幾房之親某為叔伯行某為兄弟行某為子姓行某為縣為郡為卿為大夫某為進士為文學為孝廉為耆儒為處士髙祖之墓在某曽祖之墓在某祖若父之墓在某其生以某年某月某日其死以某年某月某日秩秩乎其有序次也井井乎其有條理也藹藹乎其有忠厚之風也雍雍乎其有和睦之意也逺之而不絶也戚之而不疏也厚之而不薄也合之而不離也於乎若是者孰使之然哉亦曰維持防範之至有賢子孫以承其世德而巳耳舊譜作於宋南渡之後再修而再廢今大理少卿彥竒國子博士岐鳯懼其久逺失傳乃偕其族長宗武煥卿宗坦等重加敘次而考訂之而後斯譜始粲然大備無復遺憾矣於乎古無譜牒而嚴大宗小宗之法自宗法不行而後譜牒之學興今士大夫家於宗法雖未之講然俾後世得以考其世次明其本始而不至廢墜散渙者以有家譜耳大抵天下之物其基厚者其積髙其源深者其流長周氏積德深厚為其子孫族人者尚益致謹於斯念先世積纍之勤思祖考敷遺之厚而益思所以維持紹續之則雖百世之下猶一日也豫素知周氏者因大理博士公命為序故推本其家世源流之盛與其敦睦忠厚之意而致警於將來者以為之告送職方員外周君省墓南歸詩序士莫先於立志有志則天下無不可為之事然必本之以學問廣之以器識而後可以有為反是則雖有志而無所成焉於戲若豫友周君岐鳯其可謂有志之士也歟君為人磊落不羇學贍而才優自少負志自髙視流俗略不肯屈下年三十聲譽日起遂以所業伏氏書應聘為桐城縣學訓導繼又用薦主即墨簿太宗皇帝入正大統方枋用儒術特命入教國子居數年復選授親藩紀善以讜直聞未幾出為長洲縣學教諭秩滿升國子博士繼以憂去服闋值今天子即位詔中外求賢近臣首以君為薦特除南京職方員外郎人莫不稱宜方君為職方時國家肇隆封贈之典其子敘仕為翰林編修以久次當得敕命推恩其親於例君亦得棄職就封君間謂豫曰今以子貴獲逮於吾身固為榮矣但念父母之恩未酬且蒙朝廷簡擢未有涓埃之報方將勉竭駑鈍兾異時得援恩典以上及吾親則平生之願塞矣至是君以職方入考書最得受五品誥命追贈其父子賓甫職方員外郎偕奉直大夫母李氏贈宜人且得循例陳請將歸焚黃先壠將行其族子待詔時簡合能賦之士凡十有二人分題賦詩為餞以豫素知君且有舊特以首簡相屬惟周氏吉水故家自昔號稱宦族其人以經術材行著稱者後先相望君養晦山林奮然力學為文章振起於布衣之中自始仕至今揚歷中外者幾四十年其文名政譽與時而偕顯其居官蒞事至老而弗倦聲光洽于縉紳事功著于當時所以發其藴蓄者可謂至矣逮兹欽承褒典蒙恩以歸天章龍文賁及泉壤遭遇之隆千載一時是則君之素願至是而可以少塞矣雖然非君之有志負學問才器足以自見於當時者其能卓卓若是哉君歸故鄉吾知文江之上磻洲之間其山川草木將皆有喜氣而為之發榮振耀鄉之耆老以洎宗族父兄必將望而拜曰此吾聖天子寵命之來降也則相與具壺觴升堂以為君慶於乎斯慶也豈徒為周氏一門之榮固將以為鄉人之勸以貽子孫無窮之休若是則諸君子之所以播諸詠歌者又豈徒為一時之觀美而巳哉是為序周職方詩集序豫家居時獲與周君子霖遊子霖博學髙才蔚然有聲臨吉間已而識其從子岐鳯君其才學不異子霖至於操筆吐詞頃刻立就意氣豪宕不羈子霖與豫皆自以為不及也後數年子霖不幸棄世岐鳯領薦為教職一佐縣政兩遷國子纍轉而至今官揚歷中外三十餘年其文章之美聲望之隆士之得名若君者不多見也今年以職方秩滿來京出其近藁一集示豫曰昔與子遊年方及冠今皆鬚髮皤然衰且老矣子知我者幸為序之顧念少壯日窮蚤夜之力從事於編簡以為茍不克施功業于時必藉諸文字以垂萬一不朽託於後此豫三人者之素志也子霖不可作其遺稿所存無幾豫叨祿禁林竊幸以是為職業而碌碌歲年學思荒落間有鄙作一二多煨燼於回祿雖欲收拾志且餒矣觀君平日著述甚富晚年尤嗜學不倦所作益浩博宏放淵乎無際人鮮及之君子敘為翰林編修復多學而賢其能為君收拾而傳也可必矣所謂垂萬一不朽之託於後而償厥素志者獨於君見之斯又何可及哉君之先世以儒鳴家學相承有自故其樹立特異且有子克紹厥緒如此尚奚俟豫言為耶兹因君有命不可辭遂為之序并致感歎之私云鄒氏族譜序古者因生賜姓胙土命氏其來已久大抵有姓氏而後有𣲖系有𣲖系而後有譜牒有譜牒而後世代之久逺親屬之戚疏可得而推唐宋以來大家世族莫不致謹於此然非子孫之善繼善述者鮮有不致於湮沒而昧昧無聞也吾淦鄒氏其先居撫之艷坪宋世有仕為光祿大夫者至某始贅于新淦之閠陂生二子其季曰少四府君復徙邑之晉溪晉溪之前舊譜以兵燹散軼不傳府君之五世孫曰義叔者欲修輯之竟賫志以殁今其孫兵部郎中孟爵復慨然致力於斯欲以繼夫義叔甫之志可謂能重其所出而知所本者矣譜成來請言為序夫譜貴得實不援逺不遺近若孟爵之譜斷自少四府君而下為之序次昭穆於生年卒葬皆備書而無所遺者蓋本其所可知者而言也視世之損益附會以誣人欺已者不可同年而語矣鄒氏之後人尚敦德務善以嗣於無窮哉因是為譜序且以致其勸勉之意云贈憲使孫可大還鄉序宣德三年秋七月豫奉命往慶府道過長安獲識按察使孫君可大因與欵接其言恂恂而不妄其舉動秩秩而有禮其容侃侃而甚舒蓋知其篤實君子也明年冬君以舊使還職遂被召入覲京師吏部循故事將改擢之君懇以疾辭願歸休于其鄉吏部以聞詔許之俾歸養疾兾其再起而復用焉將行會昌伯孫公以與君有鄉里交遊之好乃來請豫文送之君世家鄒平洪武癸酉以鄉舉登南宫弗偶入太學選為監察御史改大理評事久之復為御史永樂甲申升山西按察憲副歲庚子升四川按察使丁內艱服闋宣德之丁未仍前職改陜西君為人雍容詳雅才識敏贍仕為風憲幾四十年皆以清謹著聲所至不為赫赫而人皆愛仰之斯無愧於平生矣然君今日之歸豫尚有告焉方今聖天子宵旴孳孳圖任舊人君以歷練老成且筋力未衰政宜陳布嘉猷贊宣洽化以上副當寧求賢思治之意顧乃以疾辭欲為終老之計若是果厭於時論哉君歸而圖之尚體聖天子禮遇之厚慎起居勤藥食以適於和平康裕之美俟異時再起效力報稱吾意君之功名事業有未可量也姑以是諗於君且書以為贈行序况氏文獻序昔孔子能言夏殷之禮而以杞宋為文獻不足然則文獻足徴自古所尚况後世乎西江之靖安况氏號稱名族數百年來衣冠不絶今其裔曰鍾字伯律繇禮部儀制主事進秩郎中才能茂著煜然縉紳之間嘗以所給誥命先後若干通洎當代名公巨儒所為其家銘志記序及播於詩歌者又若干篇彚為三卷而總名曰况氏文獻兹用薦擢知蘇州乃持以謁豫請一言以辨其端惟大家世族其乃祖乃父仕宦隱顯之迹或載之傳記或著之史册雖歷歷可指然非有賢者以為之嗣善繼而善述之則亦安能使之久而弗替逺而有傳哉伯律讀書明理道以其能顯仕于時凡所謂聲利人所共好者皆淡然弗以芥於意獨惓惓以其所被國家褒榮之命與夫先世之德善見之翰墨者寶而愛之且欲貽之後人以傳永久非所謂况氏之賢後乎是可嘉尚也巳詩曰無念爾祖聿修厥德又曰子子孫孫勿替引之是編有焉遂書以為况氏文獻序贈劉彌朂赴保德訓導詩序鄉貢進士安成劉彌朂得山西之保德州學訓導將行其友翰林周敘相率能賦者詩以餞之來徴言為序余辭不獲則告之曰古先哲王之欲造就人才也未始不資於學校然學校之教無他其性則仁義禮智也其倫則君臣父子夫婦兄弟朋友也其書則易書詩禮樂春秋也其道則堯舜禹湯文武周公孔子之相傳者也其學則顔曽思孟周程朱張之授受以相講明者也千載而下為師者則資此以為教為弟子則資此以為學固未有舍此而可以為教為學者也彌朂以純謹聰察之資出身庠序其于學焉教之之術講之有素矣今之往也不過明其道以示之正其誼以率之勿局於章句文辭之習勿雜於私智人為之鑿導其所能至而勵其所不及使賢而智者據而有所立愚不肖者化而有所成庶幾於巳而不負其所學於人而不負其所教且於學校斯文亦重有光耀矣彌朂尚勉之哉贈周公明赴長洲教諭序黃岡縣學教諭周先生公明以九載秩滿上吏部吏部考其績在優等循例將升教授於郡學先生以老且病乞仍舊任於是改教於蘇之長洲鄉之士夫相與賦詩為别而徴豫序其首簡夫學官之秩甚卑而其任甚重也今天下郡邑莫不有學學莫不有師然求其道之能立而稱於其職者鮮矣韓昌黎有曰師者所以傳道授業解惑也然必身能行道然後可以傳諸人巳充於學然後可以授於徒今之任學校而能稱其職者幾何人哉此師道之所以鮮能立也於乎師道之不立而求學校興人才盛其可得乎先生以家學之懿於詩書百氏無所不通而老成端厚言動恂恂皆可師法蓋所謂道之行於身而學之充乎內者也故其職教四方所至士陶其化為時聞人者先後相望矧蘇為名郡昔胡瑗嘗教授於此至於今其人士猶仰其流風餘韻於數百載之下而先生之弟學正公又嘗施教於是邑能卓然以師道自任吾知先生之往也譬若駕輕就熟無所用其力而於興賢育才之效可坐而致矣則其師道之傳教化之盛將與胡瑗並稱於悠久豈徒推重於一時而已哉楊讓允謙字序文淵閣大學士兼翰林學士建安楊公之仲子讓冠而字之曰允謙國子祭酒胡公既為之説而祝之以詞以豫同寅辱交之久復請豫一言示教戒之意豫不敢以辭也則為之告曰君子之自修莫大乎謙讓讓與謙古今天下之美德也惟讓則所處愈下而須臾不敢以自驕惟謙則自視者益卑而毫髮不敢以自足謹之於孝弟忠信而遜志以自將慎之於動靜威儀而虛心以自居是故下氣怡聲和色婉容而弗慢弗悖者非謙讓之著於事親之間者乎友愛輯睦和順孚洽而不爭不凌者非謙讓之著於兄弟之間者乎相尊以德相長以年而不矜不伐者非謙讓之著於交友之間者乎讓英年美質既冠而字則將有成人之責必也遜志時敏退然而若有所不及虛已自下欿然而若有所不足無驕而陵也無滿而肆也無傲而誕也無先人以衒能無矜巳以恃長躬履實踐以求造夫謙讓之實將見業日以充德日以廣人之仰慕而尊崇之者日益以衆矣夫如是則於命名制字之意可以無愧而所以底夫髙明廣大之域者又可涯涘哉易曰謙尊而光卑而不可踰書曰滿招損謙受益請以是為讓勸讓其朂之哉贈瘍醫孫思敬序友人石公熙永為余言瘍醫孫思敬之賢且曰思敬吳之姑蘇人少警敏通儒書兼攻於醫嘗遇異人授以祕方屢試之而驗因以醫鳴于鄉既而𨽻名太醫居京師有年矣京師之人有疾輒叩之思敬投之劑一無所計以是人德之不忘今年夏四月公疽發於背而榮衛復失所守凡有茹輒吐之不三四日膚瘠而臘形憊而羸衆醫以公耋老且艱疾環視之莫敢措手最後思敬過視之即許以不死於是砭以防其潰藥以通其氣未浹辰而瘳既月乃復公貧無以報思敬方慮其報之來也輒不有其功公私竊歎曰惠及更生施莫厚焉厚施而不報斯亦無可報者矣報之以言其亦貧者之心乎然言而無所重輕雖墨南山之竹惡乎用惟先生德重當世道淑于人人倘不靳而賜之言則豈惟㒒重拜更生之功而思敬之名亦將重於華衮之褒景鐘之勒矣是敢固以請於乎名不可以幸得善不可以幸致茍實有其名有其善豈不可與之乎且夫利物濟人醫者之恆心也然孰有施之而不望報者乎報之不責者或有之矣孰有絶所報而不有其功者乎思敬之心若是固不可以不與也豫聞之昔秦越人遇長桑君飲以上池之水而其術遂神觀其或施之帶下或用之小兒無不驗者然當時知報之者幾何人哉太史氏之傳至今有耿光良以其心之仁也今思敬授受之祕如越人用智工巧如越人是亦秦越人而巳矣史氏之書其終得泯於思敬者乎思敬勉之不朽之名當自公始矣於是縉紳大夫士咸詩以貺之而豫為之序姑山白雲圖詩序姑山白雲圖者旴江章玉孟修氏思其母夫人而作也孟修世家邑之姑山下其先代以儒業顯揚者往往而有孟修始以武功授懷逺將軍秩同知蘭州衛事及今扈蹕留京師蓋二十餘年矣居常念其父之早世不逮祿養夫人雖逮養而逺在萬里又不得朝夕侍於是繪圖以寓其思時之縉紳大夫士既多為之詠歌矣間復徴豫文以辨其首嗚呼孰不有親而事親者或有所不逮焉孰不為子而思親者或有所不遂焉觀之孟修蓋可見矣吾想其晨興而朝也九門未啓環珮在躬當此之時引睇而望白雲縹眇姑山微茫孟修喟然而歎曰吾親之舍寧不在兹乎及旰而退也簡牘既著公庭向幽當此之時披圖而觀姑山倚壁白雲在顛孟修又喟然而歎曰吾親之舍寧不在兹乎是則孟修之於其親進亦思退亦思耳庸有極哉余聞之昔者狄梁公之登大行也見白雲之孤飛盻親舍而延佇方是時公勤吏事雖欲往省有不可得一念之私豈不以為徒付之歎息而已哉厥後遭時搶攘乃心唐室回薄祚於妖周復明辟於逆武孤忠徑節皭然與日月爭光者孰謂非向者一念之私之所形哉今孟修志如梁公孝敬忠信如梁公而又當太平無事之日其祿秩之豐紫誥之榮輝映光彩日著於慈闈之內其視公之艱難百出顯其親於既歿之後者為何如哉是知斯圖之作固將與梁公忠節之書同一光耀矣孟修尚勉之傳曰求忠臣于孝子之門余固深有望於孟修也眉夀堂詩序雲川衛指揮使畢文構堂以奉其父而名之曰眉夀士大夫皆為之詠歌焉蓋其父嘗以驍勇從太祖髙皇帝平定四方自小校積功至明威將軍雲川衛指揮之職其後以老蒙恩俾文代之文有勇略好讀書喜從縉紳大夫遊間以事至京介其友鄭道恭請文以為序豫觀洪範五福之疇夀為之首而詩人之頌亦往往以夀為稱蓋夀者人之所同欲而况孝子之於其親者乎然此實係於天有不可以力致幸而得之則其欣慶當何如也今文以武辨承家嚴之餘烈荷朝廷之寵光得以享其榮名盛福於當時而其父亦龎眉鶴髮康寧夀考以克受其子之祿養於太平若是者實出於天非人力可得而致者則其心抑惡得而不喜且幸哉想其佳時吉日老親在堂文率其子婦稱觴為夀芝蘭玉樹交映後先婉容愈色怡然而相接愛日之誠油然而無已藹然至和之氣薰㴠於庭户之間充溢於堂奧之內此其樂宜何如哉然則文之親所以得其夀者又豈非至和之所致乎傳曰靜者夀又豈非其謝官家居安恬怡適之所致乎孔子曰父母其順矣乎豫於斯堂見之矣雖然文之所以致孝於其親者固為可尚矣而尤當竭誠盡力以圖報答於君上庶幾無愧於為人子為人臣之道而於忠孝之義得以兩全顧不偉哉文尚勉之是為序大醫院判韓公達挽詩序挽歌之始蓋自漢初田橫之門人以橫死不敢發哀乃為薤露蒿里之歌以悲之而其後李延年遂分為二曲薤露送王公貴人蒿里以送庶人之葬然大槩為弔死侑葬而設也魏晉隋唐以來士大夫有悼其故舊親友之逝遂作為詩歌以哀挽之於是挽詩往往有傳于世逮宋暨元以至于今日逺日盛者蓋有由然矣大醫院判韓君公達故魏國忠獻王之裔其先次饒陽轉徙姑蘇因占籍焉公之尊人復陽先生剛直亷介侃侃之節可以懾強暴而服僣偽逮今名聞于縉紳間其後公之兄公茂以精於醫學受知今上皇帝為大醫院使溫純忠謹有聲于時及其殁也公復入大醫院擢任院判夙夜勞勤稱於其職居數載公偶嬰疾竟弗起以永樂丁酉冬十月卒于北京之官舍皇上深用閔悼特為文賜祭超逾常品朝之士大夫聞公之卒者莫不為之悲傷且相率作為詩歌以挽之公之子某以所得挽詩若干篇來徴序於豫嗟夫詩本性情止乎禮義故凡悲哀愁怨歡娛離合必於詩焉發之蓋人之情有不能自已者如此惟公以詩書之胄克承家學遭值明時為聖天子所知遇一旦殁于官特蒙恤典之加而又能致人哀感作為詩歌追挽之此可見公之平生心術至誠忠厚所以得於天者甚厚而見慕於君子者果何其至哉子忝職侍從與公兄弟交遊幾十五年不謂公之兄溘先朝露而公亦九原不可復作矣感今思昔為之慨然遂略述其槩以冠篇端且以攄豫之哀云送新復古之官臨江序大雄氏之教以空為質以無為理得其理成其質乃可以敷宣法教揚闡宗風啓導羣倫以翊贊夫化民成俗之務然自其教不明欲縱慆誕之術兢起而世之守其師説者又斤斤焉不能相與究明開導之於是空無之學日就榛塞不有以崇奬而作興其教不至於凋喪淪敝者鮮矣昔我太祖髙皇帝削平禍亂混一區宇制禮作樂誕宣人文稽古建官庶職咸備而尤注意於釋氏之教且復設官以釐之上率下承蓋將明其道化其愚啓其暗通其窒礙而納之於至善之域焉永樂庚子冬臨江之都綱缺有以復古為薦者遂得兼住持天寧講寺將行中允吳公仲平相率搢紳大夫詩以貺之而屬豫以序夫都綱之任所以長率釋流以宏其教宗而講師之業又所以宣明大覺以會其指歸兼是二職者亦可謂難矣復古廬陵人自少善根宿植神清秀朗勤勤焉嗜浮圖以為髙遂託迹方外既若干年即首京剎之座粗衣菲食謹持律戎窮討祕義晝夜不息造般若之奧恱二觀之旨體用不遺內外相資絶欲縱之愆無慆誕之失今而領都綱之任專講師之席將俾人崇其教滌穢除纍通暗去礙以同造夫大覺至善之域上以隂翊皇度下以揚闡宗風庶幾不負朝家崇奬之意而於佛氏之道亦重有光矣復古尚勉之送陳憲章復任序吾邑陳憲章氏朴茂淳謹有幹局永樂丁亥以賢能徴至京揚歷于秋官凡九年始得授廣州之清逺河泊所今年考滿來京師既將還其任别余官舍且求豫文夫士之仕於時也不問其職之崇卑惟其稱焉耳欲求其稱焉者亦在乎盡吾之心勤於其職以理乎其事安於其所當為而無慕乎其他則可也然今日之仕者不計巳之短長茍授之職一不如其意輒悒悒然悵怏而不樂於是怠惰縱弛放溢而不知止以為卑資下僚雖矜名節勤職事祗以自苦不足起聲譽以致顯宦乃或荒于沈酗黷于貨賄而曠然不以經慮故有不旋踵而至於喪敗黜辱者職此之由也若吾憲章則不然憲章初領是職欣然無不足之色其在官也不怠於已不慢於事知盡其職之所當為而不知所以致聲譽以釣榮利故歷三年之久而舉無過天官考之以為稱時人頌之以為賢則憲章豈不過人逺哉雖然昔人謂官之怠者由於宦成憲章之歸也由是而行之始終而不怠焉則其聲譽益起而至於顯宦也不難矣憲章其勉之哉雲松軒詩序豫始至北京喜得一友曰余成德氏文雅溫厚磊落不羣無纎毫勢利之習誠耿介拔俗士也成德居城東構小軒為遊息之所扁曰雲松朝之大夫士工詩者咸歌詠之復徴豫為序以記之豫造其軒蕭散靜深無車馬之喧軒之內置琴書圖史客至輒取酒共酌雅歌投壺以樂其樂環顧左右未嘗有所謂雲松也豫遂詰之曰子之居非巖壑山林於雲松無預而乃託名於是不幾於自誣者乎成德曰豫昔在西蜀環廬而植者無非松也觸目而見者無非雲也心誠慕此而未嘗一日忘之今以自名軒蓋以識豫所思而不忘其舊也子幸一言而終惠之豫謂世之人莫不慕榮艷而逺清潔也莫不喜穠麗而謝幽獨也孰肯苦志勵操而能為人之所不為者乎觀成德所好尚如此則其志之所趨向者可知矣雖然雲與松不可以常物觀也養之於至靜故可以凌宇宙而軼氛埃培之於積久故可以出霄漢而傲冰雪成德老成練達當奉天靖難之日戮力王事以武功授昭信校尉自兹積勤致勞以取重爵厚祿如雲之變化不測如松之堅厲節操其進固未可量也詩曰髙山仰止景行行止豫於成德尚深有望焉是為序送曽栩還南京序元之盛時廬陵曽小軒先生仕為翰林學士兼領天官考功其弟亦軒先生仕為應奉翰林文字兼國史院編修官聨芳接武並列清要雙璧之輝炫耀當時距今幾八十年豫乃與亦軒先生曽孫棨同官于朝因得詢舊家文獻之盛永樂七年春二月偕扈從留寓北京北京有元之故都而今天子之潛邸也休沐之暇復得與棨縱觀乎闤闠之內至城之南隅則曰此舊有驂龍門吾曽祖亦軒先生進鹵簿圖時拜住丞相於此引見元主成宗者也至城之外西有長春宫遺址則曰吾曽伯祖小軒先生之所遊憩賦詩而虞文靖公為之序者也至文明門則曰此舊有明時坊吾亦軒先生之所舍也今家藏曰明時類稿蓋以此名云至太學則曰吾伯祖副使公先祖集賢公嘗為內舍生於此藏修者也遇都人故老亦往往能道兩先生之遺迹可謂盛哉明年夏四月小軒先生曽孫栩自南京來省其兄於翰苑又得與其兄周旋以追尋乃祖之遺慨然懷思其流風遺韻將有以紹續焉固有非尋常騷人墨客之流遨遊江湖以騁其登髙弔古之懷而已也栩尚朂之栩將歸大夫士咸賦詩以道其行而屬豫為序豫故書其先世之盛以贈之若其兄弟會合之歡離别之情賦者能盡之矣遂略之贈鄭叔恭致仕還鄉序聖天子臨御以來任人圖治宵旰孜孜一視同仁措生民於夀安之域而於禮賢尚齒之意尤拳拳焉是故中外之臣無間戚疏逺近凡齒及七十者皆得引年致政歸榮桑梓以夀考終恩德之隆從古罕儷乃永樂甲午冬十月朔監察御史鄭公叔恭以年滿上于朝乞賜休致天子特命優禮遣歸老于其家於是所與交遊者設祖帳都門之外且皆賦詩以餞之國子司業金華貝公俾豫言為序豫惟鄭氏之在浦江以義門著稱幾二十世孝友敦睦之風聞天下我太祖髙皇帝褒奬行義於鄭氏尤加禮異凡子弟之才者悉拔而用之時則有若沂為禮部尚書濟為春坊左庶子衣冠之美炳耀于時今天子即位一新庶政叔恭拜監察御史賜沂致政還鄉所以優待鄭氏者尤厚叔恭能文詞周慎沖密謹言而篤於行有恬淡之志無綺紈之習其居官蒞事廉正而不厲明恕而不察恂恂退讓有古君子之風誠無忝於其職矣今兹謝事而歸也蒙被恩眷親拜宸翰寵褒之榮行李光華宴錫有加一時縉紳莫不榮之是雖叔恭之忠誠純篤有以獲上之眷遇而亦豈非其纍世積德深厚之所致乎於戲世之君子懷抱才藝效用于時兾他日宦成幸得歸老于家以為終身之榮遇而往往有不可必得視吾叔恭之列位于朝道行志達而又能進退以禮不辱其身以光其祖考榮其鄉里若是者其可多得哉雖然叔恭至于家見其宗族昆弟行于鄉見其親戚故人相與展敘平生酣嬉宴樂周旋於尊爼之間將必具道夫聖天子禮賢優老之意與夫朝廷制作禮文之盛居間無事則詠歌太平教其子孫族人益勉於為善以上報國家㴠煦生成之德庶幾無負於聖天子褒寵之厚而亦無負於友朋之所期望矣於其行遂書此為贈贈教諭劉九成序永樂癸巳春豫扈從至北京適族弟鳯儀先一年由監察御史謫居平谷縣平谷距京師可二百里鳯儀間三兩月必一見見則留信宿乃去每問平谷所與遊者亟以教諭劉九成為言且曰九成商河人昔者南宫會試豫與九成俱不偶其時同受命為教官豫往靈璧而九成至平谷及豫為御史罷去得為民於此以與九成遇羇愁困踣之中無以慰子者獨九成篤念斯文相顧如平生已而復延致學宫俾諸生執業講明問難藉此歲得粟若干石由是可以代執耕之勞給公上之用使豫無恣嗟愁歎不足之色者實九成之惠也巳而又曰九成為人端重謹願不妄交不茍取教諸生有法無茍且厭倦之意平谷自昔艱於貢舉自九成之來也賓興歲貢皆不乏人而學校之政視昔有加焉豫竊識鳯儀之言以為若九成誠不多見也去年秋九月車駕巡幸郊甸歷懷柔密雲平谷適九成朝謁行在懇索豫會一見之頃即欣然相要明日豫徑造學宫九成為置酒明倫堂上欵留半日目其貌溫粹莊慤耳其言純謹敦實觀其周旋進退謙恭而益下察其外以徵其內誠非矯揉而然者豫然後知鳯儀向之所以譽九成者可信不誣也今年春九成以秩滿當書考天官其僚友暨諸生不忍於别託鳯儀走京師求豫文為贈且徴能詩者而歌詠焉豫謂士之修於巳者為不易故施於人者為甚難况學校風化之源所係尤重非得人以典其職則於興賢育才之效未必有所成而於學校之政未必有所禆也我聖天子即位以來拳拳以興學為務故於天下府州縣學官之選不取之他途每於設科之歲取登乙榜者以充其職蓋以其於經學義明理正足為士子矜式而所以造就作育之者其效又易成也奈何任師儒之責者往往坐擁虛名疲懦猥瑣既無奮興之志因循茍且遂成積習之弊是致師道不立士類弗興廉耻為之不修風教為之不振若是者大負朝廷作育期待之意此豫之所以永慨而深歎得人之難也九成列於教官明經同於人受祿同於人歷歲久近同於人獨所遇之地與所教之人不與人同非其地之不美所以居學校者無法非其士之不良所以為教養者無素九成乃能作而新之振起斯文於積敝之餘使為士者知所以學而學焉者有所成其於朝廷學校誠無所負而於是行也有光矣豫以鳯儀之請故歷敘九成交友接物之盡其道與夫修巳及人之盡其職者而書以為贈行序贈王所存還會昌序吉水泝流而上可四十里曰古溪王氏世居之其先業儒由宋元以來通經學古之士恆甲於其鄉有曰所存王先生者今大學士胡公之外兄也嘗為豫道所存之賢豫因得識其人而友焉所存少穎敏刻意於學通毛氏詩為文章有矜式既壯志落落不偶永樂初贑之會昌儒學闕師範或以所存為薦者遂聘致之上于吏部至則命就試翰林中在優等乃受職還會昌會昌為贑屬邑據章水之上遊僻陋而荒落煙嵐瘴癘之氣蟠結鬱積逺方之人或卒然觸冒之則往往疾困纒綿至不起者有之所存之來也乃能安其風土優遊恬嬉於琴書爼豆之間志適氣舒肆然有以成其樂晝夜講誦力去積習之陋所以琢磨淬礪以求其底於成者蓋無所不用其心焉而比年以來諸生挾所業以試者輒不利有司所存亦惟咎其教之未至業之未修初不以是咎於人而怠廢其職也永樂乙未秋所存以九年秩滿來京師吏部較其績效弗成將舉例降以罰所存聞之曰尸位縻祿罰我誠當也未幾為請於朝乃命復還會昌期三年弗成而後罰之所存受命不勝感激詰旦即束裝就道翰林檢討錢君習禮中書舍人許君鳴鶴咸相率賦詩為餞且以首簡授豫豫謂士之修於巳者為不易故其施於人者為甚難况學校以得賢為本非漸漬培養積之於悠久則不足以收其效會昌居深山長林為瘴癘之鄉凡典教于兹往往悲傷憔悴恆抱無聊之感故其所以為教者不過記誦於詞章之末所以為課試者不過蹈習夫陳言之陋玩愒歲時茍且率略惟以免罰為僥幸之圖教化之不興師道之不立士類之無成其所由來者尚矣所存至是奮然特立思有以作而新之故其教之所施恆先本而後末由內以達外浹洽涵濡待之於悠久未嘗茍且率略以急近效為心而求幸免於責罰以此較彼其難易得失較然若黑白之分不然會昌諸生豈果不知所以為學而所存之施教何其成之難如此也或曰所存不幸而遇會昌使其處善地則有不勞力而可以坐致其成者殊不知君子之於出處進退隨所遇而安其於得失利鈍則有弗足計者有若吾所存之持身守志確乎其不移曽於是戚戚而有以動其心哉世之觀所存者幸無以是而少之吳氏族譜序族不可以無譜譜者所以敦本始明世系别等衰而篤恩義也夫人之生其初一人之身至於二世三世其居尚同一家飲食起居冠婚喪祭相聚於一堂之上揖拜跪起長幼之禮秩然而不紊譜不作可也傳之既久至於後世一人之身散而為數十百人仕宦轉徙之靡常居止地望之有異茍無譜以合之則苗裔無所據疏戚無所辨至於相視為途人比比而是此譜之不可以不作也廬陵之永和吳氏世為望族其先家永新之燕市復徙泰和之白沙其居永和者則始於某世祖某宋興以來衣冠蟬聨以經術而顯者項背相望至於今益蕃衍盛大有若尚禮尚忠之篤厚著稱於鄉以及其子克良克岐之敦尚禮讓不忝其世而尤切切焉於敬宗睦族之道間自南來以所修家譜一編相示有宋右丞相信國文公序引在觀之既則再拜請一言以識右簡嗚呼自宗法不行而譜牒興士大夫家猶得賴之以究夫木本水源之義近世故家大族於宗法固不知講而於先世之譜牒一視為長物謾不加省其間子孫之賢能尋襲先緒致謹於此以不失夫前人之舊者十不二三焉視吾克良兄弟之拳拳愛重於斯以不忘其先者可同日而語哉繼此以往使吳氏子若孫登名於是譜者皆能以是為念篤世系之親明孝弟之道尊卑之有其序昭穆之有其等疏戚之有其别揖讓會合之有其節冠婚喪祭之有其常則所以訓於後世傳於將來者其曷有窮哉傳曰本之茂者末必蕃膏之沃者其光煜觀於吳氏尚亦有徴哉靜樂軒詩序永嘉有一士曰謝庭循嘗以靜樂名其軒士大夫與之遊者皆為賦靜樂之詩長篇短章萃為一卷介豫友彭君子斐來求言為序豫非靜者也果能知靜之説乎然豫有以試之矣豫來北京嘗結一室堊其中以為遊息之所而名之曰氷雪每晚歸自玉堂則命童子拂几席秩圖史焚香煮茗正襟危坐憂慮不作於內人事不交於前閴閴寥寥四顧寂然怡神於恬淡之境遊心於髙明之表妙契天地之始默識造化之原而吾方且于于焉申申焉悠然自適無纎毫之纍若是者殆於靜而有得乎庭循以靜名軒非深得其理而會其要者其能真知其樂至於久而無變乎雖然人之一身固不能以常靜而無動也而所謂靜者豈枵然若稿木塊然若泥塑而無所為哉蓋靜者動之體動者靜之根靜未嘗無動而動未嘗無靜也惟吾方寸之中湛然虛明日用酬酢流行於天理而不為萬物所搖奪則靜亦樂也動亦樂也反是則雖閉門扄户處於至靜之中而吾心之紛紜已交馳於彼欲得其樂者蓋鮮矣庭循悟靜之理得靜之趣反於中者廓然而有餘故雖處夫都邑喧雜之區冠帶聲利之途而其心常淡然不為之動宜其所樂之異而為士君子所稱道者如此抑豫嘗聞濂溪周子之言曰太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根又曰動而無靜靜而無動物也動而無動靜而無靜神也動而無動靜而無靜非不動不靜也庭循居軒中靜坐㴠泳斯言以會夫太極之指歸將見所得者益深所造者益髙而所樂者益至矣庭循尚勉乎哉蕭氏行樂圖詩序吾新淦自宋元以來多大家碩族而白馬蕭氏其一也蕭之先世以長厚著稱於其鄉至文輝尤敦慤質儉為里閈所推重其居占溪山之勝竹樹團圝泉石灑落雲霞蒼翠綺綰繡錯旦暮卷舒於几席之下者殆不可名狀佳時暇日文輝葛巾野服逍遙徜徉或登髙而望或臨溪而漁或席樹而坐或引泉而潄或彈琴酌酒臨風對月以自適其趣因命繪事者寫其像為行樂之圖士君子亦既為之詠歌矣謂不可無敘述乃懇懇焉丐豫言以冠諸篇端豫謂自昔聖明之世天下奠安時和歲豐庶物阜多人得所養熙熙焉皥皥焉同臻於康寧仁夀之域若唐虞成周之際蓋可見矣我聖天子厲精圖治宵旰孳孳惟以安養斯民為心深仁厚澤覃被無外而自蒞阼以來雨暘時敘年榖豐殖至和之氣融朗暢達粲而為景星慶雲凝而為甘露溢而為醴泉育而為嘉禾芝草騶虞麒麟之屬蓋郁郁乎其盛也是以薄海內外咸適厥居無憂思困苦之虞無札瘥夭閼之患而其民往往至於蒼顔皓首康寧夀考長子老孫以同享盛大和平之福者蓋由聖天子之撫摩煦育德洽仁溥有以被及於彼莫之致而自至者也文輝幸遭夫聖朝熙洽之日筋力康強齒髮未衰憂患不慮其心勞役不撓其志優遊歲時偃仰山林鼓舞詠歌於聖化之中所以臻于夀考以樂其樂者蓋未艾也然則兹圖之作豈特為家庭之慶鄉里之美觀固有以見天下之人具享夫太平之樂而聖朝德澤之深與唐虞成周之化同一其盛矣是為序贈王太守赴肇慶序永樂丙申夏六月前瓊州太守王公伯貞以服闋待選行在維時廣東之肇慶疏缺長吏遂以公往蒞焉於是文淵閣大學士兼左春坊大學士胡公光大國子祭酒兼翰林侍講胡公若思翰林待讀兼右春坊右贊善梁公用之咸相率賦詩為餞而以首簡授豫豫於公斯文也於其情之有不能巳而言以文之者固君子之志也公操行純謹志節矯抗讀書明聖賢之學而於子史百家天文地理醫藥卜筮之説莫不有以博通其要故其於問學縝密而不疏於才識強察而不迂於事理疏通而不滯一旦出而仕也孳孳汲汲強勉力行於是而任風紀職部屬持法盡公廉而不矜謹而不肆卓卓乎有古君子之風及其引而退也將老於江湖之上而復以薦者起為瓊州瓊古南越地自昔號稱難治公始至其郡守以清靜寧一不為峻迫以利取近效審察夫人情俗尚之所宜撫循漸摩休養生息教之導之以入於其化由是政協人和郡大治以寧公乃得以其暇日與賓客故人彈琴賦詩登髙逺覽自放於山顛水涯之間以樂其樂推其治與其所以為教雖古二千石稱良吏者不是過矣公在瓊十餘年始以憂去自其去至今其人無小大貴賤咸追思愛慕之而不忘茍非公之篤厚廉平務實惠以及於人者其能若是哉今肇慶比於瓊里道又近矣其人情俗尚為治之難易無大相逺者然以昔之所施於瓊者而施於肇慶之人則其治之之易致效之速有不待餘力而舉者矣雖然世之負才能取爵祿者其途亦多矣然或際遇於盛年而不能快意於晚節惟公以才學早遇聖明超躋顯秩揚歷中外至於晚年受任牧伯之寄益克張大以展其所施而又賁及其子以明經擢髙第列官詞林為聖天子侍從之臣顯榮光大方自兹始於以見公之髙年碩德所以享其爵祿顯于功名以傳諸其後者正未有艾也豫言蕪陋不足為公榮特述公始終遭逢之隆與其積諸躬著於官而及於人者以為贈贈御史蕭孟常巡按廣東詩序聖天子蒞阼之初慮天下之大四海之廣於民情吏治之得失休戚有不能周知則自京畿達於藩閫以及邉徼數萬里之逺皆命御史持節以按臨之期三年則使人更代著為令今年秋八月都察院奏廣東當代於是監察御史蕭孟常實受命以行同列洎鄉里之士皆作詩為餞而俾豫敘其首簡豫惟御史之名見於周官其職掌贊書受法令戰國為記事之職至秦漢始有監御史以任糾察晉復置檢校御史隨改檢校為監察御史唐復置監察御史裏行宋沿唐制設御史臺其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉我朝酌古制以臺為都察院院置各道以監察御史以分任其事入則糾正百寮震肅朝綱出則亷察姦慝觀采民風其任非他職可比然非亷公諒直之士不足以居之孟常始以明經登永樂辛邜進士第擢授今職其為人小心周慎亷介弗阿不察察以為明不悻悻以干譽數年以來僚寀稱之曰能可謂稱於其職矣今之往也居言之位得言之地又思曰教化之未興吾何以勸之獄訟之未理吾何以平之姦蠧之未去吾何以鋤之吏治之未舉吾何以振之某利當興者有幾某害當去者有幾某之賢可薦某之才可進者有幾如是則可以舉於其職而無忝於聖天子之所責任矣茍為庸庸碌碌因循茍且視民之休戚而有所不察視吏之得失而有所不舉長貪殘之風襲蒙蔽之弊此豈任風憲之道為聖天子奉宣德化之意乎豫於孟常朋友也責善者朋友之職故於其行不以頌而以規云春雨堂詩序聖天子蒞阼之初大封功臣凡殁於王事有異勞者皆得褒贈且推恩及其子孫俾皆貴顯而享其爵祿焉其時咸寧成山侯王公彥亨之先公以淝河之歿追封奉天靖難推誠宣力武臣特進榮祿大夫柱國金鄉侯諡忠莊命侯襲封武義伯後數年以山陵故進封今爵侯為人孝友敦厚好讀書禮接賢士竭忠事上夙夜弗懈出入朝著小心寅畏無毫髮驕蹇嘗念其先公早歿不待於養歷歲滋久與人言恆涕下沾襟悲憤愴惻汲汲焉若有求而弗得者因扁其堂曰春雨以寓罔極之思縉紳大夫士與侯遊者咸為之作詩而以首簡相屬竊惟四時之序春為之首時雨之降惟春為宜故凡動植之品枯瘁凋落潛藏退蟄於其際者必遇之而後敷榮暢達有以遂其性是則春雨者固人與物之所共喜而樂之者也侯思其親於既歿則其中慘焉而痛怛焉而傷政所謂荼毒之苦者而乃取是以名其堂何哉雖然豫有以知其然矣禮曰春雨露既濡君子履之必有怵惕之心蓋言孝子因時序之易追念其親之既逝故於春祭之日兾其魂氣之來而如將見之且不忍致死於其親欲其常存而不忘常見而不失庶幾可以少紓其思而慰釋其懷也然則侯之取是以名堂者其意深矣抑豫聞孝子之於其親也思為大而報為難惟其不可報故其思無窮若風木之觸乎耳焄蒿之接乎目羮墻之如在手澤之若存感雨露而怵惕履霜露而悽愴一跬步舉目之間無時無處而不致其思此古之人所以有終身之慕者政以此耳然則侯之惓惓不忘其親者豈惟春雨之時為然哉特託此以致思於無窮耳觀於此者尚察侯之心而無以辭害意可也是為序送聶士安重遊金臺序士之隱於山林者其寧靜淡泊可以觀物察理晦迹求志以積諸躬以充其藴蓄而必得通都勝地為之觀遊名山大川備其登覽以宏其器識以招其見聞庶幾其所負者不卑以隘也不然井蛙管豹庸庸瑣瑣烏足以為士哉此司馬子長之所以逺遊也淦甫溪聶氏為邑著姓士安少負竒氣長而好遊嘗拿舟下彭蠡道金陵歷山東以至燕兾徘徊登覽浩然以歸久之以為未足也復辭家而來今年聖天子舉巡狩之典駐蹕北京余備員扈從與士安相會者纍月歲寒士安告歸請豫一言昔蘇欒城出西蜀以為於山見泰華於水見黃河於人見歐陽公其喜幸為何如也今士安之行幾萬餘里以至於斯仰居庸西山之髙俯桑乾易水之深登黃金之臺弔涿鹿之野其厭飫於山水之竒勝古人之塵迹不特黃河泰華而已也况今天子倣成周營洛之意肇建一都北京都會之區而車駕臨幸四方萬國輪楫輻湊人士雲集士安遊其間豈無所得哉今歸故鄉里閈交遊更相勞問扣子之所藴必有歎異之者矣是為序送羅貞吉還江寧序聖天子既登寶位百職咸舉庶事用康民物豐阜翕然以和乃永樂七年春倣古巡狩舉省方之典駐驆北京凡四方藩臬暨郡縣有司皆奔走效職冬十有二月江寧簿羅貞吉亦以公務來胥會京邸與豫握手者纍日事畢侍講曽君子啓合諸同列賦詩為别屬豫一言貞吉故儒者性行純篤寡言辭與人交謙而有禮始以秀才應辟當得七品官銓曹以江寧急缺奏為簿或曰江寧赤縣也民夥事繁旦夕汲汲雖奔走奉承有所未暇若以儒者處之持迂闊之論行迂濶之事鮮不曠官失職而遭黜罰也豫曰不然儒者讀書窮理宅心公平無所施而不可彼以刻薄殘忍之行狐媚狙詐百態逢迎茍祿取容欲以僥幸於旦夕者豈儒之所為哉貞吉自受命以來不戚戚不汲汲雍容和緩舉於其職未嘗棄儒者所行而為暴吏之舉宜乎士民信之君子稱之政事修而名聞流而後知貞吉為政果無愧於儒者也貞吉之歸尚求有以副聖天子拳拳愛民之心始終不變吾儒之道則庶幾無負諸公屬望之意而豫亦與有榮焉胡氏山居八景詩序距吉水之南十里許有山髙出霄漢挺然竒秀曰夫容山山之下舊族胡氏世居之環山四傍川原林壑逺近映帶而煙雲風日變態之狀四時朝暮粲然呈露無不可賞而可愛者胡氏之彥中書舍人海澄家居時日登覽而樂之乃掇其最勝者列為八景曰夫容疊翠曰墨潭澄碧曰燕岡曉日曰濠嶺寒泉曰石井春耕曰楓林夜讀曰鍾岫晴雲曰砂山霽雪其官京師也徴縉紳士大夫詩以咏歌之既成帙乃謁豫求為之序且曰思昔陽山天下之窮處也一見諸韓昌黎之文而名遂傳袁家渴遐陬之小區耳一經夫栁栁州之品題因得以不泯地由人勝事以言傳自古則然也幸不鄙而賜之豫曰嗟乎海澄之志則逺矣豫言曷足取重哉且吉水為江右名邑八景吉水之勝處固非陽山袁家渴之比苐乏昌黎栁州之文詞發揮之耳雖然千載之下是地之勝又烏知不因今日賦咏之什而有聞乎此政海澄之志也豫言曷足取重哉若夫其間景物之美遊觀之樂則諸公賦之悉矣豫特舉海澄志之所在者書以辨其端云贈陳希顔赴涇州詩序吾邑黎田陳氏為衣纓家自唐宋以來代有聞人其間或以相業稱或以科第顯或以文學著前後相望至元時又有若存存翁者負通明之學卓然見稱于時至今鄉里猶景慕之存存之孫曰希顔由博士弟子員登貢成均未幾佐政大理復為刑部郎中清慎平允稱於其職後以薦者擢知蘄州復為寧海今年秋九月以秩滿改平涼之涇州在朝士大夫相交者咸賦詩為餞以豫為鄉里不鄙命序其首簡豫聞希顔在寧海時善於其政寬厚慈良弗峻弗激宅心以公正而不局於褊迫待物以平恕而不流於苛撓因民所利者而興之所病者而去之閭閻田畝之間稱道其美者如出一喙比聞希顔去職其民之少者則相與追從之于道其父老則相率詣闕下懇懇請留之不置觀此則知希顔之得民心而民之服其教令者可知矣今之往涇也譬猶施利器於盤錯駕輕車于康莊綽綽乎其有餘裕矣雖然慎終如始君子所貴循名責實古人所重希顔尚勉於其職異時報政于朝課績循良使涇之人懷戀去思如寧海之民則可以無負於司牧無愧於古之良二千石矣希顔尚慎重之哉贈郭鼎貞還南京序聖天子臨御以來宵衣旰食圖治靡寧懷保小民明慎刑罰故於邦刑之司必慎擇其人以典厥職所以重欽恤而示哀矜之意也豫友郭鼎貞始由太學仕為秋官主事周慎沖密勤敏小心操履純潔稱於其職今年夏四月以秩滿至京吏部第其績在優等以未及三考也命復還其職在朝縉紳士與鼎貞遊者咸賦詩為餞以豫辱在久要俾一言辨諸首簡豫謂唐虞之治固不能廢刑也而在於得人以任其職觀於臯陶之明刑弼教而刑期於無刑則當時治化之盛可得而想見矣其後政教陵替始專任法律以罔其民於是作為刑書而亂獄愈繁若是者豈所以求民之生實所以速民於死耳欽惟聖天子法天圖治好生之德洽于民心而切切焉以詳刑為苐一事懇切戒諭至再至三惟恐有毫髮不當以傷天地之和於是天下之民莫不迪善率德樂生居業同囿於光天化日之下是果何道以臻此哉實由我聖天子躬行於上羣有司率職於下相與裁成輔相鼓舞作興導之以忠信友弟而使之不爭示之以禮樂制度而使之不犯藹然慈良豈弟之風悠然惻怛忠厚之意治化之盛蓋亦幾致刑措而同躋於泰和者矣鼎貞尚歸而求之慎其始以圖其終惟清惟謹而恕以宅夫心惟欽惟恤而仁以濟夫物無激而撓也無狹而迫也無寬而至於縱也無嚴而至於殘也斯則聖天子任賢圖治之意而所以為明慎刑獄之本者實出于此雖然以鼎貞之賢其於是職固優為之矣然區區猶拳拳以是為告者蓋所以期鼎貞於逺大而盡友朋忠告之道也是為序丹陽宋氏族譜序吾鄉宋氏世為衣纓家其先出自晉丹陽府君哲哲之後有興者為大常協律郎改官吉州官滿歸經新淦見柘鄉山水秀麗遂冡焉其後族姓蕃衍則由柘鄉分黎陂由黎陂分今之橋灘然皆以丹陽為始出之祖以太常為不遷之宗橋灘自黎陂來居僅六世則始於居士層十翁實進士常固之髙祖也常固念其先君宏善嘗欲修輯家譜以繼於柘鄉黎陂之𣲖有志未就而卒至是乃體其先志參以歐蘇之意别白疏戚考訂妄謬著其行第爵位卒葬源委有敘尊卑有等綱舉目張秩然不紊譜成將鋟梓乃來請為之序先王盛時宗廟有制昭穆有序冠婚喪祭有禮自足以敦本厚族譜不作可也去古既逺宗廟之制廢昭穆之序紊冠婚喪祭之禮不講茍非譜以識其所從出别其所由分則世日以逺族日以蕃親疏之誼乖骨肉之恩絶其不相視如秦越人者幾希記禮者曰禮不忘其所出返始之道也常固此譜殆不忘所出而返始者歟夫返始者尊祖敬宗之本也能尊祖敬宗則所以厚倫理篤恩誼以維持人心與行孝弟者舉不外是矣雖然作譜之要尤貴得實失實則不足以傳逺昔梅洞提舉以為其法當如臯陶之明刑慎罰不可輕出亦不可輕入茍輕出之是謂忘祖輕入之是謂誣祖聞者以為確論常固如此必有以審之吾知其傳逺貽後也無疑矣然則後之人登名斯譜者其可不體吾常固之用心哉贈郭鼎貞南歸詩序士之窮居獨處非資友朋之益非有見聞之廣以擴其心胸以舒其志氣則終於卑陋而已是以古之人以友一鄉一國為未足又尚友夫天下之善故其所至者逺所就者大而人莫能及也豫自弱冠以來與郭君鼎貞雅相友善與豫同遊鄉校切磋琢磨有希古之志常恨不得去其窮困卑陋以友天下之士其後豫忝以春秋登進士第轉官詞林始得與天下之士相接私竊喜幸以為因是可以去其固陋以進於學而落落至今無一藝可稱甚可歎也今年春二月鼎貞被薦來京師豫躍然以喜方欲資其啓沃以警余不逮曽未幾時遽承恩南歸朋遊相與固留之不可乃各為詩以道其情不鄙謂豫序焉余謂鼎貞之來豈為利祿而動耶其志固有在也方其扁舟東下道彭蠡過匡廬覽九華登采石上金陵慶風雨之會瞻日月之光與天下之賢士大夫揖讓交遊所以脫其沉鬱廣其耳目發舒其胸中之竒氣者亦至矣今兹之歸譬若乘雲馭風而翔夫太虛之表其快可勝言哉抑豫復有説焉古之君子所以取友於天下非徒事逰覽登臨之樂蓋將以充其志而成其學也鼎貞其去此而毋忘舊好遜志時敏日就月將因是而益充其志益廣其學以造夫髙明正大之域他日抱負所藴出而鳴國家之盛以圖揚顯庶幾先世之遺烈可以垂無窮而復振於今日也余於鼎貞有責善之道故不以頌而以規云金文靖集卷七
