body:
  text: 金文靖集卷八明金幼孜撰記賜進士題名記國朝稽古為治設科取士期在登庸賢俊以禆治化列聖相承益重其選數十年間譽髦奮興布列中外所以闡鴻猷而宣教化者率由是出皇上嗣承大統尤深著意慮選拔或濫也申賔興解額之制思用人適均也限南北取士之規故科目之愈嚴而士之所以自期待者益重而不敢忽焉乃宣德五年適當論造之期故事以三月朔旦天子臨軒親䇿之時車駕謁祭先陵禮部奏請試期詔更是月望日先是連日隂雨及廷試霽景澄明士皆歡悅各罄其所欲言翊日復雨傳臚之旦復霽洎錫宴上表竣事而雨復作于乎非上天敷佑以相文明之運其曷克若是哉是科得進士林震等百人禮部尚書臣濙循舊制請刻石題名以貽永久上以命臣幼孜撰文以紀之惟天之生才也不偶故上之取才也亦不易學校以教之賔興以造之臨軒親䇿以試之復揭榜題名以榮之固將望其有益於天下國家也欽惟皇上聖神文武祗承祖宗敬事上天孜孜求賢以圖治理故天心眷佑於取士之際丕示顯休為千萬載文明之徵昔宋天聖中䇿士臚傳至韓琦太史奏日下五色雲見羣臣稱賀後琦卒以相業為宋名臣今百人中豈無琦輩其人足以當其兆者諸士子尚勉焉飭躬勵行措諸事業以副皇上求賢之盛意以不愧科目取士之令典庶幾􅓻美前人有光國家俾後之見之者知今日之徵不徒然也謹記重修蘇州府廟學記蘇為東南都會學校人才實為諸郡先昔宋景定間范文正公仲淹請於朝始建先聖廟學於吳蓋割錢氏南園之地而為之者也荏苒三百餘祀荐厯兵燹屢興屢廢而比年以來其文廟學舍傾圮漸不可支永樂甲辰秋臨江陳孟浩來典教是郡顧而嘆曰學校風化之夲乃不振若此其何以稱崇仰以作興士類適監察御史李立按臨吳中孟浩以其事白之乃力贊其成為裒大家富室之有力者俾出金榖而協助焉孟浩復與司訓馬夀錢紳韓暘各捐已俸以為之倡于是鳩工庀材首新大成殿增塑像次新明倫堂傍飾齋廡室廬次及池橋亭檻階戺垣墉靡不完繕是役也工不勞民費不出官而巋然更新于一旦之頃往來者但視其成而不知其所以成也孟浩請豫記其事豫不敢辭則為之言曰學所以明人倫不可一日廢學校其可一日廢耶士遊於其間其理則仁義禮智其器則君臣父子夫婦長幼朋友其文則易詩書春秋禮樂若是者豈徒託之空言蓋欲明其道以充其性密察於幾微致謹於踐履積纍以至乎浹洽擴充而極於廣大此則學之之要所以成已成物者不外乎是矣吳素稱禮義之鄉宗工巨儒後先相望他未暇論有若吾文正公之清修博雅文章事業光明俊偉至今為天下重士生於斯遊於斯必取法於公無眩於邪説無奪於利誘充其內以逹夫外他日出而臨民則思為良吏立朝則思為名臣真履實踐以求無負於所學無愧於先逹則孟浩所以拳拳於斯文者豈空言而已哉因悉記其事并書其説如此俾歸而刻諸且以示後之典教事者尚思自勉以繼於無窮焉是為記武進縣廟學重修記武進舊有學在毗陵郡城之東二里許創自有宋至元而繼修之國朝洪武初宰邑者復新而大之嵗久夫子廟洎學宫漸至傾圮永樂甲辰訓導覃懷逮宏率諸生王忠輩修之時前進士白瑜判陳州以內艱家居慨欲協相其成首捐資為倡遂募財鳩工粗復其舊洪熙改元今都御史熊君元節以大理卿承命巡撫過郡謁學嘗督有司修葺未克訖事宣德丁未鄱陽進士蔡貴來尹兹邑留意學政視學規制稍隘乃捐俸貨民之隙地于靈星門東創三門又於講堂後勸民分地十餘尋植以竹樹正泮池之偏增築饌堂射圃使復其常于是廟貌有嚴堂廡有序講誦有所像設藻繪煥然一新而至是可謂大備矣其郡人禮部尚書胡公原潔歎修復之難念繼葺者之不易乃來屬豫記之惟人才之興夲於學校而學校之興係乎宰民者之賢否今觀是學之成其創修前後纍纍有人固不俟乎宰民者矣然非貴之卒其成功其能完美壯觀若是之盛哉雖然君子之為政有先後而學校之教有夲末貴之為政能急於興學可謂知所先後矣而世之學者徒事于決科名釣利祿之計於夫為學之夲漫不加省是可乎哉夫微而性命道德之藴顯而君臣父子之倫日用事為之故莫非民彛物則之所在也學之者必察乎此端誠意正心之功造窮神知化之妙以逹夫齊家治國平天下之要而後其夲立於內夫如是則所謂科名利䘵之自外至者有不足計矣是固掌教者之任而宰民者亦詎能辭其責哉尚勉焉端為教之夲以率勵其士子而振起俗尚之弊將見異時賢才之興皆道德明秀出而為國家恢宏政治而堯舜其君民卓然為當代名臣則于斯學豈不重有光乎是又建學之意不可不書龍川縣治重修記龍川古循州在禹貢為揚州之域秦并天下置南海郡龍川𨽻焉龍川為縣自漢唐五代迄於宋元興廢不一洪武中嘗經寇掠民户散亡所存者僅八里而縣治傾圮尤甚官於是者恆病無視事之所欲重新之而不能宣德戊申豫友宋常固奉命宰龍川顧而嘆曰縣治凋弊如此豈所以稱瞻仰施政教於民哉於是齋沐祗率邑中之父老告於城隍首捐已俸鳩工庀材期在必成逾數日天大雨河水瀰漫忽得上流巨木三百餘根衆皆驚愕以為常固誠心所感既又採於山得木八百餘適川竭木不能出一夕大雨水漲木悉至不勞餘力衆又曰令尹誠心所感果如此哉乃以其年九月日興工十二月日訖工自廳事儀門及後堂廨宇煥然一新是役也錢榖費用一出于公而毫髮不以勤民是以為之者疾而成之者易斯實常固以誠心為理故山川之神默有以相之夫豈偶然哉常固為邑之三年來書考間過豫道其事且請為文立石以紀嵗月豫謂善為政者當為其所不可不為而不敢妄為其所不得為與輕為其所不必為若縣治為聽政之所蓋所當為而不可不為者常固於此固不宜有所遲回一旦興廢舉墜神相之人説之逾四月而功成豈不為難矣哉視向之偷惰庸懦因循茍且而昧於政事之先後緩急者可同年而語哉嗚呼龍川無聞久矣一旦得吾常固而作新之亦何其幸耶後有蒞于斯者覽觀斯文尚思修其政舉其職以繼於無窮哉祁門縣廟學重修記徽屬邑六祁門其一也其地為東越奧區山水竒峭地隘而少田其俗質朴其民剛徑而少爭訟唐代宗時析黟縣之西浮梁之東置以為縣以其地有祁山閶門遂名之為祁門云宋端拱中始建學於縣治之西後復徙於西南厯嵗滋久學宫或修或否至近年以來禮殿傾圮尤甚值有司多故弗克以時修治宣德二年教諭孫曰讓奉命來典學事喟然有志改作乃率訓導胡文昺及邑之富民汪士政等十一人相與裒金帛為材木工徒之直分役會功躬勤程督首大成殿次門廡舍宇牖户階戺皆撤而新之𢎞敞通眀崇密堅緻悉合法度于是廟學之規始足以稱瞻仰經始於三年之秋落成於明年之夏曰讓欲識其嵗月以貽永久乃致書屬其兄翰林修撰曰恭請豫文為之記余因告之曰古之所以重學校者以其為賢才所自出而學校之為教不越乎父子君臣夫婦長幼朋友之間而已蓋人之有是身也則必有是心有是心則必有是理是理之在天下亘古今而一日者也而或為氣稟習俗所拘則于是理或有所昧故必為之擇師儒因其固有者以導之使其讀書窮理以誠其意正其心修其身自家而國以至於平天下之道必使之貫通浹洽以極夫體用之全以造夫至善精微之藴而後吾之夲立庶幾於聖賢之德業有所造就而至於逺大也奈何世之學者往往昧其身心之所固有因仍茍且徇目前之利汲汲焉惟科舉詞章之習而欲以釣聲名干利祿者靡然而莫之顧則其夲已蹶矣尚何逺大之足期哉徽故大郡文公先生闕里所在其道德文章昭然具在曰讓尚端夲立教以先生覺斯人者日與諸士子講明紬繹使其反諸身心者有自得之效而超然於科舉詞章之外則他日推而施之於天下國家者夲深實茂將無所處而不當豈功利云乎哉余以曰讓有志於斯文而又能興廢舉墜以為學校之光故樂為之記俾刻諸石以警其徒且使後之任教事者有考焉而無忘曰讓之志也百鳥圖記百鳥圖者宋宗室趙千里所畫今長洲教諭周君岐鳯之所藏也圖用絹素從髙不能逾咫衡廣三尺適與几稱溪流淺渚岸隄平曠有古木數株踈枝縞葉颯然秋意修篁蒼蔚莎草微茫淡煙翠靄與波光搖蕩上下相映若鷗鷺鳬鷖鴛鴦鸂鶒鴇鶩鴻雁鵁鶄鸊鵜王睢鴝鵒鷦鷯􅟀鶉鶺鴒鶬鶊山雞野雀之屬不能悉數仰而顧者俯而視者飛者鳴者行者栖者飲而啄者並而匹者乘而居者巨細不同形狀各異止於樹者五十有九於竹者七於棘者二翔而未集者八浮於波者六遊息於岸於洲者十有八其羽毛爪嘴自然之情熊纎悉不遺巧奪天造顧惟尺素之間而幽間平逺有以含不盡之景而寓無窮之觀吁亦竒矣哉而趙公之構思匠意經營摹狀良亦勞矣蓋畫非難也工為難工非難也得其趣為難且禽鳥有形之物最難似真今此圖匪惟能工而似真又兼得物之趣焉宜乎世之人寶而傳之不啻珙璧之難得也雖然畫一藝耳能造其妙而使人愛慕寶藏至於如此况於學聖賢之道而造其極者乎毋惑乎世之人爭慕而親愛之不釋也周君早以經術發身有聲於時今雖以教職自任恐枳棘不足以棲朝陽之羽行將和鳴於霄漢之上矣昔人謂啁啾百鳥中忽見孤鳯凰政謂此也此意恐非畫者所能喻也姑為記之瓦頭硯記豫嘗考漢未央宫諸殿瓦其身如半筒而覆簷者其頭有面外向其面徑五寸圍一尺六寸強有篆字凡六等曰漢并天下曰長樂未央曰儲胥未央曰長生無極曰萬夀無疆曰永夀無疆靣至背厚一寸弱後人以其背平可為硯遂去其半筒因呼為瓦頭硯宣德三年戊申秋八月豫奉使慶邸王以此瓦相遺其篆文曰長樂未央察其規制厚薄皆同但質形稍粗耳嗚呼此瓦自漢至今已千六百餘年矣追想當時金玉珍竒之物可寶玩者何限然皆澌盡無遺獨此尚留人間往往為士大夫所愛重豈非所謂鈍者夀之驗歟因書此以識嵗月且以發豫之一慨也望巖記君子之所以因名取號有非徒然者蓋將以比德而進於髙逺焉豫友曽君魯瞻隱德博學布衣疏食淡然無營嘗以其字魯瞻揭其所居曰望巖蓋取詩所謂泰山巖巖魯邦所瞻者以見志焉夫泰山為東魯之望其崇髙配天其重厚配地其悠久綿邈冠乎古今舉天下之為山嶽者莫與齊焉然所謂崇髙重厚者特以山之形體而言耳若夫鍾神育靈萃竒發秀揮霍隂陽變化莫測一朝而雨天下者此山之利澤也磅礴杳𡨕鬱然蒼翠而長松巨柏挺拔於霄漢者此山之材用也世之人徒知山之崇髙重厚以為魯邦之望而不知神靈變化發育萬物又有以資世之大用焉於戲魯瞻之意其殆見於斯歟雖然魯瞻固未嘗期於世用也然觀其所藴蓄渾厚凝重而文采之呈露自有不可掩者其將厚積而薄發者歟是則魯瞻之巖巖者豈為其一鄉一邑之望蓋將與岱宗而同其具瞻矣豫昔扈從過泰山之下嘗一覽其勝形之詠歌因魯瞻求言遂得發其梗槩而著以為記且以求正於他日焉致敬堂記泝淦而西上遊五十里為象江其地夷曠水清而駛山逺而秀竹樹蔭門泉石在户琴書列於几席衣冠集於家庭是為吾蕭氏之居焉蕭故文獻大族自髙曽以來以忠厚起家有若宗望德望雅望尤敦朴謹厚以長者稱宗望之孫曰迪恭兄弟五人俱瑰偉亢爽嘗悼其父欽行甫弗待於養獨幸母夫人夀考康強思欲盡養以紓其愛日之誠乃築堂而名之曰致敬迪恭之弟迪哲以眀經登進士第今給事户科與豫有姻好間以其兄之意來請文為記於乎五倫之厚孰有過于父母者乎今天下之事孰有大於敬親者乎人皆知有親而不知所以為養也知所以為養矣而不知所以為敬也是故衣服飲食必時必愼者非敬之存乎定省溫凊弗違弗怠者非敬之著乎婉容愈色以盡其歡非敬以將之乎先意承顔以順其志非敬以逹之乎扶持於出入之際不以頃刻而弗恭周旋於杖屨之間不以毫髮而弗謹又非無時無處而不致其敬者乎彼汲汲於口體之奉而曰吾飲食之甘也吾衣服之美也吾起處之適也吾無事而不悅無所往而不順也然求其能盡誠致敬而得夫事親之道者蓋寡矣於乎此吾迪恭兄弟所以拳拳於敬之一言者可謂得事親之要矣雖然敬親固大而敬身為尤大是故孝子洞洞屬屬如執玉如奉盈不以跬步之間而弗致其謹者蓋恐貽親之辱而忝其所生也是故敬其親者而尤在於敬其身也未有能敬其身而不能敬其親者也然則迪恭兄弟之于敬親固得矣其於敬身之道尚兼致其力焉是為記環翠堂記吾家去沙坊可二里許與袁氏有世姻袁為漢太尉安之後世業儒子孫之蕃常數百指豫見其家已五世矣今煥南有子五人曰吉祥曰吉榮吉華吉信吉瑞俱卓然有立志且能恢復舊業以光其先人嘗於所居之傍構堂數楹為燕休之所髙明宏敞傑出塵表四山羅列若城郭然雲嵐蒼翠綺綰繡錯爭竒獻秀於几席之下者日不暇接因相與命其堂曰環翠今年春豫荷聖天子推恩先世遂得奉命書歸省太夫人於家暇日過沙坊吉祥兄弟為置酒邀余坐其堂上酒既行拜而請曰斯堂之記碩先生有以教之匪為吉祥兄弟增重且於來世亦永有光耀焉豫謂君子之居室將以進德修業也豈特資以遊目騁懷為觀覽之具而已哉今子兄弟以妙年美質居有華屋衣有美服有童僕可以備使令有耕稼可以供伏臘有煙霞泉石可以供笑傲所以適其性情快其耳目者蓋無一而不得焉然君子所性則不在於是君子之道修之于已則為仁義禮智行之于家則為孝弟忠信致謹於日用常行之間防慎於幾微幽獨之際而不使有須臾以乖于其道此則士君子所當致力而不敢忽者吉祥兄弟相與優遊於一堂之上究之詩書六藝之文於以講學而修德勤於揖讓進退于以敦禮而肅教謹之享祀蒸嘗於以奉先而敦族協之琴瑟塤箎於以重倫而厚誼忿疾之言不出於户庭鬬訌之聲不作於門牆熙若春暘之和充乎堂奧之內則子之兄弟所以安處於斯以享其悠久之福而涵濡太平之澤者豈無自而然哉余于斯堂之記不及夫山川景物之勝而獨拳拳于斯者蓋以進吉祥兄弟於善冀其纍積之勤以承於其先紹於其後而為鄉里之效法庶幾斯堂之有聞而斯文之傳亦永永無窮焉巢筠别業記常之宜興有勝地曰柚山其東南平皋沃壤聨絡夷曠而層峰疊嶂嶄然髙出乎雲漢之表北則洮湖之水浩渺澄深瀦匯其傍而蔣氏所居實在於此居之四隅則環植以竹其條暢修聳鬱然如翠葆下垂蒼玉之交映也其清聲逸響鏘然如金石遞奏韶鈞之諧如也其凌傲雪霜虗心徑節凛然如莊人正士之不可以屈撓也蔣氏之彥曰希文者日對玩徜徉而心甚愛之乃築軒其下以其盤屈若巢焉遂扁之曰巢筠别業間應辟至京師今少師户部尚書夏公實延致賓孰以訓其子既而以疾辭歸將尋其别業之勝而樂焉濱行公以其先世龍圖閣學士璨之誥詞示豫曰是居也實龍圖之所經始當時齋舍亭館之勝泉石花卉之富中更變故鞠為邱墟乃祖時中嘗欲復之而未就今幸别業之存而竹林之清絶尤足以想見當時之勝槩也祈一言以記之惟巢居穴處見於鴻荒之世其後有室居之固巢之居亦寥寥矣况竹之孤直踈抗其枝葉條幹非若木之堅緻可搆而巢也果何取於斯焉然豫以為筠竹膚也記禮者謂竹之有筠以明人之有禮然則希文之所謂巢筠者豈以其處此出入起居必由於禮而真若巢于筠者耶抑將以筠隂茂密而其居託夫隂翳不暴於外類若有巢氏之所為耶希文之志于是必有所在矣是歸也日與故人賓客開徑掃石挹湖上之清風弄林間之明月詠歌酣觴優遊宴逸以終其餘年其視昔人之巢雲松優劣何如耶希文之志豈不可尚哉用以是復於少師公且以為之記云清省居記友人蕭君伯辰嘗告於豫曰吾自發軔仕途及今幾三十年無過人之長但謹恪奉職不敢違越而已嘗取古人清心省事之語以為居之號而名之曰清省以自警幸一言以發其義豫謂君之於仕也有錢榖有徵發有期會有迎送可謂煩且劇矣心果可得而清乎事果可得而省乎殊不知心者萬化之原神眀之舍也而古之所謂聖賢者以一心之微應天下之變常恢然有餘而不亂者以此心虛眀洞徹無纎毫私欲汨於其間是以事至物來隨而應之略無煩擾膠轕之患而心之所以常清事之所以常省也彼梏於氣稟之偏役於物欲之私既無超異之識又乏清心之夲往往欲肆情勝東馳西騖志益勞而事益煩卒之困悴憂悶顛倒錯亂其弊有不可勝言者矣蕭君厯練老成操履純正方寸之間湛若氷潔是以臨民蒞事之餘接之而無不得其情處之而無不得其當優優焉適適焉從容暇豫若行其所無事者以故心愈清事愈省所至民服其化著績循艮始終一致未嘗致於挫衄若是者豈偶然之故哉誠以所操者得其要而已矣嗟夫君子之所為莫大乎養心養心莫大乎寡欲寡欲之至則心可得而清而天下之事有不足慮者矣豈徒省之云乎哉君惟有見於此夙夜拳拳焉服膺於清心省事之一言其所以致謹於存養省察者可謂至矣乎豫與君交遊之舊因是得以著君之素故樂為之言并以自警且俾有官君子聞君之風者皆有以致其勸勉之意云東臯八景記道金川東下一舍許有地曰莒洲坡陀延袤大江之水交流其傍地宜竹樹桑麻森鬱蔽虧蒼然可愛而連山髙陵逺近俯仰環乎汀岸之外者一舉目而盡得之誠天造地設負竒育秀之奧區故姓謝氏居焉謝故衣纓家有號碧潭居士者世家洲上數百年來子孫之盛甲於他族厥後碧潭之曽孫公煥復卜築於洲之東因自號曰東臯今公煥之子仕禮益新而大之乃瞰江滸徹其舊觀構以層軒發抗爽而據幽勝蓋欲盡得夫山川之趣也於是指其景之尤勝者命為八題曰鳯谷棲雲曰鰲湖釣月曰東皋晨牧曰南岸春耕曰莒浦帆歸曰裏河魚躍曰松林巢鶴曰義渡橫舟縉紳大夫皆為之歌詠間來京師丐豫文以為之記余謂天下山水之樂無窮而或地之所寓非竒勝之區景之所得乏雄偉之觀則其樂有不能盡者矣今仕禮所居有幽曠遼敻之美無塵俗喧囂之雜長汀逺渚映帶乎户庭水光山色涵浸乎几席煙雲斂舒於朝暮蒼翠綰錯於上下以至菱荷蘭芷之紛敷魚鳥鳬鷖之遊泳風帆雲檣之往來煙簔雨笠之出沒凡可以供臨眺之樂者舉出於履舄之下然則東皋之勝所以著名於今日者誠得所遭矣柳子曰地雖勝得人焉而居之則山若增而髙地若闢而廣以此觀之東皋非得吾仕禮為之品題其能有聞於今日乎雖然東皋特隱居之勝耳若仕禮之出為時用固將建功立事期於逺大而思所以為山水之光若然則東皋之得名不徒為今日之美將必為斯文出色而同垂不朽矣姑為記其槩以俟徴於他日焉吳氏西莊記西莊在淦東上遊四十里今北京行部吏曺員外郎吳君嘉靖之所居也其先居深圳至嘉靖五世祖竹隱翁始即西莊而家焉西莊去深圳可一里而近其地磅礴邃廓據玉笥之麓前後峰巒秀拔巖谷杳密長松巨柏森聳霄漢修竹茂林蔽虧煙日層青積翠流潤户庭嘉花異卉衣被亭榭其四時之間禽鳥上下鳴聲相答樵歌野唱旦暮迭作煙蓑雨笠逺近相望行旅逰人後先雜遝憑髙矚目而莊中之竒勝皆集於几席之下而又田有稻秫林有桑麻圃有菜茹池有菱芡芙蕖場有雞犬牛羊溪有魚蝦鳬鴨可以給衣食賦稅為賔祭之奉佳時暇日吳氏之父子兄弟率其賔客故人相與徜徉莊中樂太平之無事覽景物之及時或雅歌投壺或絃琴賦詩或圍碁酌酒或掃石而坐或席樹而眠或登丘而望或臨溪而漁笑談嬉逰倡和酬酢熙熙焉適適焉蓋無往而不得由是而觀吳氏專西莊之勝所以長子老孫享其樂於悠久者誠世之所難而不易得矣於乎天下山水竒勝之區所以娛樂極耳目之欲者何限曽不轉瞬鞠為草莽無復遺響者有之吳氏自唐歷宋元以迄於今蓋千百年於此矣其間文獻之相續世澤之相承子孫系序之相傳綿綿延延致久逺而不墜者豈偶然之故哉實由先世積纍之深詩書福澤有以沾溉於其後者如此耳今嘉靖以文學發身遭值聖明克有祿位公退之餘企瞻徘徊猶拳拳於家食之日至乃託之圖畫徴之歌詩以追述乎祖考之舊俾西莊之山水亦預有榮艷非善於繼述者能若此哉豫辱與君同鄉里且同官於朝因其徵言故歷述西莊之美與其山水園池之樂及其祖考敷遺積纍之厚以為之記且俾其後之人覽斯圖而徵諸斯文尚亦有所感發也梅雪軒記吾友徐君仲敬畫梅得楊補之遺意時人無能及者故嘗以梅雪自號人亦以其號為宜蓋君為人意度灑落雅操淡泊有類乎梅之與雪雙清並潔世無間然者且又築軒而題其扁曰梅雪士大夫既詠歌之復來徵言為記夫梅之為植孤芳獨立無桃李之艷蘭蕙之秀而其幽姿徑質挺特乎嵗寒凍沍之際則凡風霜之凛冽舉不能以撓之此其清貞之操可尚者如此若乃雪之為物凌寒所凝瑶英六出溢素流輝上天同雲萬里一色氛氲交錯聨翩委積則凡塵土之溷濁舉不足以汙之此其皎潔之質可貴者如此今也梅與雪適相值於兹軒之上飄然若姑射之仙驂白鳯乘素鸞逍遙乎太素之境香逾清而可挹光逾淨而可濯竒姿異態便姢陸離不可名狀由是觀之梅至清也被之以雪而益清雪至潔也麗之以梅而益潔此不惟二物之相宜而兹軒之勝亦藉此而愈竒也君之所好如此則其所抱負者從可知矣君自少卓犖不羈既長由郡庠入補太學生拜監察御史轉右春坊中允出為姑熟太守及今揚厯幾三十年所志彌篤所守彌堅而所造者彌深豈非詩所謂惟其有之是以似之者歟豫與君相知有素因君之請遂并書其出處之概以為記南麓齋記豫少時嘗以先大夫諭德之命遊學廬陵道出南嶺有地曰楊家莊是為忠襄公之里莊之西兩山嶄絶秀聳曰鹿峰其前衍為平田有二小山突起與鹿峰相直者曰金魚峰峰之下有澗水清泠可愛其聲淙淙然佳木茂林隂森蔽日禽鳥上下鳴聲相答白雲煙光蔽虧朝夕誠幽絶竒勝之所萃問之居人則曰此楊氏所居之南麓也為之徘徊留憩久而後去自是十餘年豫忝以科目有官於朝而忠襄公之裔孫季琛以薦者仕為南海令始獲相識又數年季琛自濟陽知東平其子黻亦由進士拜監察御史于是季琛父子與余往來益密一日黻造豫而請曰先曽大父學睡翁少傳劉靜春之學通易詩書春秋而於天文歷數子史百家之言靡不研究在宋太學時嘗上書一斥賈似道之姦以時事不可為遂翩然來歸始築室所居鹿山之下名曰南麓齋日與四方學者切磋講論而凡造公之門者皆為時名人由是南麓之學遂聞天下至先大祖文川翁從大父濟川俱以清修雅望知名當時而所以講眀夫南麓之學者相繼不輟近世家君復改築南麓為堂宇而增修之環以崇墉列以佳樹積書數千卷昆季子弟絃誦其中蓋將以少繼先志也今宦逰南北逾二十年其心未嘗不拳拳于南麓嘗命黻丐先生之文以記之敢冉拜以請豫謂楊氏以忠襄大節磊磊落落巍焉煥焉為鄉邦冠冕數百年來其間文獻之相續世澤之相承流風遺韻之相接者猶一日也繼忠襄之休烈紹家學之淵源有若學睡翁之清文懿行師表當世赫然為士子所宗一洗頺弊之陋則南麓之學有以為之倡也自後若文川之博洽濟川之敏識卓焉以師道自任而南麓之學益顯於時及今季琛父子復以賢良科目顯榮中外事業著而聲聞流豈非以忠烈之澤深長而弗絶詩書之教涵養而益茂歟嗟夫世之髙甍巨棟嚴嚴翼翼所以供娛樂極耳目之欲者何限曽不轉瞬鞠為草莽之墟無復遺響而楊氏齋居巍然於煙雲之表與山川人物相為悠久卓卓乎為鄉里所倚重非先世積纍之深後賢繼述之善者能若是哉詩曰髙山仰止景行行止又曰子子孫孫勿替引之吾于楊氏尚深有望焉請以是復于季琛父子并書以為記環山樓記吉水之谷坪李氏為西平忠武王晟之後由唐厯宋元以迄於今詩書禮義之相承衣冠儒雅之相繼蓋彬彬焉有曰竒相伯機父子者俱讀書鄉里以謹願稱嘗構第諶陂之上其地衍沃夷曠茂林佳樹扶踈蔽虧清泉白石輝潤灑落四靣環以蒼翠若崆洞若鹿角若山凹諸峯逶迤綿亘巉巖秀鬱如重城厚郭低昻起伏隱然如與人拜跪拱揖可喜可愛竒相翁存日嘗號其居曰環兩山間蓋取李願居盤谷之意今伯機之嗣子容復作樓若干楹以為宴適遊觀之所遂更名曰環山介友人羅君貞吉來徵文為記於乎天下山水竒勝之區所以供娛樂極耳目之欲者何限然往往未及轉瞬鞠為草莽無復遺響者有之李氏之居谷坪蓄德流慶蕃衍鬯茂所以享其山水之樂者蓋數百年于此矣况以其代有隱德若竒相伯機之世濟其美及今子容之篤厚謙謹仰承先德之懿祗服禮義之訓佳時暇日與故人賔客盤桓於斯樓之間或雅歌投壺或彈棋酌酒攬雲霞於掌握撫蒼翠於目前濯清風而挹爽籟送夕陽而迎素月休休乎適適乎宜何如其樂也若夫春誦夏絃吾伊相接使其子弟修業講學入以事其父母出以友其兄弟周旋於禮讓之域雍雍乎于于乎此其人果何如哉若是則今日環山之勝可以無愧於盤谷矣俟豫他日謁告南還造諶陂之上登環山之樓尚當為子容援筆一賦之姑書此以俟臨清軒記石莊之上多佳山水有溪縈紆如帶緣山麓而下復西折度石橋數十步有田可百畝羅布溪上是為袁君景哲之所居焉君嘗築軒溪傍後負林樾前俯清流以其燕息于斯遂顔之曰臨清來徴言為記於乎天地之間物之極於清者人所同好也是故處江湖而蕭散者則嗜夫風月處邱園而幽獨者則嗜夫煙霞處山林而髙潔者則嗜夫氷雪雖好之情有不同而所以同其清者則一而已今君之居是軒也髙明邃朗可以逺塵囂幽寂夷曠可以怡心神無煩擾以亂其形無喧啾以亂其耳水光雲影晨夕浮動於琴書几席之間一碧澄瑩纎塵不生佳時暇日賓客遊從則列坐軒中談論古今觀魚鳥之遊泳襲蘭芷之芳馨君乃焚香煮茗鼓緑綺之琴和滄浪之歌于以濯清風而挹湍瀨于以送夕陽而迎素月徜徉逍遙惟意所適曽不知世之紛華膠膠擾擾有一毫以膺于其中則其極於清者果何如哉雖然君之有取於此者豈徒為一時之美觀蓋將以進於道焉道固未窺也而川上之流孔子則取之盈科而進孟子則取之君處于是軒觀其流之清則思疏瀹澡雪以滌其舊染之汙觀其流之不息則思惕厲自強以造夫逺大之域如此則德日加進業日加修而於是軒有光矣君溫純篤厚有子三人曰大鴻曰大鵬曰大鶚俱讀書嗜學必能繼君之志以昌大其家者因君之請故厯敘其軒之勝并致其期望之意如此云進修堂記豫章羅公器質美而好文志鋭而善學嘗於所居作堂以為藏修之所而名之曰進修蓋取周易君子進德修業之説豫友僉憲李公原此為篆三大字揭諸楣間而國子祭酒胡公復為之銘士大夫與之遊者又皆為詩以朂之間來請豫言為之記嘗觀易乾卦之九三有曰君子終日乾乾夕惕若厲無咎而夫子釋之曰君子進德修業忠信所以進德也修辭立其誠所以居業也蓋君子之學以勤勵不息為本終日乾乾所以法天之剛健欲其無一時而不強無一息而不強也使少有須臾之間以害其天德之剛豈所謂自強哉然忠信心也修辭事也主於心者欲其無一念之不誠見於事者欲其無一言之不實主於心所以見於事也修於事所以飬其心也表裏相須內外兼進無牽制於私欲無搖奪於外物庶幾德日以進業日以修而無愧夫君子之學矣若曰今日進之而明日退焉今日修之而明日輟焉既無間邪存誠之實又無擇言篤志之功如是而欲望其德之進業之修者鮮矣古之大聖若堯舜之兢業禹之勤勵成湯之日新文武之勤用明德孔子之學不厭誨不倦皆所以進德修業也聖人且然况衆人乎公器尚孜孜勉勉夙作而夜思乾乾不息致知以力行無以半途而廢千里之勤無以一簣而隳九仭之功則於名堂之義可以無忝矣豫嘉公器有志於學故樂與之言且以期公器於大成也輞川圖記距新淦邑治之西沿流而下一舍許有地曰輞川曽氏之族居焉蓋其所居山明而水清洲渚交互煙雲斂舒魚鳥之浮沉上下檣帆之往來開闔長天鏡涵逺樹􅌨比真江鄉勝絶處也曽氏之尤彥者曰仲方嘗慨然以為昔王右丞居輞川其名勝至今不絶乎談士之口今吾所居之地其名適同而幽竒偉麗之觀清間曠逺之趣亦若不減於彼吾甚樂之於是好事者為寫輞川圖以狀其景物之妙間來請豫文記之夫天地間山水之奧區無處無之然大抵因人而重王右丞為唐名人其詩律冠絶當代故其别業之在輞川四時嬉逰其間形之歌詠至于今為人所傳誦雖未造其地亦皆引領想慕其勝此無他因其人而增重也昔人所謂山若增而髙水若增而深其此之謂歟今仲方之居其景幽地勝固已若此而又能求之當時能賦者相與歌詠而贊述之安知他日不與右丞之居同一不朽也豫與仲方同邑蓋嘗厯覽其處而想慕其勝者故樂為之記於是乎書淡湖八景記夫天下之樂莫過於山水泉石煙雲花竹魚鳥之物會於心而觸於目以供逰賞之適臨眺之娛使人神志舒暢意態蕭散無一毫塵纍足以動其中然後有以浮遊於萬物之表此其快且適當何如哉渝川距縣治一舍許曰大港平曠衍迤沃壤彌望風氣清淑山水回合竹樹煙雲蓊鬱秀茂李氏世居焉厯宋洎元子姓蕃盛有曰東湖處士者始析居里之淡湖又四世至仁齋翁益廣其業嘗覽其所居之最勝者題為八景曰淡湖秋月曰回岡晴嵐曰仰渡歸帆曰株溪古木曰美洲鴈落曰匡嶺猿啼曰大港雲耕曰鴉灘雪釣於是山水之清勝得於觀遊者悉備於此翁既歿其二子曰伯恂仲固皆能承父志善繼善述而俾其先躅所履厯者雲霞草木藹然無恙而反增其勝槩有過於昔間嘗走京師求言以記其事夫人於山川之勝或一丘一壑之美已足以陶其情性寄其蹤迹以窮夫逰眺之樂况李氏之居其景非一隨其所遇皆有可樂者此豈世之人所常有哉宜其表而出之以見於題品也且夫世之人固有得夫山水之勝以為樂者率不能一再傳後嗣弗繼遂使向之遺迹淪於莽蒼間曠之墟而為狐兔鳥鼠呌嘷栖息之所矣若李氏父子祖孫連世相承守而勿失而又益能思有以顯揚而開擴之以濟厥美其視平泉草木之轉瞬而廢者豈不霄壤哉豫以是樂為之記使李氏子孫永有所勸焉重修陽山白龍祠記龍之為靈著矣下上日星浮遊海嶽感風雲霈惠澤變幻恍惚不可為象則夫世之所稱神靈有逾於龍者哉宜其筆迹之地人益崇信廟食之久神愈彰應而祀典之盛纍千百年為不替焉距姑蘇郡城西二舍許曰陽山有白龍祠其神誕育之異相傳肇自晉隆安中而其靈顯感應莫盛於唐尤莫盛於宋元之間錫號崇祠後先相望逮我聖朝飭嚴祀事命有司春秋致祭著在令典乃宣德五年禮部郎中况伯律奉命來守是邦是嵗夏秋之交闔郡大旱禾則盡稿伯律乃攄誠禱神已而大雨沾溉嵗以獲稔仲秋之月適當祀神先期望夕伯律齋宿公館夢神告以祠宇將傾丐將修葺翊日以其故語諸僚佐咸嗟異之且天氣澄明靈飈颯爽雲彩發祥蜿蜒焜耀至誠感孚神實降歆既竣事伯律周覽祠下喟然興歎以為神之澤被及一方而祠宇傾圯若是宜乎神之預協夢徵吾儕忝蒞斯郡詎可不思改創以答神庥耶遂倡郡邑僚屬捐俸市材鳩工而重修之而民之好事樂助者益衆未幾棟宇赫奕廟貌一新既相與落其成復謀勒貞石以貽永久伯律乃致書請余文記之惟禦災捍患神之功而事神治人守之職也白龍之神其肇迹之故余不能詳而自廟食以來厯世滋久能霈澤敷惠以蔭蘇人所謂有禦災捍患之功者伯律出牧於茲天子嘗賜璽書委以重寄而能欽承德意興利除弊和洽其政人以大治復以餘力修葺神祠徼兹福祉以惠其民可謂能盡事神治人之職矣二者皆不可不書也豫故表著之以為蘇人告且俾後之繼守於是者讀斯文尚求如伯律之舉於其政哉琴川橋記蘇之常熟有地曰琴川蓋以境內七港其源皆發於縣西諸山而並趨大江若琴之七絃焉故因以得名縣南一港舊有橋跨之以通行者宋淳熙癸卯縣令曽啓纍石重修而更名曰琴川橋厯歲既久霖潦之所噴激沙石之所蕩嚙近年以來寖就頺圯經涉者病之永樂丙申豫友傅玉良繇進士擢知常熟下車之初召父老問政之所急咸曰莫急於琴川之橋且言橋之路凡四方行旅與其民人之所經者蓋大半焉今壞且久而弗克修葺此吾民之深病也既又言邑人有金珵者性好施與嘗有志率衆成之而未果遂其為人善經畫可任使也乃以其事委珵率僚屬捐廩俸與其民之樂施者鳩工鑿石拯頺捍隳築而堅之然後疊石於岸之兩傍甃深壘欹以完以固越三月告訖工而其欵密精緻實加於舊於是僚屬與其父老皆置酒相賀曰此邑民無窮之惠也東西行者且嘖嘖稱於道路焉既而父老具石請書其事且來徵文於乎夫親民之職莫大於令而令之責又莫先乎其所急茍不知其政之緩急先後而求其理吾未見其可也是故津梁道路雖民政之一端而最不可後者玉良讀書列科目厯政有聲一旦承上命出宰百里能因民之利而利之而其民亦皆趨事赴工有若不知其勞焉是皆可書也遂以此為記并識其歲月俾後之人有所考焉雞曙軒記吾邑金水之東有鄒氏焉鄒故大家其居書田者蓋數世矣至宜升兄弟始徙居厯山築室買田家益饒裕尤嗜學不怠嘗闢一軒而名之曰雞曙所以示勤勵以警懈惰也間來京師求豫言記之夫羽蟲之類可愛者衆若鳯凰有九苞之竒鵾鵬有萬里之運野鶴之清唳山雉之文采鶯之遷喬鵲之送喜鵷鷺之行鴻鴈之序至於戴勝之知時王睢之有偶皆有足稱焉而古今人蓋嘗託之以資詠歌或擬於圖畫以傳示永久若雞者無羽毛之竒聲音之美乃獨有取於斯者何哉蓋嘗聞是禽也備美五德専職司晨稱於孟氏見歌於詩人其來也尚矣吾想夫宜升兄弟當東方未明之際旦氣既清之時惕然而省恍然而悟謹之於幾微之始防之於念慮之初使吾為善之心無一毫之敢忽而怠慢之志無一息之敢萌夫如是則朝斯夕斯惟日孜孜所以致勤勵以警怠惰者寧有窮哉彼有自暴自棄終日沉酣如醉生夢死而恬然弗省者視吾宜升所志豈不有愧焉余嘉宜升託物命名而有志於學也故樂為之記且以致余期望之意云吟室記夫詩自三百篇以降變而為漢魏為六朝各自成家而其體亦隨以變其後極盛於唐渢渢乎追古作者故至于今言詩者以為古作不可及而唐人之音調尚有可以模倣下此固未足論矣大抵詩發乎情止乎禮義古之人於吟咏必皆本於性情之正沛然出乎肺腑故其哀樂悲憤之形於辭者不求其工而自然天真呈露意趣深到雖千載而下猶能使人感發而興起何其至哉後世之為詩者皆率雕鎪藻繪以求其華洗磨潄滌以求其清粉飾塗抹以求其艷激昻奮發以求其雄由是失於詩人之意而有愧於古作者多矣豫友饒俊民自少喜工於詩其家居時嘗搆屋為遊息之所而題之曰吟室蓋俊民所居據眉湘之勝得山水之秀有煙霞泉石之蕭爽有園池魚鳥之間適觸目興懷即物起興皆可發而為詩其必有得於性情之正而非世之流連光景徒事於風花雪月為藻繪塗抹者之比矣俊民來京師徵豫為記豫亦有志於詩者今齒逾五十尚未能得指歸雋咏古人之餘固不能不為之一慨也既不可辭遂舉古今人之所以為詩者以告之且以為記焉林泉逸樂記友人孫孟修近自吳中來謂豫言其所交曰黎庶清者世居淦之官洲嘗以林泉逸樂自號丐一言以為記豫日直禁林早出暮歸於文字鮮暇屬筆凡四方有求者必懇懇以辭而孟修以知已故請再三不輟且以豫與其父大恆有一日之雅必欲得一言以塞其願望之意豫不能以辭也則為之告曰嗚呼君子未始無所樂也而衆人之所樂者君子有弗與焉是故肥甘以為羞居室以為華輿馬聲色以為歡金玉珍寶以為玩此衆人之所樂也而君子則曰吾布衣疏食誦詩讀書怡神於恬寂之境寄迹於間曠之鄉不必有肥甘居室之美不必有輿馬聲色金玉珍寶之好而其樂反有過於衆人者此無他由其趣向之異而所志者有不同也然則庶清之取適於林泉者其亦幾於君子之樂乎雖然君子之志惟勤可以成德以逸自放者非美德也庶清妙齡美質好讀書吟詩明聖賢之道慕恬寂而尚間曠其志甚適也然所謂逸樂者豈流連光景放肆於形骸之外者之比哉蓋必以勤於逸優遊自適以樂其樂而異夫衆人者之所為矣大抵居山林者恆逺夫圭組之榮有圭組之榮者恆逺夫山林之樂憶豫昔在鄉校時常往來官洲之上與二三朋從延覽登眺擷芳潄流嘲風弄月其樂蓋悠悠然殆與庶清無異也今宦逰幾二十年追思昔時之樂恍若夢寐每翹首金川玉笥於長天落照之間未嘗不為之悵然也異時幸得歸省于家艤舟江上訪庶清於林泉之下絃琴賦詩以求其樂吾知庶清必有以相告也姑書此為記以俟沂江八景記淦之上遊二十里近曰沂江山清而水秀地幽而景勝緣江上下緑樹連坡長林蔽郭天光雲影蕩摩吞吐浮嵐翠靄掩冉隂翳沙禽水鳥飛鳴上下農家漁舍映帶逺近村歌野唱相和相答風帆浪舶蔽虧出沒四時之間男勤于耕女勤于織有蔬可茹有稻可食有魚肉酒醴可以供賔客有麻枲布帛可以給用度而孫氏之居所以享其土地之宜樂其山水之勝于此者蓋亦數世矣孫氏有彥士曰永字孟修豪爽俊邁喜讀書吟咏往來江湖間甚為賢士大夫所稱賞豫扈從兩京十餘年與孟修數相見暇日過豫談論恆傾倒相得也其家在沂江瀟灑幽逈景物之美具集目前孟修顧而樂之乃取其景之尤勝者命為八題一時士大夫咸為賦八景之詩而請豫為之記豫謂山水之區因人而勝者尚矣峴山之髙不逾於嵩華以羊祜而得名於後世蘭亭之美不逾於金谷以右軍而流芳於千載今沂江之勝不逾于蕭灘玉峽也一旦得吾孟修為之品題而其名遂播之四方此無他蓋因時而有所遇者然也栁子曰地雖勝得人焉而居山若增而髙水若闢而廣以此觀之為尤信雖然孟修之為志吾得而知矣以泉石為枕席以魚鳥為朋侣寄髙情於風月紬雅志於雲煙牢籠百態潄滌萬彚𢎞其中以廓其外若是則其所得而樂者必有出于八景之外者矣姑以是諗于孟修并書以為記樂善堂記新喻習均泰氏誠篤謹願士也嘗名其所居之堂曰樂善石門梁孟敬先生既為之銘今均泰墓已宿草矣其子懷恭念先訓之不能忘也而復請豫言為之記豫時直禁林晨出暮歸未暇屬筆而懷恭請之數四不置乃因退朝之隙舉所聞告之曰天下之道二善與惡而已矣善者天命所賦之本然惡者物欲所生之邪穢也人之常性莫不有善而無惡一為氣稟之拘物欲之蔽于是天命之本然者日以微削而凡目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚紛紛擾擾舉皆窘吾室廬作我蟊賊矣君子知其然必有以克而復之謹之于戒懼之際慎之于言行之間涵飬操存不使有一毫之不善以害吾天理之公如是則仰不愧俯不怍心廣體胖優遊於天理之內涵飬乎德義之中其樂油油然有不可勝言者矣嗟夫天下之物若金玉珠璣珍竒玩好聲音采色之屬可樂者多矣茍無道以制之孰不沉酣汨溺于此以喪其本然之天而均泰獨有見于此終其身惟德是好惟善是修不惟得之於已而又以樂之于心其志趨髙逺識見超邁視彼尋常聲利之徒營營汲汲以為不善而不能適其樂者霄壤不侔矣雖然均泰之善豈惟著于其身其遺訓之在斯堂者及今猶昭昭然登降俯仰之間使其子若孫徘徊瞻企感發興起一皆勉於為善而有以樂其樂則斯堂之慶所以垂裕於將來者其有窮哉懷恭謙慎亷退以明經舉為平江縣學訓導今以書滿稱職升湘潭縣學教諭能世其家云賚溪釣者記新喻多佳山水而賚溪尤占其勝是為傅氏之居而釣者孟素之所遊處者也孟素以布衣栖遲鄉里沖淡寡欲不慕榮利嘗持一竿釣溪上憩清風而弄明月濯煙波而友鷗鷺其志休休焉無一物以嬰于懷抱謝簮組於朝市飬嘉遁於邱樊希古人而為徒慕前修以自礪皎皎乎不可尚矣於是孟素遂寄迹于釣因自號曰賚溪釣者一時同志之士咸為之歌詠以寫其山水幽間之樂而石門梁先生孟敬復為之序以發其恬逸雅淡之趣所以嘉尚於孟素者其意深矣今孟素傾逝已久其子常熟令玉良乃以先生所為文及鄉里諸君子所為詩凡若干篇裝潢成卷將以垂示永久復來屬豫記之夫士之所志莫難於甘淡泊而尤莫難於逺榮利茍為利誘所牽其不汨沒於卑汙茍賤之中者鮮矣余聞孟素家居力問學克敦儉素無一毫外慕之心其以釣者自居特其迹而已蓋迹者身之所寓而心者德之所蘊也故善觀人者不于其迹而于其心茍以心求之則其人之趍向從可知矣余與孟素居同郡未嘗有一日之雅因推其心之所存與其志之所向而孟素之為人可以想見矣詩曰髙山仰止景行行止然則聞孟素之風者尚亦有所感發乎余重玉良之請用述此為記以遂其愛親之心且俾其後之人相傳無窮而知所愛重也雍穆堂記淦邑城之南闤闠輻輳室屋鱗次逺蹄輪紛蹂之區出塵埃喧囂之境而傅氏彥榮之居實在焉彥榮敦朴質儉克承其世慕賢尚德之心孜孜不怠而於世慮外物恆淡然無營二子長孟説次孟楫翹然不羣佳時吉日升堂展敘家慶父父子子兄兄弟弟歡欣怡愈椿桂並列花萼交映天倫和樂之美蓋可想見於是士大夫相與題其堂曰雍穆且來徴豫言以記之嗟夫人之至親莫父子兄弟若也自世教衰民彜物則有不能得其正者多矣故借耰德色取箕誶語以至操戈同室鬩墻以搆怨者比比而是於是家庭之內始失其和不相親睦不相遜順而大義遂乖君子不能不為之一慨焉今傅氏父子兄弟藹然和洽不競不凌揖讓後先不愆不惡恩義之隆同氣之感迭應而交孚使其中油然皆有以念其天顯之真敦夫倫誼之重而無有一毫違拂之意於其間非底夫雍穆篤於民彜者能若是哉其視世之蠧倫敗禮乖恩悖義怠傲凌戾者不可同日而語矣雖然彥榮父子之美豈特著于其家將使其宗族鄉黨之為父子兄弟者皆有以興於其行而成敦厚之風將見積之之久和氣之盛薰蒸融液感孚浹洽發而為駢頭之花連理之木以昭其應者又未可量也姑書此以俟是為記慈夀堂記吾里泉井孔氏系出宣聖詩禮衣冠之盛非他族可比宣聖之五十六世孫曰志仁者聰敏好學克承其家嘗念其父之不見而幸其母之獨存也乃即其室之西偏為堂數楹以奉起居名之曰慈夀屢屬余記而未有以復之今年春二月志仁買舟下鄱陽逾采石上金陵邐迤淮泗過鄒魯之鄉覽幽冀之區訪余於金臺之上間因退朝之暇篝燈夜坐談論往昔志仁復以前記為請余不敢固辭遂以所聞者而告之曰人子之心莫不欲其母之慈也然慈主於愛而或流於姑息愛失於慈則又傷夫情義莫不欲其親之夀也然或臻于髙年而飬有所不足或力足以致飬而親有所不逮斯二者皆人之所難能而有不可以必焉者志仁賴其母之賢鞠育教誨閔閔焉惟恐其弗成也諄諄然以望其有立也既不失於姑息而又不傷于情義是誠可謂慈矣母之所以慈愛於志仁者如此則志仁之所以願望其親者又當何如哉其必曰吾之於親恭為子職亦惟竭誠以致飬而已然又恐吾親之不待也故必期其夀考而後可庶幾焉余意志仁之於母思菽水之盡歡而恆存喜懼之情念桑榆之漸晚而不忘愛日之誠願母之夀必如岡如陵也如松柏之後凋也如南山不騫不崩也斯誠可謂能致孝而不負於母矣余兹竊祿于朝尚幸沐恩南還登斯堂之上誦白華南陔之詩奉觴酌酒以為其母夫人之夀庶因有頌歌志仁之樂豈不快哉姑書此以俟齊夀堂記華亭諸文亮氏司教京兆之九年秩滿得漳州之長泰縣學教諭將行來請於豫曰吾昔家居時嘗構堂為奉親之所名之曰齊夀所以期吾親於髙年者也今將歸為吾親夀幸先生賜一言為記庶以為諸氏子孫之榮敢再拜以請豫辭不獲則告之曰夀者人之所同欲也故洪範五福之疇夀為之先然不可強而致是以世之介眉夀以享有多福者甚不多見其或幸而黃髮兒齒則嗣世之賢舉案之樂又有不得以盡其美者焉何哉蓋夀也者天之所錫福之所鍾也非人力所可強致者也茍為不然其誰克有之此世之所以躋髙年者為難而孝子仁人得二親之康寧夀考者為尤難也今文亮昆弟既得夫人之所難又能盡美於其所尤難則齊夀之堂詎可無作而作又可無記乎豫想其昆弟之處此也二親期頥鶴髮交映綵衣斕斒子婦先後奉觴上夀歌南陔之篇頌和樂之章又賡之以既醉太平之什方是時也愛日之誠油然而無已婉愈之樂藹然而相得是雖有猗陶之富金張許史之貴韓彭之勳爵尚誰與易之然斯樂也非人力也福之所鍾天之所錫其視世之幸而得其難者為何如哉抑嘗觀之昔人能有是樂者不過老萊子歐陽詹以及郭元振包龍圗數人而止耳夫數子之外豈無其人哉蓋不具其慶也矧夫之數子者或以行義稱或以政績顯於是其親之夀不唯享有盛福於當時而史牒之書光采輝耀傳至今不朽也然則文亮昆弟既樂二親之夀以是而名其堂又必徵諸翰墨以圖詔之後世者良有以也夫雖然福者夀之源德者福之基自今諸氏兄弟子姓其惟德是植則福夀之盛固未艾也若夫德之不修而一以諉諸天則豈余之所敢知坤之文言曰積善之家必有餘慶斯堂之謂矣姑書此揭諸堂間庶有徵於方來云迎薰齋記永豐有地曰石溪趙氏士偉實家於此嘗以其所居狹隘不足以延賔客乃於屋之南為齋若干楹而名之曰迎薰中列琴書圖畫外植蘭蕙松竹誠隱居之佳勝也間來京師屬余友禮部員外吳君嘉靖來徴文為記夫人之所居必有勝地而後可以寓幽逈蕭散之趣既得其勝矣又必有宴居而後可以適性情暇豫之樂今士偉之居當山水幽曠之區而復為是齋以與賔客子弟宴休於此夫安得不快且適哉吾想其居是齋也㽔賔應候薰風徐來窗户之間爽氣浮動林柯之外清響逸發薦微涼於枕簟散澄灝於簷楹士偉於是或絃琴或觴酒或憩松竹之蔭或挹蘭蕙之芬周旋起居無不適意嘯歌徘徊皆有其樂至若思解慍之遺音想阜財於盛世慨然遐慕乎千載之上此其髙懷逺興又當何如哉而是齋之名於是為稱矣余聞士偉洎其弟士郁皆喜賔客好文翰而子姪六七人又能溫淳篤厚以承其家則齋居之勝必將有聞於世而迎薰之樂抑詎可涯哉昔人愛夏日之長而愜薰風之爽者誠有在矣士偉之齋豈得其心之同然者歟是可尚矣遂為之記焉望思堂記渝川周鼎鎮仕為汶上丞以其親老家居而身在宦途道路寥濶弗得迎飬於官舍乃作望思之堂于公署西偏退食之暇輒登降徘徊于此念關河之邈悠慨桑榆之既莫而弗得朝夕承歡膝下以罄愛日之誠雖昔人所謂三釜而心樂者蓋終有不遂矣其將曷以紓吾之思乎若夫引睇於太空也則有白雲之孤飛矚目於長川也則有春暉之和煦以至凝情延佇之際凡觸物而感於心者皆有以弗忘於吾親然則何由而己乎此堂之所以作也今年夏鼎鎮以公務至北京介其友鍾瓛來請文為記嗟夫人子之於親孰不欲日在其側以盡菽水之歡而不可以必得然後不能不致其惓惓之思如古人之於陟屺陟岵者可見矣今鼎鎮宦遊齊魯之間而其親年八十餘逺在江南相距數千里定省之禮滫瀡之奉不得以少盡其飬則其情之篤其思之切所以寓意於無窮而托斯堂以見志者蓋有過於昔人屺岵之悲者矣雖然顯親揚名孝之大者鼎鎮於蒞官行事能思有以貽親之令名以無忝所生則所以報親之德而致其終慕之情者殆庶幾焉鼎鎮尚於此求之因書以為記且以致勸勉之意云耕讀軒記古之人於學無所往而不致其力蓋以學者皆切於日用常行之實故雖居江湖畎畝之間耕牧漁樵之中未嘗以無所用而忘乎學也豫從姑子袁孟卓質粹而器純志鋭而行篤自幼孳孳慕古人之為學居石莊之上結屋數間左右皆喬林古木清泉白石交映几席良田美壤羅布屋傍孟卓躬耕之餘則讀書講道操觚染翰以樂其樂因扁其遊息之軒曰耕讀比來北京以其意請豫為之記豫謂耕所以為食蓋資之以給其家學所以求道蓋資之以裕其身古之賢士大夫未嘗以農畝為卑賤而棄乎耕亦未嘗以隱居不用而忘乎學也孟卓幸生聖明之世居畎畝之間誦詩讀書以樂堯舜之道天下和平雨暘順序四郊無虞百榖順成於以治粢盛以祀其先人於以出貢賦以供夫公上退而優遊以教其鄉之子弟勸之力本務農使知衣食之所自導之以孝弟忠信使知禮義之所重夫如是則孟卓之於耕既足以給其家而其學又足以裕乎身而及乎人其視世之不耕而食而不知學者霄壤不侔矣雖然孟卓豈終處畎畝而已哉隱居以求其志行義以達其道固君子之心也彼有託退耕以為髙離羣絶類髙蹈長往而遂以忘世者豈君子之所為哉孟卓久處山林幸一至此周覽竒勝覩太平製作之盛衣冠文物之富山河城闕之壯仰日月之光華感風雲之際會其能無致君澤民之念而共為帝臣者乎詩曰梧桐生矣于彼髙岡鳯凰鳴矣于彼朝陽吾將候孟卓於黃金之臺朝陽一鳴必有知吾孟卓者孟卓尚勉之哉全沖堂記夫天地之氣運行於亭毒之表絪緼坱圠未嘗有一息之或間寒暑以之而成序萬物以之而生育蓋莫非沖和之所為也然而雨暘之弗若燠寒之愆候則遂失其和者有焉人稟隂陽之氣以生四肢百骸運動舉措者亦沖和之所為也然六氣之弗調則隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾是淫者伐和之斧斤而戕生之蟊賊也於是不可以無醫醫也者所以推明五運六氣之祕察夫隂陽升降之候審其表裏虛實之證斟酌損益使無過不及之偏然後疾可差而人身之和可得而復全也於乎醫之功亦神矣哉姑蘇劉康民其先世皆業儒兼攻於醫祖啓源嘗任崑山州學録父叔昭有學行以醫濟人尤得時譽康民溫純謹願克紹其家今天子即位之初有司以其名上京師得𨽻太醫院復以選與扈從凡三至北京而其術益顯嘗取全沖二字為堂名以豫交之久來請文為記豫故為序天地之和與夫人身之和相為流通者以告之俾益修其業以診夫人之所以傷而保其所以全變其呻吟愁歎之聲以為欣愈順適之情斯則和之至也又豈非全沖之大本者乎康民尚勉而行之以求造夫全沖之實將見超躋顯融而祿位之加有不可得而辭者矣姑為記以俟朴齋記括蒼郭文通作小齋為退休之所而名之曰朴來請文為之記或質於豫曰文通性聰敏有巧思善畫用大小李之法作金碧山水尤精妙似非朴者而以是名齋不幾於相戾乎豫謂善觀人者于其內不于其外于其實不于其迹文通之於朴蓋幾於道也幾於道者思欲矯俗以近本實而造夫君子之域也嗟夫蚩蚩蠢蠢習為便儇矯偽者孰近於朴乎詡詡訐訐流為漫靡哇淫者孰務於朴乎文通不能以便儇矯偽也非全其真歟不能以漫靡哇淫也非存其質歟夫全真則無偽存質則無鑿無偽無鑿故淡然而自適泊然而自得遊乎太素之域處乎無為之鄉休休乎適適乎涵泳大朴以終其身者非文通之所以為志者乎夫如是固幾於道矣幾於道以近本實則為之朴也固宜於是質者釋然曰先生之言誠當也請以是為文通告且書以為朴齋記環溪堂記文江李撝謙純謹篤厚力學好古自其少時往來淦之西江樂其山水園池之美遂徙居之豫嘗厯覽其處觀其地勢之平衍風氣之翕合田疇彌望竹樹森列雲霞斂舒綺綰繡錯風泉噴激金鳴玉應鳥禽鱗介之翔泳漁歌樵唱之互答於是四時之間風雨晦明無不可愛而撝謙猶以為未也以其居之左右有桂林明溪二水交映此為絶勝之處又欲攬而有之乃作堂于二流之交而名之曰環溪暇則宴休其中或臨流而釣或掃石而坐或濯纓而歌或登邱而望侶漁樵而友鷗鷺席煙波而枕泉石徜徉夷猶莫不自得由是言西江之勝者以環溪為首稱而撝謙之意亦甚樂之以為勝也既而撝謙膺薦有司宦遊於外者幾三十年而環溪之勝往往形之夢寐間來京師求豫文記之夫常人之情始而隱遁則放情丘壑間若將終身焉及其出而有祿仕則又耽視貴富而遂忘其初服者比比皆是撝謙既有山水之樂於其未仕時及其出而效用驅馳四方今髮已星然白矣而猶惓惓於昔者釣遊之樂可謂篤厚之君子矣詩曰維桑與梓必恭敬止矧有若環溪之勝者乎異時撝謙遂休致之願豫亦得告還鄉幅巾杖屨相與往來環溪之上酣嬉詠歌以樂太平尚當為撝謙一賦之姑為記以俟獨知處記友人鍾君玉宇司訓于北京順天府庠嘗闢一室為藏修之所取中庸子思子慎獨之語而榜其室曰獨知處間以相告求一言以申其義豫謂慎獨之説子朱子言之無遺蘊矣顧豫何人尚敢容喙於其間哉辭讓不獲則以所聞與自勉者而為之告曰大哉心乎萬理之統而神明之舍者乎其廣也可以包六合貫古今而無不充其微也可以合天人會性命而無所遺方其未動也湛然虛明如鑑空衡平固無善惡之可議也及念慮既萌而善與惡之幾始形於此於是有不可以不致其察者察之將如何亦曰慎其獨而已矣獨者人所不知而已所獨知之地也所謂莫見乎隱莫顯乎微者此甚言獨之當謹而毫釐頃刻不可以忽焉者是故目能見矣而謂之隱則有不可得而見者耳能聞矣而謂之微則有不可得而聞者夫以不可見不可聞之處孰不易而忽之以為可以欺天罔人而不必謹者君子則曰皇皇上帝孰敢弗欽昭昭靈臺孰敢以欺曰隱曰微迹固未形也而幾則已動人固不知也而我獨知之則是昭晰於中固已甚於十目所視十手所指者矣是以君子於耳目之所不睹不聞者既戒謹恐懼以全其本然之體而於此尤不敢不致其謹者所以審善惡之幾遏人欲之萌又以防之於未然者也鍾君行純志潔強於學問平居和易簡默兢兢然動循軌則其於隱微之際謹之至而審之精內不欺於已外不欺於人所以致力於存飬省察者蓋非一朝夕矣嗚呼此君之所以為獨知而非體道之深者其何足以與此雖然君子之所以為學者不越乎敬而已戒慎於不睹不聞者敬也致謹於幽隱細微者亦敬也未發而敬者所以存天理之本然既發而敬者所以遏人欲於將然戒懼則靜而敬者也慎獨則動而敬者也推而至於天地位萬物育篤恭而天下平者亦無往而非敬也鍾君講道之餘尚於獨知之處反而思之從事於敬之一言孳孳勉勉以求造夫髙明廣逺之域則所謂賢希聖聖希天者舉不外乎是矣請書此為記俟他日造室中尚相與共講之淡齋記蘄州學正傅君子楫以去冬被纂修之命來京師今年秋九月竣事聖天子褒嘉寵錫復命還官將行以所名藏修之室曰淡齋來徴言為記豫謂淡之義有所謂恬淡有所謂淡泊釋者以為皆安靜也夫惟淡故安靜能安靜未有不淡者矣茍為轇轕於是非動搖其心志汨沒於庸俗之中奔馳於事為之際欲其淡而安靜者鮮矣子楫和易樂善不事表襮布衣韋帶泊然自處無一毫外慕之心與人交久而能敬不為翕翕熱相倚附往來士大夫間怡怡熙熙無所忤自始至終未嘗茍且急遽出一語妄謬周旋進退于于焉舒舒焉綽乎其有餘裕也非有得於淡者能若是哉或曰子楫之所謂淡者居室不事乎丹堊衣服不事乎華靡飲食不事乎旨甘文詞不事乎雕琢言語不事乎矯飾是其志固有所在者矣若子之言殆非子楫所以為名齋之意也嗚呼為此説者又豈足以知子楫者哉夫淡可以飬志可以寡欲可以體道可以觀萬物之情可以察天地之化怡神於至靜之中遊心於無為之表得失利害不足以為其纍榮辱欣戚不足以為其撓若是者非子楫之所志歟或者聞之釋然曰先生誠有道之言非體淡之深何足以與此於是書以遺子楫子楫拜而謝曰子之命我者至矣請以是為記謹思堂記吾友胡子琛佐安慶之屬邑太湖名其退休之堂曰謹思來請言以為記蓋將以自勉而勤於其政也豫謂人必有思也而後可以有為然泛思則無益弗思則無成三思則多惑故善思者必致其謹乃為無過若思而不謹必至於私欲妄動放情肆意而不知檢冥行瞽蹈而無所從其不至害道敗德者幾希子琛取是以名堂可謂知所本者矣然思之所謂謹者豈徒然哉晨而興必思行吾之政當有以化其民也夜而寢必思推吾之惠當有以及夫物也上而令長其將贊佐而敬承之乎下而簿尉其將寅恭而協和之乎一事之不舉必思所以振起之一政之不修必思所以作興之凡百里之內有關於吾民之利病者莫不謹思而力行之如是則可以舉於其職而無忝於贊佐撫字之意矣茍惟思之不謹而營營擾擾汨沒於利誘之私以昧夫天理之公則非惟蠧政厲民而所謂敗名喪德者實基於此矣子琛歸而思之必有得於豫言俟他日重來尚有以復我哉是為記友順樓記吾鄉去金田可一舍許張氏世居之張故名族其先出自分宜之峽石距今十有五葉衣冠之美甲于鄉閭而吾友張郁尤金田之俊秀者也郁字文範敦茂淳實居家讀書積學入郡庠為博士弟子員屢試於鄉不偶比年充薦成均厠髙等適車駕巡幸北京開館延文學之士編摩經籍而文範以工書選入館中書成獲被寵賚命待選吏部一日欵門告於豫曰郁不佞昔者家居時與吾弟文節文篆三人同室而處同爨而食同業而遊同心而弗二同情而莫逆以至朝夕出入服勤任勞治家理生又同事而相成也兄弟怡愈之情手足友愛之誼自始至終未嘗有毫髮乖忤嘗於所居之傍為樓數楹縱橫廣袤各若干尺佳時暇日吾兄弟三人相與進退揖讓於斯遊息寢處於斯其樂蓋油油也而斯樓之名至今未稱執事知郁之深幸為我名之且求一言為之記庶以警郁之不逮而示訓於方來也豫聞其言而異之則為之告曰子之兄弟並秀競爽克篤倫義相睦相好愈久而不替若是非友而順者不能也請以友順為子名之可乎嗚呼天下有至親而不可離有至厚而不可薄者莫兄弟若也人之於兄弟分形而同氣異體而同胞由孩提以至于成立其親且厚不啻若膠漆之固自常情觀之豈有至於可離可薄哉奈何天理易微人欲易滋一旦略關利害義即疏絶鬩墻發於忿懫攘袂起於門庭化骨肉為仇讎視同氣為冦敵若此者往往而是此無他由其不友不順之所致耳張氏之先世有處德若文範之先君時美祖安道皆孝友樂善鄉以長者稱至于文範兄弟尤飭身謹行克任繼述萃慶美於三世育和氣于一門友焉而彌篤順焉而益恭雍雍乎彬彬乎可謂能盡乎為人兄為人弟者之道矣由是推而及于其家以達于其鄉俾凡為兄弟者咸取則於斯則所以風勸鄉黨教戒後昆而裨益於倫誼者豈淺淺哉抑吾聞文範有母年七十餘尚康強無恙昆弟之間勤勤懇懇所以致飬于其母者未嘗少衰此尤人之所不能及者觀乎此則其得於兄弟者既如此而所以得於其親者又如此誠可謂孝友俱至而無忝於其先者矣雖然文範丁方壯之年懷經濟之術其意以為士生斯世際熙洽之運有可為之時茍得一命施於有政遂其濟時澤物之心以上報國家飬育之厚庶幾無愧矣是又文範報君之誠而存心於忠孝者也書稱君陳惟孝友于兄弟夫子言事親孝故忠可移於君文範行將上青雲登要津矣尚益致力於此勵其所已至而勉其所未及以求無愧於為人子為人臣為人兄之道是則豫之所望而期子於逺大者如此姑書此為樓記以俟且以告諸來者思恩堂記深州有蔣氏世家滹沱河之北其地曰五龍塘衍沃夷曠山水秀麗樹林茂密雲嵐煙靄卷舒朝暮蓋其州之勝處也有名卣者今為北京行部户曹主事嘗築堂數楹而題之曰思恩客有過而問之曰名堂之義何居卣慨然曰夫所以生我而劬勞鞠育之勤提挈撫摩之篤閔閔焉以望其成勤勤焉以厚其生者父母之恩也拔于凡民登于庠序迪之以禮義化之以道德使之琢磨淬礪於學術以底于造就者君上之恩也卣幸今遭值聖明忝有祿位既未能顯揚光大以致孝於吾親又未能竭力殫慮以報效於吾君君親之恩如天地之大以覆育於我而皆弗有所答如之何其弗思也客聞其言而韙之今年夏五月友人蕭公伯辰自深州來為卣徴言以為記豫謂人有莫大之恩而終身莫之能報者子之於其親臣之於其君者是矣蓋非不知為報也雖報之亦豈足以稱其施哉是故可得而報者其恩小不可得而報者其恩大子之於親也雖不可得而報然不可不盡為子之道以求無負於親之所以恩我者之篤臣之於君也雖不可得而報然不可不盡為臣之道以求無負於君之所以恩我者之厚盡為子之道所以事親也盡為臣之道所以事君也子道盡而於親無負焉斯報親之誠也臣道盡而於君無負焉斯報君之誠也所以然者亦曰致吾之思以盡夫天理之當然耳夫惟能致其思也是以一跬步而不敢忘乎親一食息而不敢忘乎君敬恭於朝夕之際致謹於操履之間不以毫髮而有玷不以隱顯而有虧惟其所在而莫不戒謹恐懼以盡其思慮之微則所以報吾君親者庶幾在是矣間以是復於伯辰并以答卣之請而致其勸勉之意焉是為記錦杏軒記太醫院御醫金剛中世家浙之錢塘代以其術顯錢塘之人有抱札瘥疾疢者不之他氏必詣金之廬而請焉自其祖父至于剛中以其術濟人多所全活剛中居家時愈人之疾未嘗有責報之心欲效昔董奉事第令種杏數年之間杏皆成林根株盤固枝葉薈蔚春陽時至千葩萬萼一時競吐如披綵纈如烘丹砂如點絳雪如蒸赤霞光采穠麗爛絢雲錦剛中顧而樂之乃築軒杏林之中而顔之曰錦杏既而以選召至京師𨽻太醫院以拜今官嘗從容為豫具道其軒之勝且徴文以記之余聞董奉居廬山治人疾愈不責其報但令種杏嵗久成林後奉竟以仙去其迹誕漫不經故後人間有一造其境則荒煙白露漠然徒見山髙而水深欲求向之紅霞萬樹燦然可愛而賞者已皆不可復得然則奉之杏與其出處果信然否歟是固不可得而辨已今剛中之學世有顯著而錢塘實其故業杏林之錦誠非誇詡無實之景而及今又得以其術遭遇聖明之世列官于朝為國上醫則其名譽事迹赫然光顯視向之種杏如奉者蓋霄壤不侔矣雖然錦杏之在軒固為可愛而四時代謝有不可以常得孰若活人之心如春陽之澤物使疲癃夭閼者皆如杏樹之敷榮暢達不復枯稿則其可愛又當何如哉姑書此以復剛中以為信然否也象江八景記余友蕭君迪哲世家淦之象江上距玉峽下接湄湘前瞻玉笥羊角諸峰之秀後據百丈均山鶴峯之勝其地夷曠饒沃居逺近皆竹樹桑麻緣江多蘭芷魚雁鳬鷗遊泳上下風帆浪舶往來蔽虧水光雲影浮動大空而四時之間凡可以供臨眺者舉出於履舄之下蕭君顧而樂之乃以其景之勝者命為八題賢士大夫相繼為之歌詠而學士曽君子棨既為之序乃復以書來屬余記之豫謂象江為淦川之勝而八景又象江之勝然自開闢以來其景之在象江者若無所增損也何曠世之間無一人為之品題乃始聞於今日耶是知山水之勝亦必得所遭也嗚呼峴山之髙不逾於太華得羊叔子而其名遂傳於天下蘭亭之勝不逾於金谷得王右軍而其美遂冠於古今象江非有瀟湘洞庭之廣不得吾蕭君為之攄幽發竒又安能顯著於今日然則栁子所謂地因人而勝者不其信歟雖然天下山水之樂無窮而或地之所寓非竒勝之區景之所得乏偉麗之觀則其樂有不能盡者今蕭君之居象江其於竒勝偉麗蓋兼有焉宜其撫而樂之而攄諸歌詠也如此余年逾六十漸進衰老幸他日謝官南還得從蕭君往來於象江之上攬玉山之白雲招金川之明月相與酣嬉觴酌以極夫竒勝偉麗之觀然後發羣公八景之詩援琴而賡之吾知其樂又非他人所得而與者姑以是諗於蕭君且以致余願慕之私云德隱堂記吾家去東梅五里許有龍氏為著姓余自弱冠時識龍君添德修眉廣顙身長而體豐氣宇超邁卓犖不羈鄉之人莫不敬焉已而君謝世又獲與君之子仲齡季修相往來今春之三月仲齡過京師訪余寓舍因張燈出酒相與道契濶酒再行仲齡作而言曰吾先君存日嘗以德隱為堂名山隂仲修劉先生為篆三大字揭諸楣間僕兄弟朝夕曕對每為之惕然興懷今欲託諸文字以垂不朽且以寓夫孝敬之思子其為我記焉余心許之而未克屬筆比來伯兄季質就省慈闈復以仲齡之意為請雖欲無言其能已於懷也君子之生乎世也不出則處不隱則顯未出而隱也固不以隱為髙而顯為非既出而顯也固不以隱為卑而顯為榮出處隱顯惟天所命天者德之所在違夫德而求合於天者未之有也方龍君當有為之日懷慷慨之志雖未獲顯融於時然于公家之劇務人事之酬酢鞠躬盡力一循乎理是以推究規畫之間不勞而集暨後故家右族相繼凋謝君獨晚節自持栖遲林澗杜門謝客日以教子讀書自娛卒得令終此殆天之所以為報而德之徵于人可信不誣大抵德雖隱而其應甚顯天雖逺而其理甚著隱顯幽微之際皆天理所存故君子畏而謹之若龍君者可謂審於德而獲於天者矣揭名斯堂誠有望於將來也宜夫仲齡兄弟不忘所自拳拳以先德為念其賢於庸衆人者逺矣雖然天下之物其本厚者其積髙其源深者其流長君子修德以為其本不必期於天而天自祐之不必求乎福而福自歸之將見斯德之徴垂慶於子孫者其有窮乎詩曰毋念爾祖聿修厥德又曰永言孝思孝思維則惟仲齡兄弟其勉之春暉堂記或問於余曰人子之於親可得報乎曰非不可報也欲報之而有所不能也是故視寒暖之節以適其體治甘旨之具以備其飬謂之奉乎親則可而謂報乎親則未也婉容愈色以將之先意承顔以接之謂之悅乎親則可而謂報乎親則未也立身行道以致於用榮爵厚祿以賁其身謂之顯乎親則可而謂報乎親則未也大抵可得而報者其恩小不可得而報者其恩大子之於親政所謂不可得而報者故小雅之詩曰欲報之恩昊天罔極而孟東野亦云難將寸草心報得三春暉此蓋甚言父母之德愈大而難酬愈厚而不可報也豫章李君彥琪溫純孝友恆念其先人歿不待飬獨幸其母夫人髙年無恙愛日之誠悠然無已而凡可以奉其親以慰釋其心者無所不用其情乃築堂而名之曰春暉來徴言為記余謂彥琪之取是以名堂者非以著其能孝也誠以親之德同乎天大而難報所以慊焉於此而常若有所不足者彼汲汲焉致奉於口體勤勤焉強勉於承順切切焉徼榮於爵祿而曰此足以報吾親之德其亦異乎彥琪之所志矣彥琪嘗與豫同領江西鄉薦仕為泰興學官秩滿升蘇之儒學教授有文行稱于時行將躋顯融踐華要自致青雲之上則所以報其親者其有窮哉豫言不足為彥琪重姑述夫名堂之義以告于來者且俾世之欲報其親者不可有自足之心而益加勸勉云梅溪清隱記梅溪在新淦金灘宋氏世居之宋故巨族詩書閥閲之華為望於鄉邑者數百年至其裔孫曰惟學甫尤好學蓄德以承其休嘗種梅溪上歲久蕃茂大者交柯屈鐵如龍盤虬攫偃蹇樛曲不可名狀其小者雜然以生挺然以遂彌布於水濵籬落之際者尤衆也當窮冬沍寒百卉凋謝孤芳獨秀鮮妍髙潔而殘雪初霽溪流淺清月色澄映惟學甫方乃幅巾杖屨延佇徘徊詠歌逍遙招逋仙於天外揖姑射於雲間芳馨襲人萬籟俱寂恍然如入羅浮之境逰西湖之涘一時髙懷雅致邈不可尚因作軒俯臨溪傍名之曰梅溪清隱士大夫相知者皆為之作詩以寫其幽逸清曠之懷由是梅之植日盛而溪之名遂顯焉厥後惟學甫去世其孫常固以斯梅先祖所愛者乃益加培殖而不敢廢又懼其厯年之久或泯而無傳復汲汲焉以其意請為之記於乎士君子之有取於物者豈徒適性情資玩好而已哉蓋將以礪行而嫓德焉耳草木花卉之植競芳菲艷春陽非不美也而世俗之所同好君子有不取焉惟夫梅質堅而不脆花素而不妖香潔而益清挺立於嵗寒凍沍之際獨秀於羣芳既謝之後非正人君子不足以嫓之若惟學甫之所好尚可謂超軼凡情而嫓德於君子者矣今常固追想遺愛久而不忘而拳拳焉思有以繼繩於祖武其志固有足嘉者然豫尚有告焉夫仕之與處其趨異而隱之與顯其迹殊常固以經術發身任職民牧正致力效用之時繼今以往益思所以濯磨淬礪卓然自立不為夭冶以徇俗不為靡麗以矜時志乃祖之所志修乃祖之所行以期建功立事為梅溪之光庶幾兹軒之名傳之無窮而於乃祖亦重有榮耀矣是為記靜深堂記文江之西一舍許為富溪其地衍迤饒沃喬林嘉木掩冉隂翳連峯疉巘含滋育翠清流碧湍環抱逶迤雲煙朝夕室屋蔽虧而望之巋然出於溪南之上者則蕭氏所為靜深之堂也蕭故大家其先自西昌徙居於此者若干世至伯淵甫尤植德不倦撫世酬物一歸於厚嘗因其字伯淵遂以靜深為其堂之扁蓋取朱夫子中庸釋淵泉之義其飭躬裕後之意可謂切矣伯淵即世其子希迪希用仰瞻遺訓益篤不忘而希迪慨然以為非託之文字則不足以傳逺示後乃遣其孫積訓走京師屬余丈為記余謂君子之所以承其先以貽諸後者莫先於積纍而德善者其本也易曰積善之家必有餘慶善積于此而慶流于彼此自然之理也彼積之不至培飬之無素忽焉而赫奕俄焉而銷歇者以無其本故也今夫水之積為淵泉泓渟淡濧撓之而不溷出之而不竭者其本之厚也溝瀆沼沚之聚蹄涔蟻垤之積不一朝而枯竭無餘者其本之不厚也蕭氏以德善為藩屏以禮義為根柢自伯淵甫以至于今父祖子孫彬彬傑出敦本務實油然樂易之心入孝出弟藹乎和順之意田園日饒乎生息門第益致於蕃盛公上之供不缺伏臘之資有餘混混乎其益厚源源乎其益深百年之間所以享其安利而沾被於慶澤者豈無自而然哉於戲此伯淵甫所為名堂以期於將來者其寓意亦深矣太史公曰德厚者流澤廣德薄者流澤卑使蕭氏後之人因是而益務于敦德篤善以培其本以濬其源則其慶澤及于久逺者其可涯涘哉詩曰子子孫孫勿替引之又曰以似以續續古之人請誦此以為希迪告且以為靜深堂記重建陸宣公祠堂記檇李舊有陸宣公祠厯有唐宋元廢興迭徙不一國朝洪武初郡守劉澤民重建於城內實元江南書院之故址且以公十六世孫應竒守其祠嵗久風雨頺圯因循弗治民有力者侵奪其地乃宣德二年大理卿胡元節承上命巡撫吳浙諸郡鋤姦植良政行化洽慨念公之忠誠而廟食未稱實為缺典遂購材鳩工復厥侵地命郡人王愷之董其後祀享有堂燕處有室門廡庖庫序列輪奐周垣崇崇環以林木胡君于是率其郡之僚屬祭告落成焉遺象有嚴登降有禮數年之廢一日而舉士人耆耄瞻望嗟咨咸請書其事于石而郡教授張萬選乃來京師求豫記之豫嘗讀唐史而得公之所以立身事君之大者其要不出于一誠而已觀公之進言於德宗有四人之所助在乎信信之所在由乎誠一不誠則心莫之保一不信則言莫之行又曰誠信之道不可斯須去身夫誠者聖賢之所以成始成終者也人君舍之無以成開國之務人臣舍之無以盡匡輔之道公之言若此豈非得夫聖賢誠身之學者哉當有唐中葉藩鎮跋扈鑾輿播遷宗社幾覆賴公密謀贊襄再造有邦而公之忠誠切至不以夷險易節一論討河北破李希烈之䇿不用再陳制李懷光之計不行而陳論愈力竇參忌之于前裴延齡沮之於後而自守益固非誠而能之乎從守奉天所下詔書皆公視草痛自引過曲盡情事雖武人悍卒聞之無不感激思奮非一誠之所推乎惜乎唐祚不競德宗以猜防信讒之君用不克終而公卒歿於貶所豈非天哉雖然公雖不盡究其蘊於當時而其忠誠之所感奏議之所存垂之天下後世雖與日月爭光可也則今日祠事之復于公固不足為重輕而所以起邦人瞻仰之誠勵臣子忠君之義則不為無助也豫既嘉胡君之能敬崇先哲舉廢墜之政因論公生平立身事君之大者以明公之心于數百載之上且俾後人謁公之祠者讀之得有所勸焉重建靈安寺記新淦玉峽靈安寺者僧彌勒之所重建也寺自唐宋來已有之逮元末而廢惟觀音閣存洪武丙子僧道成始自永豐之靈泉寺住持於此以興起其墜緒實玉峽巡檢張子昻鄉之耆宿李子雅相與製疏迎致之也彌玉嗣道成克揚宗風顧舊址局于地勢位置弗合毅然以興復為己任乃距其寺二里許得勝地於今四顧臺下都督金剛諸峯舒竒獻秀環列左右石牛嶺蜿蜒奔放矗乎其後誠天造地設之佳境也而鄉之樂施之士曰劉文仲楊貴敏實捐是山俾之以成其志彌玉乃夷荆榛闢土壤出衣盂之資勸導衆力市材鳩工首創佛殿髙四尋有竒深廣倍之殿之後為法堂為毗盧閣左為藏殿右為地藏十王殿其前則鐘鼓有樓門廡有序而丈室庫庾庖湢之廬莫不畢備經始於永樂十五年丁酉八月落成于宣德年月寶相玉毫輝映霄漢金碧髹彤照耀林壑偉制宏模人天具瞻猗歟盛矣惟吾淦多佳山水而玊峽玉笥其雄勝竒偉又為江右最但往往為道流釋子之宫所據雖其為教易以動人亦為其徒者多才智勤力之輩而豐家巨族有輕財樂施之士以相之也且吾聞彌玉為人精修苦行孝敬而善學其師祖深省堅公舊居百華寺特迎致于靈安晨昏奉飬備至又不以其能自足間師天寧都綱新公復古講其禪宗之旨而又能甘勤苦淡薄以成此勝剎其可謂難也已彌玉間來京師求豫文記其興造始末之故欲歸勒諸石而邑人李萬魁復捐金為之助豫家距玉峽不一舍許雖慨佳山水為彌玉所有然愛其能開創是山以為逺近之巨觀他日幸謝事南歸窮登覽之勝時從玉峽訪靈安以徜徉暮景之樂蓋素志也遂喜而為之記以示其後之嗣守者復以識豫之私云歸田别墅記宣德戊申之夏福建左參政永嘉楊公景衡引年致政乃臨行以告豫曰吾所居即古東甌山水之奧區今幸復退休于此將築室以為燕逸之所而名之曰歸田别墅子幸為我記之豫謂墅者田廬也古者田中有廬以為耕者之所憩息後世大家巨族往往即山林幽絶之處作為陂池亭榭以為遊觀臨眺之所謂之别墅若公者以少壯出仕南北馳驅更厯多故夷險憂樂終始一致而揚踐中外幾四十年至是始克謝事而去蓋四方之志倦矣其所以惓惓於是者不過欲託此以為終老之計此别墅之所以作也歟吾意公之去此而休也其林壑泉石之美足以資玩賞其池館軒檻之適足以備栖息其圗史琴尊之具足以娛心目而又有騷人韻士子孫賔客朝夕相與登山臨水絃歌賦詩以逍遙暢適乎其間斯則别墅之勝而公之所以為志者蓋如此雖然公之志槩可知矣然古之君子居畎畞之間一飯不敢以忘乎君公念生平之出處荷纍朝之恩遇慕戀感激思所以詠歌太平鋪張鴻猷以報聖天子生成之德蓋亦庶幾不忘其所自邪公於此亦豈能自止也姑以是復於公公以為如何是為記永慕堂記淦人李宗祚以其二親之沒久而思之不忘嘗揭其堂之楣曰永慕間以其情求為之記宗祚之尊府彥澄公與先少保雪崖學士實為忘年交豫自童丱時已識之其為人剛方嚴毅不茍諧於俗布衣疏食泊如也奉其親極孝親歿哀毁不勝纍然衰絰三載如一日其後以薦者擢興寧知縣慈祥豈弟有及人之惠居數載以老休致于家年七十六而歿既而宗祚不幸嬰禍難舉家謫戍逺方寒暑瘴癘艱苦萬狀日思其親無須臾而休也每以興懷輒泣下霑襟聞者為之感動嗚呼孝弟天性也子於父母親親之至一跬步而不敢忘者况於既歿之後終天之痛其思宜何如也然人之情一經貧窮患難富貴利達未有不異其思者能不以是而異其思愈久而益切愈逺而不忘者可不謂之孝子哉宗祚自幼服公之訓敦于孝道故雖蹭蹬艱虞之際炎荒瘴徼之外未嘗以失意而忘其親此人情所最難者卒之萬里生還克復舊業存宗祀於板蕩之餘此非天道神明有以默相之者乎若公者可以瞑目泉下矣因宗祚求言遂記之如此用以告其後之人且諷于鄉里俾聞宗祚之風者庶亦知所勸勉云具慶堂記具慶堂者新淦橫溪何祐奉親之堂也易曰積善之家必有餘慶夫慶莫大乎親之存世有父存而母不待飬者謂之嚴侍有母存而父見背者謂之慈侍嚴侍慈侍雖皆為慶而不足為具慶獨父母俱存者為具慶此祐奉親之堂所為名歟祐不獨父母俱存而其兄弟四人又相友愛無或間言蓋庶幾詩所謂兄弟既翕和樂且耽以順父母孟軻所謂父母俱存兄弟無故一樂也然則祐奉親之堂蓋又有超乎具慶之外矣謂非由善積而致然歟祐之父士端敬賢尚義教諸子以學而自篤好於醫務以澤物為心而凡有求之者施之未嘗責報此其積善之可見者是以能致具慶之福而有子如祐兄弟之賢者焉祐自少志氣不羣嘗自江涉淮厯齊魯以達遼海轉而之乎京師周覽竒勝充然若有所得而歸分行以其具慶之堂未有為之記者屬其內姻吳主事揚來請文於豫豫屢辭不獲因為之書使其益務善於已以為家慶之本而施及後之人以繼承於無窮焉是為記思親堂記君子之於其親未有不思者不思者豈人情哉然世之人又豈皆能思而不忘其親耶惟其有不思是以思之者為難而思之不忘者所以為尤難也吾新淦玉峽驛丞陳光振世居廣之筆慶其為人謙恭而習於禮敏給而達於事嘗以其父早歿獨母氏年七十餘在堂不得供飬以盡子職恆蹙然于懷每翹首嶺表未嘗不咨嗟浩歎而繼之以泣也士大夫聞者為作詩以攄其悲遂相與名其退休之署曰思親之堂屢以其意丐豫為記未有以答之今年夏來考滿京師復溫前請至再三不已豫不能以終拒也則為之告曰古人以行役之勞念其親者則有陟岵陟屺之悲以宦遊之逺念其親者則有白雲親舍之想所以然者豈非以曠缺定省不得致其飬為慊歟光振蚤喪嚴父不逮於飬幸賴母存可以少盡菽水之歡而又以宦遊不得遂其志此所以切於思慕而不能置者歟雖然昔人有子在京師其志樂者子在親側其志不樂者何哉豈非以人子所存當志其逺且大者而區區衣服飲食之奉依依庭闈孺慕之私殆不足以盡其務孝之實歟光振於此尚思以逺大自期若何而忠君報國若何而顯親揚名必求所以盡為人臣子之道以無負君親天地之大恩則其所以為思超出於常情萬萬矣豫以逺大望光振光振亦當以逺大致其思無徒區區溺於常情孺慕之私則他日所以顯榮其親者又烏可量哉姑為記以俟萬木圖記古之君子修德為善恆不求人之知而責其報蓋以為已之當然非有求於人而勉強為之者若吾建安楊公達卿殆其人者歟公為人忠信篤厚敦德好善施豫弗吝歲嘗歉鄉人飢甚公私自歎曰吾有粟而不以散於人非仁人也將謀發粟以賑之而又懼有其名乃指所居龍潭之山語人曰若等能為我植木吾酬之以粟聞者皆競趨之其植與否公亦弗之較也不數年木繁夥暢茂久之鬱然林立而干霄可以為材公懼其子孫將貨以自利也戒之曰慎守之毋伐惟民居學宫仙釋之廬及死者之棺槨濟涉者之舟梁則悉以施之而無所計以是惠利之及於人者甚廣公歿後二十餘年山木之萌蘖者至是復發榮滋長沛然若前日之暢茂而不可禦人咸以為公德善積久之應其見於生物之盛者豈徒然而已哉蓋將以為公子孫蕃衍盛大之徴耳公存日元左丞阮德柔嘗為公寫萬木圖以傳播于時兵燹之餘圖不復存而公之孫右春坊右庶子兼翰林侍講榮懼其久而無聞也復命中書舍人毗陵王孟端為圖萬木以寓其思且以告其後之人既裝潢成卷而持以示豫不鄙謂豫記之於乎人之行莫大於為善善有諸已固無與於人也而世之人往往好名要譽務為矜肆誇詡旦暮汲汲焉恆恐其不見稱於人又且期望責報於人者甚至於乎此豈誠於為善者哉若公以布衣居鄉里恬淡沖退不事表襮自少壯至老勤勤懇懇一以敦德力善為務而其惠之施於人及於物者蓋不可以一二計使他人有此其為矜眩誇張不知為如何而公乃惴惴焉益自韜晦泯其迹以逃其名未嘗求人之知而責其報焉方於古之篤行君子又何多讓哉宜夫公之獲報於天而敷遺於後者如此其盛且大也然則斯圖之作所以傳於永久以啓迪楊氏之後人者視吾庶子之用心不亦勤且至哉豫竊慕公之為人可以教勸鄉里且以庶子之克承其家而不違夫公之志故樂為之言並書以為記映雪齋記新淦泝流而上可半舍許曰沂江江之上衍迤修曠其民聚處者凡數百家而孫氏為最盛孫故望族多衣冠之士所居有佳樹茂林清泉白石前睇大秀玉笥諸峯左挹楓岡之秀右枕大江之流雲嵐蒼翠山光水影回抱映帶宛然在門庭几席之下而吾孟修之居尤占其勝焉孟修資質秀爽胸襟灑落好讀書為歌詩孳孳不怠前年來北京袖其所作數十首相示余讀之且賞且歎與往來談論者纍日間請於余曰孟修不佞竊慕先哲之遺芳而有志於學嘗闢一齋為藏修之所而名之曰映雪蓋欲憤悱自勵以求分寸之益幸賜一言為記且以示教焉余即許諾未有以答之今年秋七月孟修復自南來相見之頃又以其齋記為請余不獲辭則為之告曰夫雪之為物極天下之至潔而無以加極天下之至白而無以過者當嚴冬之際錮隂沍寒同雲萬里上下一色霰淅瀝以先集雪繽紛而交下溪流無聲萬籟俱寂日晃晃以就夕月輝輝而向夜吾想夫孟修之居是齋也正襟危坐凝神定慮四壁洞徹朗然虛白於是延攬光景窺閲簡編含英咀華探賾藴奧會至理於一心契沖漠於無眹極乎髙明超焉自得蓋將與造物者為徒而逰乎太素之表矣然則孟修名齋之意而所取於映雪者殆以此歟雖然孟修之為學豈徒然而已哉去其昏則必湛然如雪之潔而不汙濯其垢則必皎然如雪之白而不變砥其操以厲其行持其志以飬其氣如是則所學者益篤所得者益密所造詣者益深而於景行先哲者庶亦可企而及矣若徒騖其外而不察其內徇其名而不究其實致其逺而不由其近此則非孟修之志而亦非豫之所以望於孟修者也孟修尚歸而求之俟豫他日謁告南還造映雪之齋相與援琴賦詩發猗蘭白雪之操吾知孟修之所以起豫者又非今日之比矣姑書此以俟永思堂記先大夫諭德司訓臨江郡庠時有杜士賔者嘗從遊而學焉其為人英邁頴敏善記誦為經義有法則每屬筆伸紙輒先就未嘗有窘束艱澀之狀時郡守王敬仲方以興學為己任每見士賔必加奬勸先大夫於諸生中少許可獨異目視士賔蓋將進之於成德達材之地而期之以逺大也居無何士賔遘疾竟賫志以歿聞者莫不嗟悼之方士賔歿時未有子顧其兄士昻曰吾婦已娠幸而有子善撫育之俾克成人以繼吾之志雖死且無憾矣士賔卒後果生子觀自孩提為成童敏慧過人其鄉里族姻莫不慶士賔有後而謂觀必能繼士賔之志也比弱冠觀以士昻之命復入郡庠為博士弟子員業春秋奮然以科第自期今天子即位之明年改元永樂其秋觀以第四人魁薦鄉闈明年上春官登乙榜授山東濟陽縣教諭觀恆以不得識其父為終身之憾賴其母辛勤鞠育底于成立以為見其母猶見其父之存也故凡可以報其母者無所不盡其情雖以山東去鄉里之逺而念母之心拳拳不置乃極力迎致以飬焉已而母沒觀悲不自勝茍可以致力於襄事者又靡不盡其誠敬每與人言輒嗚咽流涕既傷其父之早世又念其母之不見悵悵焉貿貿焉若欲求之而不可得者此永思之不忘所以託於名堂以自見也嗚呼人莫不有親也獨觀不幸而未識其父當其時雖賴母以生而其成與否有未可必觀乃能刻苦自奮卒由庠序發身登名薦書無負於乃父之所望且又得祿為母飬以夀考終自他人觀之若可以無憾矣而觀猶日夜悲念其親愈久而情愈切愈逺而思愈深非純孝篤至者能若是哉雖然觀以方壯之年強於問學由是而益致其力益廣其思立身揚名以顯其親則所以為孝者不既大矣乎觀間以其情相告復丐豫一言遂書此為記且以致期望之意云墨林清玩記天下之物可玩者非一若金玉綺繡之珍聲音采色之美凡有以悅心志娛耳目者皆是也然而好之以為玩小者致怨大者賈禍甚者至於滅身此無他清濁之玩異焉若夫天下至清之物可賞可玩決不致於招怨賈禍使人終身玩之不厭而得其樂者其惟翰墨之事乎友人蕭公伯辰宦遊四方幾三十年淡然無所嗜好平生篤志於翰墨圖書公退之暇輒操觚染翰賦詩酌酒以樂其樂未嘗汲汲汨汨而有所不足焉今年夏公以報政來京師間求當時士大夫名公能書者輯為一卷題之曰墨林清玩屬豫言以識之嗟乎天下之物可玩者多矣所謂金玉綺繡聲音采色之屬皆衆人所酷好以為玩之至美而至貴者也公不同衆人之所欲而獨嗜好於翰墨非惟嗜而好之又能因是以怡情飬性而得其所以為樂者誠可謂極天下之清而無害極天下之玩而無厭者矣雖然人之所好要不可沒溺以陷夫一偏之癖凡世之可玩而經於目者付之一賞而足矣古之士所以不免於撫心嘔血復壁走舸之譏者蓋以此耳若公有民社之寄出而臨民施政以盡其職入而周旋於文墨以樂其志視彼之汨沒終身而不悟者霄壤不侔矣卷中所書若翰林侍講曽棨子啓翰林修撰沈度民則中書舍人許翰鳴鶴朱寅孔暘沈粲民望朱暉庭暉前浮梁丞陳登思孝皆擅名於一時有不俟豫言者故特書公之志有足尚者以識夫嵗月俟公他日歸休林下與賔客故人酣歌賦詠時展而玩之以想夫當時人物之盛與夫平生交逰之美豈不重停雲之思而有無窮之感者乎村樂記新淦之官洲黃氏為山谷先生之後自雙并來居于淦者蓋若干世矣豫遊鄉校時嘗識伯原父又嘗識其子公器父子一門衣冠于于雅有風致甫既歿公器克振其家表表鄉閭間以隱為髙因所居號曰村樂屬姻家趙君公復來徵文為記豫嘗一至官洲見公器之居四面皆平村迥野衍沃夷曠山逺而秀川涵而清園池巷徑杳密靜幽竹樹隂翳泉石疏滌菱荷蘭芷郁郁紛紛魚鳥鳬鷖遊泳翔集農耕婦織密邇而相聞樵歌野唱朝呼而暮應風帆出於林端棹謳發於户外與夫雲霞霧靄之相滋寒暑晦明之變化四時景物之竒可喜可愛可賞可玩可歌可詠者無一不出乎履舄之下宜乎公器撫之而得其樂樂之而久且不厭也雖然人知公器居村之樂而不知公器之居于家者有父子兄弟之和以樂于其身有詩書琴瑟之美以樂于其心有觴詠倡酬之適以樂其性情熙熙然陶陶然蓋無不得者然猶未也至若時和嵗登年榖豐阜公器與其村之人幅巾褐衣婆娑嬉逰含哺鼓腹和康衢之謠誦日出日入之歌黃雞白酒相勸相酬抃舞於青天白日之下此其樂果何從而得哉是蓋天之所錫聖上之所賜而太平千載之盛福也惜豫不得與公器樂之幸他日來歸結屋滄洲之上共尋村中之樂與公器為鄰吾知村中之樂又將推以與豫夫豈黃氏所得而專哉姑書此為記置于壁間以俟一樂堂記余氏故江右令族其先自饒陽徙成都至成德以武功授六品官因家北京城東門之左嘗闢地構堂一楹不雕繪不丹漆惟置圖書尊爼其中以為燕休之樂永樂己丑春余扈蹕來北京賜第禁城東密邇余氏其仲子信一日奉父命來徴堂名豫告之曰子之親年方強壯而未耆耋子之昆弟聨芳競爽而相友悌非孟軻氏所謂一樂者乎請以是名之信謝曰先生既不鄙夷而賜之名敢祈一言以為斯堂之記庶以昭示將來而傳之永久則余氏世世受惠庸有既哉豫乃告之曰天下之物可樂者非一而皆可以力致之是故珠璣金玉之貴可樂也山海出焉錦繡寶貨之産可樂也商賈通焉輿馬居室服食子女之美可樂也富人有焉至若天下太平四方無鬬爭金革之聲一門之內二親康強夀考未艾朱顔鶴髮輝映於一堂之上昆弟輯睦鴈行後先佳時吉日服萊氏之衣誦華蕚之章旨甘定省之不違乖爭凌暴之不作和氣滿堂熙然如春怡怡焉愈愈焉有不知人世之樂可以代此者是豈偶然之故哉蓋有得於天而非人力勉強可以幸而致也樂出於天而得於已又能昭其所以樂者以傳諸後則余氏父子之賢不徒能樂其樂於今日又將使後之人慕其賢而知其所以樂夫天者然也於乎人孰無父母無兄弟也而百嵗之內其盛衰欣戚死生存亡可感者何限豈能皆如所願必其俱存而無故者哉余氏世篤慶烈父作子述克濟其美獲於天者既厚則所以垂裕於後昆者詎有涯哉姑以是復於成德遂書以為記梅雪齋記淦之下遊三十里有謝氏劉氏何氏皆名族文雅俊爽之士彬彬輩出而辱交於豫者先後相望豫至北京之明年有何氏名淮潤者自齊魯而來既相見揖而請曰吾家世居莒洲洲之上幽間夷曠多佳山水嘗構一齋置圗書琴册其中左右環植以梅四時之間惟雪最宜而心又酷好之因以梅雪顔其齋之楣敢丐一言為之記且以自朂焉豫惟物之植於天地間莫非春陽以喣之雨露以濡之風霜以收斂之故其萌而為敷枿發而為英華結而為果實皆足以悅人心目而致人之好尚也獨梅之於羣卉中又若有異者焉是故不榮於春不實於秋不凋瘁於冬而清姿徑質適有類乎雅操之士則其可好又宜不在于衆人而在于士君子也淮潤以梅雪名齋可謂好之得其宜者矣豫想夫隆冬沍寒萬木摧折黃雲在空密雪交下天宇無塵上下一色齋居晃然益清而潔梅粲粲而始花香霏霏而在樹回孤根於厚地與六出而爭竒淮潤焚香靜坐歌白雪之章操猗蘭之曲神清氣和萬慮俱息抑不知梅之為雪雪之為梅而我之為梅為雪也雖然君子之有取於物者豈徒然而已哉若淵明之於菊周子之於蓮六逸之於竹廣平之於梅皆以其有堅貞孤直之操可以比德以進於道非徒嗜好之而已也淮潤勵志修行不撓於物欲不汙於塵濁景慕先哲以成其德以進於道庶幾無愧於梅雪而無忝於是齋之名矣淮潤勉之尚有以復我哉廉泉書舍記廖氏為章貢望族其居之邑曰興國鄉曰衣錦在宋時有諱某者為大學生後登顯仕洎歸老於家捐私財創廉泉書舍聚宗族鄉黨之子弟而訓之雨雪之朝燈火之夕絃誦之聲洋洋乎盈耳厥後嗣續益蕃以盛衣冠爼豆之習詩書仁義之澤藹如也而其中葉尤攻於郭景純蔡季通之學纍世相承顯於江右隂陽家皆師宗之至均卿復以其術見知于朝得膺靈臺之任永樂八年豫以扈從留寓北京而辱與均卿以鄉故相往還間請於豫曰均卿上世所建書舍未有記丐一言以記之余謂自三皇五帝以降載之方册若經史諸子天文地理醫藥卜筮稗官小説之類名雖不同而總謂之書然而經以載道史以記事至於百家之書人亦莫不資之以為用焉豫嘗觀夫古人藏書之多至於汗牛充棟則凡於此又豈有一之不備哉然或有束而不觀以來新若手未觸之譏者亦比比有焉是可歎也今廖氏書舍所積之富固未可量而其涵泳聖涯嚅嚌道味以昭前聞而淑後胤者亦必有所在若其能博涉地理隂陽之書超取名位以克大其家聲斯可謂盛矣視世之儒者尋常摘句占畢竟日至於終其身不得一命者誠有間哉此書舍所以久存而不壞也均卿尚朂之是為記深州八景記深故兾州之域七國為趙地秦置郡二為上谷巨鹿漢為饒陽縣復改置博陵郡隋始置深州取州西故深池為名唐天寶初改深為饒陽郡已復為州後又以其州徙居陸澤五代因之宋熙寧間復徙靜安即今之州治是也永樂八年友人蕭公伯辰來理其州州之地卑下四面皆繚以深池每雨潦驟至輒汗漫泛溢至入州壞公宇蕩毁民舍彌旬月弗解民甚患之而前守皆因循未有能計慮為久安之謀者公始至乃遍厯其州相地之宜以圖之於是去州可三十里曰吳莊廣袤爽塏周回翕聚宜為州以居民且道里甚近便於遷徙而不勞也遂進諸父老而謀之衆皆大悅公即日疏聞于朝以永樂十年七月十又六日告其州之人而遷焉凡州之廳事廨宇以及夫子之學宫與夫山川社稷之壇壝皆公所經畫纎毫之費不以干於民由是政協人和咸適厥居官無煩劇之慮民無勞苦之思公乃得以其暇日與其僚友賔客登臨寄眺於山水之間因取其景之勝者有八而名之曰吳莊新市博陵舊治束鹿晴嵐凌消暮靄滹沱春漲蕪蔞夕照房淵飛燕衡水歸鴻遂相與倡和而詠歌焉間為豫道其事且命為之記豫謂山水泉石之勝燕賞遊觀之美非幽人逸士不足以專之茍一為爵祿所縻非其志有所不暇則其迹之有所不能及而又勢之有不得為者也獨豫居北京數年以來幸從屬車之後巡厯郊甸徘徊登覽仰居庸西山之髙俯桑乾易水之深訪黃金之臺弔涿鹿之野其厭飫於山水之竒勝古人之陳迹亦可謂榮且幸矣若公之蒞於是州其職業異於豫官守異於豫而乃能遐觀物外攬竒托秀攄幽發粹結藻思於煙霞吐竒葩於雲漢浩乎無窮超焉自得顧其所遇又有過於豫者豈非栁子所謂理達事成而得夫髙明遊息之道者歟雖然後有聞公之風欲繼其迹以追夫勝逰之美則非有公之志歟公之所以及夫民者固未易遽至也因公請記其八景并述公為治之槩與其遷州之大略俾來者有所考徴而斯文之幸或因是亦得以貽諸久逺也貞節堂記吾鄉之金灘山水清麗林木秀茂良田沃壤逺近櫛比環金灘而居者無慮數十姓其族有劉氏溫氏相與皆世姻溫自宋元以來衣冠相承子孫之盛蓋彬彬焉近時有允恭甫尤豪邁磊落著聲鄉閭允恭有子一人曰同海今鄉貢進士彥登之先人也同海之配龍孺人年十七來歸事舅姑極于孝敬允恭甫既沒而同海亦相繼以逝維時彥登幾十嵗其弟彥博才五嵗孺人守節自誓間關劬瘁躬紡績以給其家勤勤焉教其子底于成立於是孺人益臻于康強而年且六十矣彥登作堂以奉毋名之曰貞節所以昭母之志而崇孝飬也縉紳大夫既為詩以歌詠之以豫鄉人復來徵言為記於乎節義之在人天爵之至貴者也然保而勿失士君子尤或難之况欲責之於婦人女子哉今觀孺人所守自嫠居以至于今三十有餘年矣始終之際未嘗有毫髮虧玷非志於貞節者能之乎易曰恆其德貞吉傳曰臨大節而不可奪夫貞則處變而不失乎正節則守志而不二其操斯皆女婦所難能者而孺人赫赫乎如秋霜烈日之不可犯皎皎乎如氷壺玉鑑之無玷誠無愧於為人婦為人母者之道矣雖然孺人之貞節豈惟著之於家推而達之於鄉黨州閭使凡為女婦者咸取則於斯風俗其有不厚者哉豫深嘉孺人志操之美而又喜孺人有賢子為之顯揚故不辭而記之俾昭示將來且以俟他日觀民風者有所採取焉省庵記永樂辛丑夏四月豫始識廬陵彭敷哲於京師其為人髙邁絶俗有氣節不肯翕翕然相附倚與世浮沉通經學古充充乎其有得而沛乎其應之無窮也豫甚敬畏焉以為若敷哲者誠無愧於儒者之道矣一日來請曰僕不佞無過人之長竊嘗景慕先哲思日反躬自省以期於寡過乃取省字揭諸室間而名之曰省庵蓋將以自朂而進於道焉先生幸賜一言以相其志豫聞而歎曰至矣哉子之所以名其庵也是可無一言以為告哉惜豫不足以知之不足以言之也雖然豫嘗聞之在易之震曰君子以恐懼修省在書之無逸曰嚴恭寅畏在詩之抑曰尚不愧於屋漏古之君子未有舍此而為學而所以致省於其身者亦未有出於此數者之外也今夫人之生也自屋漏以至於户庭之外自一身以及乎萬事之衆何一而非天命之所在茍一念之不省則人偽將雜之一息之不省則私欲將間之若是則天之所以命我者其能保而勿失哉是故君子之於其心也靜而未發則省以存之動而將萌則省以察之檢之於平居幽獨之際而謹之於日用常行之間所以正心修身而盡人道者在此所以克己復禮而存天理者在此所以裁成輔相參天地而贊化育者亦在於此然則君子自修之要其有大於省者乎今敷哲以文學發身師表郡學篤志厲行務勤修省然猶以為未足而兢兢焉栗栗焉不敢少自暇逸思欲致其力以造乎髙明廣逺之域其賢於人也逺矣豫忝職禁林日俯焉弗逮方且切切焉以求內省之弗疚視敷哲之力於自治寧不重有所警乎因以是告於敷哲且書以為省庵記寬所記廬陵宋仲寬以才薦仕為淮安滿浦壩官嘗築一室於公署之偏而題之曰寬所間來京師屬侍讀李君時勉來請文為記夫寬者猛之對也為政之道貴於寬猛得宜然太寬則必至於縱太猛則必至於殘苛二者固常相濟而後設施舉措皆不失其當焉今仲寬專以寬為務無乃失於一偏乎仲寬之意豫有以知之矣蓋其職實司官府漕運以暨商賈舟船之役而國家建都北京淮安為水道之衝凡四方舟楫往來綿亘聨絡逺近相望而𨽻其役者皆淮甸之民夙夜勤勞以供所事茍非寬以撫之則未免涉於驅迫束縛而不得其情矣又安能使其人樂於趨事而不至於怨咨哉仲寬之居此優遊暇裕不煩不亟承上馭下無稽緩之責有疏通之利民不知勞而事易以集者非得之於寬乎昔人有閉户自責蒲鞭示辱者皆為政之寬者以取效也豈必在於猛乎惜夫仲寬位秩卑下獨未得大用於時以展其政事之才耳雖然仲寬報政天官行將登于顯融以有民社之託其於為治之道他日尚有足徵焉卧雪圖記豫外弟袁孟卓嘗命善畫者寫袁安卧雪圖裝潢成卷持以求豫記按史安字劭公少甚貧其居洛陽嘗值天大雪洛陽令訪之安閉門僵卧不出令為除雪入户見之安曰今大雪人多凍餒豈宜千人耶令賢之舉孝亷厯官至河南尹遷司空復改司徒其後四世皆居三公夫安以廉潔介特之操受知于令卒蒙薦辟為漢名臣顯榮盛大延于數世天下後世莫不景仰而企慕之况其後裔之賢寧不有所感發而興起者乎孟卓讀書勵學安貧樂道希古人之髙節慕先世之流風乃以其意著之於圖復求豫言以自朂則其志趣之超異操守之嚴潔所以期致於髙逺而不肯以凡近自居者於此可見矣雖然善學人不以其迹以其心則今之圖者乃其迹耳若以心而言則雖炎風酷日常若六花之飄積而干謁之私未嘗少萌於方寸此其志豈不與安為一哉孟軻氏有云人惟有不為也而後可以有為觀孟卓之所志如此則其他日所造詣者又烏可量乎詩曰無念爾祖聿修厥德又曰髙山仰止景行行止孟卓其尚朂之將見徵書賁門躡青雲而登要津者有日矣姑書此以俟樂善堂記人之所樂衆矣都富貴者樂輿馬服御之美處間曠者樂煙霞泉石之秀居賈販者樂珍寶竒玩貨財之盛是皆常人之同情其所寓雖異為樂一也若夫脫然於物欲之私而知善之可樂者豈不為君子之所嘉美歟蓋彼之所樂惟娛心志悅耳目欲以取適於一時此之所樂必從容於禮法周旋乎道義欲以貽謀於永久然取適於一時者每易貽謀於永久者恆難宜乎善之樂者鮮焉鄉友蕭子良世居邑之花坑其地幽曠而回合環左右泉石清麗樹林秀密雲嵐蒼翠卷舒朝夕耕有良田可以收稻秫種有嘉圃可以取蔬茹畜有牛羊雞犬可以給賔親故自其祖父以來恆以農為業而敦實務善尤為鄉閭所稱道洪武中子良始以材諝出仕于時初授陜之蘭縣大使繼授廣東之象江鎮巡檢所至稱其職今年夏秩滿上京師屢過豫道故舊間復請記其所謂樂善堂者豫辭不獲因告之曰天下之道二善與惡而已矣善者天命所賦之本然惡者物欲所生之邪穢也是以人之常性莫不有善而無惡其情莫不好善而惡惡但為氣稟所拘物欲所蔽而所謂天命之本然者有不得而著矣君子知其然必加以克治之功兢兢焉勤勤焉日求造夫至善之域而後天理可復私欲可勝心廣體胖無毫髮之纍表裏澄徹無纎芥之係周旋俯仰之間出入起居之際優遊暇裕無往而不得此其樂果何如哉世之人汨沒於卑汚茍賤之中既不知善之當修又焉能知善之可好而樂之於乎此子良之志為可嘉也雖然子良以是名堂將惡夫世之人所樂而故異之耶抑將因其名而履其實耶子良曰豫非惡彼之樂而逺之是有命焉不可幸而致也豫之志懼夫日用事為之際或一言之戾乎道一事之乖其宜則人欲日滋天理日消而所謂善者或幾乎息矣且昔人有云為善最樂故揭之楣間以示規蓋將徇名以求實非惡乎世人之所樂而異之也豫聞君子與人為善子良之意善矣遂書以為記金川八景記吾家去金溪僅半舍許溪之上室居鱗次良疇沃壤星羅棊布水光映帶瑩若澄練岡巒回抱風景清淑余自幼時慕金溪之勝與張君子儀為忘年友子儀齒少長於余而聰明博達抱負竒氣洪武庚午以明經舉進士於鄉得典教莆田後復教授成都既而以外艱去官家居優遊因得以窮幽閲勝乃目其所居為八景屬善畫者繪為圖士夫皆詠歌之今年服除上吏部因過余徵言以辨首簡觀其二石壁立秀隱雲霄俯瞰下流如削蒼玉則雙簡朝天也三石連峙錯落斷續絶頂倚空圎若華星則三台貫日也長出特立枝幹屈鐵緑隂下覆六月無暑則孤松擎蓋也修竹猗猗森若玉立天風時至音響鏘然則千篁戛玉也四山逶迤澗壑盤紆長林深池景物幽麗則螺峰舊隱也老樹千章凌厲霜雪繁隂四布仰不見天則喬木清隂也逺近諸山空翠暗靄旌旗飛翻萬馬並馳則羣峰聳翠也二水橫前勢若玉玦波光乍澄膏停黛滀則雙溪環碧也八者既備金溪之勝盡之於戲天壤之內山水林壑之美可好者何限然必遭遇其人而後可以傳述無窮不然亦徒為風雨間曠之鄉而已有若金川八景之勝自有天地以來固自若也茍不遇子儀而品題之亦將韜竒祕異於數千載之下尚得以見稱於世而為騷人墨客之所取哉然則金溪亦得所遇而可傳於後矣俟子儀他日宦成致政余亦卸事南還尚得同遊溪上周覽八景之勝與賔客故人酣歌歎詠以樂夫太平之盛斯時也當與子儀一賦之是為記金文靖集卷八
