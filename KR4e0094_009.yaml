body:
  text: 金文靖集卷九明金幼孜撰碑銘明故榮祿大夫後軍都督府同知陳公贈奉天靖難推誠宣力武臣特進榮祿大夫右柱國追封涇國公諡襄敏神道碑銘公諱亨字某姓陳氏鳯陽夀州人生而竒偉有大志元季為揚州萬户時太祖髙皇帝龍興濠梁嵗丁酉遂仗策叩軍門上謁髙皇帝竒之選為鐵甲長從大將常公征泰州破張士誠軍獲乘馬而還戊戌冬從車駕攻婺州拔其月城陷陳先登有銀器金幣之賜由是以驍勇聞遂從定浙東諸郡洎征安慶大平髙郵皆效勞績壬寅春天兵攻陳友諒於鄱陽公以功擢鐵甲百户癸卯再舉師次湖口公言於主帥曰陳氏兵多土人熟於水道今方秋湖水尚盛中多灘磧或為所誘則我舟膠淺難可以逞莫若募其土人潛遣小舟察其淺深險易量勢而進斯可濟也主帥用其言以聞如其計遂大敗陳友諒兵甲辰實授天策衛管軍百户隨大將定江北諸郡縣吳元年以平浙西取蘇州功升崑山衛千户階武德將軍繼從丞相徐公北定中原取東昌公副指揮常某守之值元兵數萬猝至城下衆倉皇失措公曰敵衆甚鋭利在速戰難與爭鋒當以計破之於是堅壁不與戰越二日公先以兵數百誘之敵見人寡悉力來攻公與常率大軍奮擊且出竒兵邀之敵遂敗追奔至棠邑僵尸載路獲人馬輜重無算公亦身被十數創已而徐公復選公攻元都克之追元兵出塞而還遂從定幽燕諸城未下者洪武己酉調守大同攻王保保魏伯章俱有功已又征和林應州天城白登甲寅破詹童軍生禽偽官劉平章乙卯擢燕山左衛指揮僉事是後屢征迤北遼陽破滅營帳綏輯降附威聲逺著戊辰冬以公守禦邉陲久效勞績特升驃騎將軍北平行都司都指揮使追封其二代公感上知遇益以邊務為任功烈之茂一時邊將罕與為儷嵗戊寅升後軍都督僉事仍掌行都司事己卯太宗文皇帝舉兵清內難至大寧得公召見軍門賜坐親酌巵酒勞之問以安社稷計公奏對稱旨乃曰天以卿授吾其遂成吾志於是命公為五軍總兵官南進至鄭村埧首與敵遇即摧敗之從攻廣昌蔚州大同諸郡無不克捷庚辰夏四月戰白溝河下濟南茂建竒策敵聞公名不戰自退勑書褒諭升都督同知未幾公嬰疾在營文皇憂念不置晝遣中使絡繹往問夜則就營察視安否醫藥飲食皆出上賜疾篤命還北京文皇尋亦旋師親幸其第臨問者二公獨以用賢厚賞為勸文皇嘉納之遂以其年十月七日卒于正寢訃聞悼慟不勝遣官諭祭者七喪葬之費悉出內帑以年月日葬北京宛平縣某鄉之原文皇既登大寶録序前勞定議贈公奉天靖難推誠宣力武臣特進榮祿大夫右柱國追封涇國公諡襄敏公之曽大父諱萬大父諱福父諱參皆贈涇國公曽祖妣闕氏祖妣張氏母秦氏妻韓氏皆贈涇國夫人公享年六十有九子男三人忠府軍衛指揮使先卒次恭今後軍都督府都督鎮守鳯陽次懋今太保寧陽侯佩征西將軍印總兵鎮守寧夏孫男闕人紀羽林衛指揮使昭闕勳衛餘皆幼孫女闕人長應城伯孫某次太宗妃次幼在室曽孫男闕人狀稱公為將四十年未嘗殺一無辜妄取一財色他將或多以殺戮為功橫取子女玉帛公輒語之曰好生惡死人人所同奚忍􅊣彼之命為己功耶父子夫婦人倫至重又奚忍獨人之父鰥人之夫而掩有其妻子耶於是聞公言而化者甚衆嗚呼若公者其倣古良將肯多讓哉宜其厯事二聖生都髙爵沒受大封澤流後胤益顯而盛則天之報施於公者可謂厚矣太保公以公之神道未有刻詞乃以公事行命其子勳衛昭來請銘遂為之銘曰烈烈陳公虎臣之傑昔事太祖佐興皇業從征四方如霆如雷無敵不破無堅不摧洎任邊閫勞勤益至綏輯降附宣昭德意威馳沙漠風塵肅清勳在盟府忠著朝廷繼事太宗內難是靖宣力效謀屢戰屢勝大功垂成公疾弗支公進讜言忠誠不衰宸衷興悼遽失名將九原追錫實天所相煌煌寵命侈昭崇封翼翼涇國列爵上公名顯于躬慶流後嗣錫圭儋爵惟公有子惟國有臣為國楨幹本公之仁公仁何以不妄殺戮不事俘虜不寶金玉斯實公仁格彼穹旻昭兹錫類以大厥聞峩峩豐碑用揚勳德與國始終永世無極追封夏國武毅公祠堂之碑永樂十二年夏五月丁酉奉天翊運推誠宣力武臣特進榮祿大夫柱國後軍都督府右都督鎮逺侯顧公薨于貴州時年八十有五秋八月訃聞京師天子輟視朝遣行人李鑑往祭之詔定諡議追封夏國公諡武毅明年春二月公之子勇孫興祖自貴州入謝興祖祗承恩命襲封鎮逺侯爵既而泣告於豫曰先祖久鎮西陲義行信孚邉人嘗願立生祠天子可之今不幸傾逝將樹碑于祠以著先烈請為文刻之以昭示後世余弗獲辭遂敘次其平生功業如左公諱成字景昭其先湘潭人祖父皆善武藝嘗往來江淮間因寓江都遂家焉曾祖百四祖千二父萬一三世皆追封鎮逺侯其配皆追封夫人公以至順庚午十二月十六日生于江都之笟籬灣自幼機警異常兒既長涉獵書史姿貌魁偉有膂力善習水騎射嘗泛舟北遊元都夜有盜十數持刃抵其舟衆皆駭愕失措公獨率六人擊走之元季羣雄並起張士誠僣號泰州公知其無足為聞太祖髙皇帝自和州渡江克太平諸郡行陳整肅所至市不易肆公自揚州歸附從元帥至鎮江公與勇士十二人奮戰直抵城下無敢當其鋒者會日暮守將集衆執縛至江上已戮十一人公奮起蹴執刃者仆之以身轉至水次適遇橛舟者投以斧公得斧絶其縛乃泝江而上遇舟師桑院判因語衆曰鎮江無戰士可破也衆從之攻其城克之青軍據揚州公以母故請往説之使降既至主帥置酒議不協將􅊣公公覺之獨託更衣去微服出城載母馳歸其從者皆被臠矣已而從中山武寧王徐公攻常州寧國江隂克之敗陳友諒兵於龍灣每戰皆有俘獲甲辰從征武昌擒偽漢主理授鳯翔衛百户乙已從開平忠武王取襄陽克泰州留守興化丙午攻浙西破舊館取湖州進圍偽吳張士誠於姑蘇吳元年秋九月下之公最有功升金吾衛副千户嘗扈車駕自汴梁還御舟膠淺篙師集力不得發公即解衣入水以背負舟大呼舟隨脫以行即日授堅城衛指揮僉事其攻信陽唐州所俘婦女以百計悉訪其親還之自平蜀之後調貴州衛嵗丙辰蠻人作亂公率兵連嵗攻破甕揑洛邦紅邊乖西等寨斬獲無算降土酋王萬全賊首龍小思走死蠻人自是聞公名皆心膽震掉目公為顧老虎辛酉從頴侯傳友德征雲南眀年克普定諸蠻之地皆平太祖皇帝遣中使馳賜衣金帶升普定衛指揮使自甲子至辛未凡八年數受命討阿黑螺螄尾灑龍山諸蠻賊悉破斬之壬申夏五月入朝宴賞甚厚升鎮國將軍貴州都指揮同知未幾復征諸蠻有功丙子升驃騎將軍右軍都督府都督僉事冬十一月承制充總兵官佩征南將軍印五開諸洞蠻獠之弗順者連戰勦捕之殺獲殆盡其輸誠歸欵者輒撫綏之蠻人帖服丁丑還京師己卯皇上提兵肅清內難所至皆望風欵附公知天命所在自真定挺身來歸遂承命守北京竭誠盡力晝夜不怠凡備禦攻戰莫不有法庚辰升後軍都督府同知辛巳升右都督壬午夏六月內難既平秋九月論功行賞公列侯封食祿千五百石加賜白金綵幣頒錫誥命鐵劵仍以其孫興祖襲普定衛指揮使冬十月公出鎮貴州初公還京師蠻人謂公弗復至時相聚出沒剽掠邉衛弗能禁比公再至有被拘者公縱遣之俾諭諸酋以復來之意未幾皆相率來見公撫輯之且宣布朝廷威德邉人遂安戊子夏六月上念公久處於外特驛召還京賞勞有加秋八月復回貴州時蠻冦背叛公遣其子貴州衛指揮同知勇領兵勦絶之其後纍征諸酋為冦者擒殺賊首苖普亮王忠楊再智等送京師甲午夏四月還軍貴州公在軍中得疾有命遣醫士陳汝正往治之五月疾加劇遂終於鎮夫人彭氏子男八人長統任普定衛指揮使先卒次銑次銓次鋭並卒於難次勇今為貴州衛指揮同知次亮次三勝保先卒次源女七人德瑛德瑜德善德柔德琬德貞俱適顯官孫男七人曰再興曰興祖襲爵鎮逺矦曰旺興曰長夀曰福夀曰普忠曰普得曽孫二人重興永興猶子瞻為蜀府儀賔公性雄勇有膽略能料勝制敵出師攻戰必獲萬全雖驍勇強冦莫敢攖其鋒者蠻夷懾服邉人用康此其功德彰彰較著有不可掩禮曰有功德於民則祀之則在公宜有祠廟以享祀於無窮古者廟必有麗牲之石以載烈志勳昭示萬世是宜敘公之盛烈且為詩刻之俾嵗時薦獻於祠下者歌祀公其詞曰天眷皇明肇造區夏羣雄虎吞蹀血四野於穆大祖顯命在躬壯士如雲歘其承風公時鋭然奮其膂力仗劍來歸橫行八極東征西討剗鋭摧堅捐軀賈勇莫之或先羣雄既殄萬方底平錫公爵祿光被恩榮爰託腹心委以重鎮用緝蠻人俾安俾順大祖賔天內難既作皇上提兵將除巨惡公知天命率先效義乃畀城守託為心膂晝夜備禦運籌決謀聖皇南征後顧無憂姦凶既剪宗祖載安論功錫賞䇿命攸頒貂蟬玉帶侯國是封榮及先世光耀顯融公遄受命往鎮西鄙摧強撫順疆埸攸理西人畏公公善用兵不威而懾不令而行靖逺綏邉有功赫赫匪惟有功而又有德西人懷公何以報之蘭馨在登享祀無期贈驃騎將軍中軍都督府僉事李公墓碑銘仁宗皇帝蒞阼之初誕布恩典凡在廷文武羣臣久勞於國者皆進以祿秩賜之誥命且封贈其祖父母父母并妻如制所以勵臣子以忠而勸天下以孝者也維時湖廣都指揮使李英獲升驃騎將軍中軍都督府都督僉事其大父秉臣父通亦俱贈驃騎將軍中軍都督府都督僉事祖妣劉氏妣張氏及其配髙氏皆封贈夫人英念其父嘗以勞力立功先朝所以致今日之顯貴者其來有自乃具狀其功實來請銘立碑墓隧以為後來不朽之託豫既諾之遂按狀而序之曰公諱通姓李氏其先濟南武定州人世業農以長厚聞於鄉公自幼驍勇不羣知書通大義稍長奮然有立志出入里閈未嘗為儕輩屈耆老見者皆壯之年二十來歸太祖髙皇帝𨽻籍行伍屢從大將軍收山東諸郡遂得長十夫既又從征應昌征西蜀征和林征大石崖捕納克楚鼐爾布哈等升長五十夫未幾連出塞捕敵至諾延鄂諾河黑松林之地而還及太宗皇帝舉兵靖難首從諸將扈駕克薊州遵化密雲諸處升百户經從援永平克大寧勝敵于鄭村埧升副千户已又從征廣昌蔚州至大同疾作乃以英領其職英時年二十餘公解所佩刀授之曰此正建立功名之秋汝能奮力以繼吾志吾即死無憾矣逾數月遂終于大興縣之蓬萊坊實公寓所也生元至正丁亥月日享年五十有四其配即夫人張氏子男三人長即英公殁後由正千户升指揮同知轉指揮使以從征北敵由都指揮僉事升都指揮使特恩進都督僉事次闕次闕孫男六人女五人以年月日葬望京鄉德勝關之東原公為人卓犖竒偉不事生業居家孝事二親友愛其兄弟結交重然諾輕財尚義好濟人之急及居戎行益以忠義自勵遇戰陳奮軀賈勇未嘗有怯志始終勤勞逾三十年未嘗齟齬不得意使天假之年以待聖天子論功報賞之日則公爵位所至其可量耶雖然公雖未獲盡展其能而有子如英者克紹前烈奮忠竭勞以佐成靖難之勳纍加顯秩厯躋督府而公卒膺寵贈光賁泉壤是則天之所以報施於公者豈偶然哉是宜銘以貽于其後銘曰於惟李氏德善繇先譬彼木水厥有夲源惟公世家實夲東土奮起即戎來歸太祖北伐南征作長百夫屢斫殘敵荷戈長驅逮我太宗舉義靖難公奮厥勇千夫之冠烈若熊羆駕馭雲風胡止中道以遏其逢卓哉令子踵繼前武時維鷹揚受知帝所至于仁宗篤念舊勞督府追榮用錫顯褒峩峩東原惟公所藏松柏桓桓雨露所降惟公不朽載此銘文尚貽後人其慶永存故都御史兼詹事府詹事致仕向公神道碑銘故都御史兼詹事府詹事致仕向公既殁之逾年其子可觀自家匍匐走六千里至京師既入謝即衰絰踵門泣告豫曰先人既葬而墓隧之碑未立大懼無以為不朽圗惟閣下之哀之而賜一言則不肖孤兄弟沒齒不敢忘豫辱與君逰幸同鄉又同官于朝誼不容辭則許而諾之乃取其鄉人包彥孝所為狀序而銘之曰公諱寶字克忠姓向氏别號踈庵其先河南之開封人宋僕射文簡公之十五世孫也文簡四世孫蔚嘗扈蹕從宋髙宗南渡子水性仕孝宗纍官大中大夫封魏國公贈少師魏國生任煜官朝奉大夫朝奉生公道為臨川縣丞娶進賢許氏遂以朝奉葬其邑潤安因家焉自是為進賢人祖雲翔父允恭公貴皆贈資善大夫都察院右都御史兼詹事府詹事祖妣張氏母熊氏皆贈夫人公資性頴異五嵗能誦孝經七嵗通四書章句過目不忘稍長肄業邑庠教諭丁之翰授以書經甚見器重嘗從友人假通鑑綱目七日即遣還之間舉以問答之如響洪武甲子科舉復行遂以書經薦于鄉明年登進士第觀政於都督府丙寅授庫部試員外郎丁卯實授職方員外郎階奉議大夫壬申丁外艱明年詔起復仍前職丁丑秋滿升通政使以不善奏對力辭改應天府尹階嘉議大夫戊寅坐事謫廣西蒼梧甲申太宗文皇帝入正大統復公前職己丑以譴逮獄憲臺庚寅冬左遷兩淮都轉運鹽判官未幾復頌繫南京乙未春宥復前職命督運糧餉并總督淮安諸郡漕運材木甲辰秋八月仁宗皇帝即位驛召還朝上方欲擢用公適交趾缺按察使吏部首以公為奏上未許之遂以為都察院左僉都御史翊日入謝升右都御史階資善大夫未幾復命兼詹事府詹事特賜楮幣羊酒公雖屢見挫折而志於有為到官不數日即條陳八事以進其一曰録用勳舊二曰設置諌官三曰選舉賢材四曰簡練將帥五曰貴重有司六曰考核吏員七曰監生資格八曰流通鈔法其言皆懇切有裨於時政者上命次第行之今上皇帝即位之初以南京都察院缺人特命公往蒞焉宣德戊申夏秩滿入覲公時以嬰疾艱於拜跽上念其老特賜勑令致仕歸其鄉然自是疾益加劇遂以八月四日卒于南京之官舍訃聞上悼歎之特遣使賜祭命官給舟還其喪復命有司治祠墳以其年十二月丁酉葬潤安九世祖朝奉公之塋公生元至正丙午六月九日至是享年六十有三娶羅氏封夫人子男五長劉孫早卒次可觀可規可靚可寬女四長適陳子寧次適吳叔榮餘在室孫男一以復女二嗚呼公為人清介公方厯事四朝逾四十年初居庫部職方時公牘日纍千百次第剖析無所停滯衆皆推其勤慎及為京尹豈弟廉明興學育才恆加督勵撫善摧惡強暴悚懾公庭肅清終日不聞鞭箠民皆感服及居憲臺振舉紀綱以德濟威嚴而不苛士論多之屢遭黜斥辭氣浩然未嘗少屈所至輒開館延士觴詠賦詩未嘗以夷險易志故其廉厲端確之行終始如一日性至孝嘗以祿不逮親為歉時祭忌日悲泣如初喪奉繼母不違其志撫諸弟友愛切至處鄉里恂恂自下交友朋恭謹謙抑久而益篤平居言不及貨財不茍取與疏食水飲自處泊如其學博究經史百氏為文章有理致詩雅健可愛有踈庵日稿若干卷學者稱之為踈庵先生云銘曰猗歟向氏文簡之裔魏國繼之益顯其世逮于朝奉實葬南昌公紹厥緒閥閲煌煌公年弱冠名薦南宫祗事列聖太祖太宗洎于仁考厯躋顯融揚踐中外有聲渢渢公在官守執勤秉恭寬惠愛人恤于痯恫公有言責勵其清忠不撓不激雅度雍容公志之篤操履之堅夷險一致隨遇而安公老致仕始終克全公歿有榮無憾九原士論所歸如公有幾匪公之能惟德之比匪惟有德而又有子圗其不朽屬銘太史最行琢詞揭石墓道後千百年其永有耀贈奉直大夫兵部職方貟外郎周府君墓碑銘聖朝重褒嘉之典在廷羣臣治職優最者秩滿獲承恩命貴顯其親士生斯世可謂幸矣然其間父子同居朝著膺褒典者殆不多見惟兵部職方貟外郎周君岐鳯暨其子翰林編修敘一時先後均受誥勑玉璽龍章寵賁三世存沒增輝士論榮之是雖其父子才賢之致必其先人厚德之積也不然何遭遇之盛若此哉已而岐鳯君以其先君子贈奉直大夫兵部職方貟外郎彬彬府君墓碑為請且曰國家定制五品以上得立碑先君子幸蒙恩追贈秩列大夫於立碑為稱將求文二通一置諸祠堂以屬今少傅東里楊公一植諸墓道以屬豫幸不靳而賜之言君篤念其親思彰顯之者至矣豫曷敢辭謹按狀而敘次之彬彬諱觀字子賔鄉人尊稱之曰彬彬其先唐長慶中自廬陵烏東遷今吉水泥田髙祖應龍在宋以文學顯名曽伯祖京孫仕直寶謨閣曽祖嶽咸淳進士祖厚父元瑞領元統鄉舉彬彬幼以父命後其伯父鰲溪書院山長聞孫少侍鰲溪遊學宦所業成值元末兵起未及試用嘗避亂山谷季父有立喪殯殮無具衆將棄之獨仰天慟哭穴地以葬負土成墳然後去從父中立避地絅村父子相繼死於疫無所歸衆畏疫不敢往即日馳赴葬之卒無恙事鰲溪極謹其嬰疾憂形顔色夙夜侍湯藥無少怠及卒哀毁逾禮鄉黨以孝稱之中遇時平家産蕩析未復一不以有無介意惟延師教子孜孜弗倦客至焚香瀹茗談論古今泊如也間約同志遨逰湖海以適其趣嘗在廣以數千緡貸廣州之貧民會水寨兵作亂焚掠無遺他日不能償同侣假聲勢榜笞其民逋索負甚急彬彬止之曰兹行命也諸君幸思之毋爾為也同侣不聽彬彬曰吾寧忍此耶悉取其劵焚之未幾同侣果有暴死逆旅中者廣南有驛舍相傳有怪物居之至者輒死彬彬不信止宿其間獨無恙已而詢昔有商人殞於非命瘞垣下者乃收其遺骸改葬之怪遂息行旅安寢焉洪武中岐鳯司訓桐城奉迎就飬逾年以疾終配李氏同里谷平名族事姑相攸孝敬無違禮先彬彬草有四年卒今贈宜人初李宜人葬其鄉小西湖洪武丁丑九月十三日合葬于今周嶺沙山之原丙向子男四長即岐鳯仕厯中外幾四十年次梧鳯翔鳯李宜人出也其季儀鳯劉氏出少命育于其從弟子霖孫男五長勉次即敘今升侍讀次崇顯宣女四豫子麒廬州府學訓導彭塤李能恂郭迪鑑其壻也曽孫男十女八嗚呼豫觀彬彬之德憫人之難寧甘貧棄劵不忍責償仁也喪亂奔竄之中不避艱險克襄季父事義也盡心所後生事死哀孝也不畏疫而殮瘞骨肉之親不信邪而息積年之怪勇也秉此四德加之以寬裕恬退之心則其所積可知矣夫有德者必有後彬彬生雖嗇其所藴不見諸設施既有子有孫顯融光大如此卒之其身沒被褒寵垂光後裔天之報施有德豈不可徵哉是宜樹碑墓道昭示無窮焉銘曰天有明徴食報惟德皇有嘉錫褒顯在績匪績之崇繄德之隆逮其子孫被乎厥躬猗歟彬彬蓄德未用其德伊何仁義孝勇他人不足已則有餘時方競進我獨間居其心休休其德碩碩不忮不求泊焉安適維躬不有維天實親綿綿慶澤施厥後人顯允令子名剔朝著忠勤既殫茂績亦庶皇降寵命紫誥褒揚龍章玉璽煜乎輝煌職方之榮大夫之貴恩覃冥漠光照來裔峩峩周嶺沙山之原欎欎松楸翳彼丘墳紀德有碑穹崇赫奕髙風千載過者必式周氏祖塋碑周氏居吉之吉水以族望於江鄉曰泥田里其先蓋自廬陵烏東徙也始徙之祖四承事諱某號沂濵其配為葉氏夫人俱葬泥田里二塋相去不三百步子孫之衆不啻千億以世計之凡草有四矣皆是祖之所自出也何其盛哉豈非其積德之厚不在其身在其後人耶則為其後人者於厥祖之德當何如而致念於二塋之封壤又當何如而盡培護之誠興敬恭之心哉豫聞其先厯五代宋元供祀有田圑拜有禮元季兵燹遂廢不講後人昧厥所自者乃有作室於沂濱墓前有竊葬於葉夫人墓中其賢者雖知其非痛憤之而力不能止也因循既久毁削日甚宣德紀元來其裔孫宗坦叔昭仲升士逵輩家居者倡族人白其故於郡邑既不可改時簡功敘實聮官禁掖又相與言之朝始克復其舊宗坦謂斯舉之不易能懼來者之或難喻事白之日與豫道契闊外即以祖塋碑文見屬豫嘉其意諾之不敢辭焉惟人之有祖猶水木之有源本也水無源則流竭木無本則枝瘁人忘祖則世衰一理勢之自然耳是故江河之大其發源深焉松柏之茂其培根固焉名門世族之家顯盛相承其祖德厚焉無間知愚賢不肖所共悉也而乃有不能然者則失其本心膠於物誘可知矣烏足道哉周族居泥田逾六百年衣冠詩禮代不乏人國朝數十年間赫然著稱中外豫耳目之所逮者難以枚舉雖其祖宗德澤悠逺亦其後之人克紹述以綿延之也則祖塋之復固其分內事安得而不留意哉豫既嘉之而尤有感焉昔召伯治政有遺愛於民以嘗息于甘棠之下人不忍伐詩人歌之曰蔽芾甘棠勿剪勿伐召伯所茇又曰勿剪勿敗召伯所憩甚言思慕之切而不忍傷也夫以賢臣過化之地人思其德草木微物尚不忍加害况祖宗體魄所藏吾身所自出德澤所垂裕者而忍毁滅之乎此賢子孫思木本水源之義而欲培濬其世業慶澤者所宜䀌然有動於中而正其失也然則今日宗坦暨諸族人之致念厥祖至矣自兹以往一抔之壤一拱把之材環於二塋者凛焉敬恭培護惟恐傷之俾封域益髙宰木益茂吾見周宗之盛繼繼繩繩雖百世可也後之人尚其戒之念之宗坦既沒之明年時簡功敘復以斯文為請遂纍書之俾歸刻諸石并系之詩曰有周之胤居泥田名宗簮紱輝蟬聨祖塋二封峙穹然唐宋迄今六百年誰其毁者昧本源匡復賴爾後多賢積仁纍行開必先繼志述事期無愆山川形勝麗且偏重封草樹欎䓤芊斯文照耀瓊瑶鐫來者敬恭毋忽旃孫子綿綿百世傳贈奉議大夫刑部郎中郭公尚禮墓碑銘洪熙改元之初朝廷推恩羣臣封贈其祖父母父母如制於是刑部郎中郭君鼎貞蒙恩贈其父尚禮為奉議大夫刑部福建清吏司郎中母朱氏為宜人鼎貞將樹碑于公墓來謁文刻石憶豫嘗表公之阡蓋已二十年今鼎貞圗昭寵命於無窮也故不得以復出辭乃序而為銘公諱如字尚禮姓郭氏唐汾陽忠武王二十五世孫六世祖朝散大夫諱彌約始由吉水徙淦之東梅五世祖諱份中進士第官終嶽州四世祖諱蒙通直郎平海節度推官曽祖諱聖輿賀州司户祖諱􅣫龍元初中童科免舉父諱季端博雅有文以隱德終母楊氏忠襄公五世孫公資質秀整修眉廣顙臞然玉潔方弱齡父母俱亡依于外氏稍長就室劉氏元季兵興挈家避地洪都皇明混一區宇將歸尋桑梓而故廬悉燬于兵復往依所親曽公得之已而歎曰人皆有祖宗吾豈可僕僕鼾睡他人榻而遂忘所本哉刻日歸東梅葺祠宇修墳墓收聚宗族拯恤鄰里急困乏撫孤惸興廢舉墜惟日汲汲久之先廬故壤咸復于舊始得宴休山林延師教子以斥去塵慮因闢一齋環植以梅置圗史其中扁之曰梅雪朋遊來過輒與觴詠從容其樂裕如也晚年以二子恆貞益貞相繼卒恆悒悒懷抱間一日過子壻廬陵周宗文家得疾舁歸不移時遂卒時洪武乙亥十一月十有九日也享春秋七十有八以某年某月某日葬里稠陂先塋之次初娶劉氏女一人壻即宗文繼室朱氏生一男即象字鼎貞由胄監中永樂辛卯京闈貢士授刑部主事秩滿升郎中女一人適士人李惟瞻又繼廖氏子男二人即恆貞益貞孫男八人曰美曰持曰迪曰得曰儀曰道曰闕曰闕孫女三人曽孫男闕人於乎公為人性行質直不喜諛侫家居終日肅然無譁處鄉里中扃坦夷是非無所偏徇人有不直不詣有司恆取決于公徐出一言咸帖帖感服公荐厯艱虞念先世以詩書起家至老尤不忘學于方殁時無一語及他事惟懇懇囑其子務學無忝前人卒之鼎貞以經術致身顯融而公亦獲膺寵贈光賁泉壤是則天之所以報施於公者可徴不誣矣為之銘曰於惟郭氏德善由先肇彼汾陽其來源源遍于江右胤胄孔蕃逮至朝散厥聲有聞由吉徙淦實開慶門惟公其後卓爾不羣遭時澒洞蒙犯風塵東西流寓備嘗苦辛事定來歸爰撫桑梓汛掃煨燼乃構堂戺治修墳墓潔嚴享祀收聚族姻拯恤困匱田廬園池咸復于始乃訓于子率厲鄉里乃築齋居列置圗史朋從盍簮觴詠燕嬉臻兹眉夀克享多祉超焉乘化曽何係纍翼翼令子是述是繼學古入官滋厯年嵗祗蒙恩典追榮先世公被褒錫登以秩位五品之崇大夫之貴琢石刻詞式表幽隧雲山蒼蒼江水瀰瀰瞻思無窮永告來裔綏德衛指揮閻子能墓碑銘綏德衛指揮僉事閻公子能既卒之三十年其子陜西都指揮俊懼公平生所纍勞伐或久而弗彰則無以昭示後世乃以寧夏儒學教授張所為事行遣一介走京師求豫銘將刻石墓道以圗不朽惟閻氏世家宿州之靈壁代有隱德至公父貴始以文學顯于元纍官知許州事母夫人李氏公生有竒質材力絶人許州嘗竒之曰是子必將以武功大吾門太祖髙皇帝龍飛淮甸公在義兵行陳間從渡江取采石太平攻溧水破陳也先營克升潤公皆與有勞勩遣從參政趙某拔宣歙時偽漢陳友諒以舟師襲龍灣公進言於趙曰敵今猝至其鋒不可當宜乘其登岸未半擊之可潰也趙如其言敵果敗從下淮北諸郡追奔李左車奪其乘馬積功授豹韜衛百户洪武元年大將軍北伐詔選將士之勇鋭者𨽻其麾下公與焉元都平從定大原迤北留守金州坐纍謫戍河州公砥節礪操不以夷險介意未幾以逐寇平西畨功復職岷州衛繼改慶陽征慶州征伊瑪河捕敵帥納克楚鼐爾布哈等公皆與調選所向身先士卒無不克捷時朝廷篤念舊勞將士遂超擢公明威將軍綏德衛指揮僉事尋請老以俊代職初公謫戍時俊生未期嵗乃以寄育於其友胡青不相聞者二十餘年青後為錦衣衛百户俊亦不知閻出也至是青聞其請老來京即以俊畀公公感激悲喜且具其情聞于上召見占對稱旨遂嗣僉事之職時論榮之公生元至正辛巳月日以建文庚辰二月己卯卒享春秋六十權厝于綏德郡北之西山永樂癸卯改葬米脂縣明黃寨之原公凡五娶張氏李氏王氏遊氏陳氏子男三人長即俊李出次儀王出次佐遊出女一人壻某孫男七人理瓉琳瑾璪瑛玘於戲公以世家之胄為開國舊人間關行伍感會風雲勳業著于當代威惠洽于藩鄙功成身退考終于家可謂不負其平生矣而後嗣之賢益大而顯俊今纍官至都指揮厯事三朝出鎮邉城屢征漠北擒捕強敵焯著偉績荐膺賚錫其功業所就尤未易涯涘豈非公餘慶之積乎豫與俊最故文字之託不可以辭并系之詩曰閻氏之先肇家靈壁華聞垂延代有隱德施于許州實開前休以文學顯厥聲彌流繼文者武與公克奮從龍雲興際兹昌運南征北伐率先戎行屹若貔虎時維鷹揚屢守邉郡遏亂禦侮箙矢櫜弓優遊遲暮功成身退嗣子是承宣力積勞益顯其名公慶悠久公靈如在委祉垂休其來未艾明黃之阡有穹者碑百爾孫子視此銘詩重修寶臺觀碑係銘距贑東七里許山秀而峻水清而迅居民列闤闠而處者如躔次如棊布如喬林森立如霧滃而雲矗信古虔福地也五季之亂邑民病於癘禱祠無所驗有天台氏以邑之汶山至德觀丘真人之徒曰曹僑年鍾居厚者能以其術役鬼物濟人人遂迎而致之以祛所病衆既康食不忍去二師朝夕則相與即贑江之濆鎮市之中背隂而面陽建道院以居之宋治平三年始克迄工名之曰寶臺觀于時講道有堂藏經有閣祝禧有殿幽禜有壇於凡門廡寢室庖湢井竈靡不備具元末燬于兵於是向之勝迹鞠為茂草已天朝洪武初道士謝蘭石與其徒謝瀛洲慨前規之零落乃相與披荆棘剪蕪萊畚瓦礫除椔􅀈經工庀財圗復其舊嵗己未正殿及前經樓成辛酉山門成辛未東經堂成癸酉法輪寶藏成己亥前殿左右廡真官祠偕成積二十餘年而規模大起幾復其舊矣既而蘭石瀛洲相繼淪逝完美之任乃諉之丹霞氏焉丹霞瀛洲髙弟子也蓋能委心力捐資財裒施金以建功德勤勤焉幾三十年而前後崇真之殿通明之閣丹霞之洞天清虛之壇法靖朝陽之軒雲饌之厨鼓鐘之懸延賔集真之所始克就緒其時同志之士若劉道常陳元綱張玄理劉仲江皆能經營贊理殫力竭慮以相其成於是寶臺之偉觀巋然一新非復昔時可比矣既落成郡守建陽張珂將為琢石立碑以圗不朽乃命丹霞具興繼顛末來請文於豫豫嘗考之圗志江右山水名天下古虔居江右上遊際閩廣之交扶輿磅礴之氣或凝而為層岡融而為洪流散而為人物其竒絶怪古欎積而不得盡泄者又往往為靈異窟宅若寶臺者其天作地藏又所以名江右而最勝以為有道者泄耶觀之蘭石瀛洲之精勤至道丹霞之葆嗇沖虛所以增重玄門而為山水之光者蓋可見矣傳曰地因人而勝其斯之謂歟丹霞邑之梅林人字清虛姓桂氏貌清而行潔神間而志完自少知讀儒書及寓迹道流又盡得其師之學曩嵗嘗被徴纂修永樂大典及今再領祠事登玉録之壇式能光闡宗風敷贊妙玄以不墜其教吁信可謂賢也已余既次第其事而序之俾觀者有所考徴復為之銘以遺其後之人銘曰牛斗之墟參井東控甌際越地鎮雄虎頭峭拔金芙蓉錦屏十二連崆洞章貢之水貫當中勢狹江漢俱朝宗寶臺福地清淑鍾天設地藏神所宫越從五季司禍凶毒流痛結民命窮汶山異人參化工祛逐鬼物麾蒼龍拯墊汛熇揚清風師席攸止民景從琳宫瑶宇禋祀崇誰其燬之元祚終皇明典祀嚴寅恭規模壯觀夙昔同披椔畚礫芟蒿蓬蘭石髙士瀛洲翁丹霞紹述志愈攻堂構弗負勤垣墉載丹載艧金碧重樓觀突兀摩青空仙軺星槎南北衝揭虔秉慮來憧憧農工台背髫齡童晨鐘暮鼓粢盛豐它山翠琰新琢礱螭首蟠結龜趺窿丕示功載昭和衷萬年香火皇化隆刻文有光齊景鐘凡厥來裔希玄宗徑山南石和尚塔銘蘇之徑山寺和尚有曰伯瑩號南石者示寂之三年其徒孫妙門述其行為狀求銘塔石和尚崑山人李姓生七嵗不茹葷白其父母求出家遂因僧顯無外入邑之雙江紹隆寺從僧志興逰年十八乃受具戒肆力于其學凡諸師無常也故遇名僧輒師之若松江南襌海會蘭江濋公通宗熙怡皆從之授業故能深於律義而領乎道要籍籍有聲於叢林間初海會見而甚愛之盡以所學相授熙怡得之喜曰吾徒有若人吾道不寂寞矣即以為侍司尋升記室未幾諸山舉以居郡之普門時瑞岩僧恕中由京師還至吳和尚即親炙之相與講求居數嵗升於靈岩已而慨念其師既殁且無繼之者乃還紹隆興廢舉墜凡佛殿僧舍廊廡廬庫悉大而新之又思紹隆創基永懷僧鐵牛也而永懷久廢懼後世莫知所自來遂白于有司請更紹隆為永懷其敦本崇原類如此靈谷僧隨庵名重一時非其人弗接聞和尚名即招之與之分門説法蘇之萬夀寺主席難其人以禮致之既至其徒從之者常百數十人皆一時之名流也而謝歸雙冮居于北山之後永樂初元朝廷纂修永樂大典和尚亦被召與其事既歸杭之徑山舉掌僧録司事徑山雖杭之名剎然嵗久室宇多至摧圯和尚咸修而葺之乃慨然歎曰吾病且老其可以復任事乎即日謝事退居于寂照祖塔之左已而又還北山松院一日語其徒曰速促裝吾將逺行矣其徒疑有他適詰旦乃無疾而逝蓋永樂十六年九月二十一日也年七十四為僧六十七其平生博通禪學然於楞嚴圎覺二經尤為研精每授徒輒曰學道當以二經為指南求之壇那之施及輟已資以圎覺略疏楞嚴要解鋟梓以傳四方又集宋元以來諸名僧行實法語作續集傳燈録行於世尤通于儒書故當時名公若國子司業孫公大雅太子少師姚公廣孝皆嘗與之逰和尚為人性資慈厚持已儉約衣麻食蔬凡有所得悉以營建槖無餘資所處泊如也於乎其學則勤而心無求其道既行而志弗滿其行既峻而修弗怠非有得於襌學者能之乎遂為之銘曰夙悟祕義由質之美道存則師無間彼此既博且勤厥進弗已默契微密有譽日起乃覺其徒羣昏斯啓來從如歸水趨曷止載闡法言用廣于世形則既寂有垂儀軌爰作銘詩貽厥終始會寧伯李公墓志銘推誠宣力武臣特進榮祿大夫柱國會寧伯李英以所述先考會寧伯之官封事迹一通泣拜請余為銘以志其墓余辭再三不獲則為按狀而序之曰公諱南哥姓李氏其先世居西夏後有居西寧者遂占籍為西寧人祖諱梅的古考諱管吉祿皆追封會寧伯母公氏贈夫人公姿貌豐偉性質直自幼志氣超卓為鄉人所推比長頗習武事畨族部落皆信愛之我太祖髙皇帝既定中原薄海內外皆稱臣奉貢公逺處西徼獨能識察天命率所部來歸特授西寧衛管軍土官所鎮撫其後西寧建衛置官府公屢效勞力招徠西納諸族先後來朝者不可勝計既又奉命建罕東安定曲先三衛令嵗入馬三千餘匹至今號金牌馬云已而千户析者孫構逆謀禍延于衆公獨被旨無擾復升衛鎮撫階武德將軍且給公符驗但有以無理相加者許馳驛來奏及西納族指揮板麻領直答兒千户領真奔協比為惡不守禮度太祖髙皇帝命公禽二人以獻特升指揮僉事階懷逺將軍重加賚賜其後公老退休于家遂以子英代其職英克承公教盡心朝廷屢從太宗皇帝出征北敵纍勞升陜西行都司都指揮僉事今上皇帝蒞阼之初復右軍左都督公兩膺封秩皆如其子又以英封由都督進封會寧伯然公雖耆齡其心拳拳不忘朝廷時英奉朝詣京師公匍匐萬里備良馬方物來貢上嘉其誠優賜銀幣即遣其西還比至家數月而卒時宣德五年正月十四日也享春秋九十有三上為感悼特遣中使諭祭且命官司營葬事以某年某月某日葬西寧之巴州山公娶王氏贈夫人子男二人長英次雄錦衣衛千户女三人長適指揮班貴次適汪福次贅壻薛某孫男三人長文陜西行都指揮使次武次昶孫女三人為之銘曰侃侃李公夙秉忠義來歸太祖纍效勞勩至于太宗益勤弗替既昌厥家以畀其子子有祿位實公所致公享其福恩寵荐至冠纓峩峩照耀鄉里夀考令終無憾生死公去日逺九原難起最事以銘屬于太史巴州之原公藏于此奕世有聞尚告來裔故通政使司古通政黃公墓志銘士之生也嘗負四方之志而其仕也或局於才器滯於職守有能乘一傳蒞一方者鮮矣其能屢出使萬里之外宣上威德震動遐裔俾爵位顯于朝名聲昭于時而事業垂于其後者蓋又鮮焉於今則吾於通政黃公見之當太宗皇帝時天下寧一德化覃敷薄海內外悉臣悉妾特詔簡廷臣才職之優者奉使外畨公時以給事在選實往西域諸國計程幾數萬里積十餘嵗凡三往返所以宣德意振國威致夷貊欵服朝貢相望當時稱出使之賢者必曰黃公已而以效勞故優逸于家者久之宣德紀元初交址蠻夷叛逆遣大將致討兵連不休天子惻然閔生靈重困乃擇人特往撫諭大臣以為言於是擢公通政副禮部侍郎李琦等持節往宥之既至而兵解矣公遂諭以皇上所以閔念元元之意蠻夷知感遂因公等奉表詣闕謝罪朝廷方事經略曲加寬貸且欲大用公而公竟以疾弗起嗚呼惜哉公洪武丙子領鄉薦卒業胄監授閩之沙縣教諭秩滿升禮科給事中遷通政其為人德器渾厚直諒有為好學之心惟日孜孜為教官篤於程課論討不倦生徒多所造就為給事小心慎密敷奏惟允僚宷咸推敬之出使所厯其政有關于軍民者嘗數千餘言以聞士論服其忠直其與人交不為崖異一任以誠輕財急義交逰有匱之傾槖周之不計家之有無人益以是賢之公諱驥字致逺世家廣西之全州曾祖諱耕雲祖諱餘慶皆晦迹不仕父文煥任全州訓導公生洪武甲子月日殁以宣德戊申八月二十八日享春秋五十有五娶髙氏元福建平章某之孫子男二人輗軏輗自家奔訃走京師將扶櫬歸葬于其鄉某山之原以公之友户部尚書兼謹身殿太學士陳君伯髙所為狀來請銘於戲公之才器學行既卓卓如此而其出使之績所以宣布威德播聞於時者又如此士之遭逢若公者蓋鮮矣方之史傳所稱奉使之賢復何多讓哉是宜銘無忝銘曰士之生世有志四方或限於守志鮮克償惟公奮起學優而仕名揚在廷惟天子使惟天子使寵以皇華宦轍所厯鯨海龍沙聲光之昭耀今垂後其身雖死其存不朽公志之卓公行之純刻銘志幽庶永厥聞禮部郎中蕭公伯辰墓志銘宣德紀元春正月十日禮部祠祭郎中蕭公以疾卒于位朝之賢士大夫聞而往弔者纍月不絶且相與致贈賻為之殮殯又作為詩歌以哀挽之靈輀南還其賢士大夫又引紼執奠送之于都門之外粵三月乙巳公喪抵家初公之殁也其同寅主事陳鏞為狀公官世行治將求立言君子為之銘以垂不朽至是其孤守成守安泣以授豫曰先君葬既得日月願有述志諸幽敢請豫謂公之行於銘無忝乃為志其墓而銘之曰公姓蕭氏諱正字伯辰臨江之新淦人曽祖雲可祖漢卿父希亮贈奉政大夫禮部祠祭司郎中母龍氏贈宜人公自少力學攻辭章慷慨有大志比長著聲州里間洪武辛未鄉宿劉伯達等交薦公京師遂以賢良應辟既至即授以八品官賜之冠帶命辦工部事逾年選署虞部主事未幾除貴州安莊衛知事又升經厯其後以四川僉憲張麒舉赴吏部試公水利賦役轉輸數事升知直𨽻泰州授奉訓大夫居數月以內艱去服闋改知深州秩滿升南京禮部祠祭司郎中授奉政大夫洪熙改元之夏四月適一考賜誥命復職復職八閲月而卒享年六十有四始公在工部時朝議以大江多風濤舟楫往來或至傾覆命崇山侯李新總直𨽻浙西之民開銀墅東壩以通大江則可免風濤之艱公時領夫千人畫地計日令甚嚴然慮役者有勤怠無所勸懲遂計工約夫數期日為地三尺工畢無問蚤莫即令休息於是人爭先效力事既易集役又不勞且更逭於罰責以是人知公長於政事及蒞安莊首贊衛帥飭邉防輯士卒時訓練使習於軍容號令又時時巡厯營中勸其生業教之種藝紡織以是人無不給者初白水山有堡多毒癘每嵗守者染疾疫十七八醫莫能療而議者拘於舊制莫敢有所改公建議曰白水卒千人皆有父母妻子今存者無幾若不圗急遷無遺類矣况奉天子命蒞守兹土忍坐視其苦而不知恤哉衆聞知偔然議遂定即日疏聞于朝命改築其堡人甚德之深為州四面卑下每嵗淋潦泛溢衝擊城垣壞公宇蕩毁民舍人甚病之公相地吳家莊髙廣可居且去州近便於遷徙乃以其狀達督府轉聞于朝議允之公大悅遂鳩工集遺材首治廳事廨宇建學宫次第營山川社稷壇壝以及市井街巷莫不井然有條工成率其民遷之由是得免於患州傍近有狼傷人弗便出入公齋沐白於城隍詰旦狼斃民舍中又景明村蝗生日漸滋蔓公默禱于神已乃見羣鳥聚啄之不逾時而盡稼無所傷衆皆謂公至誠所感去州若干里有地束圈頭至李村每嵗暴水為患公常於農隙率耆老吏民等修土堤以捍禦之民賴以安及秩滿還京州人爭挽留之擁馬首不得進乘夜取便道乃得去及去州人父老無慮數百輩詣闕乞留公不允公既居禮部以祠署職典神祀恆齋戒獨處未嘗敢自放有暇輒究考故實若郊社宗廟風雨山川及百神之祭其牲酒器幣之數升降俯仰之節皆有以識之至於諸司之政欲講而行者亦常預與公計之公未嘗恃此以傲人遇事之來從容酬應未嘗以急遽失措人莫不服公之量公器宇凝峻終日斂容端坐如對大賔至與人交際藹然和氣雖久與處不變素性寬和家庭之間未嘗出惡聲居官務崇儉約清心省事不喜言財利因以清省自號所至喜濟人利物有嬰疾病患難死亡危急者輒周之無所吝間居喜吟詠詩五七言簡淡可愛今遺藁無所次第皆公手筆也妻宋氏封宜人有淑德子男四人守成守安守敘守亨豫子壻方向學極為公所愛女一人適張敬修孫男二人演淇孫女六人其葬揚名鄉峽源樓背山之原於乎豫於公居同鄉自為進士官京師始與公相識及豫扈從北巡公以服闋聽選吏部衆推公老成俾偕扈從居數月以急缺守令遂選為深州去京五百里而近嵗時朝覲賀謁幸時與公見見必留數日乃去及後調南京會始疏去年冬豫奔太夫人喪過金陵幸一會會未久即别别未兩月而公卒矣於乎其忍執筆而銘諸然豫知公實深非豫銘其何以盡交友之誼銘曰公昔負才蚤出而仕有聲冬官能以集事繼遷衛幕克贊于理士卒用康以革于弊深有善政屢興于利斃狼與蝗其迹尤異爰陟春官用典祀祭廉清儉約以翊于治方領命書追榮考妣謂可還歸賁于桑梓胡遽奄然乘化而逝惟初洎終無愧于位生順死安實天所畀匪天私公惟德是視矧又多子以肖以類惟公未亡曷以名世銘以昭之尚永無替故拙存先生曽公叔用墓志銘公諱源字叔用晚號拙存姓曽氏其先夏后少康季子曲烈封于鄫春秋時曰巫仕魯去邑為曽巫後若干世曰參孔門髙弟弟子卒後封郕國公漢末郕國之十四世孫據恥仕新莾徙家廬陵之吉陽唐中葉諱某徙吉水之上查唐末曰輝仕至銀青光祿大夫國子祭酒上柱國又徙邑之睦陂又若干世曰載陽復徙邑之新陂宋至和中析邑之恩江鎮置永豐縣遂世為永豐人載陽後若干世曰晞顔登景定進士第為軍器少監厯監察御史遷兵部侍郎江西安撫制置使改湖南後以仲子德裕仕元為翰林學士推恩贈朝列大夫騎都尉武城郡伯實公之曽祖也始自新陂徙今龍潭祖諱巽申初應茂材異等授樂安教諭厯撫贑二路教授進郊祀禮書及鹵簿圗拜大樂署丞升應奉翰林文字同知制誥兼國史院編修號亦軒先生父如珤元末太學生授集賢院司直母周氏宜人有賢行以至正丙戌十一月十四日生公自幼頴悟甫數嵗讀書過目輒成誦年十餘遭時弗靖侍二親避兵惟挾書自隨鄰人有厭其夜讀者諷誦不輟自若也宜人殁寓所悲不自勝遂廬墓側國家平定海宇奉集賢君還故里家故巨族兵燹之餘資賄蕩盡公與兄洵弟潛力復舊業洪武初以多賦長萬石租公善於催科公私便之集賢君遂得徜徉山水間以樂其樂嵗甲寅以事闔室謫徙鍾離集賢君興兄洵弟潛皆殁公痛甚於喪宜人時後以恩例獲歸其鄉即日收三喪歸葬之公既歸以亂離日久恐子弟廢其世業延名師儒訓切之日復親督其課業夜分乃止如是者以為常公性寬和與物無忤每遇士農工賈即隨其所業反復教導之不倦人咸敬服之又強記問凡少時所讀諸書至老誦之益習尤深易數間言人禍福悉有竒驗嘗念兄弟早世無嗣以男棨主兄洵後撫弟潛二孤女若已出集賢君歿時庶弟潼尚在幼公教育婚娶如集賢君存日晚節深居罕所接見唯幅巾藜杖逍遙林壑間從賔客一二自娛永樂甲申棨狀元及第為翰林修撰遷侍講升侍讀學士纍遣人迎養公不果來嵗庚子八月十九日竟以無疾卒先卒之十五日病暍服藥而差後復得微恙醫再以藥進公曰死生命也何以藥為郤之明日晨起湯沐畢具衣冠坐中庭召諸子姓咸在從容語之曰吾年及中夀矣吾行不辱先人矣死不憾日中竟翛然坐逝享年七十有五配張氏新淦人臨江府學訓導東溟先生淑恭之女克相有道先公卒子男四人昌順早夭興即棨也隆名棐亦先卒孫男四人稚秬闕曽孫男一人曰續孫女二人曽孫女四人皆適士族子其一尚在室公卒時棨以扈從留北京聞訃痛絶復蘇將歸以某年某月某日葬公于某山之原以墓石未有刻乃狀其行泣請銘於豫嗚呼公行應銘不可辭遂按狀序而銘之曰曽氏之興建邦于鄫去邑氏曽徙封有郕新莾搶攘乃遷廬陵厯唐銀青及宋武城為國之楨為時之英以蟄以繩底于元貞亦軒暨兄翰林繼榮集賢載馨赫赫厥聲維公式承文獻攸徴克全于兵乃歸聖明弗替弗凌否極而亨惟義惟寧惟德之行孝友天成家邦實刑積善慶并令器攸生乃魁大廷乃揚鴻名寵渥荐膺祿飬其迎眷兹岩扄安此暮齡外榮弗矜聊以寓形行修道凝大化是乘佳城嶸嶸以綏厥靈昭兹雲仍惟德之程有如弗憑徴此刻銘亡弟幼孝徴士墓志銘幼孝諱長吾姓金氏豫之季弟也其先由厚聚徙里之洪坑復由洪坑徙今之培山曽祖德明祖仲卿皆篤厚長者好施與鄉稱善人考守正以文學行誼師表鄉閭洪武中司訓臨江郡庠永樂壬辰春聖天子推恩贈奉直大夫右春坊右諭德母陳氏贈宜人羅氏封太宜人幼孝以洪武十四年辛酉五月日生卒以永樂十七年己亥二月十七日享年三十有九配劉氏子男四人長輔伯次諒伯觀伯紹伯女二人俱適士族以卒之嵗月日葬石莊鄭坑從先大夫之兆幼孝既歿輔伯等屢以墓文為請每一執筆輒為之興思梗塞而不能言然嵗月逾邁恐終無以盡吾情者則於墓石之文又烏可以已耶乃敘而銘之曰幼孝為人有氣岸聰明俊偉卓犖不羈年九嵗先大夫棄背嘗從豫講授早夜切切焉思務於學年十四五於論語大學諸書皆能究其指歸弱冠授徒鄉里有餘暇即手不釋卷由是博考性理之要益有所得家居篤于孝友事太宜人小心欵曲恆得其歡心事諸兄怡怡然極於友愛處族里親姻俯仰酬酢有方有節交友朋重然諾賓客過從壺觴笑咏必盡歡乃已平生善筆札操觚染翰綽有思致詩五七言清麗可愛性剛直不為阿徇人有過輒面斥之不少貸遇事剖決是非必揆諸理道人皆服其公嘗以所居湫隘乃别構於里之楓林洲自堂寢門廡以及土田畦圃耕種栽藝之務皆井井不紊方落成之逾年而幼孝遽得疾以卒嗚呼何天之不可知而命之不可必也如此夫昔洪武壬申豫以邑大夫命備員學宫居數嵗忝以明經登進士第列官于朝其時悉以家事付幼孝理之永樂丙戌幼孝來省豫京師聚處逾月即别去己丑春豫扈從北巡明年春二月復從車駕問罪遐方適幼孝自南來省豫比其至而豫已出塞數日矣是秋還自漠北始獲與幼孝相見再拜勞問悲喜交集幼孝念老母在堂即欲告歸豫強留之浹旬而後别是後七年之間豫往返兩京凡數四屢約幼孝來會竟不可得嗚呼豈期一旦而遽至永訣耶方幼孝之遘疾也顔色揚揚如平時其兄幼學幼孚連命醫以藥進逾數日疾加劇幼孝呼家人具紙筆將告以後事衆皆驚曰是何言之繆也幼孝曰死生大事人所不免恐疾革不能言矣且言之而不死庸何傷遂力疾條十餘事付諸子其言切切焉以教子讀書力學為先務且命長子麒曰汝至京見汝父為我道意九原永訣不可復見矣吾諸子幼稚悉以相付他日倘至成立雖九泉之下亦不敢忘言訖再拜與母别又再拜與親戚友朋别遂正襟端坐而逝聞者莫不為之哀痛觀此則吾幼孝平生之所存者可得而識矣嗚呼豫兄弟四人惟幼孝獨少幸托先世餘蔭與先大夫教育不隕其世然自念宦遊京師二十餘年違逺慈侍與骨肉踈隔夙夜悲惋以不得躬定省盡友于之歡遂平生所願然其間或四五年或七八年猶得與諸弟晤語序契闊若今幼孝之亡則亘古今窮天地不可以復見矣嗚呼極天下之痛有如兄弟者乎極天下之哀又有如兄弟者乎故吾於幼孝之亡言有盡而痛無窮淚有盡而哀無窮刻銘堅石庶以攄豫之痛泄豫之哀而慰幼孝於地下也銘曰嗚呼幼孝質美而聰明壯負竒氣奮發而精英是蓋將有為以盡其平生胡天之酷使一旦而夭傾嗚呼幼孝生寄死歸自古而然命之短長又何足評觀子臨終其聲琅琅不懼不驚誠可謂達天之命而超邁乎常情嗚呼幼孝死不可以復生千嵗之後其存不朽尚有徴於斯銘周君子霖墓志銘子霖既卒之草一年其從子岐鳯懼君之湮沒而無傳遣其子敘持狀走京師來徴銘將以圗於不朽嗚呼豫於子霖分雖朋友而誼猶骨肉慨念今昔尚忍執筆而銘諸雖然以豫知子霖之深則銘之為宜乃按狀而敘之曰子霖諱霖姓周氏為吉水望族髙祖應龍曽祖嶽俱登宋進士第祖厚父維章居鄉以長者稱維章生九嵗不省所怙從學季兄有立復事伯兄鰲溪翁于宦元季兵亂避地新淦石洞之髙氏因家焉子霖生于髙氏自為童子時嶄然不羣見者莫不以逺大器之及冠從印山伯網羅先生授詩經先生沒復從彥通曺先生任丘應祥宋先生學易春秋以家世業書遂從莘耘歐陽先生授尚書年草餘悉通五經之旨有司聞其名召補邑庠博士弟子員大肆力于學同輩質疑問難者皆斂袵師事之略無傲睨矜眩之色嵗時月朔課試索筆一揮滔滔汨汨如江河之注未嘗有所窘束以故上官皆刮目待之而聲譽日起究其學之所至蓋駸駸乎入於閫奧矣子霖無他兄弟其父母慮其仕進重離憂之念也子霖亦思欲以安其親乃引身退居于家已而慨然慕子長之逰買舟抵章貢南踰五嶺浮廣海訪古名賢遺迹所至名山大川皆有品題其磊落倜儻之志英邁雄壯之氣殆欲凌宇宙駕風雲飄飄乎而不可止也奈何命不可知壯逰未遂使吾子霖竟賫志以沒嗚呼痛哉子霖生庚子七月草一日沒洪武壬申十一月日得年三十有三娶龍氏子霖初未有子以姪儀鳯為嗣後有子一人曰韶鳯孫男一人曰宣孫女一人先是子霖之卒同旅具棺葬之于胥江官窰之獨樹下將圗返葬而山川遼邈嵗月遷邁卒莫能歸骨于鄉後乃從俗具衣冠招魂葬之今其墓在所居石洞西山之下從髙氏塋也子霖性和易事父母至孝與朋友交久而不衰為人謀盡心竭力不求其報自幼至壯嗜學不倦尤好抄録文字日積月纍動盈篋笥而與人論辨亹亹不之嘗與豫夜臥舉河圗洛書及洪範諸説以問余雖槩答之而子霖反覆論議出人意表余深歎服焉嗚呼痛哉今已矣無與共論斯事矣尚忍執筆而為之銘耶銘曰嗚呼子霖有學有文也之死不衰其氣永存也畀于來世尚亦有聞也宋惟學墓志銘吾淦多大族而柘鄉宋氏其一也其先出自丹陽府君哲人之子詢仕為袁州刺史因秩滿道經新淦至柘鄉見其山水秀麗遂家焉詢之後凡草有一世是為處士諱貴祥字惟學而德昭之孫瑞可之子今進士常之祖考也處士幼孤賴母王氏鞠育教訓以底于成性謙謹和易力勤儉不事矯飭篤學好義惟恐弗逮閔窮濟匱施與不倦視婚姻死喪有弗給者賙恤之無少靳家庭之間藹然禮讓之風嘗買舟泝大江逾淮涉泗以至齊魯之鄉南涉衡湘抵隴蜀周厯名山大川攬竒托秀超焉物表飄飄乎莫知所止也洪武中縣嘗以耆年舉遂一至京師面受太祖髙皇帝聖諭錫以宴勞遣歸人莫不榮之處士性至孝當元季考瑞可嘗逰荆楚間值兵興道梗竟客死于外處士夙夜哀感屢往求遺骨歸葬不可得由是抱終天之痛每與人言輒嗚咽流涕不能禁聞者莫不為之感激其生元元統丙子十月五日卒則洪武壬午七月八日享年六十有七配劉氏克相內治子男一曰廣聰敏強學卓然為後進矜式可謂不忝其家者女一適德化令劉謐孫男三長即常以易經登永樂戊戌進士第次道次儒俱秀茂有立孫女二曽孫男四曽孫女三以某年某月某日卜葬揚名鄉黃鍾之原於乎處士以布衣處鄉里恂恂焉務於敦德行善雖未克顯于其躬而流委祉及於子孫况又有若常者以科第發身行將嚮用于時所至蓋未可量也常以父命將為處士立石墓上乃以太守蕭公伯辰所為狀而求豫為銘豫於處士鄉人也重以常之請故不可以辭遂為之銘曰由家達鄉惟義與仁內蘊弗耀彌篤而淳惟篤惟淳以遺子孫尚其紹之其永有聞袁處士墓志銘袁處士既葬之十有六年其子吉祥始具其事行來請銘揭諸墓上余與處士同里閈且世有姻好銘豈容辭按狀處士諱辛字煥南姓袁氏為漢司徒安之裔世居河洛間至南宋時有顗者仕為雍州都督實安之十四世孫也顗之後九世曰滋為唐吉州刺史終于官子孫遂依吉州而家焉又若干世曰致安者始徙居淦之沙坊世久族大以蕃衣冠相承曽祖邦用祖道𢎞俱有鄉行考以仁敦朴儉約號半村老人處士美資容幼頴敏不凡讀書力學蚤有立志家居父子兄弟自為師友其時以仁夫婦俱以髙年為鄉里所推處士朝夕侍膝下婉愈承顔得其歡心昆季之間友于彬彬庭無間言尤篤意教諸子處族里以和待朋友以誠周窮恤匱孜孜不怠初季父克己翁以才薦仕為河間府司稅使處士不憚道途之逺輒從之改臨安又從之及翁為靖州宰而歿而公始來歸十餘年間翁之居仕途南北遷調而所以扶持之者處士之效勞為多也居無何朝廷將營建北京詔取材木天下邑大夫檄賢豪以往處士首倡率千夫跋涉山川冒犯風濤未嘗以勞苦介意奈何命不可知舟行至新淦之白馬灘而處士疾作逾數日加劇惟子吉祥侍左右處士命之曰吾疾殆弗起爾兄弟宜自卓立務盡孝友使家道敦睦以不忝于前人則吾目瞑矣言未既而卒時永樂十四年丙申八月草八日也享年五十有二以某年某月某日葬于里之黃金江井山之原娶谷坪李氏子男五人長吉祥次吉榮吉華吉信吉瑞孫男十人孫女一人為吾第三子堅伯之配銘曰為鄉里之善士作太平之良民雖未獲一命以行其志而究其平生所存亦足以垂裕于後人雲山蒼蒼江水湯湯我銘不朽永安斯藏亡弟幼孚徴士墓志銘永樂壬寅秋九月豫以扈從北征歸京師始聞幼孚以今年二月八日歿于家為之號痛幾絶念欲為之銘以志諸墓每一執筆輒潸然淚下而不能比幼學來復拳拳以為言乃抆泣而敘之曰幼孚諱尊生後更名信而字幼孚其先居寶慶逺祖彥始來居新淦之厚聚宋建隆間始祖清復徙居里之洪坑厯若干世再徙今之培山曽祖諱德明丕承世澤植篤厚之慶祖諱仲卿啓迪後胤垂寬裕之仁考贈奉直大夫右春坊諭德諱守正師表鄉郡萃文行之美母贈宜人陳氏封太宜人羅氏後先相佑勤勞內助鍾和順之德幼孚在兄弟中尤為父母所愛重方髫齓時頴異日發先君教以孝經論語不數過輒能背誦年十二三從先君讀書郡庠奮然有志於學先君教諸生甚嚴終日端坐講授不輟常命幼孚厠席諸生間諸生所講授有未通者或以質幼孚即與之論辨講析未嘗違背經旨先君教幼孚所習有程限暇即教以作詩寫字至夜則命以一日所講授者通溫之詰旦悉令背誦泠泠焉如源泉之注未嘗有一字遺落先君甚為之喜洪武己巳不幸先君捐館舍幼孚以不能卒業夙夜悲傷乃閉門自力於學探索諸經之窔奧究性命之理推道德之懿充然若有所得者年二十餘授徒鄉里循循有軌則其講論授受一遵先君之訓以導迪之人莫不恱服幼孚器宇溫粹寡言笑事親先意承順未嘗有怠傲之容處昆弟情誼篤至未嘗有不遜之色居家庭言溫氣和未嘗有暴厲之聲接鄉黨恂恂然未嘗有矜肆之態其賦性公直廉介不喜諛佞以取悅於人然言論之間無幾微及人過失長短終嵗遊息山林未嘗造城府以非理干人寒暑晝夜恆手不釋卷尤善筆札喜吟詠每出語清麗可愛晚同幼學徙居紫山環左右植以松篁蒼翠蓊欎蔽虧天日風晨月夕遊泳其間其樂蓋陶陶然嗚呼豈期一旦而幼孚竟死矣前年冬幼孚嘗省豫北京以太夫人在堂即取别南還值氷凍阻留德州相望千里為之悵然既而幼孚手封所作詩一編來寄展玩之餘益增慨想嗚呼豈知此為永訣耶幼孚之寢疾也幾半載飲食服藥如平時其將殁也屬幼學以後事且曰太夫人年髙今不幸至此不得終飬以盡吾為子之職此平生深痛保衛扶持惟兄是賴耳復召諸子語之曰吾家世業儒素餘慶所及致有今日汝曹宜務學立身為君子善人以無忝先世敬事大夫人如吾存日愛厚兄弟篤手足之親無虧損恩誼以為父母鄉里羞辱言訖瞑目而逝其生洪武丙辰九月草九日至是享年四十有七娶郭氏子男五人長夔伯次純伯珉伯憲伯方伯女三人俱適士族孫男二人曰庭光庭霽以是年冬十二月葬里之黎洞從先兆也嗚呼豫兄弟四人次幼學次幼孚幼孝以永樂庚子春二月得暴疾而殁諸昆弟莫不為之傷悼悲痛豈期一旦而幼孚亦奄致大故三載之間喪吾二弟蒼天蒼天何痛如之嗚呼此吾於幼孚之銘所以重有所不忍也然不銘則又不足以盡豫之情且又豈可使吾幼孚終無聞於後耶為之銘曰質溫純性明敏內孝弟外謙謹篤問學力辭章言合則動允臧廉有立不妄取分知足介自處樂嘉遁視考槃撫松竹保嵗寒天不仁奪之亟去莫追返幽穸孰昭之視我銘告爾後垂千齡羅處士道暉墓志銘處士諱昶字道暉姓羅氏其先由錢塘遷豫章唐末有諱崱者再遷廬陵之印岡四世孫議復遷吉水之桃林議之後六世有曰彥真者生燠文始遷居里之竹溪由是子姓蕃殖以科第文學而顯者後先相望燠文又七世而至伯通家益饒裕好讀書攻文詞學者稱為通溪先生是為處士之祖考通溪生與立瑰偉卓犖以鄉舉受順元路學正爵未顯而終是為處士之先考也處士幼孤資質秀頴動止異常兒比長益肆力于學若安成劉先生雲章清江劉徴士仲修鄉先達周公仲源李公伯謙皆與之為忘年交暇日於廣坐中談論禮樂詩書以及古今政理治忽之迹厯厯如指諸掌人莫不傾服常念二親早喪弗獲躬奉旨甘每遇嵗時祭掃奠薦則悲泣嗚咽不能止處家以和接族屬以恩無少長咸得其歡心有再從子幼孤不能給賦役處士極力償其逋租者十餘年又有外氏子孤弱無所託處士育之如已子為畢婚娶乃遣歸諸子始知學輒延名師儒為之楷範退則諄諄然喻以義方之訓遂皆底於成立鄉先生歐陽伯周晚失所託盡力給之無少怠比歿復為之經理喪葬其有厄窮無告者必捐資以濟之無所吝性切直不容人過有弗迪於善者輒靣責之不少置鄉人以田有肥磽租輕重無所别嘗訴之於郡郡以下處士理之徐為區别無毫髮偏徇人莫不服其公嘗督役往它郡取財衆皆畏難相避匿處士慨然曰此王事也獨以身先之衆即欣然趨事無一人敢差池者其後為羣小所誣訐當謫戍遼陽處士躍然就之無難色居無何竟以疾弗起聞者莫不為之悲悼時洪武丁卯六月十又八日也其生元至正壬午四月初七日享年四十有六以永樂乙未十二月草九日與其配邉氏孺人合葬里之乾塘坑子男四人長彛字同倫次曰載曰實曰直俱能世其家女二人曽希濓胡世熊其壻也孫男九人曽孫男二人處士之卒于遼陽以道逺弗即就窀穸厯三十餘年彜與諸弟始克歸骨于其鄉以葬彜復懼處士之德善或致久逺遂湮沒不傳乃以其宗人修撰汝敬所為狀來請銘將歸而刻諸墓上豫不能以辭也為敘次其槩而銘之銘曰德足以及人而志不售才足以濟時而命不偶始雖不能以智力而勝夫人終則獨能以福澤而遺其後於乎是為處士道暉甫之墓尚永世而有耀曽宗沂墓志銘宗沂諱暉姓曽氏世居永豐之新陂曽祖維荃始徙居新淦之九原頭祖魯望父伯雍俱業儒母陳氏宗沂自少頴敏不羣好讀書於經史百家能通大義值兵燹後家業稍不振宗沂時方丱角即奮然有立志由是家益饒裕或有歎羡之者則曰居家致千金豈難事哉惟能如古人之建功立名流譽於無窮乃為可貴耳暨長豪邁不羈慕司馬子長之為人遂周逰四方遍厯名山大川值古人遺迹輒徘徊終日不忍去平生喜讀李白詩嘗夜泊舟采石風月凄清江流無聲獨乘興翩然上蛾眉亭拂石危坐朗誦秋浦歌數過慨然曰安得如斯人者復與之遊乎聞者異之性至孝父殁盡禮殮葬事母尤小心敬謹供具旨甘未嘗不得其歡心嵗時祭掃先塋非有故未嘗不親往嘗僑寓玊峽雅尚髙致暇日無事輒行吟水濵或擷芳攬秀或潄泉枕石或投竿取魚超超焉有自得之趣玉峽古鎮市凡四方賢士大夫往來於此者宗泝必館榖之遇困窮無所給者即捐資濟之不少靳永樂己丑十二月二十日值遘疾危亟呼其子桓謂之曰我有母未及終飬汝宜盡心侍奉以終吾志不幸而有故尤當致力襄事使無遺憾吾瞑目矣言訖遂絶其生元至元己亥十二月草日享春秋五十有一娶李氏子男一人即桓也字景武女一人適呂景瞻以殁後十二月草四日葬邑之黃牛岡首乾亥趾乙辰葬之後十有二年桓奉其叔父翰林侍讀學士子啓君之狀來請銘豫弗敢辭乃為敘次其略而銘之銘曰少能奮立慕古為學壯逰四方寄興寥廓裕家以豐致飬以樂內藴弗施如玉在璞既厚以才胡夀之索臨終有言奚愧奚怍子克其家繼志有作徴銘刻石千載之託從兄季質處士墓志銘處士諱相子字季質姓金氏其先由寶慶來居新淦之厚聚宋建炎間復由厚聚徙里之洪坑後以族蕃地隘再遷今之培山世業儒曽祖德明忠恕仁厚鄉以長者稱祖仲卿謹願誠篤好周給貧之以隱德終于鄉洪熙初元蒙朝廷推恩贈資善大夫太子少保兼武英殿大學士考用勤儉敦朴以孝友聞母袁氏處士為人剛毅亷直有氣岸為童子時已屹然不凡先少保雪崖先生親撫育之教之讀書績學既冠為婚娶馴至成立家素貧授徒鄉里給饘粥以飬父母其後名聞郡邑人爭延致之惟恐後邑大夫屢以應辟辭不就平生寡嗜好不事華飾布衣蔬食淡如也於人不妄交不喜諛佞人有過輒面斥之不少避見惡人嫉若冦讎終身逺之不與對交友以信於財利介然不妄取豫終嵗足迹未嘗至城府性素嗜醴醪風晨月夕時引杯獨酌酒酣則劃焉長嘯擊節髙歌氣凌宇宙無一物以嬰其懷者尤善筆札喜吟詠長篇短章迭宕豪放視餘輩不多讓而人亦不與抗也永樂庚子館寓清江之上一日忽晨起語諸弟子曰吾平生未嘗有疾今遽憒憒其殆將死乎乃命取湯沐浴具衣冠即席翛然而逝時冬十一月初二日也生元癸卯三月初七日至是享年五十有七娶袁氏有婦德先卒再娶李氏子男二人曰廉伯誠伯女一人適劉長通孫男三人孫女二人以卒之嵗十二月十八日葬揚名鄉黎家洞先塋之次嗚呼處士行修於家操履之嚴足以風厲鄉閭使其得一命以施於世必大有可觀者而卒以布衣晦迹山林此不能無遺憾焉昔仁宗皇帝蒞阼之初幼孜嘗奉命歸省大夫人獲一哭處士之墓蓋有不勝其痛者而自歸朝以來屢欲為文以志諸墓每一執筆輒嗚咽不勝今年已六十四日臻衰邁恐無言則終無以盡吾情者乃序而銘之曰超邁之志介特之行身修於家素安於命完德全名無愧無怍一朝乘化返于溟漠江月山風無異昔時我哀弗除魂魄何之用揚潛德表于墓門百世有傳而貽子孫李孺人周氏墓志銘永樂九年春友人李鎮以服闋來京師待缺吏部今年夏六月始被命得調將赴官狀其母孺人之行來請曰鎮負不孝先妣殁十有一年不得稱述以銘于墓夙夜弗寧恐遂湮沒無以昭示後來惟執事哀而賜之銘匪惟鎮之幸而吾母亦得以託于不朽也余辭不獲乃按狀而述之孺人諱妙貞姓周氏世家吉水之洪同父東周母宋氏孺人生有淑質明敏恭慎自幼受教讀女孝經論語諸書輒記誦不忘且了其大義及笄學女事晝夜不怠父甚憐之擇配谷平李氏納于二館屬元季兵亂鄉里繹騷故家巨室資産悉板蕩孺人念周氏已所出極力為之扶植卒賴以不墜父殁事其母以禮未嘗有纎毫怠忽洎四方平定始營産治居第家事無巨細必親厯之平生不事浮靡敦行儉約以道義相其夫延師教子孜孜不怠訓飭二女俾勤於麻枲絲繭之事春秋祭祀及旦暮飲食必躬其勞而不以委於他人賔客相過者具醴醪殽羞豐儉必適其宜治家理生弗懈於勤待下以慈睦族黨以恩賙貧乏以義自內屬及於外姻稱道其賢者如出一口而閨門之內皆視以為模則孺人性至孝常語其子曰吾為爾家婦不幸舅姑早亡弗獲盡一日之飬至今思之慊焉于懷爾曹蒙先世餘慶當力於為善毋驕傲以敗德毋損人以益已毋非為以貽父母羞辱茍能守而行之雖終身無失此皆孺人卓卓之行可以稱述而垂諸後者生元元統乙亥四月十九日卒于洪武壬午六月十又九日享年六十有八當壬午夏鄉里難作所在聚冦盜攻奪焚劫富家巨室俱罹其禍時孺人殯在堂未克襄事而恬以無虞一門之內皆賴以寧謐人皆謂孺人積善所致故天報之若此子男二人長即鎮今調鎮江府儒學教授次曰銓先授工部主事今任福建汀州府通判女二人長適王仲璟次適宋敏惠皆名族孫男六求已求益求用求正求審求問孫女六永樂二年十二月某日葬于新淦揚名鄉之斬山銘曰為婦為母淑善有稱躬履勤儉以厚其生夫受其助子賴以成晚享多福際乎太平夀考而終既臧且寧刻詞墓門耀于千齡濟陽教諭王公子職墓志銘公諱省字子職姓王氏其先出晉右軍羲之之裔孫鴻以官逰于虔遂家寧都木瓜園後徙永豐之上里六世祖諱芳號槐堂再遷吉水仁夀之前村曽祖諱仁字德可復徙居富溪去前村可一舍許祖諱理字道中樂善好施與鄉以長者稱考諱進字君賢以儒術起家壬辰兵興嘗以策干防禦使梁公監司丁公二公以便宜檄補安福州判官辭不就公天性剛果純仁孝友自為童子頴異秀發讀書不數過輒能記憶鄉先生長者皆異目視之洎長從前進士歐陽衡習舉子業晝夜劬勞難疑答問日積月纍如水湧雲蒸浩然而不可遏居常正冠肅容如對神明雖祁寒盛暑手不釋卷未嘗以仕進為心視家人生産略不介意仁接族姻義敦鄉里平心率物不為町畦終日欵對不妄言笑事親極于誠敬起居定省動循禮則君賢翁嘗遘疾危革旦夕呼天乞以身代不數日而差人以為至孝所感大明龍興方以科目取天下士公首應詔以書經舉洪武壬子鄉貢進士明年赴春官例免會試命吏部次第銓擢公以親老乞歸養詔許之十五年壬戌禮聘天下賢士邑大夫首以公應辟懇辭不獲遂與計偕逮至太祖髙皇帝召見奉天門命題親試以稱旨居前列廷議欲置公大用公以才薄力辭遂授浮梁縣學教諭時學校久廢師道不振公極力與諸生切磋講明有所問難必為分章析句旁推曲引以盡其奧故士之造就者逾於他邑居四載以外艱去職服闋改授睢寧縣學時在學司訓久缺貟公於訓誨課試一任其責而諸生亦帖然敬服其教居八載再調山東之濟陽縣學其於教飬之方無異于浮梁睢寧一時絃歌之盛以濟陽稱首未幾遇王師平定內難濟陽失守公為邏騎所獲欲以非禮辱公從容引譬辭義慷慨神色不變衆遂舍公發其私帑以行公仰天歎曰子職發身科第叨竊祿幾三十年今老矣幸得保全首領以歸見先人於地下吾目瞑矣遂閉門不食逾數日而死時洪武庚辰七月草又四日也公生元至元戊寅九月一日至是享春秋六十有三以洪武壬午十二月草又三日葬先塋之次從公治命也子男三人長哲誠思次善孝思俱讀書有立次茲永思選為博士弟子員以公殁之嵗卒妻彭氏霍州學正明復之季女先公八年卒女二人長適南京兵部職方員外郎周岐鳯次適同邑歐陽緝安孫男三人長麟次章又次禎孫女三人嗚呼公之行不愧于古學不下于人惜其位不稱德遭時弗偶竟賫志以沒然觀其燭理之明信道之篤而於死生禍福之際漠然不以動於其中視彼靦顔齷齪蔑然無聞與草木同腐者霄壤不侔矣公沒三十餘年哲以豫交久之深求為之銘遂為敘次之如此銘曰學至進士位列教官志行潔清操履方端識察幾微生順死安清風凛然百世不刋孔處士立夫墓志銘公諱克寬字立夫姓孔氏宣聖五十五世孫也其先有曰績者仕吉州為推官遇黃巢之亂遂家新淦之西江子孫漸以蕃殖績之後逾七世有若文仲武仲平仲俱以科第發身為時名人所謂臨江三孔是也三孔之後有諱源者與其子誠子昌慕豐溪山水之勝遂卜泉井而屋之則公四十九世祖也曽祖碧澗祖𢎞毅父惟顯俱隱處弗仕公資性篤厚器識𢎞達修髯廣顙神采煜然讀書通大義不拘拘於訓詁句讀之末年二十五值壬辰兵亂逺近盜賊蜂起奉二親避地東西雖流離顛沛之際未嘗一遭于橫逆暨天朝平定禍亂海宇寧一辛勤來歸剪荆棘葺廬舍闢田園以復其故業洪武初命下造城磚有司以公董其役晝夜盡瘁以身先之而人皆樂於趨事上無稽違之責下無疾怨之聲及後核實田畝有司復委公經理纎毫皆得其實未嘗以已意而妄為增損以是皆推公之忠厚而服公之平恕也公處家治生以勤儉為夲教育諸子篤於義方待宗族有恩交友朋以信處鄉黨以義人有不平者或詣公質之公從容引譬皆釋然而退佳時吉日賔客故舊相過者輒命觴對酌相與坐茂樹俯清流酣歌笑談盡歡而後已晚節優遊田里享滫瀡之奉綵衣怡愈孫曽滿前夀孝康強無與為比一日公臥疾度弗能起召諸子謂曰詩書世業也吾不能光於前人若等能繼吾之志吾無憾矣言畢翛焉而逝時洪武壬午十一月十又一日也生元季丙寅八月草一日至是享年七十有八以其年十二月葬里之羊山嶺戊子冬十二月草三日復改葬里之西坑配周氏有婦德先公之歿四十有九日子男四人曰恆曰慎曰恂曰悔孫男二十孫女十人曽孫男十人曽孫女五人嗚呼先大夫諭德雪崖府君與公生同里閈交好之篤終始如一日余生也晚幸辱知於公而又與公之子恂為忘年交先大夫既歿追維先執之存者惟公尚康強無恙孰謂於今而公亦九原不可復作耶余蒙恩待罪禁林忝職太史以恂之請不敢固讓是用敘次公之平生以銘諸墓俾傳諸永久而昭示于後之人銘曰公之勤儉行於家而服於身也公之信義著於鄉而達於人也徜徉乎畎畝之間詠歌乎林泉之下而樂為太平之民也生獲其寧殁獲其夀而福慶及於子孫也我知公心作公之銘尚千載而永存也故户科都給事中贈承直郎兵部職方清吏司主事龔君淑安墓碣銘龔君淑安既卒之三十年其子永吉懼公之德善或久而弗彰乃奉其父友前長沙府同知朱肇所為事狀一通泣拜請豫追銘其墓顧豫辱交於君嘗同朝同給事內廷知已莫逆誼不容辭乃序而銘之曰君諱泰字淑安姓龔氏義烏人其先漢渤海太守遂之後傳至宋有曰應之者纍官右史中大夫直寶謨閣則君之七世從祖也曽祖諱興祖仲寶俱蓄德弗耀考諱印可以君貴贈户科都給事中母傅氏封太孺人君生九嵗喪父太孺人躬勤教育遣從鄉先生學比成童能記誦經史無慮數萬言及長復精於吏事吏有公牘不能辨者必資君以助然尤為縣大夫所器重遂以選充邑庠弟子員受業於景濓宋先生之門人宗思睿討論問難晝夜不輟故其學益進業益充洪武丙子以書經舉鄉貢進士明年會試春官未第復肄業大學已而承命往青州閲齊王府護衛君奉法惟謹按視有方人無敢干以私者又嘗監視安東護衛君儲廉公不欺人用畏服自是聲籍籍聞于朝著未幾吏部以六科缺人欲得勤敏亷慎者以充其任君被選擢户科給事中授迪功郎改從仕郎嵗辛巳升都給事中授承直郎給以勑命壬午太宗皇帝以肅清內難師至金川門君從文武羣臣謁見遽得疾墜城下以死實六月十又三日也享年三十有六以其年十一月五日葬縣南崇德鄉青岩里先塋之次娶傅氏封孺人子男一即永吉業春秋舉永樂庚子貢士以工書入祕監擢兵部職方清吏司主事授承直郎適朝廷推恩君所贈封秩皆如其子孺人傅氏亦加封太安人女二皆適士族孫男二君為人剛徑有氣節遇事一據於理不為他岐所惑始居鄉校時人有病狂者擠君幾溺于池弗救人皆謂宜置之法君曰彼狂至此若論以法是豫不仁也一無所較有趙文慶者失盜衆言巫有靈叩之其應如響君曰此罔人者寧有是理哉衆莫之信及視之巫瞪目不能啓一喙衆始服君之明君居家孝恂恂然恪守禮度嘗構堂所居繡湖之上婉愈承顔日以奉母為事當時賢士大夫皆賦詩以為母夀至今鄉䣊稱之君有弟叔寧待之極其友愛凡田廬資産悉委之不較未嘗有一毫自私然叔寧尤恭謹和順朝夕事君肅如嚴父家事無巨細必資稟而行未嘗敢自専一門雍睦為鄉里所推君平生寡嗜好不妄言笑不喜諛佞與人交常厚於自責居官敬其事兢兢焉以理法自衛未嘗敢須臾怠忽歿之日人莫不悲之嗚呼士之所志莫先於操存以君之制行卓卓如此誠無愧於古之君子者雖享年不永然於死生之際志安而理得九泉之下無復遺憾矣是宜琢銘貞石以揭諸墓隧使後之人於此有所考徴焉銘曰惟士之仕將行其學志有弗偶以求無怍偉歟龔君操履之確之死不惑增重山嶽九原日逺知君者稀君殁無憾後人之思君有賢子躋於顯融追榮泉壤報施攸崇惟善不替惟名永存刻銘墓道百世有聞贈翰林編修習君墓碣銘習君既卒且葬其孤翰林編修嘉言具君善狀一篇泣丐余為銘將歸而刻石以揭諸墓上余與君同郡為知已而嘉言於豫誼敦鄉執又為寮采則於銘何敢辭按狀君諱諲字懷恭姓習氏東晉滎陽太守鑿齒之後鑿齒襄陽人以避符堅來居袁之萬載已又卜居新喻之白梅田既殁葬其里近棗木山子孫占籍遂為新喻人髙祖季達宋鄉貢進士號梅窗曽祖允亨祖漢舟考均泰號梅隱居鄉能急難解紛人稱為長者妣黃氏有婦行值元季繹騷相梅隱起家多內助君為人氣宇溫厚性尤頴敏方髫齔已嗜學嘗從伯父前星子縣學教諭均謙甫講授既冠偕從兄今國子學録懷清遊學石門梁孟敬先生之門久之學始成名譽日著同輩皆推敬之年二十餘郡縣屢強起為教官以親老辭杜門不出供飬之餘惟讀書誦詩徜徉林泉以為樂洪武丁丑有以明經爭薦君者力辭不獲遂起為南雄郡學訓導其後丁外艱調瀏陽復丁內艱調平江秩滿升湘潭教諭永樂甲辰秋太宗文皇帝賔天君入臨闕下適洪熙更化特降恩典凡廷臣有年勞者皆得授誥敕贈其父母先世于時君已老例得棄官就子封乃以其情訴諸朝遂命以翰林編修階文林郎致仕而歸逾年而殁宣德元年十二月十又五日也距其生之年至正庚子享春秋六十有七以卒之月草五日甲申葬里下陂石嶺原先壠之次配吳氏封孺人子男三人長經即嘉言登永樂戊戌進士第為翰林庶吉士轉今官次約次緘女一人適彭邦憲孫男若干人孫女若干人君為教官三十年所至皆有條教其在南雄平江奮然以興學為已任終日端坐與諸生問疑辨難誘掖奬勸隨其才而造就之二郡以科舉占者實自君始其教湘潭而居南雄平江而科貢得人又倍焉以是名籍籍皆推君為善教君在官雅好周人之急茍力有可為雖傾資無所計然尤虛已下人人有善輒揚之久益稱道之不置持已小心篤慎雖遇細事亦惴栗不敢忽故終其身未嘗致重譴平居儉約不喜華麗布衣泊然未嘗以得失介意君未仕時嘗種梅山間以自况恆語人曰此吾祖吾父所好尚者吾不敢忘因以梅坡為其號其中堂之扁曰樂善曰此先君遺訓吾不敢不勉及來京師復以記屬豫其意蓋切切焉欲以示後傳逺云君於文平實詩亦簡潔昔嘗以湘南所作見示豫未暇有所評竊幸他日或歸休林下尚得與君論其事不謂一旦而君遽死焉執筆臨文有不勝其感者為之銘曰聞昔習氏居渝陽世以儒行稱其鄉惟君承之善自將讀書奉親甘晦藏中年被寵名始彰屢教郡邑職載陽晚蒙休致荷寵光加封清秩榮天章方期夀考未渠央胡遽乘化返混茫托德裒行靡不臧昭兹刻銘表崇岡永貽來世垂不忘蕭宜人江氏墓碣銘宜人諱柔字順貞姓江氏元處士學敬翁之女今奉訓大夫知晉寧州蕭君迪哲之配母楊氏世居淦西斷金鄉之黃芝山為邑著姓自宜人之曽祖潤玉祖宗海以至其考學敬翁皆篤厚有隱德宜人自幼聰慧柔淑習姆教勤女事處閨門動止有節極為父母所鍾愛及歸蕭氏謹修婦道事舅姑如事其二親處妯娌如接其同氣遇宗族禮賔親奉蒸嘗小心敬慎又咸適其宜其後知州君以進士厯政憲府迎宜人於京師猶日夜勤女紅不輟雖薪米鹽醬細務皆親理之一不以煩知州君永樂十六年知州君由南來北京擢官近侍遂遣宜人歸家二子一女年已長皆次第為之婚嫁方將優間享旨甘之飬以樂太平而宜人遽死矣其生洪武甲子十月十有六日沒則永樂甲辰三月十五日享年四十有一子男二人長瓊次璞俱讀書能世其家女四人長適袁用莊餘在室以卒之後某年某月某日葬某鄉某山之原瓊璞奉知州君之命以進士李敘之狀來屬余為銘豫於知州君託交有素璞又豫之子壻誼不容辭乃為之銘曰淑其質育其德內助克勤靡乖慝宜夀而夭天難必我銘其墓示無極興寧丞袁景陽墓碣銘迪功郎興寧丞袁公景陽既殁之三十五年其子鵬始以友人李潛所為狀來請銘豫與公同里閈而鵬又豫子壻有不可辭乃按狀而序之曰公諱復字景陽姓袁氏世居新淦之石莊曽大父諱叔信大父諱夀卿考諱友敬俱純雅篤厚鄉以長者稱母胡氏公性資頴敏美丰儀善揖讓進退稍長就學知事師敬長之節洎弱冠即教授鄉里時時學為古文以韓愈歐陽修為矩矱儒先長者咸器重之公居家孝友純篤父殁哀毁不自勝事母左右承順無違禮撫育二弟成人皆為之婚娶待宗族恩義兼盡接朋友終始如一平居終日無疾遽色以是鄉里皆推敬之洪武辛酉夏四月以聰明正直薦于朝太祖髙皇帝命賦槐隂清晝遂援筆成三詩以進即日授惠州興寧縣丞興寧地居荒僻民俗反側公始至詢察民隱因其所利者而興之所病者而去之居數月民皆服公之教帖然以寧未幾鄰邑博羅盜起上官委公往捕之未至盜所公遣人喻之曰爾等皆良民有父母妻子何苦陷於惡今與爾約能改爾之行悔爾之過則身無恙否則請於朝必孥戮爾身家可全乎羣盜聞之皆爭趨來歸曰生我者阿公也自今不可復為盜矣甲子冬十月秩滿入覲民老弱追送於道曰阿公我父母也向非父母我何以生願父母重來以綏我民既而公復歸民大喜過望逾數月以疾卒于官時洪武乙丑九月十三日也公生元至正戊子五月初七日至是享年三十有八妻髙氏早亡繼室毛氏俱無子以弟景哲次子為嗣次鵬也女三人適龍淑章楊秉權羅孟俊以丁卯年十二月初一日葬揚名鄉七丘山之原銘曰純粹之資孝友之行經術之才豈弟之政化暴緝強以綏以靖弗究厥施竟嗇于命惟名永存惟後之慶太史作銘其德斯稱贈承直郎襄府審理張公墓碣銘張故為宦族連世有聞其先有昺者仕宋自天台徙今之仙居德善垂延肇興厥家昺之後有登紹興進士第曰賢者纍官左司諫贈中奉大夫則公之六世祖也公曽大父可貴仕元慶元路儒學教授贈上騎都尉清河郡伯大父漢章贈輕騎都尉清河郡侯考惟賢海道巡防義兵萬户以功得追封先世故可貴漢章皆以惟賢貴贈也公諱宅相字景舒今贈襄王府審理正公母清河郡夫人郭氏生公有偉質其舅某見而竒之曰吾家宅相也故因以名公夙承家訓讀書樂善日惟不及天性純孝事親婉愈承顔雍容和悅篤厚宗族恩意周浹內外無間言者萬户公殁公獨膺家政嘗長鄉之租稅廉介不阿公家徴需百務皆已出一不以煩人所居鄉官寺田多重租小民不堪逃徙者衆公遂以已田均其租由是流移者復歸公私便之洪武甲子嵗大飢人餓死相屬公發廪賑給賴以全活者數十家其處心仁恕率皆類此卒於癸酉嵗十二月二日享年四十有七娶郭氏事姑以孝稱後公草有六年卒今贈安人其葬在鄉西奧先隴之次安人合祔焉子男四人伯昭伯溫伯升伯厚以材徴初授北京行部主事改襄府審理正稱於其職女一人孫男十人伯厚間以其友北京行部主事李茂𢎞所狀事行來請銘揭諸其阡乃序次之如此而為之銘曰胄之華兮多顯揚善之積兮慶斯長身不達兮嗣之良崇褒寵兮煥天章刻琬琰兮配前光盧處士紹先墓碣銘盧處士既卒之三十六年其子滋懼無以稱述先德且懼其久或泯沒無聞乃以今越府長史周恂如所為狀泣請豫追銘其墓豫於處士為鄉里於滋為友朋有不可辭乃序而銘之曰處士諱勝字紹先姓盧氏世居新淦之殷山祖諱某考諱仁俱隱處弗仕母蕭氏處士資稟敦實讀書通大義不事章句甫冠值元季俶擾間關兵革奉二親兢兢致飬無違時逺近方事焚劫盜感其孝皆相戒勿犯故先廬幸完葺無恙庇及鄰里亦賴以粗安及海宇既一遂栖息山林於聲利漠然無聞昆弟三人怡然友愛伯兄以事殁於外奉寡嫂盡禮且為擇後以承其祭享開孰延師篤於義方率僮僕耕稼皆有方法人有過未嘗出口必曲為遮護人有爭不能平者則溫言慰解之人或以非禮相加輒俯而不答或視之一笑久皆敬服人有急難即周之不吝或有假貸不能償者悉無所較賔親過從雖蔬茗飲必盡歡乃已鄉里無貴賤皆以長厚目之生元至順庚午二月四日殁以洪武甲戌正月十五日享年六十有五以卒之明年葬其鄉柏林之原其配黎氏婦行有稱後處士八年卒長即滋字玉潤疏通練達從事中外皆有聲以薦擢吏部主事厯貟外郎中升杭州府知府居官以廉勤著績次曰益曰貞女三人孫男十人孫女七人銘曰孝友恂恂坦以舒惠周族里德善俱教子能官志操殊廉勤著績榮終初惟此髙厚公所居益蕃厥慶厚遺敷尚貽不朽垂所圗令子徴銘太史書封太常博士丁尚文墓志銘南京吏部稽勳員外郎丁鉉以其父尚文甫之殁將扶柩歸葬於其鄉乃奉其友翰林編修孫曰恭所為狀匍匐泣請豫為之銘且曰將以圗先人於不朽幸哀而賜之豫辭不獲則按狀而銘之曰公諱文字尚文世居豫章之豐城曽祖某祖某父某俱隱處不仕母李氏公性介直姿貌頎偉事親待昆弟皆有禮節間居衣冠整肅與人交和順滿容性好施與急難濟匱若有所不及年弱冠客逰江湖久之自歎曰人生貴知止與其勤生於外曷若安身於內哉遂歸杜門不出惟日潔清庭宇種蒔花木與賔客故人徜徉以為樂雖所居城市足未嘗及公門物論多之公少時遭厯艱虞恆以失學為終慊既有子遂篤志延師教之且躬自程督已又遣鉉入學為弟子員遂登永樂乙未進士第授大常博士洪熙改元朝廷舉褒贈之典封公如鉉之秩公配亦封孺人時皆榮之鉉後以薦升工部虞衡員外郎尋改今職其時公夫婦皆就飬京師嵗時聚處心甚安之蓋以公能訓勵其子而其子能遵承公訓所以有婉愈之歡無憂戚之慮聞者莫不稱道其賢公生元至正壬寅九月草三日以宣德己酉十一月草日卒於其子之官舍得年六十有八配楊氏公弟二人尚質尚彬先卒女一人適士人曽默孫男八人孫女五人墓在某鄉某山之原葬以今年某月某日為之銘曰孝友敦和式裕其躬教子進士逢時顯融太常清秩命服攸崇刻銘告後其永弗窮蕭母胡孺人墓志銘新淦白馬有胡孺人端靖淑善未嫁為賢女既嫁為賢婦自其宗族鄉䣊稱之無間言其稱之者曰孺人資性粹美自幼寡言笑處閨門動止有節習女紅勤勞弗懈及笄歸蕭氏孝奉舅姑無違禮舅姑卒葬祭皆不失常度接族屬疏戚有恩教諸子有法待僕婢下人嚴而不傷裕家厚生率以勤儉而於吉凶慶弔饋遺咸適其宜賔親往來治具必豐潔家庭肅然不聞有疾言厲聲其相夫子皆盡道未嘗為其憂孺人行美見稱於人者蓋如此而豫友謝繩正與孺人皆懿戚且以書來言孺人之歿并致其孤莊之言為狀一通求為銘以志其墓豫乃按狀而序之曰孺人諱仁靖世為瑞之髙安人八世祖宗義宋進士纍官尚書令兼浙東提刑按察司事曽祖毅叔有文學始來贅新淦莒洲之謝氏因家焉後終溫州路教授祖思誠習舉子業未成名而歿父仲寬以篤厚稱子男五女二孫男六曽孫男一生元至元壬寅三月草五日歿以今戊申十一月草五日享年六十有七以己酉嵗葬某鄉某山之原銘曰維婦之德孝與順孺人由之義兼盡內助和平力儉勤子孫兟兟慶彌蕃琢石刻銘納幽竁永貽後昆示來世張孺人墓志銘中書舍人衛靖之母張孺人既卒之二月將扶襯歸葬於其鄉馬鞍山之隂匍匐泣拜豫請志其墓按狀孺人諱淑清世為蘇之崑山人曽大父諱君實大父諱子恕閎偉有局量通經學古恬於世利因自號雲槎人亦稱之曰雲槎先生父諱厚字淑載克世其家母龔氏孺人性柔敏慧自幼處豐富謹持女則父母甚愛重之及笄為擇所宜配遂以適衛士安入其門動有禮節未嘗至狎褻以儉勤佐其家未嘗至侈肆謹事其夫未嘗至傲弛自其內外屬疏戚咸宜之其後士安坐事纍謫戍逺方即屛膏沐躬紡績終嵗勞勤迹未嘗及户外歲時非薦祖給酒食及餽遺親戚無毫髮妄費靖長親交戒策勵使之親師取友未嘗以寒暑廢學永樂中有以能書薦為中書舍人久之給筆札內閣遂迎孺人就飬京師仁宗皇帝蒞阼之初詔羣臣之久勞於位者咸得給誥敕以封贈其親於是孺人以靖貴特被褒封鄉里榮之孺人生元丙午四月草八日歿今宣德丁未四月十九日享春秋六十有二子男一即靖也女三孫男一銘曰婦德之貞兮母教之成兮錫命之榮兮丘麓所寧兮後嗣之慶兮胡孺人墓志銘蕭生定律以其母胡孺人之歿丐翰林編修周敘為狀泣請銘於豫將歸刻石而納諸其幽按狀孺人諱淑貞姓胡氏祖某父尚禮母汪氏自幼聰慧勤女工不妄言笑既笄來歸蕭氏蕭居玉峽下莊有益謙尚謙兄弟友于敦睦同居三世如一日人無間言孺人為冡婦相其夫克初事父母盡禮及克初出遊逺方孺人總內政以事舅姑凡飲食衣服浣櫛之事皆身任其勞至於歲時奉師待賔吉凶慶弔餽問之禮綜理裁度咸適其宜處婦姒長幼內外戚疏悉中禮度年二十九不幸夫歿於外終其身守志不二及舅姑歿喪葬皆營治如禮比終喪哀猶不輟鄉里目為孝婦云生元至正壬寅六月卒以宣德己酉十二月得年六十有八子男二人長定律次定禮孫男四人女七人以卒之明年某月某日葬某鄉某山之原方孺人之歿定律以久客江湖未獲侍疾候起居及歿又未獲親殯殮至是訃聞汲汲焉欲託之銘文以彰其母德雖或可以少慰其私情而不能無遺憾焉銘曰有婦之貞兮有母之則兮我銘之畀兮其永無斁兮鄒處士時用墓志銘君諱庸字時用姓鄒氏世為臨江新淦人曽祖明翁祖夀海父雲瑞俱隱德於鄉母熊氏君資稟溫純甫二嵗而孤賴其母教至于成比長好讀書謙遜自下被服若儒生略不為肆傲居家務儉約勤於治生待人接物和氣滿容未嘗露圭角所居城南僻靜少喧雜悠然有山林之趣嘗構樓數楹髙明𢎞敞延覽俯眺羣峰環立因號曰凝翠樓之前闢小齋為遊息之所時萃諸子絃誦其中扁之曰時習居之中堂前列滫瀡後列几杖所以奉母樂髙年祈夀康扁之曰適安至於賔客時至則攜以登樓觀圗畫揮灑翰墨已則具壺觴肴核從容酬勸酒酣則髙歌抵掌以為樂不至於傾倒不已也君性雅淡不嗜榮進獨喜治耕稼嘗買田百頃積谷數千石遇嵗歉則以濟貧乏未嘗有所吝晚屏居究心黃老終日端坐怡然自得無毫髮為身後計慮君之所以為達者又如此宣德改元春二月草五日以疾卒于正寢享春秋六十有二配黃氏有婦德子男三人曰敬曰讓曰誠俱克世其家女一人適黃惟勤孫男十一人曰京安魁寬顯康文寧英隆罕孫女四人曰夀孝福惠以本年十二月初一日庚申葬于居後柘園巷內作丑艮山未坤向其兆君所自定者君之子敬以豫相知泣請豫為志其墓豫不能以却也為之銘曰性之純氣之溫藴業弗耀善彌敦維慶未艾貽子孫來世有聞銘斯存墓表贈資善大夫户部尚書兼謹身殿大學士陳公墓表户部尚書兼謹身殿大學士陳君山以其所述先大父之狀來請曰惟先大父有賢行而祿夀不逮山幸賴遺澤得至顯官蒙恩以山之官秩贈大父資善大夫户部尚書兼謹身殿大學士雖少足慰罔極之思而墓表之文久未克立自念侵尋暮景或遂泯沒無聞則後之人將不復知傳家啓後之意豈不重不孝之罪惟閣下哀而圗之敢泣血再拜以請豫於君交久知深誼不容辭乃受狀序而表之曰公諱祥字添麟系出漢大丘長實之後唐開元中有諱野者自長葛徙今之沙縣遂為沙縣人野生通傳六世至昻授汀州文學昻之後有諱文殿者始析居縣之廊口白泥里則公所自出也公之七世祖諱二麟擢大觀三年進士第紹興初知韶州因禦冦有戰守功遷湖南轉運判官祖諱某父諱智俱有鄉行母某氏公自少負竒氣美姿容警敏不凡方垂髫即知向學比成童己著聲性至孝事親恆得其歡心親終殯葬祭無違禮待昆弟友愛如一日遇宗姻內外恩義兼盡居鄉里恂恂不事矯飾與人交恭謹不伐周窮恤匱不厭不倦尤善治生産纎悉曲折皆有條理公初雅有當世之志以為異時得一命或可究其所施奈時與命違竟賫志以沒聞者莫不惜之生元大德壬寅六月某日歿以泰定甲子某月某日得年二十有三葬某鄉某山之原配范氏贈夫人子男一曰得祿生甫周而公己捐世賴其母躬勤教戒至于成立其平生德善及追贈恩命備載少傅楊君士竒所述墓碑中孫男三長石次山以明經為教官擢吏科給事中轉左春坊左庶子升户部左侍郎尋拜今官次虎曽孫男四人女四人嗚呼以公之賢其持制行皆可以率厲鄉人而享年遽止於斯且歿時子猶襁褓先緒不絶如線天於此時似有難諶者而公之明靈隂隲卒使其後嗣顯融光大公於是亦隆享其報一旦荷蒙恩寵昭錫崇封秩躋二品龍章汗渙賁于九原此誠千載希遇人之所願幸而不可得者而公獨得之斯豈非公之積善承德以遺其躬以裕其子孫之所致耶然則天之所報施於公者又未嘗不可諶也是不可無述用刻詞于墓以昭示其後之人且使其鄉之人知為善之報而有所勸勉焉嗚呼是為表資善大夫都察院右都御史熊君夫人劉氏墓表余友都御史熊君元節之配劉夫人以宣德庚戌五月草二日卒于南京之官舍享年四十有七其年閏十一月壬寅葬邑之折桂鄉丁江今年夏元節聞其母夫人之喪將奔訃南還乃具夫人之事行來請言以表諸其墓余不獲辭則為之述曰夫人姓劉氏世居吉之夏璜曽祖則恆祖伯新父汝模皆有鄉行母周氏夫人自幼莊重警敏勤女紅精於紉縫剪綴父母特愛重之年十九來歸元節謹密小心於杵臼厨傳之事皆身任其勞事舅姑恪謹不違處妯娌遇內外親屬和而有節居常以禮自間不見惰容不為疾言遽色寡嗜好喜周給窮乏視親屬貧不能衣者不待己足輒分與之於書雖不甚解而日用酬酢處之自合理道永樂壬辰元節以進士擢任御史夫人挈家來京師方僦屋以居屋且敝僅庇風日處之晏然未嘗有不足之色時元節之先君子西澗公由鄉校登貢成均嵗時往來于家夫人婉愈承順凡賔親故人來過者必為之治酒食使相欵洽雖極勞未嘗有厭倦意公喜曰婦善事我庶幾可以少安矣其後元節為憲使廣西夫人間關萬里侍太夫人以從比至官所居舍宇頺敝不勝而地又卑下沮洳夫人日躬灑掃補葺敝漏候起居調膳飲和容恱色未嘗不得太夫人之歡或時具酒殽率長幼同元節舉觴為夀太夫人怡然久益相安又若未嘗去家也己而元節調官東廣未逾月仁宗驛召還京改官大理夫人又自廣奉太夫人南來同處處未久元節有命巡撫吳越夫人朝夕溫凊起居備旨甘為飬而太夫人怡愈順適其樂有餘元節雖多外處不獲親侍左右然得以盡心所事無內顧之憂者大抵皆夫人之助也去年春元節被召還朝蒙恩擢升今官循例封贈祖考祖考妣妻室夫人遂以貴得封為二品夫人方命下而奄至大故禮部以聞特遣官賜祭命有司治地營葬人莫不榮之子男四曰煜曰焯曰道安曰端生女三孫男一承孫女一嗚呼女婦之行稱于書史者曰孝曰順孝順人道所先非是不足以傳於後世若夫人之孝事舅姑始終一志處內外逺近無所往而不得其心而又能順事其夫相其善使得専志職務內有以慰其親之心外有以副國家委任而榮其身以逮於夫人夫人之於婦道妻道可謂兼盡之矣是宜刻詞表諸墓道使後人有所仰承而垂諸無窮焉台州府知府王仲智墓表君諱慧字仲智姓王氏吉之廬陵人所居在宣溪華山之間因自號宣華道人王氏由仲舒觀察江南西道子孫散住在章貢者為七里鎮之族在廬陵者為宣溪棟頭之族宣溪自觀察以下世系不可考其後有哲者仕宋為評事評事子四人曰東升察判曰南鵬縣丞曰西城解元曰北平主簿目以元亨利貞而析為四𣲖自是簮紱相繼登仕版者不可以纍數主簿而下凡十傳至維嶽諱嵩號嶽峰則君之大父曰子善諱應號畹蘭則君先考也畹蘭公為人瑰偉卓犖讀書喜文辭詩五七言有唐人風致好周窮恤匱以公道服鄉里君自幼警敏嘗從其世父子讓子榖諸老成遊得家學之緒沉靜寡默自視欿然常若有不足者事父母盡孝服勞奉飬必得其歡心畹蘭公甚器重之居間屢勉君學問以紹承其世洪武戊寅秋九月君被薦至京擢浙江藩省照磨授迪功佐郎浙為大藩照磨秩卑而任重君勤於其政介持弗阿以賢能著聲上官莫不推許之永樂乙酉秋以九載通考選留厯事於禮科明年春二月擢升山東雷州府同知授奉議大夫又明年丁亥以求賢應舉擢知北京永平府未及赴丁畹蘭公憂而歸將起復而繼母黃氏歿仍居憂于家壬辰冬服闋至京改調知浙江台州府授中順大夫台為劇郡素稱難治君撫之以寬度政之緩急而施之各有其序於是徭賦以平訟獄以清興學育材奬善罰惡而一郡之內翕然以治今天子營建北京君以藩閫之命來董其役夙夜勞勤恆以身先之勸工督事咸有條理於是君之賢能益著于上下己亥夏四月某日忽以疾告逾數日劇甚遂不起其生辛丑十月草四日至是享年五十有九以某年某月某日葬于某山之原配傅氏有婦德子一人曰紹克世其家君為人端方持重有文學其居家孝以和處宗族愛以仁接友朋敬以義馭下人寬以慈及其致用于時也克篤忠勤所至民受其惠自始至終舉無玷失於乎若君者於死生之際可以無憾矣君子紹以狀來請言乃為著其大槩以表于其墓俾後人之有所徴焉是為表武德將軍千户匡福墓表公諱福姓匡氏匡故魯匡邑宰匡句須後世居淮安東海州之贑榆縣曽祖某祖某父某俱以農起家公資性抗朗志氣超卓平居寡言笑不事表暴當元季兵興羣雄割據吳楚之間悉為兵爭我太祖皇帝膺受天命提一旅以清禍亂摧強撫順逺邇翕從時偽吳張士誠竊據姑蘇授公元帥公知天命在我太祖髙皇帝即率衆來歸以公勇冠於人拔為騎士嵗丙午受命守東海洪武初調沂州升百户授昭信校尉復命守東萊升副千户授武略將軍公之守東萊也竭忠效力夙夜勞勤馭士卒有法偹禦練習咸有其方東萊居海濵倭冦伺間竊發公屢擊之有竒功加授武毅將軍而東萊之人嵗獲安靖不知有冦攘之撓者皆公之庇也後公以老疾請于朝休致於家冡嗣德代領其職移鎮山東之膠州升正千户授武德將軍公亦以子秩加一級已而德卒于官其子濟仍襲厥職衆推濟總督屯田勞來奬勸得士卒心嵗較其所入之餘常增數倍居間即讀書究韜略或馳馬彎弓以講習武事人咸慶公之有後而嘉濟之能世其美也洪武三十三年九月草一日公以疾卒于膠蓋享年六十有六矣配葛氏有淑德封宜人後公三年卒子男四人長即德次曰貴曰政曰榮政先卒女一女適萊州衛百户張顯孫男八人長即濟次曰清曰滿曰源曰海曰深孫女六人長適靈山衛千户宗夀餘在室玄孫男四人玄孫女三人公之卒也與葛宜人同葬于膠州西郭門外貴以膠非鄉與濟謀曰贑榆吾祖宗丘墓所在今以二親葬于此恐一旦他適則嵗時祭享將安所託乎且厯世既逺子孫隔絶其墳墓必為丘墟又安能保其無虞哉遂以永樂某年四月奉公與宜人歸葬于其鄉某山之原從先塋也嗚呼公剛勇過人發身於行伍之間當僣偽崛興人惟狐媚以取富貴為朝夕之圗而公獨審去就明逆順知天命之有在挺身來歸真可謂傑然者矣由是竭忠致力榮膺爵祿出鎮名州捍禦冦攘屢著勞績晚獲休致優遊太平以夀考終而又有賢子孫克承其世以立功立事誠可謂光前振後者矣濟懼公久逺無以傳示將來介友人余子亮持狀來乞言以表諸墓豫辭至再三而子亮之請拳拳不置遂按狀而敘次之銘曰匡姓孰始肇自句須世家于淮有田有廬爰及于公奮迹戎行去逆效順為士之良命守東海再遷于萊捍攘敵冦其聲恢恢屢加升擢報酬厥功晚賜休致遂獲考終惟公有爵傳于子孫惟公有慶逺庇來昆淮山蒼蒼淮水澄澄我銘公墓永世其寧處士陳信中墓表處士陳氏諱誠信中其字也世為金華人其先居蔡之平輿唐末有諱某者避亂于浙之烏傷而其居金華則自曽始也處士幼孤從學於伯父堯之頴悟善記問於書史過目成誦伯父甚竒之里有王與權者望族也素知處士孝且賢遂妻以女處士尚恬退不慕聲利其後隱居夫容山下有園池泉石之勝喜植花木閉門讀書布衣蔬食淡如也平心率物於鄉里無怨惡與人交久而情益厚未嘗有忤平居欣欣焉無不自足之心祖墳葬金華北山凡百餘塜祭田若干畝宗人奄為已物處士以義切責之遂歸其田祖宗得以綿其嵗祀者處士之力也處士樂交賢士大夫若鄉先生汪可名輩與相往還甚善翰林學士括蒼王公景彰嘗為之作傳極見稱許長子茂以工書入翰林永樂甲午用書經中京闈貢士繼擢中書舍人屢嘗貽書戒之惓惓焉皆忠孝切實之言無一語及他事戊戌正月十三日以疾終于家得年七十有三配王氏子男五人長即茂次安仕本郡隂陽正術次可次蓂女一人適王淵孫男四人孫女二人茂將奉柩卜以某月某日葬其里某山之原於乎處士以布衣積善行義泊然終其身弗及少施於世此若可為深惜然有子居近侍顯榮光耀其進尚未可量則善人之報庸或在此乎姑為述其槩俾劖之墓石以俟後之求處士者有考焉朱主事士文墓表前兵部職方主事朱士文既卒之三十六年其孫理以所狀事行泣拜請豫文表諸其墓豫懇辭不獲則為之序曰士文諱文民姓朱氏世為蘇之長洲人祖明之父彥容俱傳學隱德以儒術大其家祖母胡氏母髙氏士文生而秀異才識過人稍長彥容遣為邑庠弟子員洪武中以春秋經中京闈鄉舉入大學卒業于儀曹主事曽士朂學益進文益肆器識益充再就試登進士第授行人出使有能聲遷兵部職方主事會朝廷詔下在京文臣親族有獲罪責者皆聽免去適士文之族詿罹刑憲遂陳請罷歸棲迹林泉詩書觴詠之適泊如也士文聰敏多藝能家居久之有以其才藝薦者徴授織染局副使辭再四始就職遂徙家上元因占籍焉士文律己廉持法謹其再起也不以秩之崇卑有間以故職舉而聲聞益著洪武甲戌以疾卒於官年才三十有八配黃氏子男二人曰訥曰讓女一人孫男二人曰理曰瑄孫女二人曽孫男三人訥讓年未四十俱相繼卒理卜吉於宣德己酉六月草七日以昭穆次第列葬於牛首山之原嗚呼士文以英鋭之年力學取科第剔厯於時其聲籍甚既伏而興將躋崇秩不幸早世其二子方克紹述亦復淪逝何天道之難諶若是耶雖然嗇於前者必豐於後觀其孫曽林林既賢且才而家復享裕則天道之報蓋未始有難諶也豫忝職大史每於孝子慈孫恆垂奬勵若理之能孝以光揚其祖考又烏得不有所稱述以遺其後之人哉是為表處士伯泰墓表吾鄉桂竹邉氏世為衣冠之族其先陳留人唐末有隆者由進士纍官遷吉州推官因卜地桂竹遂家焉公諱通字伯泰祖瑞玉潛德弗耀考巽與工詩賦明三百篇之旨嘗以所學就試有司弗即售公方十嵗值元季兵亂舉家奔竄父厄於兵母曽氏攜公兄弟三人避難東西顛沛流離恆不忘於學所在必擇師教之獨公有志與衆兒異久之母覺其學有進屢朂之以期於成比長果有立凡室廬田園蕩析於兵燹者悉更張而新之先是季父巽中歿無子命公為其後逮事叔母髙氏如其所生鄉里稱之曰難嘗闢一室為藏修之所左圗右書自處晏如朝夕講誦不厭不倦雖隆寒盛暑手不釋卷尤喜作詩不為淺近塵腐之語與兄弟聚處輒講論大學修己治人之道至於諸子百家尤用力考索居鄉里平心率物人有爭而不決者咸質之於公公一以理折之無毫髮偏徇公至誠格於幾微嘗逰京師夢脫一齒既覺惻然曰吾同氣殆有難乎遂速歸而兄伯宏果卒於所夢之夕居無何公亦遘疾伏枕四五月母親為煮藥公歎曰飬兒所以事母今母反為兒纍蒼天蒼天吾何忍哉自是竟弗起聞者莫不為之悲痛公生元至正癸未四月八日歿則洪武丙辰五月十又六日享年三十有四以庚申某月某日葬西江張家山之原配胡氏有婦行子男三人長士寧卒永樂壬辰次士忠承事郎雲南江川縣知縣亷慎有聲次昌順女二人孫男八人曽孫男四人公歿後四十一年士忠既壯有祿仕追念公早世且懼久逺將湮沒無聞乃奉其從兄維所為狀請豫文以表諸墓上余不敢辭故序述之如此以釋士忠念親之懷而慰公於地下也是為表銘曰嗚呼伯泰惟士之良篤志勵行稱於其鄉胡天嗇其年不大以光惟德不爽而嗣之昌嗚呼伯泰尚永存而不忘汪處士向宗墓表處士汪氏諱紹興字向宗其先婺源人為江右著姓後若干世復由婺源徙饒州至架閣公乃遷貴溪之田西至十八居士某復由田西徙東洋之丁家山即今處士之所居也曽祖德三祖禮四考富卿俱韜晦弗仕當元季繹騷處士偕凡向甫竄伏山林間顛沛流寓幾草年洎海宇寧謐始挈挈焉來歸乃剪荆榛理蕪穢建室廬治田園以為生不數年而先業之蕩析者悉復其舊處士孝友敦儉治身理家咸有軌則兄素性躁急處士左右敬承未嘗有毫髮拂其意與人交篤於信義未嘗有一語誕妄待下人藹然和洽未嘗為傲慢所居户庭終日潔清衣服飲食之奉泊如也至於急患難周匱乏汲汲然有惟恐不及意嵗時吉凶慶弔務合於禮未嘗茍簡踈略以是比閭族黨之間莫不敬服之季子璧明為邑庠弟子員嵗時歸省必考其所業或時講論至夜分不輟嘗語諸子曰凡人立身處家莫不由辛勤而興以驕惰而失吾所以克復舊物者率由於勤儉爾曹宜服膺斯言庶幾吾志也處士生元至正丁丑七月草一日歿於洪武乙亥某月某日享年五十有九妻葉氏先處士七年卒子男五人璧昭璧輝璧華璧澤璧明登永樂丙戌進士第授承事郎廣東陽江縣知縣再調成都雙流縣孫男九人孫女四人以卒之年七月葬里之湯山璧明以代還至京師來乞言表諸墓上故為次第其平生之大略俾歸而刻諸石後有過者必曰此為汪處士之墓金文靖集卷九
