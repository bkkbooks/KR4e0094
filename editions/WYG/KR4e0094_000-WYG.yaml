body:
  text: 金文靖集别集類五明提要臣等謹案金文靖集十巻明金㓜孜撰㓜孜有北征録已著録㓜孜在洪武建文之時無所表見至永樂以訖宣徳皆掌文翰機宻與楊士竒諸人相亞其文章邊幅稍狹不及士竒諸人之博大而雍容雅步頗亦肩隨盖其時明運方興故廊廟賡颺具有氣象操觚者亦不知也千頃堂書目載㓜孜集十巻又外集一巻又北征集一巻今外集未見朱彛尊靜志居詩話稱其北征集大漠窮沙靡不身厯時露悲壯之音則彛尊猶及見之今亦未見是編為其子昭伯所輯詩文多應制之作盖即黃虞稷所謂十巻之本别冠以三朝思榮録一巻則其勅諭誥命祭文像賛神道碑之屬㓜孜事蹟已詳明史核以本傳此録多其子孫誇侈之詞無闗考證今刪去不載惟以本集著錄焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ee1d83a5b13558163efdf9b24b3dcf5052da9f366d51bf5a910a1fe7703ca886
