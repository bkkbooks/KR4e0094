body:
  text: 金文靖集巻三明金㓜孜撰五言律詩奉和學士胡公春日陪駕同遊萬嵗山十首鳯輦遊仙島春殘花尚濃龍紋蟠玉砌鶯語度瑤宫香霧浮髙樹祥雲麗碧空五城雙闕外宛在畫圖中磴道髙低出烟霞逺近分雕䦨凌絶壁丹户倚層雲古木含蒼翠靈芝毓秀芬仙山應未逺不使世人聞紫殿青霄外何年結構奇攀縁疑失路回合訝多岐竹露凝蛛網松烟濕兎絲經行隨處好盡日不知疲縈紆縁島樹迤邐傍林花舉目疑天近回頭覺路賖追趍窮物色幽賞惜韶華小立迎鸞馭中官擬進茶玉輦千官從晴波太液春光風先觧凍淑景更宜人泛月思仙艇看魚憶釣綸宸游恩渥重何以報堯仁嶻􅑖凌丹闕迢遥跨紫臺龍香浮日動鳯葢拂雲來疊巘參差出層崖隠映開幽尋不可極臨眺重徘徊始從京國至復向廣寒遊琪樹花争發瑶岑翠欲流丹丘千嵗在紫澗四時幽縹緲聞仙樂隨風到殿頭暖露滋瑶草輕飈動碧篁龍蟠知嵗月鶴唳識風霜鑿谷通仙逕穿巖闢洞房回看城闕近禁樹晚蒼蒼仙臺金露静畫棟玉虹髙日月迴三島乾坤奠六鼇碧甌傳細茗銀甕出香醪千載恩榮重追攀不憚勞侍宴分瑶席鶯花照綺羅中官催賜酒光祿為籠鵞漢業千秋盛堯年萬夀多願言歌聖徳勒石照巖阿秋日隨駕出安定門偶成西風初退暑白苧已生涼水郭稻花晚林塘荷芰香雁聲逾塞急燕子去巢忙落日金臺外蕭條客思長冬日早朝口號紫陌趍朝早揮鞭信馬蹄水聲橋上下人語市東西拂帽霜華重垂天斗柄低九門看欲曙先聴乳烏啼冬夜獨坐寒燈照孤館獨夜思悠悠久客誰青眼慈親今白頭踈鐘度雙闕長篴起髙樓遥念小兒子嬌癡不解愁臘月二十四夕偶成二首嵗事只如此匆匆又小年蘭燈看獨照栢酒已先傳月隐金臺雪香霏禁樹烟故園今萬里南北寸心懸浮生若萍梗嵗月易蹉跎久客鄉書少慈親白髪多春回殘雪在臘盡小年過未就閒居賦聊吟桂樹歌玉堂晚出玉堂初罷直緩歩散鳴珂城闕日將暮河橋風更多嵗華漸搖落人事易蹉跎未有田園計謀生將柰何次鄒侍講夜坐即事掩巻坐清宵圍爐擁敝貂捲簾寒易入汲水凍難消人静傳踈漏庭虚度急飈夜䦨傳北斗天路正逍遥除夕次韻宦游逾十載長以客為家臘酒輕浮蟻蘭缸細吐花寸心傾北闕數口隔京華明日逢新嵗春光遍海涯輓秀才黄卓母忽聴傳㓙問慈親隔九原凄涼萬里恨未報百年恩客路經寒雪雲山望故園臨岐一相送悲慟不堪聞追和學士胡公秋日同陪駕重遊太液池十首太液臨仙島微涼動早秋雨餘芳樹静岸逺雜花稠魚躍衝波外鷗眠近水頭詞臣叨寵渥載筆重追遊瑶波通碧海瓊島倚天中鳥度紅蓮雨鶯啼細栁風泉香流石砌樹暗隠仙宫盡日都忘倦登臨興未窮樹窈迴仙逕花深映石牀雲光連島静水氣入衣涼御手分氷果天厨送玉漿吾皇千萬夀流澤更汪洋逺水含秋色飛霞映晚天折荷驚白鷺倚樹聴𤣥蟬翠合三山近波涵一鏡圓子雲才更好獨步賦甘泉輦路通瑶島天河跨玉津涼風生細浪踈雨浥香塵碧草穿沙短紅菱出水新宸遊多樂事侍從忝詞人馳道平如掌金輿向日移畫橋低樹影粉檻壓花枝展席鷗相近迴鞭鶴未知故人詩句好盡得寫清奇髙閣青霄外平臺落照間未須論弱水即此是仙山禁樹祥烏集瓊林白鶴還經行多異􅃐景物自幽閒内苑消殘暑滿池開藕花涼烟生薜荔落日映蒹葭鳯葢隨丹輦鸞笙載玉車西山渾咫尺紫氣接飛霞綵仗臨花嶼仙輿隔畫䦨敲氷分學士供膳促中官屢得陪清賞重來喜徧觀微生遭盛際霈澤海同寛日下龍光近花間輦道開旗翻池影動香逐好風來賦詫相如好詩論太白才勝遊偏稱意欲往更遲囬郭氏遺安堂世系出汾陽髙門弈葉芳詩書存道義耕稼樂時康盛徳貽謀逺傳家積慶長安危有明鑑垂訓在兹堂試院偶成柬諸同志聖主崇文治南宫較藝時賢才應有待藻鑑豈容私日傍爐烟轉春隨刻漏移自慚叨筆硯飽食更何裨院中雨寒夜坐入院多風雨清宵獨掩扉燈寒難把巻坐久欲添衣人語喧江市鴉棲避棘闈賢才今獨盛吾道有光輝花晨紀懐鎖院春過半趍朝敢後期捲簾晨起早看巻夜眠遲戰藝俱争捷掄才屬有為臚傳黄榜動春滿鳯凰池二月廿五日夜寫進士榜復命花隠蘭燈夜香浮虎榜春飛騰瞻日月感㑹在風雲匡坐聴寒漏鳴珂候紫宸長安聞揭曉盡夕有行人贈許子謨博士還北京胄監南宫初上考拜命即言還淮樹雲連海燕臺雪滿山交游十載舊淹滯一官閒愧我叨恩寵空憐兩鬢班冬日扈駕獵龍山同尚書蹇公學士胡公登斗首山佛窟寺偶成十詩奉簡梵刹倚崔嵬登臨此日來穿林縁翠巘坐石拂蒼苔絶壁浮圖在空巖佛窟開慿髙一囬首佳氣滿蓬萊侍從朝初罷乘閒散馬蹄黄麾雲外見獵騎望中迷石室疑龍卧禪牀聴鶴棲經行有佳興且復記新題日晏疲登頓遥峰入望微雲根孤犬吠林外一僧歸霜滑猶沾屐苔深欲染衣底須論説法到此已忘機空寂渾無事從來逺俗氛崖深留凍雪松老駐寒雲碧殿香烟静層雲紫翠分下方塵擾擾鐘磬有誰聞野曠澹朝暉山光拂翠微青松低石屋黄葉礙柴扉長日僧閒卧終年客到稀自縁塵俗少甘與世人違江山如畫裏滿目盡乾坤翠拂旌旗動風吹鼓歌喧晴烟分野色旭景散春温喜有同袍在幽期可共論名山不易到欲去重盤桓浩蕩添詩興行吟駐馬鞍風泉雜鐘梵嵐翠濕衣冠頓此忘塵幻偏令眼界寛古木含餘靄垂蘿隔紫烟碑殘尚没草井廢尚通泉梵鉢留深殿天花雨法筵山僧少迎送髙卧不知年偶尋方外去佳興亦悠哉雲氣隨冠冕花香拂酒盃閒時難再得何日更重來向晚鑾輿動争隨騎從回未有人知處經行到上方丹霞浮御氣寳樹散天香碧嶂猿啼静遥空雁影長題詩寄行迹回首意難忘贈陳紹䕫胡季南下第再試歸南京胄監領薦來京國青雲竟未逢聖情尤軫念召試獨從容夜雨辭金殿春風過辟雍他年期射䇿須敵萬夫雄端午賜宴觀擊毬射栁四首端午恩榮重宫筵進夀觴賜來銀扇好分出綵絲長角黍金盤薦菖蒲玉甕香賦詩慚倚馬再拜獻君王鳯輦乘時動寧辭閱武勤栁間千騎合花外兩朋分羽箭凌飛電金毬度綵雲年年端午節榮遇沭深恩千官隨鶴馭冠葢拂雲來日轉旌旗重風清鼓角催玉騘低栁過綵仗逐花迴獻賦長楊裏還稱萬夀盃仙伏丹霄外鑾輿禁苑東轉丸馳寳馬拂羽試琱弓得綵歡聲合分籌寵賚濃太平無以報獻納愧揚雄贈友人廖自勤王恪赴交趾二首萬里南交路君今作逺遊着鞭臨祖道受詔出皇州漢柱雲烟古秦林瘴癘收幕中如有問珍重為參謀慷慨屬槖鞬離筵惜解分班超志投筆司馬獨能文虎旅連雲動笳聲向月聞安邊有良䇿及此樹功勲春日隨駕出郤世偶過田家二首東風被原野草木亦滋榮脉脉泉流響喈喈時鳥鳴老翁扶杖出穉子把犁耕民俗安浮樸熈然樂太平遥峰落平野小逕入柴扉雨後桑麻長春深牛犢肥林花輕拂帽空翠近霑衣惆悵蘼蕪緑天涯殊未歸杏園春晚圖為李士文賦種來看漸滿千樹已成林向曉雲霞重方春雨露深閉門容虎卧把巻聴鶯吟結實長收穀誰知植徳心隨駕出拜郊過平坡寺逺上平坡寺山行似七盤到門卸鞍馬坐石解衣冠仙井龍曽化僧房犬自看乘輿瞻已逺萬騎擁旌竿元夕午門賜觀燈五首新嵗逢元夕看燈紫禁來雲間仙伏出花裏繡筵開月轉雙龍闕春浮萬夀盃傳柑當此日獻頌愧非才五夜開閶闔千官引珮珂御烟浮寳篆華月送清歌嵗久君恩重時平樂事多金吾知不禁試問夜如何鼇山新結綵列炬照晴天簫鼓瑶臺上星河綘闕前綵粧千隊好繡簇萬花妍歡賞陪鸞馭還歌既醉篇馳道開仙蹕中天建羽旄星連三島近仗立五雲髙鳯吹迎仙樂龍香薦玉醪九重恩似海春色上宫袍鶴馭雲中下仙人海上回星橋連閣道綘蠟炫蓬萊民物同遭遇衣冠得重陪酣歌稱萬夀更上紫霞盃為方尚書賓題山水圖翠崦參差合踈林隠映開白雲生野水樹色掩樓臺釣艇烟中去菱歌江上來山隂未可到賀監㡬時回為序復來求題異種穹窿産移栽自昔年發生宜土壤潤澤近山泉品出武夷外香分穀雨前誰能識滋味為問趙州禪寄長洲周廣文風雪大如許懐人將柰何春歸雙鬢老臘盡一年過泮水菁莪意淮南桂樹歌玉堂叨筆硯感激受恩多贈友人赴亳縣一官赴亳縣九月發金臺雪色侵行李梅花照酒盃亷平需豈弟撫字頼賢才迢迤闗河意相思首重回聶氏望思堂逺宦違親養官居敢自寧孤雲長入望萬里若為情𣺌𣺌低淮樹依依帶楚城狄梁千載意誰復繼芳聲贈太醫院判韓公達昆弟俱榮遇相承領國醫濟人惟藥物種徳在書詩姓字公卿重勤勞聖主知杏林千樹好雨露日蕃滋送刑部主事鄭駱赴寧波知府進士名無忝秋官譽更多専城膺寵擢五馬動鳴珂聖主勤宵旰斯民頼撫摩循良稱漢吏青史久難磨筠莊為西莊吳氏賦繞廬無雜卉種竹已成莊烟雨三春緑風泉五月涼看時移杖屨興至倒壺觴日有平安報題詩詠鳯凰題新淦姚氏挹清軒閉門罕人事清意有誰知山色同朝暮泉聲自四時絃琴堪對酒拄笏好題詩為寫山林趣悠然動客思嵗暮祀太廟齋宿翰林奉簡胡楊二學士四首齋宿聨官署俄驚嵗又䦨庭虚燈火静天逈雪光寒漸老憐雙鬢無能愧一官相知二十載許國寸心丹吏散蚤休衙齋居夜不譁盍簪頻剪燭清坐屢供茶詞賦相如好才情水部誇余生今五十已覺鬢先華五城風雪暮萬里屬殘年話舊情偏洽論詩席屢前禁鐘人語静髙閣漏聲傳未有歸田計聊歌桂樹篇嵗事秪匆匆浮生似轉蓬官居白首共報國寸心同雲裏天香下城邉霽雪融夜深寒不寐數起候晨鐘夏日喜雨寫懐十首粉署依丹禁城虚爽氣多好風天上至凉雨曉來過翠島浮香霧瑶池澹緑波九重閒視草時復幸鑾坡夏過日初長連朝雨送凉捲簾書帖静開户燕泥香賜果來東閣分氷近御床小臣叨侍從屢得被恩光玉堂清切地瀟灑出氛埃雨㸃踈踈過天香冉冉來隔花鶯歴亂近水燕飛回朝退有餘暇新詩取次裁閣中暑不到長日静無譁坐對西垣樹吟看上苑花臨池常洗墨汲井自烹茶漸覺形容醜年來兩鬢華晝永文書静風清刻漏遲雲低雙闕樹日轉萬年枝感遇交游在迂踈聖主知不才叨翰墨何以報恩私兀兀坐清晝悠然興味嘉斜風斷踈雨逺樹障晴霞魚躍動文藻鳥啼驚落花獨憐雙鬢短筆硯老生涯長日費吟咏終年典校讐宦情真落落生事只悠悠雨後荷花晚風前麥氣秋禁林即仙館何必問瀛洲載筆晨趍閣庭空暑氣清雲移忩上影雨送樹間聲近檻馴烏集當筵舞燕輕當時乏經術衰颯愧吾生自謂年非邁誰知老見侵静觀天地化洞識古人心積雨生座潤微凉解鬰襟何時乞恩澤歸老遂投簪聖主崇儒術新開白玉堂文章陋秦漢禮樂洽虞唐製作衣冠盛恢𢎞運祚昌吾儒膺寵遇獻納愧班揚贈貢士楊綖赴南海訓導楊子青雲彦儒官稱好才逺從南海去還自日邊來綵服榮家慶􅄌顔樂夀盃題詩慚潦倒臨别重徘徊扈從車駕巡邊過裴村田舍與楊少傅共酌清朝催上道出郭聴鳴笳野水流氷澗江風漲雪沙清談駐鞍馬小酌坐田家扈蹕慚衰邁祇憐兩鬢華晚次白河日晚白河上千官向此留天光臨御幄雲氣䕶宸旒栁外輪蹄集山頭獵火收故人同寢食夜語獨綢繆早發白河禁營傳四鼓驅馬復晨征野曠風威重天空月影清衝衝雜人語喔喔亂雞聲敢憚勞行役空慚負老成晚次峪口邐迤從鑾馭山川記昔年時巡重講武事豈在遊畋碣石東臨海居庸北枕燕帝京渾咫尺王氣滿中天營門候駕羽林初罷獵萬騎擁霓旌馳道鳴笳合前茅列炬明充庖驚滿載得雋快先聲乆立瞻鑾馭虹光