雅趣在南園山水留遺韻烟霞隔世喧幽蘭宜獨操大雅共誰論我亦知音者何時一過門題清碧書舍愛子讀書處幽懐孰與同青山當户牖緑樹隠簾櫳濯足過秋渚鳴琴坐澗松故居回首日縂在畫圖中贈太僕寺丞吴鑑復任滁陽闕下久蜚聲還官荷聖明涼風生祖席踈雨濕行旌秋晚驊騮健天髙鴻雁鳴滁陽山水好圖畫有餘情贈鬰林州判鬰林𣺌何許逺在海西頭念子有行色離情逐宦遊曉雲隨綵斾夜月引仙舟好為宣王化從容展壯猷贈龔子諫僉憲雲南萬里南雲道君行佐臬司交游憐宿昔逺别繫深思衣繡瞻飛鶚乘驄問碧雞遐荒宣徳意攬轡重詢咨贈人遊錢塘錢塘古名勝念子事重遊湖山迎畫舫海月映紅樓錦樹千堤曉銀濤八月秋㡬時尋賀監一笑解吳鉤贈知縣任連江拜命出瑶京郎官動列星馬嘶驚逺道鵬運起滄溟越樹連雲白閩山入眼青到官敷善治撫字念疲氓題西園清興伊人慕清賞舊隐在西園竹影自臨砌泉聲時到門看雲晨拄笏乘月夜聞鶯一自膺名宦幽懐孰與論豐樂堂為周宜民賦海内隆平日皇恩徧邇遐大田多黍稌比屋見桑麻斾斾誇盈廩穰穰慶滿家芹湖羮飯美尚擬泛雲槎北征隨駕誓師鳴鑾戍周宣驅玁狁漢室靖樓煩戰伐需良將神謀仰至尊皇威開大漠仙伏御曽氛壯士心如虎爭圖報國恩題胡宏仲奉萱堂堂諼久無恙阿母晚尤康鶴髪春雲重潘輿愛日長花前滫瀡具膝下綵衣香節孝敦流俗門閭倍有光題習編修梅坡巻種得梅千樹盈盈雪滿坡捲簾踈影亂拂席暗香多東閣臨風翫西湖載酒過髙情政如許賦罷一髙歌題扇贈郭慎思山光澹如洗野色凈氛埃流水縁溪出柴門隔塢開白雲生澗曲緑樹䕃莓苔為問抱琴者相過日㡬囬題李惟瞻修徳齋端居謝塵鞅力學慕先民獨進功尤宻勤修業自新詠歸川上晚絃誦雨中春撫巻看遺墨懐人重愴神贈蕭性善還家省親違隔雙親久歸心一夜生綵衣天上别畫舫月中聲未説珍鮭美先占喜鵲鳴升堂展家慶重九酒須傾塞外初度日感懐余生過四十深恐負前期報國當今日思親在此時功名猶未立鬢髪欲成絲兀坐無聊頼長歌意轉悲五言排律元夕賜觀燈廿六韻聖主敷文徳朝廷戢武功熈辰千載遇樂事萬方同令節逢元夕靈鼇駕碧空危峯遥對峙䆳谷宻相通火樹千花粲星橋萬㸃紅葩分金錯落枝綴玉玲瓏翡翠粧珠闕琉璃怳貝宫魚龍陳仗外鸞鶴下雲中雜遝羣歌進喧騰百戯工觀遊來穉耋朝㑹集華戎貔虎森飛將貂蟬列上公爐烟三島合香霧九霄濛鳯輦當晴漢鸞旗簇暖風碧紗圍菡萏繡幄透芙蓉露掌承華葢銀橋亘綵虹丹青開列嶂羅綺艶芳叢夜久祥光動春遲淑景融御筵稱夀酒玉陛拜重瞳果熟瑶池獻蓮開寳幛籠踏歌聲欵欵疊鼔韻逢逢海宇逢時泰閭閻樂嵗豐謳吟紛載路抃舞效呼嵩漢代衣冠盛周家禮樂崇兩京陪扈從千載幸遭逢自感恩榮盛寧知刻漏終願陳天保什永世播無窮和胡學士立春日韻雪壓殘年暮驚逢萬里春趍朝瞻昩爽慶㑹及芳辰日月開黄道雲霞煥紫宸御爐香細細玉佩響振振軒冕臨丹陛簫韶合大鈞班行分鷺序冠劍集魚鱗福履臻遐夀嘉祥協至仁從兹陽徳盛行覩嵗華新忝作詞垣客慚非獻頌臣宴酣歌湛露深荷寵恩頻端午内苑賜觀擊毬射栁紫苑東華北霓旌拂曙來錦裝千隊合仗列兩朋開劍㦸明初日衣冠映上台櫜鞬屯虎士匼匝引龍媒花簇金毬度雲隨綵仗迴抗弦輕斮栁飛鞚不生埃閃閃揚旗過逢逢疊鼓催奪幖爭决勝得意毎先回光禄筵初罷瑶池宴屢陪御香霏曉霧大樂殷春雷聖徳同天地恩光被草萊風雲俱際㑹文武屬良材北斗尊宸極南山進夀盃太平歌既醉忝竊愧非才分題得鍾山霽雪送友人還江右危峯猶積雪衆壑已清暉野逈初澂霽冬嚴漸解威鳴崖鏘珮玦糝逕晃珠璣樹老擎偏重泉寒落正微陽林渾欲盡隂谷未全晞樵客行應滑棲禽暖乍飛山空驚嵗晏臘盡覺春歸自憤趍朝慣那堪故舊違一尊傾客路匹馬出京畿惆悵難為别臨分重把衣喜雪應制新冬初届候瑞雪已先呈歴亂騰空宻飄颻着地輕凝華連禁闥積素隠雕楹未覺瑶池滿旋看輦路平侵衣明珮玦入户散瑶瓊日下銀為屋天邉玉作城穿林疑有影墜竹不聞聲滉瀁欺歌扇悠揚濕翠旌閭閻多喜氣中外洽歡情宇宙氛埃凈山川瘴癘清兩儀資燮理羣物頼生成一統乾坤壯中天日月明有年臻瑞慶嘉穀兆豐盈四海期康阜邦家協永寧詠雪分韻得珂字旅館年將暮都城雪更多低回飄苑樹歴亂集庭柯雜霰沾衣袖隨風拂珮珂天空連浩蕩野逈接坡陁滄海收初日層城眩夕波積深藏薜荔墮下壓松蘿盈尺將平砌凝澌欲凍河映梅紛的皪綴栁自鬖髿近向尊前落斜窺隙穴過瑶池銀作水禁署玉為坡委巷封車轍填門失蟻窠捲簾輕可撲入手凈堪挼滉漾驚烏鵲繽紛掩素娥重重勝楚練粲粲擬吴醝谷口迷樵逕汀前失釣蓑歸人先罷市織婦早停梭影奪瓊田鶴光翻墨沼鵞映忩書可把拈筆硯頻呵出郭愁驅馬趍朝畏滿鞾不嫌氈獨冷已覺鬢先皤陶穀情偏洽蘇卿節不磨梁園曽授簡郢客尚傳歌瑞氣方融結祥光欲盪摩紫宸明玉座瑣闥淨琱戈潤物功彌博均施徳匪頗三農占嵗稔四海頌時和自足消氛祲從兹去札瘥作詩慚鄙拙才薄柰予何瑞雪詩有序臣聞聖人之徳以和召和所以參天地賛化育而納天下於仁夀熙皥之域者非偶然而致也洪惟皇上以至聖之徳嗣承大統自蒞阼以來萬方嚮化九有寧謐天心悦鑒諸福畢臻迺宣徳四年冬十一月乙卯冬至前四日同雲勃興降以霙雪山川草木鮮明朗耀中外歡揚咸曰此聖徳所感以福蒼生為田野豐稔之應皇上心存謙抑乃歸之於天地祖宗及文武臣僚翼賛燮理所致特御宸翰作喜雪之歌以頒示羣臣其鏗鍧震耀於千載之上者可謂盛矣臣仰惟皇上至仁盛徳恭已無為寛恤之仁浹於逺邇所以然者葢以一已之和推而為天下之和以一已之福推而為天下之福斯以上天降祥屢錫豐年及兹長至雨雪應時揆之古昔若堯舜之輯萬邦禹湯之敷佑下民不是過也臣伏覩聖製不勝欣抃之至謹拜手稽首而獻詩曰盛業開千禩皇威肅萬方一陽初届候三白已呈祥盡夕迷蟾影連朝隠旭光鋪橋明螮蝀覆瓦失鴛鴦輦路瓊瑶襯朝宫寳玉粧輕盈飄廣陌宛轉度迴廊川嶽同髙下乾坤接混茫鬭竒宫樹側呈巧御階傍簾捲琪花濕車行縞帶長雕楹斜㸃染繡檻逺悠揚重壓虬松偃深埋虎石蔵聮翩霑几席散漫集瓊璫沛澤滋羣品氛埃凈八荒從天消瘴癘入地殄螟蝗百辟歡逾洽三農喜莫當九重頒聖製五彩煥天章宗社鴻圖逺朝廷運祚昌作詩歌聖徳永世紹虞唐古圖山水平生愛山水對此意無窮逺樹參差合流泉屈曲通花明紅雨落谷暗白雲封鹿飲過青澗猿啼隠碧峰鳥歸秋崦外人語夕陽中為問武陵客桃源何處逢欽惟聖天子嗣大歴服簡用舊人懋圖治理覃布恩徳綏懐萬方天地清寧海宇乂安乃以宣徳戊申二月廿八日命少師吏部尚書臣蹇義臣㓜孜等凡十有八人乘馬將僕𨽻從遊萬嵗山已又命乘御舟泛太液池徧歴小山諸處維時風日暄朗景物明麗氛埃屏息佳氣鬰䓗心目舒暢得以周覽奇勝復䝉天語從容慰勞賜以醇醪珍饌俾盡飲至醉恩意深厚寵賜便蕃誠終身之榮幸千載而一遇者也臣㓜孜無任感激之至謹賦五言長律一首上進伏乞聖覽不勝幸甚詩曰朝廷多暇日詔許從宸遊聨騎經東苑揮鞭過御溝漸瞻瓊島近夐對小山幽嶻􅑖凌霄漢清虚動斗牛盤承金露重棟拂玉虹流疊石蒼苔合懸崖古木稠林髙巢巨鶻壑邃舞潜虬馳道迴鸞馭花隂駐紫騮空中香霧滿日下紫氛收太液相環抱波光欲蕩浮泓涵通碧海澄澈透靈湫翠荇翻紅鯉輕瀾泛白鷗碧桃晴雨潤楊栁暖風柔忽喜傳天語聮翩載御舟醇醪分玊斚香茗溢金甌冠葢隨雲氣歌謡應棹謳迂迴循岸曲邐迤歴城陬真似經三島猶疑訪十洲烟霞圍勝境日月駐丹丘列籍依芳樹開筵望翠斿九重頒異果多品列珍羞擊節諧歡笑持觴屢勸酬遭逢恩獨厚感激賜還優聖徳乾坤大神功舜禹侔華夷覃霈澤遐邇戴鴻休治世雍熈盛優賢禮數周不才叨侍從末學乏謨謀幸數承清問常時近冕旒虚心勤至道當宁納嘉猷再拜陳篇什皇圖衍萬秋金文靖集巻三
