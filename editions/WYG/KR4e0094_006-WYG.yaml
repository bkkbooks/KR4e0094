body:
  text: 金文靖集巻六明金㓜孜撰賦賛頌皇都大一統賦有序洪惟天朝太祖髙皇帝誕膺景命龍飛淮甸既渡大江遂都金陵撫有區夏肇造洪眷以開萬世太平之業逮我皇上繼承大統克紹丕圖仁恩誕敷聲教洋溢雨暘應期民物阜蕃薄海内外罔不率從而自莅阼以來宵旰拳拳惟思所以繼志述事以承太祖髙皇帝之意於是倣古制肇建兩京以為北京實當天下之中隂陽所和寒暑弗爽四方貢賦道里適均且沃壌千里水有九河滄溟之雄山有大行居庸之固玉泉之流經緯乎禁籞之中碣石之壯盤踞乎畿甸之内故其山川之壯觀風氣之清淑真有以卓冠四方為萬國之都㑹誠帝王子孫萬萬世太平悠久之基由是敕冬官洎内外文武百執事經營於茲而凡民庶士卒工匠之流莫不駿奔子來趨事赴功罔敢或後遂至天意人心感孚和同靈應疊臻嘉祥屢薦不數年間厥功告成而宫闕府庫之宏壯郊廟社稷之嚴肅朝市民物之矩麗秩乎其有序井乎其具列盖自古先帝王都邑之盛未有逾於此者乃永樂辛丑春正月朔旦皇上御奉天殿大朝海内文武羣臣四方蠻夷酋長率皆在庭踴躍鼓舞以為皇都之竒麗若此誠曠古所未見而未有者而所以為皇上萬夀之徴宗社磐石之固聖子神孫寶祚綿延之慶皆兆於此矣何其盛哉臣叨居禁苑職業文詞幸際昌期躬覩盛美謹鋪張為賦以彰太平之偉烈且以昭示於無窮其詞曰維太祖之受命膺上天之貞符奮布衣於淮右提一劒而長驅乃翦夷於羣醜悉蕩滌於寰區既渡大江金陵是都虎踞龍蟠興王之居爰啓鴻業肇開皇圖振光華於曠古恢萬世於宏模繄我聖皇祇膺寶歴奉天勤民太祖是式恩覃九圍仁周八極雨暘應期民物豐植覩四方之清寧乃有念於京邑維此北京太祖所属天造地設靈鍾秀毓總交㑹於隂陽盡灌輸於海陸南臨鉅野東瞰滄溟西有大行之嶻􅑖北有居庸之崢嶸㵼玉泉之逶迤貫金河而廻縈瓊島上聳以盤礴太液下徹而澄泓將繼志而述事必於此而經營乃勑羣工乃命百職萬方子來効勤憚力萃四海之良材伐南山之鉅石感恩意之昭孚咸經營而弗亟於是天心協順靈應彌彰布輪囷之卿雲發璀璨之祥光醴泉湧其浩浩甘露下其瀼瀼赫萬靈之呵䕶藹瑞氣於穹蒼乃卜良辰乃蠲吉日以相以度以搆宫室棟宇崇崇簷楹秩秩以盖以覆陶冶埏埴以繪以塗黝堊丹漆煥五彩之輝煌壯九重之嚴密天地洞開馳道相連金鋪絢日玉桂凌烟星羅棊列璧璨珠聫虹飛霞擁龍翔鳯騫超凌氛埃壯觀宇宙規模恢廓次第畢就奉天屹乎其前謹身儼乎其後惟華盖之在中竦摩空之偉構文華翼其在左武英峙其在右乾清並耀於坤寧大善齊輝於仁夀豁千門之雲矗敞萬户之輻湊至若丹闕巍巍飛觀凌空觚稜上聳閣道遥通左祖右社蔚乎穹窿有壇有壝有寢有宫亦有天地以嚴其崇復有石渠天禄以蓄圖書玲瓏綺錢照耀文疏懸牙籖之萬軸列緗帙之紛如宛奎畫之宵暎粲藜燈之夜嘘瀛洲文學之士閬苑列仙之儒備顧問於朝夕咸欽仰於聖謨又若大庖光禄列乎西東珍饈駢羅玉食惟豐禁城之下金水溶溶畫棟凌雲繡柱含風璇題耀日綵橋架虹雕甍隠暎寳殿玲瓏太孫所居諸王之宫金枝玉葉照耀層空育徳講學宴適游從若夫御苑逶迤上林深窈有山有泉為臺為沼巖谷谽谺雲霞縈遶走有竒獸飛有靈鳥樂寛閒以棲息恣回翔以馴擾復有天閑十二駿骨軒昂渥洼神龍之種大宛名駒之良並權竒而雄傑或磊落而騰驤又若廩庾輪囷惟萬惟億豐歲所儲累世之積玉粒金稃露積充溢國用所資人足家給復有武庫巍峩戈矛森列旗幟搖雲鎧甲耀雪凛凛白旄差差黄鉞四征不庭以彰九伐奮軍聲之揚揚振皇威之赫赫又若内帑充牣寶藏紆餘竒珍異産海匯河輸夜光之璧明月之珠琉璃翡翠瑪瑙珊瑚􅟴璖琥珀火齊璠璵錦繡迤􅆔羅綺芬敷又若百司庶府有綱有目文武頡頏為國鈞軸大學郡庠之並建琳宫梵宇之森矗列九衢之坦坦引六階而相續閭閻櫛比闤闠雲簇鱗鱗其瓦盤盤其屋馬馳聨轡車行擊轂紛紜並驅雜遝相逐富商巨賈道路相属百貨填委丘積山蓄又若歌樓舞榭艷態穠粧羅袖回雪清聲遶梁管絃嘔啞狎坐傳觴娛青陽之麗景駐白日之飛光維小大之不遺仰制度之畢備斯皆聖智之籌謀實出宸衷之經緯儼氣象之一新壯規模於萬世屹鴻基之豐隆偉河山之巨麗貽子孫以嘉猷紹先皇之初志邁豐鎬之舊規軼漢唐之遺制於是厥功告成慶叶天人乃歲辛丑為孟之春王正之月朔旦良辰聖皇臨御大朝羣臣内外文武濟濟彬彬戎狄蠻貊工商士民稽首嵩呼抃舞歡欣筐篚具列方物畢陳以饗以餔洽此皇仁大一統而無外藹至和於八垠臣忝詞垣叨職文字懐寵眷之彌深愧涓埃之無補際千載之良逢幸微生之快覩傳盛事於將來奚徃牒之足數祝聖壽於萬年播皇猷於千古聖德瑞應賦有序聖天子在位之十有五年為永樂丁酉是年十一月二日始創北京之奉天殿乾清宫於時文武小大之臣以洎百工藝能材智之流莫不駿奔趨事各竭其力以報答聖天子生成之大恩未幾殿中俱現五色瑞光由地亘天朗耀輝徹卿雲綵霱煜煜輪囷天花璀璨大如日輪廻旋宫苑蔽虧霄漢金水河太液池氷復凝瑞内含諸象毫髪可鑑自是卿雲瑞靄繽紛雜遝無日不見文武羣臣上表稱賀以為聖天子至徳所感實應太平聖心謙抑不敢自當復申勑百寮懋勤厥職以上答天眷此可以見聖天子敬天勤民切切圖治之盛心超卓之見匪惟度越百王誠足為聖子神孫萬世之龜鑑矣臣忝列禁林職在紀述用鋪張為賦以傳示永久使天下後世知我國家太平如此其盛也謹稽首頓首再拜而獻賦曰惟聖皇之御極因龍潛而作都建兩京之偉觀恢萬世之鴻圖中四方而正位畫千里而為區宅禹貢冀州之域當天文析木之墟下衍坤絡上振乾樞洪河巨川既渾涵而聨亘重關疊嶂復磅礴以迴紆總隂陽之交㑹盡海陸之灌輸斯乃天府之國是為興王之居式宏開於景運名契合於貞符乃涓吉而經始乃選材而庀工詢謀罔貳龜筮協從萬姓咸㑹四方攸同維仲冬之凝沍盎和氣之冲融神靈協孚以交賛上帝監觀而相成於是建奉天立乾清法剛健配高明壯鴻基於九鼎揭皇極於八紘肆天庥之滋至紛總總而來呈既彌旬而閱月𦍑日盛而日盈若乃瑞彩發舒其光五色或紺而青或黄而赤或䕶日而圓或凌風而直上燭璿霄下臨柱石繡楹耿耀丹闈有赫晶晶熒熒煜煜奕奕昭晰輝融交暎洞射爾其卿雲輪囷非霧非烟勃欝布濩郁郁紛紛錯綜成章五彩氤氲乍斂而合倐舒而分或圓若停蓋或長若垂紳或粲若張綺或麗若凝纁昭回河漢朗耀三辰至若瑶葩下埀彌空紛綸的瓅璀璨状擬日輪炫碧含丹飄颻馥芬熠熠煜煜上騰髙旻亦有太液屢氷而瑞衆妙畢陳包含巨細層疊森羅璧聨珠綴瑩徹方諸輝爍陽遂匪琢匪雕匪裁匪製脛腪化工巧發神秘於斯時也百辟庶尹羣公卿士莫不蹈舞歡揚屏息睥睨以為曠世之竒逢太平之盛事乃端沐齋祓敷衽陳詞再拜而進曰皇帝功髙邃古化侔兩儀徳洽庶類仁育黔黎風雨時若百榖茂滋蠻夷咸附遐邇緝綏圓靈薦祉柔祇效珍五行序三階平醴泉溢甘露凝嘉禾植芝草生麒麟騶虞鳯凰長離籍籍紛紛合㳫葳蕤斯皆前日之徴應盛世之福禔維兹肇造新宫允協昌期萬靈敷佑民物咸宜誕昭景貺申錫蕃釐是盖天眷聖徳佑啓鴻基彰皇眀之偉烈開萬世之雍熈雖武有遷鎬之圖成有卜洛之舉曽何足以方於斯也皇帝乃謙抑遜避寅畏悚惕登進羣臣戒厲訓勅慎乃位修厥徳毋恃安而忘危毋恃祥而自逸納赤子於泰和措羣生於豐殖家無夭札之虞人靡饑寒之戚禮譲行而俗化淳刑罰清而奸慝息上安下順内寧外謐庶幾上答天眷茂衍鴻澤固邦基於久逺綿歴數於無極貽生民永世之安為子孫不刋之式顧不偉哉於是羣臣拜手稽首揚言曰皇帝敬天之命圖其難不圖其易于其徳不于其瑞誠國家莫大之慶天下無窮之恵臣等敢不勉竭愚衷欽服明訓以副陛下拳拳之盛意載歌曰瑞光耿兮五采份份兮卿雲粲兮五采成文兮瑤葩麗兮藹璘㻞兮氷華耀兮藴竒珍兮帝京建兮瑞駢臻兮皇徳謙兮訓戒之諄兮寶祚隆兮景命維新兮聖壽永兮何千萬春兮聖徳瑞應賦有序聖天子端居九重深惟皇考太祖高皇帝皇妣孝慈高皇后生育勤勞昊天罔極夙夜圖報實切淵衷稽之佛氏之書以為孝莫重於報親慈莫廣於及物而徴諸内典惟薦揚功徳可以少資冥福乃詔永樂十七年正月甲戌於海印寺修建水陸大齋七晝夜覃及幽顯咸膺利澤振法寳之威光宏慈悲之願力旛葢香花具足莊嚴齋儀梵唄修潔整齊平等無礙均一髙下維時后祗薦祉百靈闡珍甘露布於祗園醴泉出於靈甃卿雲被於霄漢瑤葩綵霱粲爛繽紛天休震動中外踴躍神人協慶大禮告成然自非聖天子至仁純孝格於天地諸佛世尊歡恱歆鑒皇考皇妣在天之應昭答感孚其能致兹福應若是其盛哉羣臣稱賀聖天子抑而不居誕降徳音戒厲切至此尤足以感動天心國家臣民萬世永頼臣叨列禁林忝職文翰不可無歌詠以播揚盛美傳之後世故不揣蕪陋謹鋪張為賦以獻其辭曰我太祖之應天以受命也不階尺土而開萬世之鴻基乃正大統任君師建皇極昭民彛掃妖氛於八表一文軌於四夷隂陽調而雨暘叙品彚蕃而百榖滋庶政咸和諸福畢來此所以躋生民於夀域而措天下於雍熈者也重惟聖后徽順柔慈身濟大業同起布衣化家為國正位宮闈輔成内治翊贊萬機上以奉神靈之統下以理萬物之宜此所以祐啓家邦恢宏慶緒而茂衍夫宗支者也肆惟皇上繼承大統君臨萬方仰法成憲祗循舊章顧昊天之莫報慨終慕之難忘怵惕惻愴瞻依徬徨凡可以導宸游資冥福則無徃而不致其力無所而不用其情此所以致禮於大雄而託諸天以達其誠者也乃涓吉日啓齋扃具冊祝潔粢盛說無量之妙品揚大梵之清聲於以展誠孝格聖靈溥惠渥洽幽明洋洋赫赫剡剡熒熒嚴㳟對越陟降在庭萬靈翕合香𣺌娉婷乃發佳祥以昭其成其祥維何甘露之盈被柯綴葉玉屑珠凝飴甘肪白純陽之精澤潤于下靡物不承亦有醴泉苾芬其馨潜通地脉發其精英如濤之沸如川之騰湛恩汪濊溢于八紘有粲其雲五采成文昭回於天布濩紛紜凌飈抱日䕃於祇園麗景流輝垂耀天門至若瓊葩下降飄颻繽紛圓暎皎日輕颺芳塵流丹曳紫凝澱含纁焱焱灼灼煜煜璘􅀈復有祥光五色揮霍冲融煥若火齊欱日歕空廻翔歛舒淺深淡濃竒形異態變化莫窮於斯時也春陽應候緒風解凍靈芬充牣天人和同歡聲溢於中外抃舞集於華戎皆曰此聖朝之大美千載之竒逢盖上天以是而昭至徳答宸衷衍皇圖福聖躬納斯民於仁夀而開太平於無窮者也於是大夫卿士百辟羣工乃齋祓上表稱賀九重惟皇謙譲祗畏寅恭親發綸音載厲載敕慎乃庶位毖於一徳以答於天以報於國惟徳之崇匪瑞之暱羣臣祗奉訓言罔不戰惕乃頓首揚言曰皇帝奉天體道恭膺寳厯宵旰靡寧緝熈庶績丕隆孝治四方承式仁沃幽潜恩流動植竒珍異産充積填溢維兹禋薦以孚以格誕降靈祥輝輝奕奕天眷用彰是畀是錫奚聖心之謙抑乃峻辭而弗居是將以仁為祥以義為瑞而弗寳於貞符盖自生民以來之所未有所以邁漢唐超禹湯而嫓黄虞也臣忝侍從游泳鑾坡頌神堯之寳露協虞舜之賡歌邁九成於唐室軼三燭於汾河際太平於今日奚遭遇之孔多是將登歌乎清廟期永世而弗磨歌曰聖孝兮孔昭衆瑞兮駢聯聖夀兮彌永億萬兮斯年又歌曰皇仁兮溥洽皇道兮昭明上天兮申命萬邦兮永寧瑞應甘露賦駕留北京惟太祖之仁聖寔受命於上天奮一旅於淮右掃羣雄於八埏拯生民之墊溺韜宇宙之戈鋋爰統臨於寳祚乃主宰乎神人首建皇極正彛倫脩禮樂宣人文握乾符闡坤珍鼔化機於品彚萃和氣於兩間紛四裔之來王致諸福之便蕃此所以創業垂統積德累仁開太平於萬萬世而啓鴻基於萬萬年也洪惟我皇神聖文武祗承大統撫馭寰宇仁信侔於湯文恭儉同乎堯禹溥湛恩於萬物沛膏澤於下土由是洽柔祗格圓靈三光全寒暑平慶雲粲景星明醴泉澧湧黄河泓渟騶虞生而麒麟出嘉禾薦而秀麥呈肆天庥之滋至羗異瑞其駢臻然猶未足以昭至德表至仁此甘露之所以復降而嘉禎之所以洊應也惟彼甘露寔降孝陵孝陵峩峩鍾山之下太祖陟降神靈所舍禋薦時享來祈來迓聖靈慰恱顯佑協相感我皇之誠孝恒洋洋而在上繄降福而垂慶屢昭錫乎嘉貺時惟子月氣和如春天乳明潤膏露繽紛溥松綴栢淋漓郁芬彌山布谷㪍鬱璘玢浥浥厭厭晶晶熒熒連朝累日屢降屢盈於是皇儲乃祗肅齋沐取以薦神宫告宗祊復馳表致賀獻于天庭皇上恭天之賜乃御大朝集百辟進羣公卿而告之曰惟太祖在天之靈監觀四方畀朕以神器之重寔頼爾臣鄰一徳一心勤勞贊襄敉寧區夏燮調隂陽風雨時叙五榖豐穰兵寢刑措民物阜康惟兹天降甘露所以表應太平嘉惠萬邦朕不敢祕天之貺用頒賜於爾臣鄰以昭上天之隆眷以承太祖之耿光其益竭乃慮厲乃志勤乃政敬乃事無藻辭以矜誇無滿盈而怠肆庶㡬休戚是同共保終始措天下於乆安致國家於長治福禄流於無窮聲名著於後世豈不偉歟於是羣臣咸拜手稽首曰惟皇上恭敬天地致孝祖考輯和民人惠養耆老徳洞淪𡨕恩被遐壤故天不愛道甘露呈瑞此感彼應理所必至而乃益存謙抑推而不處視彼植金莖以承液誇嘉瑞以紀年者不可同日而語矣是宜勅太史以紀載美盛徳之形容播諸金石被之管絃以示聖子神孫於無窮為之頌曰瞻彼孝陵松柏蒼蒼兮上天降康甘露瀼瀼兮至和所萃至孝之格兮惟皇謙撝弗盈弗溢兮憲章太祖以承於天兮永膺景命億萬斯年兮瑞應麒麟賦有序臣聞人君有至聖之徳者則必有至盛之治有至盛之治者則必有至大之徴此感彼應皆本於一心之誠非人力所致而自至者欽惟皇上建中垂統法天敷治恢宏鴻化覃暨無外和氣融朗嘉應叠臻乃永樂十有三年秋九月壬寅西南夷有曰麻林國者以麒麟來獻夫麒麟仁獸也中國有聖人在位則出王者有至仁則見惟我皇上自莅阼以來仁洽庶類徳洞幽明凡極天所覆極地所載極日月之所照臨莫不煦煦然甄陶於化育之内曽未逾年而麒麟之瑞凡兩至闕下羣臣上表稱賀皇上情存損抑推而不居以為國家之瑞不在於物惟刑政脩明奸宄不作時和嵗豐民物康阜同躋於熈明仁夀之域乃足為瑞且復舉前代溺好祥瑞誇詡張大極滿盈驕奢而底於亂亡者歴指以為戒於以見皇上之勵精圖治憂深思逺不自滿足而其心之誠真足以參天地贊化育度越百王垂法萬世豈惟天下臣民之福實國家億萬載無窮之慶也臣備貟禁林職在紀述叨沐鴻恩荐覩上瑞用著其實美盛徳之形容而為賦以獻其詞曰惟聖皇之奉天而履寳祚兮主上下之神人暢仁風於六合兮宏至化於八垠調玉燭以和四時兮順軌度以齊三辰納民物於康阜兮無彼此而不均盎鴻休之翕集兮協嘉禎之駢臻致内和而外輯兮故邇懷而逺親南濮鉛而北祝栗兮東扶桑而西崑崙或異言而詭服兮或雕題而文身畢稽首以效順兮舉駿奔而稱臣薦庭實之旅百兮紛焜耀於竒珍泝西南之絶域兮盖甞産乎麒麟仰聖人之在位兮四三譯而來賓屬兹麟之再見兮亦逖處於海濱豈㝷常之克致兮寔感召於皇仁繄麟之為瑞兮首四靈而孔神合二氣以賦形兮萃五行而胚腪至和為之育精兮大化為之陶甄匪質殊而形異兮尤抱貞而含純角笋植以周正兮蹄玉潔而璘霦矯蒼龍之脩領兮粲元龜之竒文尾􅆴􅆴以肖牛兮身磊磊而象麕閔生物以弗茹兮避蠕蠢而弗跧步驟中於矩矱兮鳴聲恊乎韶鈞絶踶觸以穆穆兮藹仁厚而振振衆靈從以先後兮百神呵䕶而紛員山川濯濯以發秀兮草木郁郁而揚芬倐光氣之上騰兮爛五采於蒼旻肆逺人之仰徳兮將獻瑞於吾君爰潔齋以告神明兮謹上貢於天閽駕檣帆於巨海兮揚旌斾於飛雲川祗為之歛浪兮風伯為之清塵詔陽侯以先驅兮役海若而後奔屏魑魅與魍魉兮走蛟鰐與鯨鯤龜龍左右以廻翔兮鸞鳳相參而繽紛歘超度於滄溟兮遄整駕於平原垂以赤䦨之雕檻兮藉以紫綺之文茵祥風載路以沕穆兮卿雲垂空而絪緼假金臺以留憇兮欵明廷而獻陳儀舒舒以容與兮體肅肅而安馴迫之不懼兮撫之不震倡率舞於玉階兮聆九奏於金門被日月之光寵兮沐雨露之榮恩重瞳屢顧以嘉恱兮臣工竦躍而歡欣固作長於百獸兮寧下儕於毛羣廓𤣥圃為之囿兮截瓊島為之藩以狻猊為爪牙兮以騶虞而為隣飡玉英之芳潤兮嗽醴泉之甘新應四時以和鳴兮符至徳於乾坤贊鴻化於幽黙兮熈大運於厖醇朝㕘鑾輅於瑶池兮暮陪仙仗於紫宸猗歟麟哉昭文明於盛世兮偉竒觀於前聞彼周南之詠歌兮邈形似而難真揭殿閣以嘉名兮奚漢唐之足云惟聖徳之淵𤣥兮軼前古而莫倫體大舜之兢業兮法聖禹之憂勤躬節儉而彌約兮蘊至道而彌敦讓嘉瑞而弗居兮履謙光而益尊戒臣僚以脩飭兮毋傲驕而怠昏遵成憲於皇考兮佩無逸於聖言上以承於宗廟兮下以庇乎生民庶長治而久安兮錫純祉於子孫斯宸衷之所以拳拳兮而聖訓為之諄諄顧小臣之猥陋兮忝載筆於詞垣瞻榮光於日下兮覩盛美之便蕃慙紀述之弗工兮罔禆益於寸分願永歌於天保兮祝聖夀於萬春師子賦有序欽惟聖天子膺受天命統紹洪基厚徳深仁覆冐無極仁聲義聞溢于八表故東極扶桑西抵月窟南踰雕題北底窮髮自前代所不通中國所不聞者其人莫不嚮風慕義畏威懐徳重譯接踵而至盖自三代以降未有盛於今日者也乃永樂十有三年九月丙申西域遣使以師子來貢考之載籍師子即狻猊也如虥猫能食虎豹銅爪鐵額鋸牙鑿齒尾端有茸毛大如斗許盖為毛羣之長夫百獸莫猛於師子居深山大谷之中非可以力致而羈絏也今乃自月窟逾崑崙越大漠歴數十萬里隨使者以逹於闕下有以見皇上之威徳逺著而師子之雄猛悍鷙亦皆帖然馴伏自致於中國則所以柔懷逺人威服不庭風飛雷厲於窮荒絶域之外者於是而可見矣臣忝列班行躬逢盛美不可黙而無言謹拜手稽首而獻賦曰於惟我皇聖神文武恢治化於八紘播仁風於下土無一物而不獲其寧無一民而不遂其所三光以之而平四時以之而序曰暘而暘曰雨而雨時和嵗登豐於禾黍致竒祥與異瑞遂駢臻而㳫至肆聲教之攸隆式廣被於遐邇彼卉服文身之鄉瘴雨蜑風之地既慕義以嚮風亦獻琛而奉贄惟兹西域綿邈萬里乃有神獸曰為師子鐡額銅爪鋸牙鑿齒紺眼赤毛鬛纓茸尾其氣猛而威其力悍而鷙哮呼則震訇雷霆奮擊則糜碎犀兕屬逺人之感化納職貢於包軌奉神獸以來朝慕越裳之白雉渉流沙以東向逾昆侖而南指凛飛霜之稜稜颯長風之纚纚覧金臺之嵯峨闖天關之嶻􅑖百辟為之駿奔天顔為之嘉恱於以彰聖皇之威武於以昭盛世之文徳熈神化以彌流亶聖心之無斁措斯世於太平遂民生於豐殖隆國家萬年之安軼曠古無前之績臣叨列於班聯仰天顔之咫尺幸目覩於竒珍敢敷陳於悃愊祝聖夀以悠長頌皇圖於無極瑞象賦有序恭惟皇上膺受天命統紹洪基仁布寰宇化周六合是以扶桑月窟之境雕題窮髪之地莫不梯山航海奔走來貢葢自三代以降未有盛於今日者也廼永樂十六年秋九月庚戌占城國以象來進其狀瑰詭雄壯元膚玉潔文有白章粲若華星郁如雲霞拜跪起伏馴狎不驚斯實希世之上瑞天下太平隆盛之徴夫百獸之中其强悍勇猛者莫逾於象非若虎豹熊羆之属可以力制今占城以是象來貢既有以見其形質之美而其馴擾狎習似與仁獸無異於以見聖徳之廣大被於幽逺草木鳥獸咸沭恩光而其感化之妙固與鳳凰來儀百獸率舞者同一效騐之大矣臣忝職詞垣幸際聖明屢覩嘉祥之盛不可無紀述以詠歌太平謹拜手稽首而獻賦曰惟我皇明受天命臨寳位洽文徳隆至治際天蟠地覆冐無外明無幽而不燭化無逺而弗被惟諸福之畢來致嘉禎之駢萃羗萬國以來庭咸輿琛而奉贄或貢以威鳳祥麟或獻以錦豹靈犀或進以渥洼龍丈之天馬或奉以西域巻鬛之神獅其他若瑤琨球琳大貝明珠珊瑚瑪瑙琥珀􅟴璖珍竒異産海委河輸紛沓焜耀雜然前陳則又不可以備書也粤有巨獸魁然其狀潜海濱以廻翔匿長林而自放勢侔山嶽之穹窿力抵萬鈞之雄壯其生也大塊孕其真至和毓其精瑶光助其神斗宿濯其英然後走百神集衆靈播休氛恊嘉禎忽乘雲而下降倐天開而日晶采旼旼而煜煜文璨璨而璘􅀈耿繁星之布濩瑩雪花而繽紛如肪之潔如玉之温經以白理緯以𤣥黄備衆采以交互紛五色而成章炳炳蔚蔚熠熠煌煌六甲為之呵衛五丁為之賛㐮嶽祇因之而獻瑞坤珍以之而效祥於是畨酋夷長睨之而惕驚象胥虞人望之而辟易不假鞿檻而自致匪藉罻羅而自格乃告神明㳙吉日載之以蔽空之長舟藉之以幕雲之文席左叱陽侯右麾海伯風師前驅而縮恧天吴後從而匍匐迅飊為之帖息魍魉竊伏以藏形猰㺄逺引而遁迹歘星馳而雲駛逾萬里於倐忽沐恩光於九重近龍顔於咫尺觀其拜跽有常動止有節既容與而弗驚亦安舒而自帖萬姓為之駿奔百僚為之欣恱麒麟㕘之以翺翔騶虞隨之而蹩􅍷于以導乘輿服鸞輅備萬舞恊韶濩宣人文昭皇度兆至徳之禎符綿萬年之寳祚囿斯世於㤗和措羣生於豐遂熈鴻化以彌流亶聖心而袛畏將以明刑弼教保民圖治答景貺於上天貽嘉猷於後世又豈徒誇盛美侈多瑞為目前之竒玩而已哉臣忝厠列於禁垣幸瞻依於日月愧學術之粗疎莫形容於萬一爰纉述於見聞兾具存於事實揚盛世之休嘉著無前之偉績祝聖夀以悠長頌皇圖於無極為之頌曰惟皇神聖上帝之命統臨萬方靡不從令維帝監觀禎祥之格丕昭神化洽此文徳皇不自聖益敬於天匪象之瑞所瑞惟賢大哉皇仁覃被八紘如天之行如日之升上帝之歆協于皇徳億萬斯年其永無斁駞雞賦永樂己亥秋八月吉旦西南之國有以異禽來獻者稽徃牒而莫徴考載籍而難辨皇帝御奉天門特以頒示羣臣莫不引領快覩頓足駭愕以為希世之罕聞中國所未見其為狀也駞首鳳喙鶴頸鳬臆蒼距矯攫脩尾􅍶崒雄姿逸態鷙武且力衡不逾咫髙可八尺名曰駞雞生彼畨國想其質乘火徳體孕陽精目含碧而星耀頂凝紫而雲蒸步凌風以聳拔翼摩空而峥嶸冠峩峩以髙翥聲膠膠而振騰豈羽毛之同族寔異狀而殊形感聖徳之逺被將獻琛於天庭爾其分重譯辭海陬貯以雕籠載以長舟風馭指以前路川后導以安流鵾鵬相參以廻翔精衛從之而夷猶駭天吴兮走列缺懾蒼螭兮奔素虬晞晨光於暘谷弄夕景於瀛洲倐忽萬里逹於九重闊步長趨氣凌太空性寔馴狎貎甚雍容昂首拂青雲鼔翼生長風山雞野雉不敢敵青鸞紫鳳同翺翔飡以𤣥圃之金粟飲以瑶池之瓊漿顧依托之得所何遭遇之非常繄聖皇之宵旰政圖治之未遑法勤勵於湯禹倣至徳於虞唐念司農之作戒冀警旦而弗忘敢躭翫於逺物有一息之怠荒惟雨暘之順序洎民物之阜昌暢至仁於六合躋四海於夀康斯宸衷之拳切而聖心之所望臣日覩於盛美愧陳詞之弗臧頌聖夀於萬年同地久而天長黄鸚鵡賦繄羽毛之為類紛總總其莫量何鸚鵡之獨異禀姿熊之非常既弗白以弗緑亦匪𤣥而匪蒼秉純黄之正色乃毓徳於中央觀其質自天成胚由地育戊己儲精坤元孕淑娟娟其容烱烱其目纎喙巧舌紺爪丹足謝濃翠於秃襟翦㣲紅於膺腹肌一色以裁柘體渾全而染菊邇其身逰南詔迹逺隴西映日光絢含風翅低思靈泉以就飲戀嘉木而擇栖鄙昂藏之文鵠陋睍睆之黄鸝誓永托於遐壌甘獨處而弗移何遽聞於守將遂逺辭於山靈爰戒斥堠勿擾勿驚爰飭虞衡勿弋勿矰兹靈禽之間見將效瑞而來庭於是祥風乍迴卿雲渰興忽低飛以自馴竟竦立而亭亭怡情閒暇弄影娉婷乃諏吉日乃告前征盛以五采之雕籠栖以雙玉之寳檠馳萬里以逺渉瞻九重而獨登于時聖皇御朝撫臨萬國天仗宵嚴閶闔晨闢敬再拜以入獻粲文采之輝赫晃初日以争姸耀金鋪而一色凝眸注視想婉娩以酬恩延頸訴言期從容而報徳惟聖皇之謙譲乃情存於損挹誠弗貴於珍竒亦豈寳於逺物思宵旰以圖治益寅恭而戒惕葢將措斯世於雍熈而納天下於仁夀之域者也臣沗侍禁垣職業文字逢千載之昌期際文明之盛治瞻羽族之靈祥羡物類之竒異聊陳賦以形容冀垂聲於後世賦已而為之歌曰天生羽族萬有不同兮異哉此禽既慧而聰兮禀色純黄昭聖徳之中兮又歌曰竒哉此禽既聦且慧兮含靈解語巧通人意兮知徳報恩頌聖夀之萬嵗兮太祖皇帝御書賛有序皇上宴閒出示太祖皇帝所書御製嘉禾詩一首雲章爛然輝映日星羣臣駭躍争先覩之即日摹刻諸石刻成取拓本裝潢成巻越十有二日御奉天門頒賜羣臣公卿㓜孜幸得與賜焉臣竊惟太祖髙皇帝龍飛淮右提一旅以靖禍亂混一六合休養羣生修禮樂以致太平涵濡漸漬垂四十年百僚效職四裔承風惟時嘉禾屢登四郊之民無凍餒之憂廟廊之上垂拱雍容聖情恱豫親御翰墨著為歌詩渢渢乎洋洋乎雄偉壯麗渾然天成至其字畫之超詣天機逸發森若飛動雖龍跳虎卧鳳翥鸞翔不足以喻其妙此誠天縱之能聖學之餘也皇上纘承丕緒祗迪先猷披閱手澤如對尊嚴用勒堅珉藏之秘府以昭示萬億年永永無極顧臣菲薄而亦竊獲此賜寵榮焜燿稱頌難名謹當珍襲傳之子孫視為至寳乃稽首頓首再拜而為贊曰天眷有徳真人興篤生太祖基皇明天戈奮舉驅雷霆救民水火壺漿迎彊摧暴滅民以寧洒掃宇宙無穢腥功成定鼎居金陵龍蟠虎踞奠神京制禮作樂羅羣英百辟濟濟良股肱九重垂栱臨大廷華夷皡皡皇風清神功聖徳不可名四民安堵萬物成五風十雨和氣蒸東郊忽報嘉禾生異畝同穎争敷榮乃知至和兆休禎天降嘉瑞非農耕我皇體物周民情手揮寳翰榮光升羣臣環視喜且驚鏗鍧金石韶鈞鳴渾涵風雅遺葩經天章璀璨輝日星奎璧分曜含晶熒龍蛇走勢鸞鳳騰珊瑚玉樹紛縱横惟帝繼述隆孝誠對閲宸翰欽聖靈慨念手澤思善承到此琬琰勝瑶瓊寳凾鈿軸黄金縢藏之秘府垂千齡勅賜百官恩寵并小臣忝竊依蓬瀛荷此寵錫慙弗勝作詩敢謂諧頌聲願效康衢歌太平麒麟贊有序臣聞麒麟天下之大瑞也帝王之徳上及大清下及大寧中及萬靈則麒麟見又云天不愛道地不愛寳人不愛其情則麒麟見又云王者徳洞淪𡨕化及羣動則麒麟見是則麟之出必聖人在位當天下文明之日固不可以幸而數致也欽惟聖天子嗣大歴服法天圖治勵精宵旰致理萬機仁聲義聞洽於逺邇徳教覃被民物和㑹四方萬國靡不歸戴於是天監聖徳景貺屢臻而十有七年之間諸福之物紛員充牣史不絶書乃永樂甲午秋九月西南夷有曰榜葛刺國以麒麟貢明年乙未秋九月有曰麻林國以麒麟貢今年秋復有曰阿丹國以麒麟貢五六年間麒麟凡三至京師烜赫昭彰震耀中外誠千萬世之嘉遇而太平之上瑞也昔者黄帝道隆徳盛麟僅出於囿周南雖托諸歌詠而未覩其真降及漢唐寥寥無聞今聖天子徳協重華功髙曠古厚澤深仁涵浸無間而兹麟之祥屢見而不已葢上天以是彰顯聖徳為王化之大成誠宗社生民萬萬年無疆之慶也臣沗列禁林日覩嘉禎不勝榮幸用述為賛以傳之乆逺謹拜手稽首以獻賛曰猗歟仁獸異狀竒形二儀胚腪𤣥枵降精龍顱聳拔肉角挺生紫毛白理龜紋縱横其質濯濯其儀彬彬有趾弗踶惟仁是遵有角弗觸惟義之循步中䂓矩音協韶鈞養綏撫㓜藏嘉思邉四時乘化其鳴弗愆是名麒麟出應於天待時而至弗後弗先萬里來賓載邁載馳瑶光燭霄卿雲下垂重瞳屢顧衆抃以嬉大開明堂坐以納之於惟我皇法天圖治聲教流行東漸西被無幽弗燭無逺弗暨川滙雲奔稽首奉䞇爰集大瑞後先駢臻何以致之惟皇之仁惟皇之仁洽于八垠極天際地罔不尊親惟皇謙恭弗自為聖匪物之珍恊于仁政惟皇奉天丕顯大命聖夀萬年四方之慶獅子贊有序聖天子莅阼之十有七年徳化大成無有逺邇畢獻方物乃秋八月甲午西南夷木骨都束國復遣使以獅子來貢夫百獸之極莫逾於獅子其狀銅爪鐵額鋸牙鑿齒聲殷殷若雷居深山大谷呑嗜虎豹非可以力制也乃今日自海外歴數十萬里隨使者以進於以見聖天子之威徳逺著覃及庶類故雖雄猛悍鷙之獸非人力所可制者亦皆帖然馴伏自致於闕下則所以柔逺懐邇威服不庭風飛雷動於遐陬絶域之外者於是而可想見矣臣叨列禁林職業文字躬覩盛美不敢自黙謹為獅子贊一篇上獻贊曰明明天子文武神聖撫馭萬邦膺天眷命萬邦協和是承是式無强弗庭無逺弗格山梯海航方物畢至竒祥異珍川湧雲萃曰有神獸名曰獅子殊姿異狀傑特雄偉豐臆廣顙目烱如鏡筋骨紏纒氣剛力勁鋸牙鉤爪茸尾盤旋髯耏纓妥柔毳霜妍奮鬛雷鳴摧山裂石虎豹懾威熊羆褫魄長林大麓沐浴雨露山靈嶽祗前後呵䕶逺人導之弗縶弗拘歛虣來歸匪迫匪遽爰涉巨海汎以長舟登貢大庭式彰鴻庥惟明天子化及羣類草木昆䖝以育以遂致兹神獸不擾而馴匪獸之馴格于至仁惟明天子奮揚威武洽以文徳孰為旅拒周書白狼漢紀𤣥犀孰若兹獸感化屢來惟明天子道隆徳至駿烈神功作配天地臣拜稽首天子萬年聖子神孫永世其延神龜頌有序洪惟太祖皇帝功徳之隆如天地之大亘萬世而莫及皇上纘承丕緒思述神功紀於穹碑爰命工取石於龍潭山之陽久之惟碑砆未得乃掘地三丈許忽得石龜隆然若蹲形體之似宛若生成九疇參錯有自然之文匠石驚愕以為神異遂奉以獻於大廷有詔俾臣民觀之莫不歡欣駭躍咸曰皇上仁孝感孚故上天昭示景貺雖神禹洛書之呈未足擬倫臣幸依日月之光重沐雨露之澤覩兹盛美喜不自勝謹拜手稽首而獻頌曰於惟聖祖作民父母濬哲温恭聖神文武伊昔元季羣醜争雄天戈所麾罔不率從救焚拯溺用寛伐虐治定功成制禮作樂聲教四達宏布紀綱振彼枯弱鋤其暴强蒐羅賢俊樹立藩屏蠻夷戎狄稽首奉命既集武功益綏文徳拱手垂裳不假聲色休養生息垂四十年俊徳成功巍然煥然維皇嗣之聖作物覩功髙湯文徳配舜禹舊章成憲皇則率之萬方黎民皇則綏之繼志述事躋於至治嘉祥駢臻諸福畢至惟皇至孝思念神功欲託穹碑昭示無窮爰求貞石不日而得既求厥趺龍潭之側眷兹龍潭孕秀鍾靈坤后效職至和儲精乃擘丹崖乃破蒼壁佳氣氤氳祥光赫奕忽得石龜隆然若蹲匪金以縝如玉而温素理𤣥介光輝的爍人文聿宣竒偶㕘錯藉以文錦獻於大廷臣庶聚觀歡聲沸騰在昔夏禹洛書獻瑞聖聖相承先後一揆太祖之靈陟降在天聖孝感通有開必先神龜所徴聖夀萬億小臣作詩永永無極白烏頌有序聖天子莅阼以來禮敬宗廟恪恭神人禋祀天地誠孝感孚靈貺昭答由是雨暘順序五榖嵗登諸福之物先後踵至乃永樂已亥夏四月癸已順天府尹臣諤奏廰前槐樹有烏營巢其上産雛二其一毛羽潔白瑩若玉雪朝徃莫來馴狎尤甚斯為上瑞實應太平天子可其奏遂登進於廷文武小大之臣莫不争先快覩揄揚舞蹈以為聖天子至孝至仁之所致臣幼孜退而稽諸載籍有曰烏孝鳥也能返哺天子有至孝之徳則白烏見又曰烏仁禽也性至慈天子能禮敬宗廟則白烏至今順天實古京兆為四方表率而政教之所先也一旦白烏之見不於他所而適出於輦轂之下達孝純誠格於宗廟至仁厚澤洞于幽明徳化流行洽於逺邇葢與關睢麟趾之應異世而同符者矣臣叨列禁林獲覩盛美敢不鋪張聖徳以形容太平傳示無極謹拜手稽首而獻頌曰於惟聖皇受命自天治洽重熈極於八埏禮樂教化期於躬行曰惟事天必敬必誠孝奉祖考寅畏肅恭儼若羮牆接於聲容俯仰降升神靈翕赫不享亦臨不顯亦式達孝尊親始於家邦錫類之仁覃及萬方濟濟雍雍忠孝友弟曰父而父曰子而子時罔乖悖亦靡鬬争上熈下恬咸樂和平雨暘時若稼穡蕃庶人足家給兵寢刑措皡皡熈熈八表同春嘉禎翕集靈貺駢蕃惟此順天實古京兆有烏營巢乃育乃鷇既生二雛一乃純白雪毳霜翎煇潔潤澤喣之哺之弗鷙弗驚肪切玉琢熠燿晶熒鶴奪其皓鸞失其素臣諤尹京曰此上瑞乃涓吉日齋祓以俟載之雕籠護視惟謹癸巳昧爽再拜以進露凝縞毳香襲素襟照影瑶砌燿采瓊林重瞳屢顧百寮抃驚咸云此瑞聖徳之徴昔在虞周流赤騰芳孰若今日變白效祥維皇神聖涵育兆民烏實仁禽其容振振維皇仁孝格於祖考烏克返哺其儀縞縞𤣥鳥兆殷神爵興漢白烏之祥式昭聖代臣拜稽首闕瑞應騶虞頌有序臣聞天子有大徳則克當天心以享天命故上天慰恱昭答景貺以兆億萬年無疆之慶洪惟聖天子祗膺大命統承寳祚敬恭天地嚴奉宗廟輯和人民七緯順度九有寧謐乃宣徳己酉春正月南京守臣來言有騶虞二見於滁州之石固山謹卜日遣人馳獻粤二月十又三日達闕下上賜文武臣僚洎四夷朝貢之使觀之白質元章膚體明潤馴擾安適弗懾弗驚中外抃舞歡揚咸曰此國家上瑞天下太平之徴非偶然而致者臣竊惟太宗文皇帝以聖神文武之資統馭華夷深仁厚澤涵浸無外在位之日四方以祥瑞進者輻輳于廷而騶虞凡兩見至今猶赫赫如前日事惟我聖天子以聖繼聖化洽宇内仁及庶類雖莅阼以來嘉祥屢至而未有若斯仁獸者駢臻並見於一日之間徴之徃牒實為希竒自非聖天子之至仁大徳足以上當天心曷克臻兹誠宜播之聲歌編之簡冊以丕昭鴻休於無窮臣不勝欣躍謹拜手稽首而獻頌曰維皇嗣統膺命上天睿知文武以馭八埏祗率舊章法祖圖治選賢簡能以布庶位五行順序三光昭明四方來同萬姓以寧洎於幽濳跂行喙息總總林林咸被茂澤太和絪縕充塞兩儀涵毓靈祥益蕃而滋乃有仁獸駢出畿内造化胚腪適與時㑹其見於何滁山之陽瑞靄祥氛為之低昂穆穆旼旼有白其質亦𤣥以文匪羣之匹不角不牙匪兕匪貙蹈義含仁惟徳之符正月令辰榮光四被守臣告祥山靈效異祝網既除罻羅弗張乃服軒車載趨載行既安且馴不虓以怒祥飈汎川彤雲載路維春二月進於九重天光低徊風日朗融於時都人於時卿士於時蠻夷咸稱上瑞兆時聖徴有煜其光至仁之應太平之祥在昔太宗功成治定騶虞再見亦惟徳之應維皇奉天昭格上帝眉夀萬年以同於天地瑞應元兎頌有序皇上御極之五載政教大行徳化覃被隂陽和鬯風雨時叙萬方熈洽咸際光明故嘉禾之生仁獸之産諸福之至不一而足是嵗己酉之春元兎見西陲守臣寧陽侯陳懋奉以進粤夏四月𤣥兎再見懋復以進皇上皆以賜羣臣觀之毛質郁然温潤敷腴黟若𤣥雲跧伏翔躍馴擾絶倫斯乃仁獸實為上瑞泝厥所由盖本於皇上純仁至孝格於祖考通於天地洞於幽明之所致夫仁為五常之首孝為百行之本推其極至於天地位萬物育不越乎是二者而已皇上受天明命統治華夷秉仁履孝惟日乾乾一舉動而必由於仁一食息而不忘於孝故内有以理於家外有以化於天下無一民而不囿於至和之域無一物而不臻於熈皡之中是以和氣之發充塞無間致兹異瑞駢臻㳫至於以見天人感應之機如桴鼔影響有不可誣者既而羣臣奉表稱賀皇上尤心懐謙抑譲而不居且曰休符不於祥於其仁不於其物於其徳盖切切焉視以為警無一毫滿盈自足之心斯實宗社靈長之慶天下生民之福而太平洪盛之徴也是宜美盛徳之形容播之樂歌以昭示聖子神孫於千萬年臣叨列朝行躬覩盛美無任欣躍謹拜手稽首而獻頌曰皇受天命作主下民功配於天徳通於神治教休明恩覃八埏邇無不協逺無不臻羣生滋植丕囿陶鈞諸福薦祥有來繽紛眷彼西陲實同内地坤珍發靈嶽祗闡祕望舒流彩𤣥冥表瑞爰毓靈㕙毛質超異匪褐而黝匪蒼而䵝如漆之瑩如墨之漬光潤澤潔霧滃雲萃既擾既馴弗維弗縶守臣以告曰為禎祥祗奉以貢維日之良山靈先導祥飈載揚爰渉大河爰歴崇岡逡廵萬里進於九重榮光彌布郁郁彤彤天顔愉穆屢回重瞳乃詔卿士乃進百工賜觀於庭頌歌渢渢咸曰斯瑞曠古竒逢何以致之維皇之徳其徳維何孝仁之積上天監觀祖考歆格洞幽徹明於昭赫赫臻兹泰和嘉生駢錫化洽仁孚徧於方國皇曰噫嘻斯豈朕能維天祖考付畀匪輕敢肆怠驕以隳厥成尚弼予治業業兢兢保兹大命以底厥寧永靖四國福我羣生於時百辟再拜稱慶祗奉聖訓罔敢不敬臣拜稽首天子仁聖式是祖考恭天之命臣拜稽首皇仁如天大明一統天子萬年御編為善隂隲書頌有序嘗觀天地之於萬物包含徧覆發育滋長莫不欲使之各得其所是以足者跂而咮者啄翼者運而栽者植洪纎髙下蠢蠢蚩蚩莫不有以自形自色而各囿於化育之中聖人之治天下也亦然徳禮以導之仁義以勸之孝弟忠信以成之使其老少尊卑之有其倫民彛物則之有其常林林焉總總焉莫不有以各循其性以歸夫至善之地故其功效之大至於參天地贊化育有莫知其然而然者洪惟聖天子統承大寳十又八載夙夜拳拳惟欲以善化其民開導誘掖懇切至到父焉而教以慈子焉而教以孝臣焉而教以忠為兄弟而教以順為夫婦而教以和為朋友而教以信是以四方萬國熈熈皡皡歡欣鼓舞咸䝉夫至治之澤同歸於仁夀之中徳化之盛蔑以加矣而聖心歉焉猶以為未足萬幾餘閒載勞聖慮以為古之為善有隂隲於人者恒不求其知不責其報施之於冥冥之中若無所與焉其後卒顯於其身被於子孫光榮始終澤流無窮此其人雖無求知責報之心而天之所以報之者不爽毫髪歴代以來其人載之簡冊者不可悉數然求觀其實則散於編籍不能盡閱茍或加以披覽之勤則又得於此而遺於彼雖欲事事效之誠有難于為力乃博采傳記凡有隂隲而獲其報者彚為一編分類成巻復為論斷而系之以詩名曰為善隂隲特命鋟梓頒賜天下臣民使羣居類處者不待面命耳提而自知善之當為徳之當脩而凡所以矜智以挾詐恃力以衒巧利已以損人縱欲以害物者皆不使作於其心消其邪穢之行絶其繆戾之萌如披雲霧而覩青天脫煩囂而沐甘雨欣慰感恱奮躍興起沛然若江河之注有莫之能禦者矣然竊嘗論之善者人心之所固有非自外至者也但為氣禀所拘物欲所蔽始昧於其理而流於不善聖經賢傳所以教人為善者其言固非一端然而人心有不能盡善以歸於有極者誠由信道不篤視為空言而莫知所止故不若備舉其人為善之迹獲福之實昭然可鑒者以曉之則人易於從化樂於視效有不自知其入於至善之域斯則聖天子製作之意而示民以保極之道者盖如此於乎是書所載皆賢士大夫力行為善之實施之於日用常行者至為切要誠由菽粟布帛有不可一日而無者茍能即其人以觀其所以為行即其行以觀其所以為報則知善之當為而身家之被其光榮者由於此子孫之享其福澤者由於此所以垂名後世與天地同其悠久者亦由於此仰而師之則而象之儼乎神明在上而知敬也珠玉在傍而知好也孜孜焉勉勉焉力行以求造夫至善之域如此而不為君子不為善人者盖寡矣然則聖天子拳拳而致意於是編者非特有功於當時實有功於萬世其父母斯民之心可謂至極而無以加者矣臣忝職禁林親拜是書之賜不勝欣戴敬譔為頌一篇以贊揚聖徳之萬一謹拜手稽首以獻其詞曰聖皇御天下養萬民漸之以義煦之以仁文治誕敷聲教攸暨際地蟠穹靡不沾被刑政弗事徳禮導之惟欲斯民底於雍熈民有恒性善所固有本根既蕪化為稂莠惟克脩治以復其初推以及人恒若有餘繇古迄今善人世出施徳布恵惟人是䘏人雖弗知其善亦至獲報於天若合符契欲求其人著於簡籍敝精極神莫究其迹聖斷天啓蒐羅今古備列其人衆善畢舉稽厥世代千載一時彚分類别一覽不遺皇文宣著聖謨洋洋昭回雲漢金薤琳琅寵錫臣民家傳人誦殆猶有虞四方風動剗偽還淳革薄從厚胥為忠良脱去汙陋大哉皇心製作之盛於萬斯年我民有慶皇徳逺被民心所歸至善之域我民是依於穆聖皇徳配天地臣作歌詩播於萬世玉笥山賦鰲宫散兮彩雲鯨海飛兮黄塵銅山渺兮寂寞玉峯美兮嶙峋占西江之上郡表南紀之孤青攬神秀於磅礴通仙靈於杳冥割晨昏而軼雲雨薄光景而生風霆登之者若廣寒八萬户之玉宇望之者恍巫山十二峯之翠屏予嘗攀蘿絶澗繫馬西風斷蒼崖之秋骨舒一笑於竒逢攀危巢於栖鶻附垂翅於冥鴻發孤嘯於崖端振萬籟於笙鏞但覩夫華葢倚天芙蓉削玉清霜利鍔劍挿秋寒初月脩眉黛横空緑其瑰偉萬狀而東連者非臨川諸山列於前者乎重灘來逺千里如瀉煙消雨峽隠若垂虹雪立風濤疾如走馬行祠候龍女之暮歸别路泣驪駒之晚駕其蜿蜒百折而南委者非章貢之經流繞其下者乎西連石霜百丈之竒北挹閤皂寳金之秀或寛而陂陀或卑而培塿莫不瞻仰其先後羅列乎左右則諸山聳處之尊真足以配南山不崩之夀也方將臨飛梁凌絶頂窮𤣥㣲入溟涬抽石室之藏書校黄庭之内境俄遇鴻濛先生虚無誕叟身佩蒼精手捫落斗或處静而寄嘿或談空而説有相與吐羅宿之竒胸騁懸河之辨口候紫氣於青牛嘆浮雲於蒼狗誕叟起揖於先生曰子亦通𤣥者也獨不聞清江玉笥之山乎夫洞之天者三十有六而法樂固為第一地之福者七十有二而郁木固為無匹葢天作而地藏宜鬼沒而神出今子以憑虚弔古之才拔俗出塵之質不遊於𤣥都千樹之時而訪於昆明刦灰之日何其異哉僕固鄙人請告山川風物之美宫室羽儀之麗悉耳目之所及庶幾發吾子之䝉而祛吾子之蔽也在昔此山卓卓太古究其根盤罔知幾許錫以太白雲臺之名雜以羣玉秦望之所崟岑岪欝峥嶸險阻嵸􆀗㠎岋㟏岈峋嶁蟠者如龍踞者如虎方者如屏圓者如筥斷者如帛續者如組髙者如立下者如俯呀者如吞突者如吐平者如削起者如舞向者如鬬回者如顧千竒萬狀不可遽數其上則小山叢桂漆園大椿松檜栝栢椅桐栗榛大餘連抱深踞重坤夸條幡纚布葉鋪芬昂霄聳壑霧合雲屯白日而蛟虬動微風而笙歌繁禽則出穴雛鵷銜書神雀黄鵠白鷴金雞𤣥鶴旋日鴐鵞鴰鶬鳷鵲呈其吐綬名之搗藥雲彩星馳風毛雲落或翔而集或俛而啄是皆踰岷越嶂離瀛度弱不逺伊邇於焉兹托其下則玉芝葳蕤瑶草緑縟葭若麝香荃蘭甘菊芎藭鶴化金鈴甖粟抏紫莖揚清馥耀羣芳駭衆目披幽崖施中谷煜煜猗猗青青郁郁獸則馴虎飛猱麝香麂鹿或獻果而攀蘿或賣杏而收榖或食乎野苹或眠乎石竹餘則五色之毛千里之足茂先所不能知爾雅所不及録莫不肥大蕃息絡繹馳逐以寢以吪不瘰不瘯水則三溪八池七潭六源丹砂之井玉醴之泉服之可以永夀飲之可以成仙潏潏滈滈澄澄涓涓光極曉鏡聲彈夜絃練横瓴㵼支分蔓延决而為雨積而為淵溉田百頃衣食之源然後觸穹石赴奔川東滙彭蠡同歸海門其中則蛟龍龜貝鰋鯉鱅鰱比目之魼縮項之鯿沙蛤海蚌明珠出焉亦有羣飛屬玉並浴文鴛雙鳬乘鴈鳴翠舞鵾蒼鱗秀羽舉一漏千莫不集於淺瀬浮於清漣唼嚼乎菰蒲菁藻棲息乎菱芡藕蓮建宮室則度其隰原拔斯柞棫爰命工垂乃程匠石巧者獻能勇者效力千夫雲從萬斧雷擊鑿石而龍門空斬木而虎穴赤發嶺表之瑰材集江南之佳植倐鬼設而神運不一朝而山積於是寳圖呈於坤靈玉梁降乎天寵倣配極之𤣥都列飛霞之畫棟翬翼宇而欲翔螭負楹而不動華榱引明月於璇題􅇨梲綴浮雲於朱栱露闕角之蒼龍啄簷牙之丹鳳表以承天大秀之崇侈以天徳乘光之竦參錯乎萬象之鱗次彷彿乎九重之星拱觀其重觀叠樓右坪左墄飛甍驚海色之揺紅鉛砌鏤琅玕之連白牕綺疏而結錢帶金釭而銜璧聚天上之星辰隔人間之風日周河漢之昭回順隂陽之闔闢宜上帝之髙居近天顔之咫尺至若黄道雨晴瑶階塵軟翠㽔下𤣥武之旌魚鑰起寥陽之殿羽衣翻仙子之霓裳雉尾擁宫人之綵扇耀孤鶴於金莖鳴八鸞於翠輦魚龍舞九奏於鈞天鵷鷺肅羣真於旒冕濟濟乎山澤之癯昂昂乎珪璋之彦降笙鶴於緱山來舄鳬於葉縣無非講道徳於元文咒長生之秘典𤣥霜杵月臼帶香殘丹氣成虹爐存火煉進麟脯之新竒集龍根之宛轉氷桃鬬瓜棗之筵銀甕錫葡萄之燕又何必慕弱水之二神此塵世之所常羡也鍾其精英發為人傑其方平重厚故為人也沉毅而富才峭直孤髙故為人也磊落而多節逺而九仙􅂱爾之名近則八祖森乎其列故孔梅沈謝之羣流歴秦漢唐宋而烜赫訪遺跡則魏氏之瑶臺何君之石竅臺聳東華赤谷之竒谷隠彤霞丹陽之奥箱峰蔓草之似袍墨池寒藤之學草劉通慕似籙於徒聞夏禹惜神樏之未造涪翁僅唫於彷彿叔夜敢侔於醉倒逮及累朝舉由其道銀鈎賜金榜之鏤題寳篆降御爐於恩詔信為古今之名山非遯世延年者莫能到也言未卒先生乃訢然而笑曰子誠知管晏之齊人識昭宣之秦客但誇夫山川之為美而不知河山之帶礪也覩宫室之為盛而不知兩都之舊制也羡木石鳥獸之同羣而不知斯人之為貴也慕辟榖延年之可尚而不知所惡有甚於死者夫達人之大觀曽何足以芥蔕雖殺身以成仁真不亡而日在且夫天人物我本同槖籥聚則成形散歸寥廓髙為星辰低為河嶽故箕尾墜而傅說亡尼山禱而聖人作二伯生而崧嶽降其神靈三蘓出而眉山為之蕭索相業應乎旁求王迹寓於筆削為藩翰於西周著文章於東洛是皆保海内之安危兼天下之憂樂豈效乎沒世無聞但忘情乎丘壑且子不聞蓬萊方壺逺則逺矣而樓船之藥未返滈池之璧已遺莖臺井幹髙則髙矣而茂林之石馬無聲柏梁之金人有淚是二君者今安在哉今欲與子窺九嶷登太行上㑹稽探禹穴泝崑崙觀澥渤追太史之竒蹤續前人之遺烈挽壯士之天河洗中原之戰血然後對禮樂於丹墀進輿圖於天闕則下視玉笥之山者何足比於一髮也哉誕叟聞斯言也狼顧䑕拱莫知所措夕陽兮在山碧雲兮欲暮余乃拾銅雀於殘烟分玉蟾於墜露倚桂樹之秋香遂登髙而作賦金文靖集巻六
