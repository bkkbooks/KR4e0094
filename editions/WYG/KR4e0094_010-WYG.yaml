body:
  text: 金文靖集巻十明金㓜孜撰書書王修本先生遺墨後右秦相李斯上秦皇逐客書一通總七百餘言臨川王先生手筆也先生在鄉里以清才䆳學早有時譽尤切切篤好古文章故於先秦兩漢之文多手鈔之若斯書其一也今先生去世已四十餘年獨此書藏篋笥中手澤如新然觀其引筆行墨嚴密清潤自有一種風韻即此可知其為博雅君子矣先生名務字修本卒年三十二嘗以子英貴贈右春坊大學士兼翰林侍講學士云書楊少傅陳情題本副録後予嘗觀先正范文正公生二嵗而孤母謝夫人貧無依再適長山朱氏洎文正貴以朱氏長育之德每思厚報凡朝廷所加恩輒丐以逮之甚至朱氏兄弟卒皆為殯葬嵗時致祭享嗚呼文正存心若是之厚者其忠孝之大節豈不因是而可見哉今觀少傅兵部尚書兼華葢殿大學士西昌楊公士竒其事殆與文正公同而存心之厚又千載而相符者也公生歲餘其先君子少傅公棄世賴繼父前進士羅君子理撫育敎戒之勤後子理官德安坐累謫戍永昌卒二子長憲補戍役次京家居養母母卒亦坐累當種田北京時太宗皇帝親征北邊仁宗皇帝居東宮監國留公輔導公念憲兄弟不幸皆以事逺役母夫人墳墓無所託具其情以聞意欲丐宥京以歸奉嵗時奠掃卒之感動淵衷親洒寶翰命永昌軍役并免之觀公之追念其親逮於羅氏洎仁廟之所以體臣下之情埀保全之德皆本乎人心天理之至而曠古所無之典也何其盛哉距今二十年京來省公于北京請録當時題本以埀示羅氏子孫公既識之復出以示予惟公以宏才碩學歴事三聖勳業在朝廷聲名滿天下其位遇之隆倚任之重葢有過於文正而其平生出處之槩存心之厚則未始有異也且世之人一𨽻戎籍子孫往往貽累於無窮今羅氏子孫獲享安逸之利若此者固荷朝廷恩德之大而實本於公忠孝之所推也拜觀之餘敬書此於末簡為羅氏之後人尚世世念之哉書椿隂書屋巻後太子少師夀椿公之子宗善質美而好學嘗於居第之旁為藏修之所而名之曰椿隂書屋來求子言葢将以致警而進於道也余謂夀椿公以耆年碩德遭值聖德致位顯融泊然以布衣自處慕道之心老而彌篤宗善日侍左右講明問辨不出乎户庭之間切磋琢磨近在乎函丈之内本之以孝弟忠信徵之以前言往行致謹於日用常行之間孜孜勉勉日求其所未知未聞者以造乎高明廣逺之域以達乎賢人君子之地是則夀椿公之所以為敎而宗善之所以為學者也予辱與公游且嘗識宗善喜能承公訓而進於學也故為之言宗善尚勉之恭題仁廟御書後仁宗皇帝居東宮時尤重文學侍從之臣凡賜賚洎有所陳請必親為題識當時被其眷禮者不數人今有春坊庶子兼翰林侍讀學士王直其一也直永樂初科進士由庶吉士擢翰林修譔器識文學蚤己受知前後膺賜者三陳請者一皆仁廟親御宸翰題識批答者首則端午賜扇次則以直目疾賜藥次則直遭喪将歸賜白金為道里費又其一則直以父在職年老乞致仕特勅吏部准所請其上皆著直姓名可謂極一時之顯者矣直謹装潢為巻用彰寵貺以貽不朽俾幼孜識之伏惟永樂中太宗皇帝屢巡幸北京仁廟實監國事親賢納善惟日不足仁聲義聞播於四海凡直之得拜賜予者皆優禮賢士之盛典非私之也其允答陳請者亦事理之當然非過也夫賜隆於上而報勤於下者此古昔盛時君臣相與至意所以治化彰明休聞彌流而功業宏逺也今觀仁廟之眷禮於臣下者既隆且厚而直之圖報於上者益勤以忠則上下之情交孚叶契可謂至矣然則是巻之藏固将以貽永久又豈圖一時之榮而已哉幼孜拜觀於斯不勝感激謹書此于後以識嵗月云書方兵部賓所藏文公先生遺墨巻後紫陽文公朱先生以文章道德師表後世而平生尤用力於書所至皆有石刻其為字端嚴謹重未嘗肯為茍簡今觀兵部尚書方公得先生所書夙興夜寐四大字墨蹟尤温厚沉著展巻之間使人悚然加敬葢先生為人辭氣雍容德性剛毅故其見於書者亦如此豈可以字畫求哉先生為此四字非以遺學者則以示其子弟其意欲以持敬為本葢夙興夜寐必常加兢惕無一息宴安之意方能不失此言簡約而為訓切至擴而充之所以修身治家事上臨民以至于立功立事而成天下之務者何莫不本於斯公明敏而勤於政其於事上之道尤恭謹弗怠而又能視此以為規戒朝夕展翫其有不惕然而懐敬畏者乎公其寶愛之俾後之人因是以感發興起則又當以公為法也書獻陵宸翰後嘗觀傅説之言有曰惟學遜志務時敏孔子之言有曰敏於行又曰好古敏以求之又曰敏則有功葢敏者汲汲有惟恐不及之意君子之學所以成德所以建功立事未有不敏而能成者欽惟仁宗皇帝以天縱之資緝熙聖學𢎞偉光明超軼往古而其嘉言善行之著于天下者皆足以訓後世嘗視禮部奏牘其後有主事馮智安名謂其義淺近無足致警遂更名為敏且題其外俾永守之無易敏感上恩之後謹以御書十五字装潢成巻間以示臣幼孜請一言以識下方嗚呼天下之事敏則成不敏則廢自古及今賢人君子之立身行道何莫不本于敏敏之於人其功葢大矣敏以薦方進秩為員外郎欽承聖訓身體而力行之夙夜兢兢礪其行修其職敏之又敏不以始終而有所間庶幾無負於仁考之深眷而於鄉里亦重有光焉臣幼孜伏覩宸翰揆今六易寒暑追思疇曩有不勝其感者謹書其後以歸之九老圖跋古九老圖乃東廣參政金華商君原迪之所藏也當有宋元豐間諸老皆以大儒為天子左右股肱其勲業聞望稱于天下及功成而退慕樂天故事相與置酒高會以樂其樂遂圖形妙覺僧舎時人謂之洛陽耆英㑹今去諸老己三百餘年而觀其衣冠儀刑雍容閒雅猶儼然如生嗚呼其盛矣哉雖然賢人君子可傳於後者豈惟其形似葢亦有文章德業之著焉予生也後想望諸君子風裁不能無高山仰止之思因商公求題有不勝其感者三復之餘遂書以歸之書梅花人物巻後李伯時以白描冠絶當時後人莫之能及此巻以梅花為主取六朝唐宋諸賢詠梅之詩摘二句并寫其人與梅為一叚其筆力精妙天機入神非惟得其衣冠形態之似而其神氣意趣吟嘯自適之狀莫不畢備吁何其至哉然亦不知其為何人之筆要知伯時之流亞與此葢刑部侍郎楊宗朂所藏以屬予題宗朂清雅修潔其所好尚者意必有在雖然畫之工拙不足論也有若何水部宋廣平蘇文忠黄魯直諸賢之休聲偉烈照耀簡册千載之下猶能使人歆羡而企慕之不忘則吾宗朂之所好尚者其在於此乎詩曰高山仰止景行行止宗朂尚益努力以先達自期待則他日所至固未可量也展巻三歎遂書以歸之書御製祭韓公茂文手巻後太醫院使韓公茂故魏國忠獻王之裔幼承家學精通醫理為時所推重受知今天子遂為院使為人温純謹愿不事表暴居職尤小心寅畏夙夜勤勞罔有怠忽公茂既殁聖天子深用閔悼特為文賜祭超逾常品其子太醫院醫傳感佩聖製復命善書者以泥金書之装潢成巻持以示臣幼孜俾一言題識其後於乎世之負才藝者常患不得其時得其時又患其道之不能行若公茂之遭值明時為聖天子所知遇道行志遂已極顯榮一旦殁于官特申䘏典聖心拳切復賜文以祭之光華寵耀豈特為一時之榮誠足以昭示無窮增重於先世矣傳尚珍襲之以為家寶拜觀之餘敬書此以歸之書聖賢象巻後昔嘗見蜀中文翁講堂及錢唐學舎皆有聖賢刻像往往為人所摹揭千載之下仰而瞻之者莫不為之起敬起慕則在當時得覩其儀容之盛所以感發而興起者可以想見矣此象乃元錢選舜舉所圖今國子司業貝公宗魯之所藏也公在成均以師道自任所講而習者聖賢之經籍所則而行者聖賢之道德朝夕與諸生揖讓進退雍容於進退之間其得于觀感者深矣豈象之云乎哉因公求識其下方敬書此以歸焉書聖賢象刻本廬陵周添彰以聖賢象刻本装潢成巻來求予題識其後余謂君子之觀於聖賢也葢将以求其道德之實察其動作威儀之則雖千萬世如将見之者添彰居大學所讀者有聖賢之書所學者有聖賢之事所由者有聖賢之大道所依者有聖賢之廣居陟降於詩禮之庭揖讓於俎豆之區其得於觀感者必深矣夫豈象之云乎哉添彰尚於此求之書周克己所藏先賢畫象巻後聖賢之道德文章具在方册千載之下使人起敬起慕者以此而已茍得覩其德容以挹其流風餘韻則雖未獲親炙其門而所以得於觀感之間者将必有出於方册講誦之外者矣友人周君克已間以濓洛諸君子遺象見示且屬予識之方展巻間衣冠儼然貌恭氣和端拱雍容直若與諸君子相接而親覿夫儀容之美使人鄙吝粗慢之氣頓然消釋亦何其快哉克己與予皆聖賢之徒也尚取法於斯以求無愧於諸先哲則於平生之所學殆亦庶幾焉詩曰高山仰止景行行止吾與克已當共勉之題顔真卿遺墨後顔尚書翰墨在人間甚不多見偶觀此巻不覺毛髪竪立嗚呼忠義之足以動人也果如此夫臨書三歎為之敬仰書釣臺圖詩序後嚴故著姓漢高士子陵嚴先生後也由桐廬徙居石荘凡二十餘世而至尚達豪爽有氣節能亢其宗今年春訪余玉堂因與出酒夜酌談論契闊道舊故尚達慨然念其先世與其祖父交㳺之盛屬予求名公鉅卿為詩文以歌詠釣臺圖􅂷不朽其用心可謂勤矣余謂自三代而下能不以富貴功名易其所守者惟子陵一人而已其高風偉節猶可想見宜夫後世子孫之多賢而有以自立也尚達圖畫釣臺追想富春以求無忝於前人而思所以自立不以富貴窮達利害榮辱而變其志則無負諸君子之所屬望而所謂圖􅂷不朽者不在于彼而在于此矣尚達欲求予題識其下故書此以歸之書樵雲巻古之人有託于隱者但求其心之所寓不可泥其迹茍以迹求之則徒得其外而其中之所存者未必能得也是故心者其理也迹者其形也形之在宇宙間若日月星辰之照臨雷霆電雹之震霍風雨霜露之變化河海山嶽之高深昆蟲草木之蕃殖與夫典章文物名器制度之宏博雖仰觀俯察萬有不齊然吾皆得撫而有之然亦豈屑屑焉泥其迹哉葢必有得其理者矣得其理則心之所寓者可得而識矣予友曾君學中脱略不羈嘗以樵雲自號以常情觀之樵雲特其迹而已而不知學中之處于此觀夫雲之斂舒上下沉浮聚散悠悠揚揚或行或止或往或來皆有至理者存而於是心有黙契者焉若曰學中之樂夫樵與雲為徒優㳺嵗月以自放於山林間者豈真知學中者哉學中持是巻求予題予故表而出之使觀學中者當觀其心不可徒求其迹也題周氏世直集右文三通其一周君伯寛哀辭宋進士湜溪郭先生譔其二元鄉貢進士周君墓表前翰林學士解公大紳譔其三寶賢堂箴今兵部職方員外郎周君岐鳯前為漢府紀善時譔伯寛為岐鳯之高伯祖以立其祖也周氏世以詩書顯以直道稱當宋季權臣擅命伯寛仕直寶謨閣忠憤激發屢上封事不報乃移書左史徐麒仲兾欲相與匡救其失卒不見信棄官家居而宋亦亡哀辭所謂危言切直直道三黜者也元至正初詔修遼金宋三史以立時以鄉貢士會試京師不利久之被知者薦入史館上書力陳當以宋為正統不合時論遂拂衣歸卒之仕不偶時僅低徊學校一小官墓表所謂雖一時廢不用萬世之下與日月爭光可也國朝永樂間太宗皇帝選文學士為漢王輔導臣岐鳯以國子學正擢紀善王所為多不法數諫不從王所居殿扁曰寶賢堂葢欲招致匪人為奪嫡計乃著箴諷諫王怒假他事請于朝左遷為長洲敎諭夫士君子明聖賢之學立身致用固當直道事人不宜曲學阿世也而或有不能然者詎非其理有未窮心有不正而承傳於家者之無本耶予觀周氏若伯寛若以立若岐鳯祖孫五世同守一道其賢於人逺矣伯寛以立雖未得大用於世而數百載之下忠讜公誼皎然表白􅂷諸宇宙其視當時依阿取容獲致美官者不啻霄壤之不侔岐鳯雖取怒所事然不二十年王果覆敗削為庶人君方敭歴中外綽著時譽年逾六袠登用未涯然則直道之行果何負於人哉信乎其得窮理正心之學而承傳於家者之有本也嗚呼偉矣君子敘為翰林修撰間托善書者以三文繕録装潢成巻出示於予求識一言予感其事有闗世敎為題之如此且以告夫周氏後人之繼承家學者書彭修譔墓誌銘後士之積學於窮困以有盛名享爵禄不幸至於夭死而不得以盡其才者吾不得而知也或者以為出於命非乎不出於命而謂之天吾亦不得而知也嗚呼賢如顔子猶且不幸短命於今獨不然哉此予於友人彭君汝器所以重為之悲也汝器為人沉毅喜氣節重然諾與人交欿然若不能勝者方其為兒時已能讀書有大志稍長汲汲焉求師友以講求夫聖賢之學間為文出語輒驚人鄉先生長者至折行輩與之為禮以為其成必大得名也其後汝器第進士入翰林為侍從近臣其名日顯天子嘗召試文章汝器操筆伸紙略不經意颯乎若風雨浩乎若波濤而莫知其所止也由是益被嘉奨其名又顯未幾扈從北京汝器偕予同行凡道路山川馳驅登覽所以著之於詠述者其氣益壮然自是用力之篤而其文益宻矣曾未逾年汝器忽以病告呻吟羸憊之餘支頤獨坐猶不廢筆札臨終與故人索别其聲琅琅潸然淚下獨以不得見其父為憾嗚呼汝器一至於是哉夫以汝器之强學廣記修之於困窮其業亦勤矣以文章取科第見知於時有盛名矣入官翰林職侍從爵禄加於身知遇於聖天子其榮幸為何如乃不得大展其志而卒以夭死是非命乎雖然以汝器所立者如此視彼老死山林無一藝可稱泯然與草木同朽腐者其得失又何如予固知汝器為不死矣夀夭何足道哉書張孝子傳後温之平陽有張氏名正字思中者事其母以孝聞鄉人異之稱為張孝子前太史蘇公伯衡次其事為傳而其名益顯思中之子真今為進士歴政于朝間以公所著傳相示丐一言識其後予謂五倫有常道生人有恒性子之事親以孝者亦分所當為豈異事哉然以唐虞之世百姓不親五品不遜猶不免以命契以是知至孝者之難得而能竭力於是者所以為尤難也思中為人敦樸謹愿自幼篤於事母平居之際事無小大不禀命不敢專行之母嘗遘惡疾不可為思中憂思勞瘁為禱於神汲汲焉若有求而弗得至刲股和粥以愈疾而人皆莫測其所為異時母滯下卧起出血糞思中不避穢惡輙手除之無纎毫厭倦意其婦或懈於事母久復有間言思中切責之不少貸遂改悔成賢婦之行母殁盡力襄事晨夕攀號擗踊幾致隕絶聞者莫不為之感傷焉夫天下之事同於人者不足以為異惟能為人之所不能為者乃足以為異思中之孝殆異於人者此其所以見稱於世也與嗟夫忠孝者天下之大閑也思中以孝著於其家而又篤於訓子俾其發身科第自致青雲之上方将移孝為忠以事其君以顯其親榮三釡之養拜旌德之封則天之所以報施於思中者固未有艾也詩曰孝子不匱永錫爾類又曰永言孝思孝思維則吾於思中葢深有取焉展巻三嘆遂書以歸之書江漢臣沉籍减税事巻後予嘗觀本深者其植必茂源深者其流必長積德之深者其報必厚此天理人事之可徵者也三衢江氏四五百年來衣冠科第人物相望何蕃衍悠久如此哉是必有本源矣江之先曰漢臣者嘗事呉越為鎮海軍節度判官宋初呉越國除漢臣上其十三州圖籍於有司當時賦斂無藝兩淛罹其害者已非一日漢臣以為一仍故籍是厲於民者無已也遂沉籍於河坐是以罪免擯棄終身後雖命王方贄更定其賦畝税一斗而非漢臣沉籍之功不及此嗚呼向使漢臣無所顧惜以其籍昧昧而進其重科厚斂貽害於兩淛者寧有紀極哉然則其惠利流於無窮者當與兩淛之人相為終始而其隂隲之報俾其子孫顯榮光大迄于今不絶者非天道耶因漢臣之裔孫襄府紀善秉心出示此巻三復有不勝其感者遂摭其大都書以歸之書古樸子傳後右古樸子傳今少傅工部尚書兼謹身殿大學士楊公勉仁所譔而雲南㕘政陳必㳟之所號也必㳟世居建之浦城為人質實不事表暴宅心坦夷不為町畦崖岸遇事任情無所矯揉人或以古樸目之因亦以之自號云必㳟來京師既請公作傳復來求予言以識其後嗚呼大朴既散澆偽日滋世惟機巧詭誕之是務媮薄矯飾之相師孰有能全其所賦而不鑿於私智哉必㳟以名進士為御史中臺出寃洗滯所至民受其惠及蒞政藩閫協贊旬宣而聲譽益著推其所存葢為敦厚而不為險刻為忠信而不為詐諼為儉約而不為浮華持之以謙而不伐守之以誠而不貳恂恂悃悃表裏一致葢幾古樸者之為矣予知必㳟有素竊喜其尚古道可以風厲世俗故舉其平昔之近樸者書以歸之題朱晦庵先生遺墨巻後紫陽先生以天挺不世出之資紹承孔孟周程之學闡明斯道􅂷敎萬世弗厭弗倦至于晚年德尊道立猶以義理無窮筆削難竟慊然有不足之意其著通鑑綱目褒貶大義嚴於華衮斧鉞而繁簡相發足為史學之規範矣至觀其手書自謂十年義例方定且欲求友就正其得失則其不自滿足之心為何如哉雖然豈特其心不自滿足如此觀其他記張魏公事歎其不同追悔於三十年前至懇辭趙忠簡公銘誌而不肯執筆則於此尤足以見大賢君子年彌高而德彌邵道益尊而心愈下宜天下後世尊仰之於無窮也此巻手書凡三二書如前所云一書則折簡道安問者京口何彦澄寶藏之以示予於戱先生片紙隻字流傳於世不啻拱璧之難得况此晚年之筆其所言尤後學所當矜式者耶拜觀之餘謹識嵗月于後云書衛生寶鑑後世傳東垣李明之從易上老人張元素得醫術之妙其用藥至詳實而以固根本為重其後明之之門人惟羅謙甫得其傳謙甫嘗著衛生寶鑑以傳於世學醫之士莫不宗之誠若布帛菽粟之適於用可有而不可無者呉郡韓公復陽力學好古尤精於醫家之説間取明之與謙甫所著脾胃論衛生寶鑑諸書叅互考訂以正其訛嘗欲鋟梓嘉惠四方竟賫志而殁今公子太醫院判公達能繼公之志既盡取明之所著者刻而傳之復繕寫衛生寶鑑總二十四巻次第而刻之書成來求予言以識其後於乎公達之用心亦可謂勤矣夫積善而行隂隲莫大於醫有若公達之存心濟物不擇所施而惠及於人者固博矣乃又能表章二公之書刻梓流傳與衆人共之則其惠利及於天下後世者其可涯涘哉雖然醫非難得其傳為難觀於此者尚求謙甫之所以為醫與公達之所以用心而思以盡其術則於是書庶其有得焉書慎獨齋巻旴江張氏以儒起家自宋元迄今以文學著聲者代有其人至彦英氏尤博雅温純自少力學為儒先長者所器重嘗名其藏修之齋曰慎獨其志兢兢然葢欲致謹於幾微未嘗以目之所不及見耳之所不及聞而湏臾忘乎戒懼誠有志於道者矣今彦英墓已宿草其揭名于齋者尤瞭然在人耳目使仰而瞻之者莫不為之起敬而凛然以自懼是則彦英所存不惟能成諸已而又有以淑諸人其見稱於士君子者豈偶然哉彦英子文昭以進士第入翰林為庶吉士擢中書舎人持是巻來求予題予嘉彦英之克有賢嗣而喜文昭能繼承先志以不墜其世故不辭而為之書時永樂辛丑秋七月十又六日也書積善堂巻後予觀天下之物皆由積而後成水之積由涓流而可以江河土之積由寸累而可以為岡巒人之於善也今日積之明日積之又明日而積之進進不已而其餘慶可以及子孫觀之渤海孫氏可見矣孫之先以忠厚起家有曰得才者樂善好施予賙窮䘏匱汲汲焉力行之不怠鄉人目之為長者得才之子成甫尤篤志於善輕利重義居鄉里恂恂焉不為表暴敎其子克讓克㳟底於成立克恭由鄉校登成均為兵部司務擢陞員外郎嘗念其祖考積累之勤而不敢以忘也乃名其堂曰積善國子祭酒胡公既序而詩之復來徵子言予聞之於易曰積善之家必有餘慶書曰作善降之百祥天人感應之理可徵不誣今孫氏之祖若父既勤勤焉啓迪之於其先而克㳟兄弟復勉勉焉繼承之於其後所謂水益增而深山益增而高者吾知孫氏餘慶沾溉於後人以傳之無窮葢未可量也展巻三歎遂書以歸之書陳智仲墓誌銘後中書舎人陳宗淵以文淵閣大學士兼左春坊大學士胡公光大所為其先公智仲甫墓銘一通相示且請予一言於戱君子之所以可傳於世者以其有行義而已當元末公以才諝見稱於時授長樂廵檢有異績陞為防禦義兵副萬户命且下而天下多事矣乃力引而退葢将託耕稼而終身焉公為人剛毅亷介事親以孝聞處昆弟篤于友愛待宗族恩義兼盡交友朋質直而謙下周貧䘏匱孜孜不倦嘗有負債而死者即焚其劵終身不問或有死不能斂者則賻以棺衾而葬焉宴居之間動必以禮言必合典則敎子弟切切焉以勤儉謹飭為訓晚節優㳺築室别塢日以種花藝圃為事賓客過從者觴酌賦詠必盡其樂公之行誼表表在人耳目者葢如此於戲世之士負才藝居顯位享高爵者固為不少而其隱約山林高蹈逺引以終其身者往往如是求其能如公之隱顯進退卓然無愧於行誼者葢鮮矣然則公之可傳於後者獨不在此乎余嘉宗淵能承公之志而喜公之慶澤綿綿乎尚未有艾也故書以彰之且以為陳氏子孫他日之徵也書南雅集後予觀天下文章莫難于詩詩發乎情止乎禮義其辭氣雍容而意趣深長者必太平治世之音然求之古作而徵之於今何其寥寥也此予所以讀南雅之作而重有感焉南雅乃三山陳仲進甫因其所作以為號也仲進力學好古而尤工於詩所為古今體五七言各臻其妙辭氣之間雍容不廹而悠然有深逺之趣其太平治世之音與且詩於政治之得失所闗甚大仲進常為宜陽韓城二縣丞復知江山皆有善政以及於人察其音之平和則其施於政者可得而知矣仲進之子中書舎人登間以此編相示且請予一言予閲之數日而喜其言之合乎古而有徵於今也故書以歸之書姚伯起考滿巻後古之所謂賢守令者以其能順民之情不生事以撓之故政平事理著績循良至今猶班班可數而稱也予友姚伯起氏慈祥樂易為束鹿者六七年而民甚安之安之之道葢亦順焉不撓之而已夫民易治也而令又與民相親也後世無善治之吏不與民親則又反其所好而厲之往往績用弗成以至于壞名災已者職此之由耳予來北京幾十年守令以賢明著稱者甚不多見獨深州得故人蕭伯辰於束鹿得吾伯起焉深與束鹿相距宻邇其人稱道二公之善者如出一口然迹其所以為治亦無大相逺者於戲使天下之為守令者皆如二公之賢民其有不治者哉伯起來報政将復還其邑學士楊公率能賦者作詩為餞而屬予一言予素知伯起故樂道其善而并及于深州且以為守令者之風勸也書墨妙巻後西昌劉士皆氏以四川按察僉事得代還京師乃求一時朝士之名能書者各書古人詩詞萃為一巻而題之曰墨妙今改調河南将行復來徵予言以識末簡夫天下之物有可以愛玩嗜好不至於沉溺賈禍者惟翰墨為然而昔東坡猶以為戒謂不可以留意若留意於此則亦足以為病士皆脱灑超邁其篤好於此必能得其樂而無所病焉政事之隙時一展而玩之想故人於天上豈不重停雲之感而有無窮之思者乎巻中所書予未暇有所評品然皆各臻其妙使在後日觀之此亦為難得矣士皆尚愛重之跋䟦定武蘭亭蘭亭模寫多失真以致真贋難辨余平生所閲石刻者無慮數十惟定武本尚存古意然見於世者甚少此本以為元大德間臨安唐師善所藏而趙文敏公題識其下文敏以為紙墨佳拓本工世所不易得者誠為確論矣因丘敬常持此求題故書其後如此䟦周氏所藏先世遺墨巻右手書一通元吉州路總管周公耐軒之筆也公在宋之季以神童科顯名當時仕至吉州刺史元有天下復兩拜總管吉之人在其時得不荼毒者公之力也故公之大節雖不著而郡之父老至於今德之於乎公其可謂仁人矣公博學洽聞勤於著述文章翰墨兼致其美此書公五世孫秉昻所藏秉昻之子忱今復以進士為秋官屬故家文獻葢有足徵者矣秉昻來京師間以求予言念前輩之既逺想流風於異代不覺為之慨然於是書以歸之以俟知公者尚有徵焉友蘭軒䟦古之人取於友也尚矣夫子曰以文會友以友輔仁孟子曰友也者友其德也又曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士以友天下之善士為未足又尚論古之人然則君子學以明道以成其德者其可無友乎淦之玉笥有士人羅孟載篤志於學其取友也不出于鄉于國于天下而乃在于家庭之間其友非父子兄弟而獨有慕於蘭者何哉豈非以蘭比德君子固尚之與抑以蘭居深谷處幽獨而不競可以養德與抑以其清操雅韻高潔不汚而可以礪操與孟載于是數者必深得之矣夫豈友之云乎葢不日而與之俱化矣俟余他日謁告南歸艤舟玉峽之濱尚當造孟載軒中相與賦詩酌酒鼓猗蘭之曲和灃浦之歌為三友之會不知可乎否也姑書此以俟䟦黄氏敎儀後予友東萊黄公福始以經術發身事我太祖高皇帝為衛幕陞貳工部煜然有聲逮太宗皇帝入正大統遂擢公北京行部尚書未幾命往鎮南交公鞠躬盡瘁勤勞夙夜撫輯綏徠無一毫弗盡者由是交人德公如父母而勳烈聞望遂著于天下當仁皇嗣統以公久勞于外特遣人驛召還京改工部尚書且命兼長官寮比年朝廷以交人反側復命公往鎮撫之将行命其子琮讀書于南京郡庠因疏為敎儀以訓之琮服膺弗敢㤀復以公手筆装潢為巻持以請予識其下方公之為敎總七百餘言其目有七首之為學修已治家之道次之以待人接物之方又次之以服用食飲之節其言切實而簡當鑿鑿乎若布帛粟菽不可一日而無者於乎公可謂善敎其子矣雖古義方之訓復何以加焉琮尚勉之惟日孜孜因其言以究其理因其事以力於行宻察於幽微致謹於操持内外交修終始一致庶幾賢人君子之域可企而及矣琮尚勉之予日望子尚有以復我哉世美堂䟦余嘗觀古豪傑士乘時奮興以其智力佐主定天下靖禍亂小者身致爵禄之富大者勲名彛鼎之重莫不欲傳之子孫俾世守之不替然或身殁之餘或易世之後已陵夷不振至於門祚傾覆者有之此余於合肥王氏不能不為之嘉歎焉王氏之先有曰玉與其弟瑛俱以忠勇事我太祖高皇帝戮力效謀東征西討屢建竒勲豐爵厚禄榮於其躬天章寵錫光耀閥閲英武奮揚卓冠當時真可謂傑特不常者矣而瑛之後則有若迪以承之迪之後則有若謙以繼之六七十年之間王氏之祖孫父子兄弟襲圭累組繩繩相繼如源泉之注愈逺而不竭亦何其盛哉今謙移鎮于温練達武事能舉於其職則所謂世濟其美者於斯堂有光矣嗚呼為王氏後之人尚益體先世之勤勞兢兢業業恒以失墜為戒而思保守之不易則其流慶所及尚可涯涘哉因謙徵言遂書以歸之䟦呉氏家乘後右呉氏家乘一編元處士伯純甫之所集其裔湖廣參政某之所重録也呉氏以族望於南昌曰北山自其鼻祖太師儀國公居厚以相業顯於宋歴元迄今詩書德業之傳衣冠文物之懿數百年來愈逺而愈盛江右故家大族若呉氏者葢不多見也今觀是集所載首於褒賢閣記則儀國為武康節度時之所作也其次繼之以序銘誌等作則皆有宋諸名公或為述其奕世名堂之義或載其先代德業之實舊家文獻粲然可徵於戲盛矣伯純甫集録時鄉先達胡霆桂先生嘗序以鋟諸梓以永其傳不幸中遭兵燹漫滅散軼某懼其久而不足徵遂託其鄉友中書舎人王仲叙重録之以藏于家其用心之勤可知矣夫莫為於前雖美弗彰莫繼于後雖盛莫傳呉氏之先儀國尚矣其承藉於後者固未始乏人今某以經術致身屢參藩閫綽著聲稱所以紹儀國之烈以為呉氏之尤者安知不在今日乎吾見是集益将續書而不替矣某之後人尚其世世寶藏而篤念之哉䟦蕭氏族譜後君子之所以重其譜者葢所以敬其先而重其所出也族之有譜雖衰世之事而亦少寓宗法之意故後世賴之廬陵之曲山蕭氏其先為湖南人五代時有文昌者避馬氏之亂始來居廬陵今翰林修撰時中距文昌十有三世葢已五百年于此矣譜有乾𣲖有坤𣲖者葢本於文昌之五世孫廷珣廷珦兄弟各以其子孫系于二大𣲖之後今時中出於乾𣲖則為廷珣之裔也廷珣之子麟為仁化令者嘗修緝家譜其後亡軼十不存八九至時中之考樂存先生乃掇其遺亡補其缺略於是世次之先後族屬之踈戚子孫之傳叙始粲然備見於其間而所謂舊譜者至是復完而無恙矣時中間以示予而復求一言以識之予故推本其先與其祖考致重斯譜之意以告其後之人俾於是有以敬其先而重其所出而不至於輕忽廢墜則其詩書福澤之美子孫科目之盛将由是而益光顯矣詩曰毋念爾祖聿修厥德吾於蕭氏尚深有望焉䟦勤禮堂巻後為政不可以無禮禮以定民志而一風俗也孔子曰齊之以禮又曰上好禮則民易使禮散在於事物之間而行之則在於人君子行禮以導民非本於勤未見其效之有成也余友蕭君雲高為安吉令在職三載孜孜不怠示民以禮而秩然有其序上下之間無鬬爭凌暴之風非勤於禮者其能若是哉蕭君尚朂之他日以良吏書於史册必以安吉為首稱余當執筆以俟表百官賀册立皇太子表伏以天命維新隆萬年之寶運皇儲肇建光列聖之宏謨中外交歡臣民均戴恭惟皇帝陛下天地之大日月之明文武聖神同符於堯舜剛健中正敬承於祖宗廣德敎於華夷霈鴻恩於逺邇明彰至理茂啟鴻圖隆太平於邦家建元良於儲副盛禮渙頒於寶命前星炳耀於青宮上允協於天心下永符於人望所以承宗社神靈之統所以係海宇臣民之心𢎞福慶於國家衍太平於萬世臣某等欣逢盛事喜切中心外順内安仰皇明之如日河清海晏祝聖夀以齊天百官賀皇太子箋伏以寶運隆興衍皇圖于萬世重明麗正表儲位於東朝逺邇騰歡神人交慶敬惟皇太子殿下天日之表龍鳯之姿躬膺册命之榮昭受元良之寄宗社所重永屬於繼承華夷之心咸深於歡戴臣某等幸兹遭遇實切抃欣日月光華仰前星之炳耀乾坤清泰祝睿算以隆長命婦賀皇后箋伏以天佑大明茂隆寶祚皇儲正位永固邦家敬惟闕端一誠荘慈仁寛裕柔順協坤儀之美肅雍著内政之成斯以闗睢之和茂彰麟趾之瑞儲宮肇建得四海之歡心宗社隆安重萬年之邦本妾某氏等均切欣愉謹伸慶賀祝皇圖於永世祈睿算以千秋賀嘉禾表伏以帝德承天盛世肇開於景運至仁育物萬方表瑞於豐年喜溢神人歡騰中外恭惟皇帝陛下道隆堯舜聖協禹湯廣大如天包六合而無外博厚配地普萬國以皆春感和氣之冲融致休禎之屢應維兹東甸地接神京慶令節於三秋來嘉禾於九日金莖濯露耀光采於彤庭玉穗揺風布馥芬於紫殿匪以備粢盛之薦實乃見仁卉之蕃共瞻同頴之竒快覩盈車之秀斯聖神之感格致寰宇之豐穰生民咸樂於生成天下同臻于熙皥臣某等躬逢上瑞誠切抃歡日月照臨贊皇圖於一統乾坤悠久祝聖夀於萬年賀平㓂表伏以帝德廣運萬方咸囿於仁恩聖武駿揚羣醜莫逃於天憲斯以成功之速皆原睿算之神中外均歡神人交慶恭惟皇帝陛下聖神文武睿知聰明道合唐虞德業經緯乎天地治隆湯武事功卓冠於古今凡居覆載之間悉在照臨之下惟兹不靖屢擾邊氓肆動天威肅馳虎旅将士用命奮發於雷霆宵小潛形莫逃於斧鉞戮兇渠而不釋執醜類以咸來訊馘獲俘男女耄倪之載路連雲擁霧馬牛輜重之入闗灤河萬里以長清沙漠一塵之不作兹皆本於宸算用永靖於邊隅隆宗社之尊安衍治平之福慶臣某等恭逢盛事喜切中心海晏河清仰神功於永世天長地久頌聖夀於萬年謝追封三代表為安逺栁升作伏以皇明啟運溥惠澤於羣生帝命誕敷錫褒封於三世蒙恩深厚感戴奚勝恭惟皇帝陛下睿智聰明聖神文武功高列代化被萬方一德格天體無為而致治重華協帝建有極以錫民是以致天下於泰山之安而措宗社於磐石之固也伏念臣升才質猥陋智識凡庸昔備戎行薄殚勤力幸際風雲之會忝膺封爵之榮䘏典載加尚不㤀於先世恩光下逮復顯被於幽明若斯異數之頒實出非常之賜春生泉壤喜溢門庭𢎞深天地之仁永逺子孫之寶臣升敢不懋勤夙夜罄竭鄙愚俯攄葵藿之誠少效涓埃之報望天顔於咫尺莫展寸忱頌聖夀於萬年敬伸三祝追封謝表為應城伯孫享作伏以聖德𢎞深䘏典特隆於今日寶章焜燿推恩復逮於先臣喜溢幽明豈勝感戴恭惟皇帝陛下道高堯舜功冠禹湯斂福錫民被八表而無外法天圖治協萬國以咸寧同臻熙皥之仁均被生成之賜伏念臣父巖昔侍藩邸幸備使令繼靖奸兇獲殫微力論功行賞金書特荷於褒封竭慮攄誠白首尚懷於報稱詎意溘先於朝露載蒙申錫於榮恩顧兹異數之頒實出非常之命永逺子孫之至寶恢𢎞閥閲之輝光臣敢不勉効勞勤繼承先志益圖補報上答君親日月九重瞻天顔於咫尺乾坤一統祝聖夀於萬年銘聚奎堂銘有序少傅工部尚書兼謹身殿大學士建安楊公嘗得隙地於長安東門之南構屋為朝退宴休之所方落成適當取士之期故事第一甲三人例授官翰林既就職同官必相與設宴以致慶時翰林公署未成學士江陵楊公請於公之居成禮焉於是羣公畢聚冠衣儼飭進退有容宴飲甚歡少傅廬陵楊公遂名其堂曰聚奎葢謂奎主文章以貺今目文儒之盛其兆若前代五緯之聚奎然惟昔太丘長陳仲弓嘗謁高陽荀季和二家子孫皆賢德時太史奏德星見以為五百里内有賢人聚當今文明盛時諸君子皆才德之賢相與會聚又咫尺宮垣之近安知今之職星象者不有所見哉名之曰聚奎宜矣一時士大夫咸歌詠之間示余屬識一言因序而銘之曰維昔五緯聚奎符禎其禎伊何天下文明粤有顯象名曰德星賢人所聚其瑞斯呈在昔既然今豈無徵翼翼高堂近接帝城君子有位持國之衡君子宴休思政所營國家閒暇海宇乂寧賢才奮庸接武登瀛乃啟宴樂乃集時英尊俎在列朋酒斯馨冠衣有偉秩秩儀刑醉不失度樂而合貞匪樂之慕惟禮之成維此君子濟濟在廷匡時致治際此嘉亨象由天顯肇自人興惟我皇明聖聖相承春涵人煦和氣薫蒸人賢維茂象緯斯澄觀占有式仰察惟精定應􅂷象昭此昇平豈俾前古獨擅厥名斯堂之光羣公之榮我作銘詩永揚嘉聲時敏齋銘有序六經之言學肇自武丁之命説而惟學之道曰遜曰時敏而已遜則虚以受人而如有所不能敏則勤以勵已而如有所不及大抵天下之善無窮君子之學無已春秋代序老冉冉其将至不遜志時敏學其有成哉友人郭君鼎貞自少有志於學虚已下人有惟恐不及意嘗以時敏名齋葢以自警也今歴仕秋官而夙夜拳拳猶不㤀乎學誠可謂無時而不敏者矣君來徵銘有不可辭乃為之銘曰惟皇降衷均厥賦予曰義曰仁德莫不具惟德如何有積乃大君子于學思罔或懈詩書六藝藝在方册窮覽貫通時敏之力念兹在兹勿玩勿愒無或半途斯道可至譬乃鑿井深則及泉亦猶播種勤則有年嗟嗟學子矜世衒名鹵莽滅裂詎底其成一暴十寒既作復輟茫如望洋瞠若先哲卓我郭君鋭志莫遏慕古為學期於上達學優既仕篤志力行恪勤于職業業兢兢早作夜思赫其若臨涵養操存祗栗一心齋居有嚴日新又新我其銘之尚朂後人樂善堂銘有序平江伯陳公瑄嘗以樂善顔其堂間屬予繹其義而為之銘予惟善者德之純美無雜原於天而具於人人皆有之也然人之於善能慕之者鮮能好之者尤鮮也至於樂之而不倦者非其言與行一心與理融而為誠身有道之君子者不能然也公今為國柱石勲庸著於旂常聲望重于海内而其平居樂善孶孶焉有惟日不足之心是真所謂古之君子而誠身有道者矣予故樂道之而為之銘曰惟人之生萬善咸備至純不雜至精而粹其善伊何曰義與仁曰禮與智本乎天真大而綱常微而動息當理不偏皆善之德衆人慕之亦鮮克好君子樂之深造夫道猗與平江為國重臣勲業之茂德行之醇含英咀華由中達外以善為樂心廣體胖其樂何以日用從容言與行一心洎理融非仁不為非義不履左之右之折旋規矩斯實可樂厥身乃誠德崇業廣益鴻厥聲吾聞積善必承天祐匪惟身榮實昌厥後猗與平江享有崇封孫子多賢夀考彌隆高堂奕奕君子之宅咨爾後人永世無斁黙齋銘凡人有言恒吐于口樞機之發榮辱所召維言如泉維口如隄涓流弗謹為河為溪是以君子不易于言守口如瓶懼致尤愆匪惡於言而尚以黙發必當理以寡為德我觀佞夫利口諜諜招怨賈禍曾不自慴君子存誠克念克敬謹言慎行表裏交正有翼其齋聖賢是則監此銘詩其永無斁陳思孝硯銘其質澤而温其體重以確逾端溪之子石超鄴下之銅爵涵清泉於靈竇起𤣥雲於齗齶集毫端之芳潤散妙蹟於製作斯所以常侍乎君子而為至寶之太璞也明其明銘人之有心具夫衆理虚靈洞徹如鑑止水是曰明德乃得於天四端既具萬善備焉人惟有欲耳目口鼻外物誘之為欲所蔽本體既昧明德斯昏涵養克治其明乃存惟目亦然明以能察高視八寰微見一髪亦既病矣若或翳之匪伊視逺為眊為眵百病所攻甚者在目弗有善醫明曷能復猗與陳氏術業專門二世攻目慶澤攸存爰築居室揭顔明明金鈚電掃以啟羣盲嗟彼世人心盲目瞽内外交蔽㝠行弗顧陳君明明盍治其内内寧外安良醫之最我作銘詩以懋厥德朂爾來裔鍳兹靡忒贊職方周先生畫象贊君以弱齡挺特自異讀書學古奮然有志栖遲林泉泊乎布素弗競弗趣履坦居易中遘休運始出而仕首敎桐城作興士類繼佐即墨政是用理入敎國子揚于道義擢輔親藩正言不諱益堅其守益昌其氣知遇聖明弗為擯棄既出復入遂為博士遄以廷薦躋于顯位用副職方以贊于治白首不渝志操彌礪冠衣有容屹若山峙匪容之充惟德之似尚期老成臻于百嵗後千萬年詒于孫子張宇清真人畫象贊葆冲毓和如春之融與道為徒𤣥敎之宗下上太清浮㳺崑崙憑虚馭氣惟以永存胡敬方先生畫像贊問學該洽有本有源也操履純正弗頗弗偏也浩然有為以古人為徒也儼乎可敬斯君子之儒也陳㕘政子魯畫像贊績學鄉郡而發身乎科第列官詞林而親承于帝制懷謹畏以自持躬儉約而不肆適遭遇於聖明遂超躋于秩位爰周歴于遐陬重敷宣於德意恒夙夜以兢兢戒淵氷于顛墜浩乎而氣益充毅焉而操愈厲於乎此所以永保終譽而克享富貴者也蒋侍郎􅂹小像贊貌温而氣和行篤而志確以文學而㕘侍從以編摩而居館閣周㳺兩京之間歴事三朝之際方躋學士之榮遄陟秩宗之貳謂宜享夀禄之遐胡遽有死生之隔覩遺像之儼然發永慨於今昔陳中書登畫像贊儼乎其容癯然其状以文藝而馳聲以翰墨而自放識彌廣而辨愈雄志彌堅而氣益壮知之者以為博古之老成而仰之者咸稱為中秘之哲匠於乎此其所以優㳺夫石渠天禄之間而翺翔乎鑾坡鳯池之上也劉僉憲咸畫像贊氣和而充識周而通發身科第歴躋顯融豸冠在首華珮在躬凛乎風采君子之容蕭深州畫像贊發身本乎儒雅歴官至於老成覩其容儀則粹然圭璧之温潤觀其持守則毅然松栢之堅貞規畫有條而政自理撫字有方而民以寧追穎川之遐躅揚渤海之芳聲於乎此其所以為豈弟之君子而遭遇乎太平者也陳太守希顔畫像贊猗與涇州本乎世德温温其儀侃侃其色蜚聲橋門發身經術首佐邦刑亷公正直敭歴數郡稱於其職不猛而威匪緩而亟惟寛惟平以著厥績惟忠惟勤以報于國豈弟君子夀考之錫猗與涇州其永無斁林推官同畫像贊才可以適時學可以淑身亷可以養德惠可以及民斯所以克任夫官政而無忝於搢紳予雖未窺其際而知其有守有為為君子之人也傅玉良畫像贊氣充而粹性介而方弟兄師友才學之良爰發身于科目遂受任以長民處煩劇而弗激弗撓盡撫字而益厲益勤偉矣衣冠之美儼乎豈弟之風尚曰彌堅於志操庶兹茂陟于顯融羅以德畫像贊其外之坦坦其中之舒舒究羲畫之微旨誦老氏之遺書適起辭於雲壑遂歴覽于金門是将優游於太平作江湖之散人而為市朝之隱淪也彭敷哲畫像贊粹焉資質之美浩乎辭氣之充篤信聖賢之要力求經術之通涵養獨嚴於省察操持克秉於謙冲藹藹菁莪之化優優麗澤之功豈曰範模於一郡寔将致位于顯融斯所以行成於已道行於人而􅂷令名於無窮者也袁貳尹景陽畫像贊氷涵其潔玉粹其容學優而仕才敏而通豈弟之政循良之風夀雖弗厚而獲令終位雖弗滿而德則豐允矣君子􅂷裕無窮夀星贊居狼之北舒陽之榮秋中方旦于丙揚明既應夀昌亦昭治平孰測天象而圖厥形噫此所謂南極老人而符盛世之徵也與余弟幼學以永樂壬寅秋九月自西江來省予北京永嘉謝庭循為作行樂圖小像其歸也余為之贊其詞曰浩浩乎氣凌于宇宙飄飄乎志在於江湖閲歴飽諳於世故辛勤幸守於儒書惟事親敬兄益敦於孝友而待人接物何有於亷隅政此優㳺於􅅵畝故将終老於衡廬撫雲松而嘯傲諧觴詠以自娯坦坦焉舒舒焉其所以無榮無辱無毁無譽介眉夀于未艾與六逸而為徒者也袁處士景哲畫像贊蘭玉之操氷雪之姿孝友之行君子之儀優㳺太平讀書誦詩後千百嵗子孫之思袁士建畫像贊蒼然不變者松柏之貞湛然不汙者氷玉之清作士林之翹楚紹文獻之家聲晚際風雲之會幸霑一命之榮惟歉焉而不足乃自任而弗輕匪曰力行於豈弟寔以圖報於聖明於乎此所以行期於古用適于今而為練達之老成者也楊德誠小像贊刑部侍郎勉之父神完氣充以養其貞幅巾逍遥以遺其名曰夀而康以篤其慶子孫之蕃以樂太平丘處士時用畫像贊其容之温温其言之恂恂居郷而忠信是與居家而禮義是敦招風月以為友約詩書以為鄰邈乎􅅵畝之志悠然湖海之情此其人所以養之厚居之安而能樂乎考槃者也陳俊文畫像贊為欽天監挈壺正寛和而不廹謙慎而不矜探賾象占得義文之奥究察地理識隂陽之情早受知於明聖寔見重於公卿名列五官之秩恩沾一命之榮斯所以朝衣朝冠日近天顔而出入乎大廷者也黄子範畫像贊抱敦實之學負耿介之資不翕翕以附衆不汲汲以趨時其行已則素高於道義其居官則無間於終初求其人似有黄叔度之風視其貌葢亦崔斯立之徒於乎清江碧嶂之間蒼松白雲之外尚俟予懸車而來相與詠歌太平以為香山之會者也太醫院判蒋用文畫像贊盎然而温者春陽之舒介然而清者氷雪之敷養之深而氣益充行之篤而守有為匪曰究通乎經術之懿實亦兼盡乎醫師之良斯所以遭遇於明時而瞻乎日月之光顧老而彌篤者服勤報國之心至久而弗衰者濟時澤物之志於乎此其為忠厚之士而無愧於君子也蕭欽讓畫像贊褐衣角巾瀟洒出塵藴謙和之美履孝友之純磊落田園之趣逍遥風月之情惟是閒散之可樂曾何榮辱之足驚宜其夀考康寧無憂無慮而享福於太平者也贛之寶臺觀道士丹霞子畫像贊盎乎其氣粹乎其容練真保龢探賾𤣥宗玉珮雲裾振揚天風上朝紫宸遐觀鴻濛與道為徒何始何終僧録司右覺義雲山畫像贊至哉佛氏稱大雄甚深微妙具圓通法身變化不思議十方充滿妙難窮雲山學佛出南詔當年被召謁九重襌林修習得清净精持戒行勤初終菩提妙義時演説慈雲下布蓮臺中伊誰著此丹青筆為貌滿月開真容輝光一時徧寶刹人人讃歎生敬恭我聞佛身出萬刼不生不滅了無蹤恒以太虚為體相視此妙法皆虚空雲山究竟無係著須離諸幻超夢夢慈悲利濟悉平等成就願力揚宗風永贊皇圖隆佛道四方八表登時雍董長史畫像贊學足以明理亷足以守身謙乎其不伐介焉而不羣出則長民於百里入則領敎於成均揚休嘉於藩邸挺風裁於搢紳繄豈弟之君子庶無愧於古人趙長史畫像贊肅容正冠儼乎有思也篤學力行浩然有為也廟堂之器松栢之資也永保終譽夀考為期也彭子斐畫像贊世承文獻之懿家傳專門之學得褒貶於師承究微言於先覺浩然而氣愈充欿焉而志彌約接論議於搢紳與讐校於館閣是将鳴太平之盛為道德之光而作髦士之矩矱也于中書子楫畫像贊翛然林壑之清烱乎氷玉之潔託闤闠以自高處布衣而弗折際熙運於昕朝沐榮恩於晚節偉命服之雍容兼綵侍以娯悦適几杖於燕休寄嘯歌於風月綏福履之未央享眉夀於大老至郭郎中鼎貞畫像贊衣冠之族汾陽之胄振家聲于兩郡之間承世澤於千年之後爰發身於科目遂擢任於郎官平恕每存于心曲聲華素滿於朝端顯融幸際於清時補報敢忘於白首庶幾眉夀以為期尚播休光于永久贈翰林編修曹處士畫像贊編修義之父也養以澹泊居以坦夷春風秋月衎樂以熙優㳺太平夀考遄躋爰用子貴畀以清秩命服之華儀容有飭子孫其承永世無斁張和卿畫像贊陜人今冬官正明之父也在昔夀州牧守維良酡顔鶴髪煜其有光皇用追錫寵以天章善既弗替慶則未央猗與夀州其永弗亡郭處士檜林畫像贊汾陽之系忠武之胄詩禮之傳衣冠之舊惟善是承惟德是懋尚永無替以貽厥後龔仲塤畫像贊養乎内澹然而自足接於外温然而可掬雖托迹于公卿亦忘情乎榮辱緑髩朱顔角巾時服步天上之春風散杏林之朝旭匪余識其平生伊誰知其幽獨於戲此所以為吾仲塤而有此康寧之福字説郭用檜林字説鄉先輩孔公貫道嘗名其郭氏之甥曰用而字之曰檜林且曰檜非常木吾夫子嘗植之闕里至于今子孫族人護視之益謹而不敢怠四方過者必拜而後敢仰觀焉檜之見重於聖人見重於後世若此則字豈可輕哉於戲先生之期待於甥者何其切至若是也先生殁已久其甥既長恒為余道其舅氏所以命名與字之意且屢請為之説余不獲辭則進而告之曰檜貞木也其質勁其性確其内栗而文其根盤而深其榦端而直其枝葉蓊宻隂翳滋潤上可以蔽天日嵗寒霜雪凌厲挺立霄漢氣色芒寒而略不為之變及取其材而試之則足以任重負厚柱明堂棟大厦屹立宇宙以為四方之仰瞻則檜之用豈不大矣哉人之為人鍾和萃秀直方雅厚以端其性敦柔温裕以養其心輔之以仁義忠信載之以詩書禮樂剛正𢎞毅内之而無所歉外之而無所怵一旦推而達之於天下國家則足以尊主而庇民濟人而澤物建功立事顯融當時以埀聲光於久逺者其用亦𢎞矣檜林尚顧名思義兢兢焉閔閔焉生息涵養以充于其内培封扶植以立于其外将見繁殖滋榮摩霄戞雲鬱然成林材不可勝用矣昔檜林之先人德存甫温雅篤厚好施予以醫藥濟人與先少保尚書雪厓先生交莫逆其時貫道公尚無恙先少保與公往來尤極雅善四十年之間前輩風流若逝波不可復見矣獨檜林猶能稱道其一二以益余之所不及此為可嘉者檜林勉勉尚求之無負于舅氏之命以為斯文之光則他日所至又未可量也傳蒋侍郎傳公諱驥字良夫姓蒋氏錢塘人也祖秀實以隱德終父均美以公貴封左春坊司直郎母姚氏封安人公少好學攻文辭弱冠以春秋經試淛江鄉闈居前列遂第進士擢行人能其官永樂初太宗皇帝詔文學之臣纂修高廟實録公與焉書成陞翰林檢討賜白金文綺襲衣已又與修永樂大典為副總裁賜楮幣綺帛前翰林學士解公出為交阯㕘議以事逮獄公坐累拘幽者十餘年中扃坦然日以書史自娯未始有幾微怨懟仁宗皇帝即位宥復前官逾月陞左春坊司直司郎今上皇帝嗣統之初以宫僚恩遷翰林侍講宣德紀元奉命祀東鎮洎大禹南宋諸帝陵竣事遂得便道省謁其親公家錢塘二親高年在堂且膺封秩公復使命歸本郡方岳重臣以及郡邑官僚咸瞻望下風公歉然不敢當日戲綵承顔以夀其親椎牛釃酒以宴集其姻䣊鄉人榮之歸朝與修兩朝實録書成賚賜循永樂故事復進秩侍講學士無何上命左春坊大臣簡廷臣之才且良者佐六卿公膺選授禮部右侍郎衆慶得人蒞職逾二旬得夙疾不移時遂卒上聞為之悼歎遣使賜祭且給舟歸其喪命有司為治祠墳恩典之加可謂厚矣於乎公天性孝友嘗迎司直公就養京師朝夕起居侍奉備至獨母安人道逺弗克就居嘗悒悒以前此奉祀匆遽不盡膝下歡屢欲歸省值編摩事劇不果言及輙欷歔慨嘆兄弟二人公居長與其弟友愛無間言公素善筆札嘗奉命書列女傳特被褒賞禮部會試兩為同考官時推其公為人美丰儀善談論尤喜賓客所居軒楹清曠几席整潔佳花異卉雜植前後客至詠歌觴酌歡如也其雅懷洒落葢如此予毎私竊自念同年數人在朝多顯仕公獨居散秩洎遷學士深以為慶拜侍郎益為之慶葢兾其有為以遂其平生所志也奈何天不憖遺遽焉殞逝聞者莫不痛之公享年五十有三所為詩文總六巻前後所録公多手筆云贊曰士之負才器問學固将有為於世也其或仕與時違不能奮揚其藴蓄葢有命焉耳一旦遭逢可以有為矣而天不假年志與願乖豈非命耶若蒋公久居散秩中值坎坷仕将終身逮逾中歲躋于顯融足以自見而奄焉捐世信夫命之不可以强也雖然公平生所致磊磊若此亦可謂傑特之士矣夫復何憾哉袁義士傳袁大珍字仲仁其先鄞人也自其曾祖以禮來官金華遂為金華人仲仁生元之季遭亂而廢學其父嘗告之曰汝無以弗學為歉古人往往有不知書而所行自不悖于道者汝苐能篤于信義使鄉閭稱為善人斯可矣仲仁謹識之不㤀遂刻意樹立營植生産孝事二親朝夕惟謹父殁哀毁幾弗勝母董氏患末疾日扶持在側未嘗頃刻違去至躬親矢溲前後凡五載如一日從兄大通客死東甌仲仁匍匐往收其遺骸以歸嫂張氏呉氏孀居無子仲仁養之終身二姊適寗氏與皇甫氏皆寡為迎歸于家畢其男女婚嫁割田園贍之度能自給乃已撫其孤甥姜某為之擇配養其外姑楊氏幾四十年而終友人張彦希仕為雲南幕官致政于家一夕夫婦為仇家所殺惟一女甫生仲仁往哭彦希甚哀為持其女歸養之如已子且為迹其盜禽之皆置于法鄞人蘇某至金華遇疾同行者委之而去仲仁遣人舁至家求醫藥甚切疾愈其人弗忍去者久之郡人死無葬地多焚燒棄其骨江流中仲仁乃捐其負郭田若干畝俾葬之人呼為義塜又嘗用己貲為石梁造二舟以濟行者人感德之鄉黨皆稱為義士云贊曰古之人雖一才之美一行之懿莫不著之史傳以至百世之下猶使人仰而望之得以感發而興起矧仲仁平生善行之昭著於時非一而足其傳於後世復何疑哉故為之傳以俟時之觀民風者有所採焉王母洪孺人傳王母姓洪氏字宗南台之寧海人唐開元間有為諫議大夫諱某者其始祖也代有衣纓為鄉鉅族祖某父某洪既笄適奉化王宗禮王故著姓與洪閥閲相望宗禮父元帥府萬户伯英伯英父連山鄉官希伯希伯父兩淛運榦子震而距唐銀青光禄大夫檢校太子太傅敬玘寔宗禮十三世祖云洪歸王氏生四男子文琳文葩文琖文㻸時王氏之族人被鄉人誣告逮赴京宗禮為白之皆得免及還道感疾劇甚臨終謂洪曰死生命也吾無所顧惜所念者二親埀老諸孤稚弱未有所託耳君能成吾志乎洪泣曰夫在且猶敬事撫育不敢怠矧夫亡乎有不一心王氏者有如日遂斷髪為誓宗禮卒洪年甫三十居喪哀戚甚終身不事膏沐躬親饋食養其舅姑舅姑殁盡禮喪葬且日夕攻絲枲資遣諸子就外傅受業時今户部尚書兼謹身殿大學士延平陳公伯高典敎奉化洪謂其仲子文葩曰吾聞陳先生賢而善敎汝家世以宦業著聞汝父嘗以早卒不獲繼先緒為憾汝盍往就學以成父志文葩遂負篋入縣庠從陳公游學成今為國子生方嚮用于時洪性嚴正而好施與王氏族聚蕃大洪於諸母行最尊羣子弟有不循先世遺訓者入見輒諄諄訓諭有不悛者嵗節會拜必公言於衆愧之否則令諸子姪白於族長黜辱之必改而後已鄉鄰宗姻死喪患難不能濟者即捐貲助之且語諸子曰此為汝輩植德計勿吝也年登七十有七尚康强無恙鄉閭閨閫之稱女範者悉歸之見孫曾四世云太史氏曰女婦之德見於載記尚矣守貞節者孝慈或鮮聞况能以敎淑其子及其宗族乎若王母洪氏者其兼而有之若此豈非女婦而士行者耶則享有夀考宜矣其子方将佩服懿敎力學以顯名於時吾見其與古之稱於載記者不幾矣哉哀辭贈奉直大夫左春坊左諭德楊公哀辭有序泰和楊公子将其先葢出漢太尉震之裔轉徙錢唐歴廬陵吉水始家于此祖景行元進士官至翰林待制有盛名公自少頴敏過人讀書力學總角已有聲藉藉其為文操筆立就逈出時輩儒先長者皆器重之平居孝於親友於昆弟忠信篤厚出自天性閲歴險夷終始一致拯顛濟危汲汲然惟恐不及而不幸享年不永卒之嵗纔三十有四一時賢士大夫莫不哀悼之予生晚弗及瞻望公之風采幸與公子士竒同官禁林出入侍從幾二十年公以子貴荷蒙恩眷贈職宫僚寵光下臨賁及幽壤公之所以得於天而敷遺於其後者可謂盛矣公潛德懿行以具載墓碑予不能無言獨哀之以辭且以慰吾士竒罔極之思而昭示於無窮也辭曰繄闗西之苗裔兮瞻閥閲之孔華抑太尉之盛德兮矢清白以傳家羌華隂之遥遥兮卜錢唐而轉徙再遷於廬陵兮耀官牒之有煒繇文江與西昌兮潏慶澤之彌深騁逸軌於文塲兮待制處乎詞林睠夫子之克承兮偉妙齡之英秀方髫齔而知學兮披奥義而研究惟天性之孝友兮敦行誼於彛親探聖賢之遺言兮廼克踐于其身年甫冠而馳聲兮抱韋編以就試掇餘思於倉卒兮尚足䇿乎高第播鳯雛之美譽兮忽振舉而逺揚蟠錦繡于胸臆兮摛五采而成章倐元季之驛騷兮聚羣盗而蜂午既焚刼于州閭兮肆蒼黄而莫措痛叔父之罹害兮竟殞命於異區還撫棺以號痛兮寧暇䘏于吾軀因脱生於虎口兮遂竄伏乎山間擷澗芳以為養兮怡菽水之歡顔奄二親之傾逝兮勉致力於襄事妥窀穸以安厝兮惟斂葬之兼備際寰宇之廓清兮揭日月於中天言将返乎故業兮復先世之清氊何天道之難諶兮遽嬰疾而弗起慨山木其頺壞兮慘悲風之滿耳謂夀夭之不齊兮諒資禀之既豐胡天俾其才兮而竟嗇其逢念厥躬之韜晦兮實流慶于𦙍嗣藹令望于士林兮職清華而嚴䆳膺紫誥以寵贈兮煥雲漢之天章豈曰耀榮于今日兮雖百世而有光嗟予生之獨晚兮仰夫子之遐躅慕高風之寥廓兮空徬徨以于鬱盤古之崔嵬兮閟音容于夜臺聊寓情于一些兮志予心之永哀黄孟鉉哀辭吉水黄公孟鉉以頴鋭之資淵懿之學識趣超詣才思逸發其立心期至於古聖賢之道為文章若泉湧川匯浩乎其不窮沛然而莫禦每有所著人爭傳誦之以為楷式洪武中用薦為鎮江幕屬治效尤著尋以事免官家居益致力於聖賢之學四方從㳺者森若束筍公循循善誘多所造就得其學者往往皆當時名士公為人孝友純篤志趣卓越虚已下人不事表襮襟度洒落夐出物表言動之間恂恂謹飭樂易和平見者心醉予嘗辱交於公獲承公之緒論以為可久相處者曾未幾時而公遽捐館舎矣感今思昔為之慨然爰申之以辭少據予哀且以慰公於地下也其辭曰維公之特兮資性天成仁山之秀兮文水之英藻思俊發兮始於幼齡聰頴絶人也遹馳厥聲涵泳百家兮沉潛六經逺企聖域兮玩心高明虚以受人也弗矜弗盈淬磨砥礪兮研思覃精蓄之既博兮藴之益𢎞發而為文兮五采縱横咸韶並奏兮金石鏘鳴江海下流兮波瀾泓渟武庫洞開兮衆寶晶榮瑶穹澄朗兮萬象森呈時既弗遺兮期道之行位不滿德兮孰究其能遽焉退休兮詠歌太平從者如雲兮視公儀型胡天之嗇兮奄然長征獨乘元氣兮遨逰太清庶幾精英兮隨物流形凝為卿雲兮粲為列星令名弗泯兮千載猶生於乎懷公兮永以為徵祭文祭太保陽武侯薛禄文追封鄞國公諡忠武惟公之生夙負才略乘時奮興鳴劍横槊公負剛勇義膽忠肝為國靖難惟公桓桓感會之機雲龍風虎公所自任惟忠與武天戈所向如霆如雷公冒矢石無堅弗摧既清内難既奠邦國爵位超加有聲赫赫疆場有警六師親征公為前驅沙漠肅清積勲累勞荐受褒典進位師臣極于崇顯公結主知終始一心屹為柱石以身自任爰城朔方爰度爰築亦既克完而公病篤還京入朝力疾自陳賜藥命醫恩意益勤公宜少留溘爾遐棄訃聞興嗟錫爵賜諡存殁哀榮如公幾人公死無憾失兹老臣予輩交㳺同在朝列自公云亡孰不嗚咽爰潔一觴載陳以辭公靈如在尚其鍳之祭宋駙馬琥文惟公出自名閥器宇端厚昔在太宗選配貴主嘗命鎮撫西陲式副倚注繼命居守南京小心周宻彌效勞勩既而閒居數載恪謹自守皇上用篤親親任以心膂而一疾弗支遽焉長往宸衷軫念所以眷禮於公者甚厚公可無憾矣某等辱在交㳺切深感悼馳詞致奠涕淚交零靈爽如存尚祈歆鍳祭僉都御史嚴升文惟君有學有行早擢科第首為牧宰稱於其職繼僉外憲改佐郡符入典郎署遂貳大理滋歴嵗年益嚴操履朝廷重耳目之寄陟僉憲臺自蒞職以來夙夜惟寅振起紀綱剗决宿弊政令一新人用畏服夫何一疾遂以不起凡在同朝皆為傷悼某等相望非邇弗獲躬赴緘詞逺寄寓此一觴君尚有聞鍳此誠悃祭兵部尚書張本文惟公器宇清粹性行剛介負通敏之識藴經濟之材始服官政宰邑有聞用登郡守遂叅大藩入佐冬官復贊邦刑敭歴中外聲譽咸彰操履之嚴始終一致仁考繼統之初急於用賢首擢公司馬皇上委任舊人益隆寵眷加授宮僚復命兼職地官公夙夜孜孜講求治理嘉言讜論日進于延整飭兵政懲濫冒之失清理錢榖革欺漏之弊黽勉不懈一心為國上納其忠人服其公惠利及於軍民事功著於朝廷方兾績效之成以副倚托之重詎意一朝遂成永訣當宁興悼䘏典有加凡在聞知罔不傷感某等久同朝列契誼尤深忽此相失涕殞心摧繼今欲承顔接辭以罄平生而音容日逺不可復得矣一觴薦誠想公如在公其有知來格來歆祭户部尚書郭敦文嗚呼公之器宇靜厚而凝峻公之德性孝友而謙和公之存心處正而不阿公之持身厲操而不變方入仕之秋遭聖明之日首登郎署繼任郡守用佐藩閫賛貳六卿爰陞陟於地官遂總理於邦賦身任勤勞而不替心懷忠鯁而不忘歴事四朝揆始終而一致踐敭中外亶清白而一心屬兹委任之隆宜享夀禄之富何一疾之弗支竟逾月而不起九重為之興悼百僚為之惻傷某等辱在交㳺久同朝列忽一朝而永訣與萬古而長辭爰陳菲奠寓此哀忱惟公不亡庶其鍳之祭胡學士光大文贈資善大夫禮部尚書諡文穆惟公之生器宇夙成粤自髫齔煜然有聲壮逰江湖襟度洒落傲睨物表寄興寥廓繼登庠序學問益充如玉斯琢如金在鎔射策决科蜚聲塲屋一魁天下人望所屬爰歴清要列官詞垣步武玉堂出人金門備承恩遇眷顧益隆論思獻納夙夜在公掌帝之制温純典雅雲漢之光被于華夏黼黻鋪張皇猷日宣地位清切委任尤專帝命時及賚錫繽紛繡衣象簡照耀青雲公既蒙恩益勤厥職慎宻小心靡間朝夕方期眉夀以享榮名豈謂二竪倐焉相嬰薤露興歌九原不作聖情嗟悼百僚駭愕䘏典攸加褒贈愈厚公死無憾後世有耀顧惟交㳺中心孔悲昔也同列今焉永辭旅櫬言還道路悠邈睠兹故鄉窀穸是託臨岐祖送涕泗其滂哀哉長訣萬古一觴祭兵部尚書陳洽文鎮交阯殁于戰陣贈少師諡愍節惟公之生性行貞純忠謹謙和翼翼恂恂初以才薦首列近侍繼典銓衡載職大理夙夜弗懈惟明惟公寔稱委任仰副宸衷交人梗化肆造叛逆公贊元戎屢效勞績閲歴二紀撫鎮炎陬累征不靖惟公懐憂寧橋之役公謀既善彼拒弗納失在輕戰師徒為衂宼勢披猖惟公秉義奮氣彌剛公蹈白刃如履平地一心為國有死無貳孤忠偉節日月争光凛凛英風振于遐荒公死如歸國有懿典生著榮名殁尤光顯稽行錫諡恩䘏有加命子以官鸞誥寔華予忝交㳺夙敦情好公既永逝益增悲悼有殽載俎有酒盈尊一觴致奠靈爽如存祭駙馬都尉廣早侯袁容文惟公出自勲閥選居戚里文皇靖難首效勞勤翼贊城守設施有方用濟艱虞茂膺褒錫榮賁三世肆加恩數遂董督府以贊軍政從容慎宻亷公寛和親賢樂善文雅恂恂不矜于已不驕于人方兹委任期輔邦家胡兹一疾奄然而逝逺邇嗟悼中外盡傷某等叨同朝列咸切哀痛九原日逺瞻望無由有潔其觴有楚其豆庶鍳于誠歆此一奠祭胡學士文惟公負剛介之資抱明敏之識學究乎天人才高乎時俗早發身於科第遂敭歴於清華出入乎金馬玉堂之間翺翔乎紫禁青雲之上論制作則黼黻乎皇猷備顧問則屢承於寵眷歴覽兩京載筆累陪于扈從馳驅沙漠服勤兩事於北征既屢躡於華階亦荐蒙於褒賜斯文為之倚望朝廷為之屬心顧年齒未登於五十而筋力正及於康强胡大限之俄窮遂九原之不復聖上軫不憖之悲百僚興云亡之嘆雖䘏典之加逈超于古昔而死生之感不盡于心私嗚呼哀哉公其往矣自今不可以復見矣瞻靈柩之南還悵雲山之遼邈爰敬奠于一觴痛永訣乎千古祭周處士宗坦文以逮對憲臺得直将南歸病卒于官舍嗚呼周君其所藴者仁義忠厚之德其所見者冲和雅粹之容其所負者英偉豪邁之氣其所尚者高蹈肥遯之風播芳聲於鄉郡埀典則於名宗仗先塋之大義秉尊祖之至公上京華以遊覽歴川岳之竒雄何高情偉志之弗遂奄焉一疾以令終嗟善人之不淑慨天道之夢夢視浮生於一瞬寔今古之所同其所貴者身後令名之不冺况夀年福履之兼隆諒仙逰九地以奚憾悵親交一見而無從邈音容之杳杳積予心之忡忡瞻旅櫬之南旋𣺌雲山之萬重持薄奠以攄哀靈彷彿兮來降嗚呼周君尚享祭夫人劉氏文憶自洪武庚辰之春予以薦赴南宮忝官近侍其冬即迎致夫人京師以就禄食未幾遭值國艱深切憂怖賴祖宗之佑幸以無虞既而荷先帝選用儒雅授職翰林逮永樂已丑之春承命扈從北廵明年從征於北以其冬還京嵗癸已復扈從北廵明年再征於北夫人以十三年挈家歸鄉里十四年冬予還自北京夫人復携二女來會十五年春車駕再幸北京予又從行而夫人復以是秋歸數年之間南北往來與夫人聚處者無幾去年春得大鵬書言夫人将買舟來北京聞之喜不自勝適其夏值予復有北征之行至秋八月始還京而夫人乃以五月十四日得暴疾而卒嗚呼痛哉夫人之病也吾不得視藥殁也吾不得臨訣殯也吾不得臨棺祭又不得以時嗚呼痛哉思惟夫人慈仁之德勤儉之行而不能相與偕老於百年使吾一旦失賢妻吾母失賢婦而諸子失賢母嗚呼痛哉比者聖天子蒞阼之初嘉念舊人蒙恩擢居保傅官列二品夫人亦荷二品鸞誥之封帝命下臨獨不得目視其榮早日子孫滿前綵衣後先跪拜笑嘻奉觴稱夀和氣滿堂何樂如之今吾之歸諸子諸女諸孫皆在獨不見夫人嗚呼痛哉奈何哀哉奈何嵗月逾邁夫人去世又已周朞而一坏未卜停棺在堂此實予責今将赴京已令諸子卜宅兆俟今冬安厝夫人夫人其尚鍳予誠一觴致奠涕淚交零中心梗塞痛何可言祭弟幼孝十郎文嗚呼吾弟命止此耶吾弟聰明磊落襟度秀爽脱畧不羈傲睨物表誦詩讀書操觚染翰鋭敏精勤超然獨得孝親敬兄交友接物周宻詳審曲盡人情理家治生創基治産相時經營咸適其宜公直亷介忠恕明信先義後利服于鄉閭英英之氣挺挺之識浩然之志獨步前驅方期有為如古之人繼志述事以裕厥後夫何一旦困于二竪奄忽長逝竟不可知於乎吾弟命果如斯賢若顔子尚嗇于夀雖在後世夀夭窮通此理一致抑又何疑况以吾弟明决自信臨終之言炳炳琅琅洞視古今中心坦然知命不懼視死如歸力疾據几援筆大書告以後事略無忌諱且命吾子再三寄聲死生訣别萬古無期惟此孤幼托之于兄提擕敎育兾其成立庶幾九泉瞑目無憾於乎吾弟言及于此終古之痛何以克堪兄於吾弟情深義篤幽明之間敢負斯言憶自曩嵗弟來省問兄從北征未及相見弟乃留此待兄之歸惟秋七月還自塞北詞林一見悲喜交集握手勤拳如解飢渴曾未逾月弟復告歸臨岐一别愴咽無言日月逾邁南北暌離十載之間如隔夢寐謂宜再見敘我情親豈期一朝遂成永訣於乎哀哉兄於吾弟病弗克視藥斂不及撫棺葬不及執紼祭不及以時號哭天涯永恨何追於乎哀哉人世百年寄此一瞬萬生擾擾終歸於盡吾弟雖殁幸有賢子長者奮立克振門户幼亦頴發不在人後殆天所畀以報吾弟惟弟不亡視此後人彼或夀考嗣續無傳殁同埃燼寂焉無聞兄視吾弟生既有立殁復有傳雖云蚤世無復遺憾於乎哀哉兄仕于朝二十餘年骨肉疎濶會少别多終兾歸老共樂丘園天胡不弔奪我賢弟命不可知遽至於此於乎哀哉我言有盡我思無時我淚有盡我恨無窮緘詞萬里以寫我悲弟其有知鍳此深情祭亡兄季質弟季緘㓜孚㓜孝文幼孜竊禄于朝埀三十載骨肉手足之情無日不惓惓于懷然尚兾會合有時庶少叙天倫之樂以慰久别契闊之私豈意諸兄弟數年之間皆相繼亡殁南北迢逓竟成永訣嗚呼哀哉吾於諸兄弟病弗能視湯藥殁弗能與殯殮葬弗能執紼以臨窀穸祭弗得以時終古之憾其何能釋兹者荷蒙聖恩封贈先世幸得歸省予家拜吾母見吾子孫族人見吾鄉里親識朋友獨不得見吾兄吾弟呼天叫地五内摧裂嗚呼予言有盡予恨無窮予淚有盡予悲無窮用致薄奠以寫予誠惟靈不昧來享於斯金文靖集巻十
